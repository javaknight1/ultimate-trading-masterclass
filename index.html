ul><li><strong>Common gap</strong> — occurs within a range or quiet drift, on no special news. It carries little meaning and tends to <em>fill</em> (price trades back over it) quickly. Fade-or-ignore.</li><li><strong>Breakaway gap</strong> — occurs as price <em>breaks out</em> of a base or pattern on heavy volume, launching a new trend. These often do <em>not</em> fill and signal real commitment. Trade the continuation.</li><li><strong>Runaway (continuation/measuring) gap</strong> — occurs <em>mid-trend</em>, as an already-moving market accelerates on fresh conviction. It often marks the rough midpoint of the move. Trade with the trend.</li><li><strong>Exhaustion gap</strong> — occurs <em>late</em> in an extended move, a final lurch on climactic volume as the last buyers (or sellers) pile in. It tends to fill quickly and frequently precedes a reversal. Fade it — carefully, with confirmation.</li></ul><div class='chart' data-scenario='gap-up' data-overlays='sma20' data-marks='note:24:96:breakaway gap out of base' data-title='NOVA · Daily' data-cap='A breakaway gap launches price out of a multi-week base on heavy volume and holds.'></div><p>Above, NOVA gaps up out of a long base on heavy volume and never looks back — the gap holds and a trend begins. That is the breakaway signature: gap <em>plus</em> base breakout <em>plus</em> volume, and crucially the gap is <em>not</em> filled. The unfilled gap becomes a support shelf; a later close back below it would be the warning sign.</p><div class='box law'><div class='bt'>Definition.</div> A gap fills when price subsequently trades back through the empty zone to the prior session&rsquo;s close. Breakaway and runaway gaps that <em>hold</em> (stay unfilled) confirm the trend; gaps that <em>fill quickly</em> behave like common or exhaustion gaps. The volume on the gap day is the single best clue: heavy volume favors breakaway/runaway; climactic-then-fading volume favors exhaustion.</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Breakaway hold vs. exhaustion fill</span></div><div class='term-body'><span class='dim'>Breakaway:</span> base top <span class='am'>92</span>, gaps open <span class='am'>96</span>, volume <span class='ok'>3&times; average</span>\n  gap zone 92&ndash;96 stays <span class='ok'>unfilled</span> &rarr; trend intact; trail stop under 92\n  entry on hold above gap <span class='pr'>96.3</span>   stop <span class='pr'>91.5</span> (below base &amp; gap)\n\n<span class='dim'>Exhaustion:</span> after +40% run, gaps open <span class='am'>140</span>, volume <span class='bad'>climactic</span>\n  price stalls, closes <span class='bad'>back below 140 open</span> within 1&ndash;3 days &rarr; gap <span class='bad'>filling</span>\n  reversal signal once prior day&rsquo;s low breaks; do <span class='bad'>not</span> fade blindly into strength</div></div><p>This contrasts the skeleton example exactly: a breakaway gap out of a base that holds versus an exhaustion gap at the top that fills within days. The hard part in real time is that a runaway and an exhaustion gap can look identical on the day they happen. The distinction is only confirmed afterward — by whether the gap holds (runaway) or fills (exhaustion). Volume and how far into the trend you already are give you the probabilistic read.</p><h4>How to trade gaps without guessing</h4><ol><li><strong>Locate the gap in the structure.</strong> Out of a base? Lean breakaway. Mid-trend? Lean runaway. After a long extended run on climactic volume? Lean exhaustion.</li><li><strong>Use the gap edge as your line.</strong> For continuation gaps, the gap should hold; a fill of the gap is the failure signal and your stop reference.</li><li><strong>Wait for the fade to confirm.</strong> To trade an exhaustion-gap reversal, do not short the gap itself — wait for price to fill back and break the prior day&rsquo;s low.</li></ol><div class='box danger'><div class='bt'>Failure mode.</div> The two big mistakes: (1) <strong>fading every gap</strong> on the folk wisdom that &quot;gaps always fill&quot; — common gaps usually fill, but breakaway and runaway gaps often do not, and shorting a breakaway gap into a new trend is how accounts bleed; (2) <strong>buying an exhaustion gap</strong>, mistaking a climactic blow-off for a breakaway. The cure for both is volume and context: heavy volume on a fresh breakout is a friend; climactic volume after an extended run is a warning. There is no reliable base rate for &quot;gaps&quot; as a category — the type is everything.</div><div class='box tip'><div class='bt'>Insight.</div> An unfilled gap acts as a magnet&rsquo;s opposite — a support/resistance shelf the market remembers. Breakaway-gap supports often get retested and hold once before the trend continues, offering a lower-risk second entry for those who missed the gap.</div><div class='box lab'><div class='bt'>Do this.</div> Tag every gap you see with a type the moment it forms, write your reasoning, then watch whether it holds or fills over the next three sessions. This single habit will teach you to read volume and location faster than any rule of thumb.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Classify gaps by structure and volume, then track their fate.</p><ol><li>Find five gaps across different charts: at least one out of a base, one mid-trend, and one after an extended run.</li><li>Label each as common, breakaway, runaway, or exhaustion using location and gap-day volume.</li><li>Mark the gap zone and note your continuation-or-fade decision with a stop at the gap edge.</li><li>Track each over the next three to five sessions: did it hold or fill? Compare your labels to the outcomes and refine your read.</li></ol></div></div>"},{"id":"p7-1","part":"07 · Trend Indicators","nav":"SMA vs EMA","num":"7.1","kicker":"Part 07 · Lesson 1","title":"Simple vs Exponential Moving Averages","html":"<p>A moving average is the simplest trend tool there is, and the most misunderstood. It does exactly one thing: it smooths price into a single line by averaging recent closes. That line lags price by design, and the whole art of using moving averages is understanding <em>how much</em> it lags and <em>why</em>. The two workhorses are the <strong>Simple Moving Average (SMA)</strong> and the <strong>Exponential Moving Average (EMA)</strong>. They answer the same question differently, and the difference matters at every turning point.</p>\n<h3>The Simple Moving Average</h3>\n<p>The SMA of length <em>n</em> is just the arithmetic mean of the last <em>n</em> closes. Every bar in the window counts equally, and the bar that drops off the back of the window has the same weight as the most recent bar had a moment ago.</p>\n<div class='box law'><div class='bt'>Definition.</div> SMA<sub>n</sub> = (P<sub>1</sub> + P<sub>2</sub> + &hellip; + P<sub>n</sub>) &divide; n. Each close carries weight 1&divide;n. A 10-day SMA gives every one of the last 10 closes a flat 10% vote.</div>\n<p>The flat weighting has a hidden consequence. When a price that was inside the window finally exits, the average jumps purely because of that old bar leaving &mdash; not because anything happened today. Traders call this the <strong>drop-off effect</strong>, and it makes the SMA twitch on stale data.</p>\n<h3>The Exponential Moving Average</h3>\n<p>The EMA fixes the drop-off problem by never fully forgetting old data; instead it lets the influence of each bar decay smoothly. It weights the newest close most heavily and every older close a little less than the one after it.</p>\n<div class='box law'><div class='bt'>Definition.</div> EMA<sub>today</sub> = P<sub>today</sub> &times; k + EMA<sub>yesterday</sub> &times; (1 &minus; k), where the smoothing factor k = 2 &divide; (n + 1). For n = 10, k = 2&divide;11 &asymp; 0.1818.</div>\n<p>Read that formula carefully: today's EMA is a blend of today's price (weighted k) and yesterday's EMA (weighted 1&minus;k). Because yesterday's EMA already contained the day before, and so on, every past bar lives on with an ever-shrinking weight. Nothing drops off a cliff. The bigger k is (the shorter n is), the more aggressively the EMA chases price.</p>\n<h4>Worked example: 10-day SMA vs 10-day EMA</h4>\n<p>Suppose a stock trades flat near 100 for nine days, then prints a sharp 100 &rarr; 108 jump on day 10. Watch how each average reacts.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>sma_vs_ema.calc</span></div><div class='term-body'><span class='dim'>Closes days 1-9:</span> <span class='am'>100, 100, 100, 100, 100, 100, 100, 100, 100</span>\n<span class='dim'>Close day 10:</span> <span class='pr'>108</span>  &larr; the shock\n\n<span class='cm'>// 10-day SMA on day 10</span>\nSMA = (100&times;9 + 108) &divide; 10 = 1008 &divide; 10 = <span class='ok'>100.80</span>\n\n<span class='cm'>// 10-day EMA on day 10, k = 2/11 = 0.1818</span>\n<span class='dim'>EMA day 9 (flat) = 100.00</span>\nEMA = 108 &times; 0.1818 + 100 &times; 0.8182\n    = 19.64 + 81.82 = <span class='ok'>101.45</span>\n\n<span class='cm'>// Reaction to the +8 shock</span>\nSMA moved +0.80   EMA moved +1.45   <span class='pr'>EMA reacted ~1.8&times; faster</span></div></div>\n<p>The EMA moved nearly twice as far on the same data. That is the entire trade-off in one number: the EMA turns faster and hugs price more tightly, at the cost of being noisier and more prone to false signals in chop. The SMA is calmer and cleaner but later to every party.</p>\n<div class='chart' data-scenario='breakout-up' data-overlays='sma20,ema21' data-title='NOVA · Daily' data-cap='A 21-day SMA (slow) and 21-day EMA (fast) on the same breakout; the EMA peels up off the base first.'></div>\n<p>Notice in the chart how, off the breakout bar, the EMA separates from the SMA almost immediately and rides closer to the rallying candles, while the SMA only curls up several bars later once the move is undeniable. In a clean trend that early turn is a feature. In a market that fakes a breakout and reverses, that same eagerness is exactly how the EMA whipsaws you.</p>\n<div class='box tip'><div class='bt'>Insight.</div> Neither average is &quot;better.&quot; Shorter lengths and EMAs favor responsiveness; longer lengths and SMAs favor stability. Pick the one whose lag matches the horizon you trade &mdash; and never expect a smoothing tool to call the top.</div>\n<h3>Which length, which type?</h3>\n<ul><li><strong>Fast EMAs (9, 21):</strong> short-term swing structure; turn quickly, whip often.</li><li><strong>Mid SMAs (50):</strong> the classic intermediate-trend line; institutions watch it.</li><li><strong>Slow SMAs (200):</strong> the long-term regime line; above it is broadly bullish, below it bearish.</li></ul>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: feel the SMA-vs-EMA reaction gap in your own numbers.</p><ol><li>Take ten flat closes at 100, then make day 10 spike to 110.</li><li>Compute the 10-day SMA by hand: sum and divide by 10.</li><li>Compute the 10-day EMA: k = 2&divide;11, then 110&times;k + 100&times;(1&minus;k).</li><li>Compare the two jumps. Repeat with a 20-day length and watch both reactions shrink.</li></ol></div></div>"},{"id":"p7-2","part":"07 · Trend Indicators","nav":"MAs as S/R","num":"7.2","kicker":"Part 07 · Lesson 2","title":"Moving Averages as Dynamic Support and Resistance","html":"<p>Horizontal support and resistance are static lines drawn at fixed prices. A moving average gives you something a trending market needs more: a <strong>dynamic</strong> support or resistance level that rises or falls with price. In a healthy uptrend, pullbacks often stall and reverse near a rising moving average; in a downtrend, bounces often die near a falling one. The average becomes a moving floor or ceiling.</p>\n<h3>Why a moving average acts like support</h3>\n<p>There is no magic in the line. It works because so many participants watch the same well-known averages &mdash; the 20, 50, and 200 &mdash; that their orders cluster there. When a stock in an uptrend dips back to its rising 50-day SMA, dip-buyers who use that exact level step in, and the buying that follows is partly self-fulfilling. The level matters because people believe it matters and act on it.</p>\n<div class='box law'><div class='bt'>Definition.</div> <strong>Dynamic S/R:</strong> a moving average used as a level that moves bar to bar. In an uptrend it tends to act as support from below; in a downtrend, as resistance from above. The role flips when price decisively closes through it.</div>\n<div class='chart' data-scenario='pullback-uptrend' data-overlays='sma50' data-title='ACME · Daily' data-cap='Three pullbacks into a rising 50-day SMA, each bought, until the slope flattens and the last touch fails.'></div>\n<p>Read the chart left to right. Price rallies, pulls back to the rising 50-day, and bounces &mdash; once, twice, three times. Each touch is a textbook dynamic-support hold: buyers defend the line and the trend resumes. Crucially, the average is <em>rising</em> through all of this. Then the slope flattens near the right edge, the next touch produces only a feeble bounce, and price closes below the line. The character of the support changed the moment the slope did.</p>\n<h3>Slope is the real signal</h3>\n<p>A moving average gives you two pieces of information: its <em>level</em> (where support/resistance sits) and its <em>slope</em> (the direction and strength of the trend). The slope is the more important of the two.</p>\n<ul><li><strong>Rising MA:</strong> uptrend intact; treat touches from above as potential support.</li><li><strong>Falling MA:</strong> downtrend intact; treat touches from below as potential resistance.</li><li><strong>Flat MA:</strong> no trend &mdash; the market is ranging, and the average will be sliced repeatedly. This is where MAs are nearly useless (Lesson 7.8).</li></ul>\n<div class='box tip'><div class='bt'>Insight.</div> A flattening slope is an early warning that the trend is tiring &mdash; often visible before price breaks the line. When the 50-day rolls from clearly up to sideways, dynamic support is about to stop working.</div>\n<h4>Quantifying the slope</h4>\n<p>You do not have to eyeball it. A simple, objective slope read is the percentage change of the average over a lookback.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ma_slope.calc</span></div><div class='term-body'><span class='cm'>// 50-day SMA values, 5 trading days apart</span>\n<span class='dim'>SMA 5 days ago:</span> <span class='am'>118.0</span>\n<span class='dim'>SMA today:</span>     <span class='am'>121.0</span>\n\nSlope% = (121.0 &minus; 118.0) &divide; 118.0 &times; 100\n       = 3.0 &divide; 118.0 &times; 100 = <span class='ok'>+2.54% / 5 days</span>  &rarr; clearly rising\n\n<span class='cm'>// Later, the average stalls</span>\n<span class='dim'>SMA 5 days ago:</span> <span class='am'>124.5</span>\n<span class='dim'>SMA today:</span>     <span class='am'>124.7</span>\nSlope% = 0.2 &divide; 124.5 &times; 100 = <span class='bad'>+0.16% / 5 days</span>  &rarr; effectively flat\n</div></div>\n<p>That drop from +2.54% to +0.16% per five days is the quantitative version of the curve flattening in the chart. A rule like &quot;only treat the 50-day as support while its 5-day slope exceeds +0.5%&quot; turns a visual impression into a testable condition.</p>\n<h3>Touches versus closes</h3>\n<p>One discipline saves a lot of grief: distinguish a <em>wick</em> into the average from a <em>close</em> beyond it. Price routinely pierces a moving average intraday and recovers by the close &mdash; that is a successful test, not a break. Wait for a daily close decisively on the other side, ideally with a confirming bar, before declaring the level lost.</p>\n<div class='box danger'><div class='bt'>Pitfall.</div> Moving-average support is probabilistic, not a wall. In a strong sell-off price will gap straight through the 50-day as if it were not there. Use it to frame risk and place stops, never as a guaranteed bounce to lean size on.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: judge dynamic support by slope, not just level.</p><ol><li>Pull up a trending name and add a 50-day SMA.</li><li>Mark every pullback that touched the rising average and note whether it bounced.</li><li>Compute the average's 5-day slope% at the first touch and at the last failed touch.</li><li>Confirm the failed touch coincided with a flattening (near-zero) slope.</li></ol></div></div>"},{"id":"p7-3","part":"07 · Trend Indicators","nav":"Crossovers","num":"7.3","kicker":"Part 07 · Lesson 3","title":"Crossovers: Golden Cross and Death Cross","html":"<p>A moving-average crossover is the most famous mechanical trend signal in the business. The idea is simple: when a faster average crosses above a slower one, momentum has turned up; when it crosses below, momentum has turned down. The two most-quoted versions use the 50-day and 200-day simple moving averages.</p>\n<div class='box law'><div class='bt'>Definition.</div> <strong>Golden Cross:</strong> the 50-day SMA crosses <em>above</em> the 200-day SMA &mdash; a bullish, long-term trend signal. <strong>Death Cross:</strong> the 50-day crosses <em>below</em> the 200-day &mdash; a bearish one. Faster pairs like 9/21 EMA give the same logic on a shorter horizon.</div>\n<h3>The mechanics</h3>\n<p>Because the 50-day reacts to new prices faster than the 200-day, a sustained rally first lifts the 50-day, then eventually drags it up through the flatter 200-day. The cross is therefore a <em>confirmation</em> that an up-move has already persisted long enough to bend both averages &mdash; not a prediction of a turn that hasn't happened yet.</p>\n<div class='chart' data-scenario='golden-cross' data-overlays='sma50,sma200' data-title='NOVA · Daily' data-cap='A golden cross firing weeks after the actual bottom: the signal catches the middle of the trend, not the turn.'></div>\n<p>The chart tells the honest story. The low is on the left. Price bottoms, bases, and begins climbing well before the 50-day finally noses above the 200-day near the middle of the rally. By the time the golden cross prints, a meaningful chunk of the move is already gone. That is not a flaw to be fixed &mdash; it is the unavoidable consequence of averaging. You trade the cross to capture the <strong>fat middle</strong> of a trend, accepting that you will never buy the bottom or sell the top with it.</p>\n<h3>Quantifying the lag</h3>\n<p>Lag is not vague; you can measure it. The 50/200 cross typically fires weeks after the price low. Here is the cost in concrete terms.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>golden_cross_lag.calc</span></div><div class='term-body'><span class='dim'>Price low:</span>            <span class='am'>day 0, price 80.00</span>\n<span class='dim'>Golden cross prints:</span>  <span class='am'>day 38, price 96.00</span>\n<span class='dim'>Trend peak:</span>           <span class='am'>day 70, price 110.00</span>\n\n<span class='cm'>// Move already gone before the signal</span>\nMissed = (96 &minus; 80) &divide; (110 &minus; 80) &times; 100\n       = 16 &divide; 30 &times; 100 = <span class='bad'>53% of the trend missed</span>\n\n<span class='cm'>// Move still available to capture</span>\nCaptured-able = (110 &minus; 96) &divide; (110 &minus; 80) &times; 100 = <span class='ok'>47% remaining</span>\n</div></div>\n<p>Roughly half the move was already over when the signal fired. If the trend is large, that remaining 47% is still very much worth having. If the trend is small, the lag eats the entire opportunity &mdash; which is precisely why crossovers reward big, durable trends and punish small, choppy ones.</p>\n<div class='box danger'><div class='bt'>Pitfall.</div> In a range, the 50 and 200 sit on top of each other and cross back and forth repeatedly, firing a string of golden/death crosses that all lose. The crossover has no idea whether it is in a trend or a range; you must supply that judgment (see ADX, Lesson 7.6).</div>\n<h3>Faster pairs, faster lies</h3>\n<p>Shorten the pair to 9/21 EMA and the cross fires far earlier &mdash; days after a turn instead of weeks. You capture more of each move, but you also get many more false crosses, because short averages flip on minor wiggles. There is no free lunch: every bit of lag you remove by speeding up the averages, you pay back in whipsaws.</p>\n<div class='box tip'><div class='bt'>Insight.</div> Treat the crossover as a regime label, not an entry trigger. &quot;50 above 200&quot; tells you the long-term tide is in; time your actual entries with pullbacks to a rising average (Lesson 7.2) rather than buying the cross bar itself.</div>\n<div class='chart' data-scenario='death-cross' data-overlays='sma50,sma200' data-title='ACME · Daily' data-cap='The mirror image: a death cross confirming a downtrend that already broke down weeks earlier.'></div>\n<p>The death cross is the same machinery in reverse. Price has already rolled over and broken down before the 50-day knifes below the 200-day. As a long-term risk-off flag it is useful; as a short-the-exact-top signal it is hopeless, and anyone selling the cross bar is often selling into a bounce.</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: measure crossover lag yourself.</p><ol><li>Find a past golden cross on a 50/200 SMA chart.</li><li>Mark the price low, the cross bar, and the eventual peak.</li><li>Compute the percent of the move that occurred before the cross.</li><li>Repeat with a 9/21 EMA pair and compare the smaller lag against the larger count of false crosses.</li></ol></div></div>"},{"id":"p7-4","part":"07 · Trend Indicators","nav":"MACD Build","num":"7.4","kicker":"Part 07 · Lesson 4","title":"MACD: Construction and the Signal Line","html":"<p>The <strong>MACD</strong> &mdash; Moving Average Convergence Divergence &mdash; is a crossover system in disguise. Instead of plotting two averages on the price chart and watching them cross, it plots the <em>distance</em> between them as a single oscillating line. That reframing makes momentum visible: when the line rises, the fast average is pulling away from the slow one and the trend is accelerating; when it falls, they are converging and momentum is fading.</p>\n<h3>The three classic settings</h3>\n<p>Standard MACD is built from three numbers: 12, 26, 9.</p>\n<div class='box law'><div class='bt'>Definition.</div> <strong>MACD line</strong> = EMA<sub>12</sub> &minus; EMA<sub>26</sub>. <strong>Signal line</strong> = EMA<sub>9</sub> of the MACD line. <strong>Histogram</strong> = MACD line &minus; Signal line (covered next lesson). The MACD line is the gap between a fast and a slow EMA of price; the signal line is a smoothing of that gap.</div>\n<p>Because the MACD line is one EMA minus another, its sign tells you which average is on top. When the 12-EMA is above the 26-EMA, MACD is positive; when below, negative. The <strong>zero line</strong> is therefore the MACD's own version of a moving-average crossover &mdash; crossing zero is the 12-EMA crossing the 26-EMA.</p>\n<h4>Worked construction</h4>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>macd_build.calc</span></div><div class='term-body'><span class='cm'>// On a given day, after a rally</span>\n<span class='dim'>EMA(12) of price:</span> <span class='am'>104.20</span>\n<span class='dim'>EMA(26) of price:</span> <span class='am'>101.40</span>\n\nMACD line = 104.20 &minus; 101.40 = <span class='ok'>+2.80</span>   <span class='cm'>// fast above slow &rarr; bullish, above zero</span>\n\n<span class='cm'>// Signal line is the 9-EMA of the MACD line itself</span>\n<span class='dim'>Signal (9-EMA of MACD), prior:</span> <span class='am'>2.30</span>\nk = 2 &divide; (9+1) = 0.20\nSignal = 2.80 &times; 0.20 + 2.30 &times; 0.80 = 0.56 + 1.84 = <span class='ok'>2.40</span>\n\nMACD 2.80 &gt; Signal 2.40  &rarr; <span class='pr'>bullish signal-line crossover in force</span>\n</div></div>\n<p>Two crossovers, two distinct meanings. The MACD crossing its <em>signal line</em> is the faster, more frequent trigger. The MACD crossing <em>zero</em> is the slower, more significant trend-confirmation. Reading them together is the whole skill.</p>\n<div class='chart' data-scenario='uptrend' data-pane='macd' data-title='NOVA · Daily' data-cap='MACD turning up, crossing its signal line, then pushing above zero as the uptrend is confirmed.'></div>\n<p>Walk the lower pane against price. Early in the base, the MACD line is below zero but stops falling and curls up through its signal line &mdash; the first, tentative bullish hint. As price breaks out, the MACD line keeps climbing and finally crosses <strong>above zero</strong>, confirming the 12-EMA has overtaken the 26-EMA and the trend is real. The signal-line cross got you interested; the zero-line cross got you confirmed.</p>\n<h3>Reading the two crossovers</h3>\n<ul><li><strong>MACD crosses above its signal line:</strong> short-term momentum turning up &mdash; an early, noisier trigger.</li><li><strong>MACD crosses above zero:</strong> the underlying fast/slow EMA relationship has flipped bullish &mdash; a slower, stronger confirmation.</li><li><strong>Both below zero:</strong> bearish regime; signal-line crosses there are best treated as bounces, not reversals.</li></ul>\n<div class='box tip'><div class='bt'>Insight.</div> A signal-line cross that happens <em>above</em> zero in an established uptrend is far more reliable than one that happens deep below zero. Context &mdash; which side of zero you are on &mdash; matters as much as the cross itself.</div>\n<div class='box danger'><div class='bt'>Pitfall.</div> MACD is an unbounded oscillator built from lagging EMAs, so it inherits all the lag of a crossover system. In a tight range it will cross its signal line back and forth every few bars, generating a stream of false triggers. It shines in trends and bleeds in chop.</div>\n<p>One more subtlety: MACD is plotted in price units, not a fixed 0&ndash;100 scale, so a reading of &quot;+2.80&quot; means something different on a $40 stock than on a $400 one. You compare MACD to its own recent range and to its signal line &mdash; never across instruments at face value.</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: separate the signal-line cross from the zero-line cross.</p><ol><li>Add MACD (12, 26, 9) to a trending chart.</li><li>Mark every signal-line crossover and label it bullish or bearish.</li><li>Now mark only the zero-line crossings and note how many fewer there are.</li><li>Check which signal-line crosses happened on the strong side of zero versus the weak side.</li></ol></div></div>"},{"id":"p7-5","part":"07 · Trend Indicators","nav":"MACD Histogram","num":"7.5","kicker":"Part 07 · Lesson 5","title":"The MACD Histogram and Divergence","html":"<p>The MACD histogram is the part of the indicator that warns you <em>before</em> the lines cross. It plots the gap between the MACD line and its signal line as vertical bars. When the bars grow, the two lines are spreading apart and momentum is building; when the bars shrink toward zero, the lines are converging and momentum is fading &mdash; even if the MACD line is still pointed the right way.</p>\n<div class='box law'><div class='bt'>Definition.</div> <strong>Histogram</strong> = MACD line &minus; Signal line. Bars above zero mean MACD is above its signal (bullish momentum); bars below zero mean the opposite. A signal-line crossover happens at the exact moment the histogram passes through zero.</div>\n<h3>The histogram leads the cross</h3>\n<p>Because the histogram is the <em>difference</em> of the two lines, it peaks and rolls over while the MACD line is still rising. A shrinking positive histogram is your earliest mechanical hint that an up-move is losing steam &mdash; it shrinks first, crosses zero second, and only then does the slower signal-line crossover confirm.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>histogram.calc</span></div><div class='term-body'><span class='cm'>// Three days of a maturing rally</span>\n<span class='dim'>Day A:</span> MACD 2.80  Signal 2.30  &rarr; Hist <span class='ok'>+0.50</span>\n<span class='dim'>Day B:</span> MACD 2.95  Signal 2.55  &rarr; Hist <span class='ok'>+0.40</span>\n<span class='dim'>Day C:</span> MACD 3.00  Signal 2.70  &rarr; Hist <span class='bad'>+0.30</span>\n\n<span class='cm'>// MACD line still RISING (2.80&rarr;3.00) but histogram FALLING (0.50&rarr;0.30)</span>\n<span class='pr'>Momentum is decelerating before any crossover prints.</span>\n</div></div>\n<p>That table is the heart of it. The MACD line is still making new highs &mdash; everything looks fine on the line &mdash; yet the histogram is already shrinking. The rate of advance is slowing. The histogram has told you the rally is tiring a few bars before the signal-line cross will confirm it.</p>\n<h3>Divergence: the histogram disagrees with price</h3>\n<p><strong>Divergence</strong> is the most valued MACD signal. It occurs when price and the indicator move in opposite directions, revealing that the new price extreme was made on weaker momentum than the last one.</p>\n<ul><li><strong>Bearish divergence:</strong> price makes a <em>higher high</em>, but the histogram (or MACD line) makes a <em>lower high</em>. The rally's fuel is draining.</li><li><strong>Bullish divergence:</strong> price makes a <em>lower low</em>, but the indicator makes a <em>higher low</em>. The decline is decelerating.</li></ul>\n<div class='chart' data-scenario='rsi-divergence' data-pane='macd' data-title='ACME · Daily' data-cap='Price prints a higher high while the MACD histogram prints a lower high: classic bearish divergence.'></div>\n<p>Compare the two peaks in the chart. The second price peak is clearly higher than the first &mdash; the uptrend looks intact. But in the MACD pane, the histogram's second hump is <em>shorter</em> than the first. Price climbed, momentum did not. That gap is the warning: the move to the higher high was made on less internal thrust, and shortly after, price rolls over. The divergence flagged the exhaustion while price was still rising.</p>\n<div class='box tip'><div class='bt'>Insight.</div> Divergence is a warning, not a timing trigger. Strong trends can diverge for a long time before they break &mdash; an overbought market can make several lower-momentum higher highs. Use divergence to tighten stops and reduce conviction, then wait for a price-based confirmation (a broken trendline, a signal-line cross through zero) to act.</div>\n<div class='box danger'><div class='bt'>Pitfall.</div> The single most common mistake is shorting the first sign of bearish divergence in a powerful uptrend. &quot;The trend can stay irrational longer than you can stay solvent.&quot; Divergence lowers the odds the trend continues; it does not guarantee the reversal, and it never tells you exactly when.</div>\n<h3>Confirming the divergence</h3>\n<p>To turn a divergence from an observation into something tradeable, demand confirmation: the histogram crossing zero, the MACD line crossing its signal line, or price closing below the swing low between the two peaks. The divergence builds the case; the cross delivers the verdict.</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: spot and confirm a real divergence.</p><ol><li>On a chart with two clear price highs, add MACD with its histogram.</li><li>Check whether the second histogram peak is lower than the first while price is higher.</li><li>If so, mark the swing low between the highs.</li><li>Note the bar where price closed below that swing low &mdash; the confirmation, not the divergence itself, is the actionable event.</li></ol></div></div>"},{"id":"p7-6","part":"07 · Trend Indicators","nav":"ADX & DMI","num":"7.6","kicker":"Part 07 · Lesson 6","title":"ADX and DMI: Measuring Trend Strength","html":"<p>Every indicator so far tells you which <em>direction</em> a trend is going. None of them tells you whether there is a trend worth following at all &mdash; and that, as the next lesson shows, is where moving averages and MACD get slaughtered. The <strong>ADX</strong> (Average Directional Index), invented by Welles Wilder, fills exactly that gap. It measures trend <em>strength</em> regardless of direction, on a fixed 0&ndash;100 scale.</p>\n<h3>Three lines, two jobs</h3>\n<p>Wilder's system has three components. Two of them, the <strong>Directional Indicators</strong>, handle direction; the third, ADX, handles strength.</p>\n<div class='box law'><div class='bt'>Definition.</div> <strong>+DI</strong> measures upward directional movement; <strong>&minus;DI</strong> measures downward directional movement. <strong>ADX</strong> is a smoothed measure of how far apart +DI and &minus;DI are &mdash; i.e., how strongly one side is dominating &mdash; without regard to which side wins.</div>\n<p>The conventional reading of the ADX scale:</p>\n<ul><li><strong>ADX below 20:</strong> weak or absent trend &mdash; the market is ranging. Trend tools fail here.</li><li><strong>ADX 20&ndash;25:</strong> trend emerging; treat as a threshold to switch on trend-following.</li><li><strong>ADX above 25:</strong> a real trend is in force; trend-following has an edge.</li><li><strong>ADX above 40&ndash;50:</strong> very strong trend &mdash; powerful, but watch for exhaustion.</li></ul>\n<div class='box tip'><div class='bt'>Insight.</div> ADX is directionless. A high ADX can mean a strong uptrend <em>or</em> a strong downtrend &mdash; you must read +DI versus &minus;DI to know which. ADX answers &quot;is there a trend?&quot;; the DI lines answer &quot;which way?&quot;</div>\n<h4>How the DI lines signal direction</h4>\n<p>When <strong>+DI is above &minus;DI</strong>, buyers are in control &mdash; the trend is up. When <strong>&minus;DI is above +DI</strong>, sellers dominate &mdash; the trend is down. A <em>DI crossover</em> (the lines swapping order) is itself a directional signal, and it is most meaningful when ADX is rising above 20&ndash;25.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>adx_read.calc</span></div><div class='term-body'><span class='cm'>// Strong-uptrend reading</span>\n<span class='dim'>+DI:</span> <span class='ok'>31</span>   <span class='dim'>&minus;DI:</span> <span class='am'>14</span>   <span class='dim'>ADX:</span> <span class='ok'>32 (rising)</span>\n&rarr; +DI &gt; &minus;DI and ADX &gt; 25  =  <span class='pr'>strong, confirmed uptrend</span>\n\n<span class='cm'>// Weeks later, the move dies into a range</span>\n<span class='dim'>+DI:</span> <span class='am'>18</span>   <span class='dim'>&minus;DI:</span> <span class='am'>17</span>   <span class='dim'>ADX:</span> <span class='bad'>16 (falling)</span>\n&rarr; DI lines tangled, ADX &lt; 20  =  <span class='bad'>no tradeable trend, stand aside</span>\n</div></div>\n<p>The two snapshots capture the indicator's entire purpose. In the first, +DI towers over &minus;DI and ADX is rising through 30 &mdash; a clean, strong uptrend you can trust trend tools in. In the second, the DI lines have collapsed together and ADX has fallen under 20 &mdash; the chop zone, where you holster the crossover and wait.</p>\n<div class='chart' data-scenario='uptrend' data-overlays='sma50' data-title='NOVA · Daily' data-cap='An uptrend that runs while ADX is high, then flattens into a range as ADX rolls under 20.'></div>\n<p>Map the ADX story onto this chart. Through the strong rally on the left, imagine ADX rising past 25 with +DI on top &mdash; that is when the 50-day's slope is steep and pullbacks get bought. As price flattens into the sideways stretch on the right, ADX rolls back under 20, the DI lines knot together, and the 50-day goes flat. The very flattening you learned to fear in Lesson 7.2 is exactly what a falling ADX quantifies.</p>\n<div class='box danger'><div class='bt'>Pitfall.</div> ADX is heavily smoothed and therefore <em>lags</em>. It confirms a trend's strength after the trend is underway and is slow to recognize when one has died. Use it as a regime filter, not a precise entry timer &mdash; and never short a market just because ADX is high, since high ADX in an uptrend means strength, not a top.</div>\n<h3>The one rule that earns its keep</h3>\n<p>The most durable use of ADX is brutally simple: <strong>only deploy trend-following signals when ADX is above 20&ndash;25.</strong> That single filter removes most of the whipsaw losses that crossovers and MACD rack up in ranges, because it forces you to sit out precisely the flat, directionless markets where those tools fail. We will wire this directly into a system in the next lesson.</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: connect ADX to the eye-test of trend strength.</p><ol><li>Add ADX with +DI and &minus;DI to a chart that trends then ranges.</li><li>In the trend, confirm ADX is above 25 and one DI line dominates.</li><li>In the range, confirm ADX falls under 20 and the DI lines intertwine.</li><li>Mark every spot where ADX first crossed back below 20 &mdash; note how often it precedes the chop.</li></ol></div></div>"},{"id":"p7-7","part":"07 · Trend Indicators","nav":"MA Systems","num":"7.7","kicker":"Part 07 · Lesson 7","title":"Building a Moving-Average System","html":"<p>Individually, each tool in this part has a fatal flaw. Moving averages lag and whipsaw. Crossovers fire late. MACD chops in ranges. ADX confirms strength but ignores direction. The fix is not a better single indicator &mdash; it is to combine them so each one covers another's weakness. That is what a <strong>rules-based trend system</strong> does: it stacks a direction filter, a trend filter, and a strength filter, and only acts when all three agree.</p>\n<h3>The three filters</h3>\n<p>A robust long-only trend filter rests on three independent conditions, each answering a different question.</p>\n<div class='box law'><div class='bt'>Definition.</div> A basic trend filter goes long only when: <strong>(1) price &gt; 50-day MA</strong> (are we on the bullish side?), <strong>(2) the 50-day MA is rising</strong> (is the trend actually up, not flat?), and <strong>(3) ADX &gt; 20</strong> (is the trend strong enough to follow?). All three true &rarr; trend is on. Any false &rarr; stand aside.</div>\n<p>Each filter kills a specific failure mode. Condition 1 keeps you out of downtrends. Condition 2 keeps you out of flat, rolling-over averages. Condition 3 keeps you out of the low-energy ranges where crossovers whipsaw. Together they describe a market worth being long in.</p>\n<h4>Encoding the rules</h4>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>trend_filter.rules</span></div><div class='term-body'><span class='cm'>// Evaluate each bar at the close</span>\nc1 = Close &gt; SMA50\nc2 = SMA50<sub>today</sub> &gt; SMA50<sub>5 days ago</sub>     <span class='cm'>// rising slope</span>\nc3 = ADX &gt; 20\n\nLONG_ALLOWED = c1 <span class='pr'>AND</span> c2 <span class='pr'>AND</span> c3\n\n<span class='cm'>// Worked sample, two different days</span>\n<span class='dim'>Day X:</span> Close 122 &gt; SMA50 118 &#10003;  | 118 &gt; 115 &#10003; | ADX 27 &#10003;  &rarr; <span class='ok'>LONG ALLOWED</span>\n<span class='dim'>Day Y:</span> Close 119 &gt; SMA50 118 &#10003;  | 118 &gt; 118 &#10007; | ADX 16 &#10007;  &rarr; <span class='bad'>STAND ASIDE</span>\n</div></div>\n<p>On Day X all three gates are open: price is above a rising 50-day and ADX confirms strength &mdash; a clean long environment. On Day Y price is still technically above the average, but the average has stopped rising and ADX has collapsed under 20. Two failed filters veto the trade. That is the system saving you from a range that <em>looks</em> bullish on price alone.</p>\n<div class='chart' data-scenario='pullback-uptrend' data-overlays='sma50' data-title='ACME · Daily' data-cap='The system stays long through pullbacks into a rising 50-day, then flattens out the trade as slope and ADX fade.'></div>\n<p>In the chart, the system is long through the whole left-to-middle advance: price holds above the rising 50-day on every pullback, and a high ADX (imagine it above 25) keeps the trade enabled. Each dip to the average is a place to add or to trail a stop, not to exit. Near the right edge the slope flattens and ADX would be rolling under 20 &mdash; conditions 2 and 3 flip false, the filter switches off, and you are flat before the range grinds you up.</p>\n<h3>Entries, exits, and stops</h3>\n<p>The filter says <em>when you are allowed</em> to be long. You still need rules for <em>where</em> to act:</p>\n<ul><li><strong>Entry:</strong> while the filter is on, buy pullbacks <em>to</em> the rising 50-day rather than chasing extended bars &mdash; better price, defined risk.</li><li><strong>Stop:</strong> place it below the recent swing low or a fixed multiple of ATR beneath the average, so a clean break of dynamic support takes you out.</li><li><strong>Exit:</strong> step aside when the filter turns off &mdash; price closes below the 50-day, the slope flattens, or ADX drops under 20.</li></ul>\n<div class='box tip'><div class='bt'>Insight.</div> The ADX gate is what makes the difference. A bare price-above-rising-MA rule still trades in low-energy drifts; adding &quot;ADX &gt; 20&quot; removes the majority of whipsaw entries because it forces participation only when a trend has real force behind it.</div>\n<div class='box danger'><div class='bt'>Pitfall.</div> Do not over-fit. Stacking ten indicators until a backtest looks perfect produces a curve fit to the past, not an edge in the future. Three uncorrelated filters &mdash; direction, slope, strength &mdash; capture most of the benefit; each added rule buys diminishing returns and rising fragility.</div>\n<div class='box lab'><div class='bt'>Do this.</div> Write your filter as plain boolean conditions you can check at any glance: price vs MA, MA slope sign, ADX threshold. If you cannot state your system in three lines, it is too complicated to trust under pressure.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: hand-run a three-filter trend system.</p><ol><li>On a trending chart, add a 50-day SMA and ADX.</li><li>Bar by bar through one swing, check the three conditions: price &gt; MA, MA rising, ADX &gt; 20.</li><li>Mark where all three first turned true (entry zone) and where any turned false (exit).</li><li>Compare the system's holding window against a naive buy-and-hold over the same stretch.</li></ol></div></div>"},{"id":"p7-8","part":"07 · Trend Indicators","nav":"Lag & Whipsaws","num":"7.8","kicker":"Part 07 · Lesson 8","title":"The Reliability Problem: Lag and Whipsaws","html":"<p>It is time to be honest about what trend indicators cannot do. Every tool in this part is built from moving averages, and every moving average shares two incurable defects: it <strong>lags</strong>, because it averages the past, and it <strong>whipsaws</strong>, because in a sideways market it crosses price and itself again and again with no trend to catch. Understanding these failures is what separates a trader who uses indicators from one who is used by them.</p>\n<h3>Lag is structural, not a bug</h3>\n<p>A moving average can only turn after enough new prices have entered its window to overpower the old ones. That delay is mathematically guaranteed &mdash; you cannot smooth data and react instantly at the same time. A useful rule of thumb: an SMA of length <em>n</em> lags price by roughly (n&minus;1)&divide;2 bars.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>lag_estimate.calc</span></div><div class='term-body'><span class='cm'>// Approximate center-of-mass lag of an SMA</span>\nLag &asymp; (n &minus; 1) &divide; 2 bars\n\n<span class='dim'>10-day SMA:</span> (10&minus;1)/2 = <span class='am'>~4.5 bars</span> behind price\n<span class='dim'>50-day SMA:</span> (50&minus;1)/2 = <span class='bad'>~24.5 bars</span> behind price\n<span class='dim'>200-day SMA:</span> (200&minus;1)/2 = <span class='bad'>~99.5 bars</span> behind price\n\n<span class='pr'>Smoother line &rarr; more lag. There is no free lunch.</span>\n</div></div>\n<p>A 200-day average is, in effect, reporting where the market was about a hundred bars ago. That is fine for labeling a long-term regime and useless for catching a turn. Every choice of length is a trade between smoothness and timeliness, and you cannot have both.</p>\n<h3>Whipsaws: death by a thousand cuts</h3>\n<p>Lag costs you the start of a move. Whipsaws cost you cash <em>directly</em>. In a range, price oscillates around a flat average, so a crossover system fires buy&hellip;sell&hellip;buy&hellip;sell in rapid succession, each one a small loss plus commission and slippage. The trend that finally pays only arrives after a pile of these paper cuts.</p>\n<div class='chart' data-scenario='range' data-overlays='sma20,sma50' data-title='ACME · Daily' data-cap='A sideways market slicing through both averages repeatedly: a whipsaw factory where every crossover loses.'></div>\n<p>Look at how price saws back and forth across both the 20- and 50-day in the range. The two averages tangle and cross each other several times, each cross a signal, each signal a loser because there is no follow-through. This is the natural habitat where mechanical crossover systems bleed &mdash; not because the indicator is broken, but because it is doing its job in an environment that has no trend to find.</p>\n<h4>Quantifying the whipsaw cost</h4>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>whipsaw_tally.calc</span></div><div class='term-body'><span class='cm'>// Two months of range, one 20/50 EMA crossover system</span>\n<span class='dim'>Losing crossover signals:</span> <span class='bad'>6</span>   avg loss each: <span class='bad'>&minus;0.9%</span>\n<span class='dim'>Range drag total:</span> 6 &times; (&minus;0.9%) = <span class='bad'>&minus;5.4%</span>\n\n<span class='cm'>// Then a real trend finally breaks out</span>\n<span class='dim'>Winning trend signal:</span> <span class='ok'>1</span>   gain: <span class='ok'>+9.0%</span>\n\nNet = &minus;5.4% + 9.0% = <span class='ok'>+3.6%</span>\n<span class='pr'>The one real trend had to pay for six false starts to leave you green.</span>\n</div></div>\n<p>This is the defining arithmetic of trend-following. You lose small, repeatedly, in ranges, and win big, occasionally, in trends. The system is only profitable if the rare winners are large enough to cover the frequent losers &mdash; which is exactly why cutting the false starts matters so much, and why the ADX filter from Lessons 7.6 and 7.7 is worth its weight.</p>\n<div class='box tip'><div class='bt'>Insight.</div> You cannot eliminate lag and whipsaws; you can only choose where to pay. A trend filter (ADX &gt; 20, rising slope) trades a few late entries in exchange for skipping most of the range chop. You are deliberately accepting more lag to buy fewer whipsaws.</div>\n<div class='box danger'><div class='bt'>Pitfall.</div> Shortening your averages to &quot;reduce lag&quot; multiplies whipsaws; lengthening them to &quot;reduce whipsaws&quot; multiplies lag. Chasing one defect always feeds the other. The honest move is to accept the trade-off and filter for regime, not to hunt for a magic setting that has neither flaw.</div>\n<h3>The mindset that survives</h3>\n<p>Trend indicators are not predictors; they are <em>followers</em> that describe what has already happened in a smoothed, lagging way. Used as a regime label and combined with a strength filter, they keep you on the right side of big moves. Used as a crystal ball in a flat market, they will hand you a string of losses with mechanical reliability. Respect the lag, fear the chop, and demand a trend before you let a trend tool trade.</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: feel the whipsaw cost and the lag firsthand.</p><ol><li>Find a two-month sideways range on a chart and add a 20/50 crossover.</li><li>Count every crossover and tally the small loss each would have produced.</li><li>Sum the range drag, then find the next real trend and its gain.</li><li>Check whether the one trend covered all the false starts &mdash; and estimate the lag using (n&minus;1)&divide;2 for each average.</li></ol></div></div>"},{"id":"p8-1","part":"08 · Oscillators","nav":"Momentum Concept","num":"8.1","kicker":"Part 08 · Lesson 1","title":"The Concept of Momentum","html":"<h3>Speed, not position</h3><p>Most of the tools we have met so far describe <em>where</em> price is: above a moving average, near support, inside a channel. Momentum oscillators describe something different and arguably more interesting &mdash; <strong>how fast price is moving and whether that speed is increasing or decreasing</strong>. A rally that is accelerating is healthy. A rally that is still rising but slowing down is, in physics terms, decelerating; the buyers are getting tired even though they have not yet given up. Momentum is the study of that deceleration before it shows up as a turn in price.</p><div class='box law'><div class='bt'>Definition.</div> <strong>Momentum</strong> is the rate of change of price over a fixed lookback. The simplest form is Rate of Change: ROC<sub>n</sub> = (P<sub>today</sub> &minus; P<sub>n&nbsp;bars&nbsp;ago</sub>) &divide; P<sub>n&nbsp;bars&nbsp;ago</sub> &times; 100. An <strong>oscillator</strong> is any indicator that fluctuates around a centerline (or within a bounded 0&ndash;100 range), rising when momentum builds and falling when it fades.</p></div><h3>A worked rate-of-change</h3><p>Suppose ACME closes at 100, then 102, 105, 109, 112, 113.5, 114. Using a 1-bar ROC we measure the day-over-day push:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>1-bar Rate of Change</span></div><div class='term-body'><span class='dim'>Close &rarr; ROC vs prior bar</span>\n<span class='cm'>100 &rarr; 102</span>  ROC = +2.00%   <span class='ok'>accelerating</span>\n<span class='cm'>102 &rarr; 105</span>  ROC = +2.94%   <span class='ok'>accelerating</span>\n<span class='cm'>105 &rarr; 109</span>  ROC = +3.81%   <span class='ok'>peak thrust</span>\n<span class='cm'>109 &rarr; 112</span>  ROC = +2.75%   <span class='am'>slowing</span>\n<span class='cm'>112 &rarr; 113.5</span> ROC = +1.34%  <span class='am'>slowing</span>\n<span class='cm'>113.5 &rarr; 114</span> ROC = +0.44% <span class='bad'>nearly flat</span></div></div><p>Notice the crucial point: price keeps making new highs the entire way (100 &rarr; 114), yet momentum <strong>peaked at bar 3</strong> and rolled over while price was still climbing. The ROC line traces a hill that crests <em>ahead</em> of price. This is the single most valuable property of momentum: it is a <em>leading</em> characteristic of a trend's internal energy, not a lagging one like a moving average.</p><div class='chart' data-scenario='parabolic' data-pane='rsi' data-title='ACME · Daily' data-cap='A parabolic advance: price still rising into the right edge while the momentum pane flattens and curls over.'></div><p>In the chart above, follow the price candles into a steep, accelerating run. Now drop your eyes to the lower pane. The oscillator climbs hard during the meat of the move, but as price goes vertical the oscillator stops making new highs and begins to flatten. That flattening is momentum telling you the <em>marginal</em> buyer is paying more for less follow-through. The rally is not over &mdash; but its fuel gauge is dropping.</p><h3>Why we bound the oscillator</h3><p>Raw ROC is unbounded: a violent move can read +30% one day and the scale becomes useless across different instruments and eras. The great innovation of oscillators like RSI and Stochastics is <strong>normalisation</strong> &mdash; squashing momentum into a fixed 0&ndash;100 band so that &quot;extreme&quot; means the same thing on a $5 stock and a $5,000 index, in 1998 and today. That lets us draw horizontal reference lines (70/30, 80/20) and speak a common language about <em>overbought</em> and <em>oversold</em>.</p><div class='box tip'><div class='bt'>Insight.</div> Momentum measures the <em>derivative</em> of price. Just as a car can still be moving forward while braking, a market can still be rising while its momentum collapses. Oscillators are built to make that braking visible.</div><h3>What oscillators are good and bad at</h3><ul><li><strong>Good at:</strong> flagging exhaustion, timing entries inside ranges, and revealing divergence between price and internal energy.</li><li><strong>Bad at:</strong> telling you direction in a strong trend &mdash; they will scream &quot;overbought&quot; for weeks while a bull market grinds higher (Lesson 8.3).</li></ul><p>Keep that asymmetry in mind through this whole part. An oscillator is a tachometer, not a steering wheel. It tells you the engine's RPM; it does not tell you which way the road bends. Used as a tachometer it is superb. Used as a steering wheel it will drive you off a cliff &mdash; which is exactly the trap we will dismantle in Lesson 8.6.</p><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: feel how momentum leads price.</p><ol><li>Take any 10 consecutive daily closes from a chart you follow.</li><li>Compute the 1-bar ROC for each day: (today &minus; yesterday) &divide; yesterday &times; 100.</li><li>Mark the bar where ROC peaked, and the bar where price peaked.</li><li>Confirm the ROC peak came first (or at the same time). Note how many bars of warning it gave.</li></ol></div></div>"},{"id":"p8-2","part":"08 · Oscillators","nav":"RSI Calc","num":"8.2","kicker":"Part 08 · Lesson 2","title":"RSI: Calculation and Overbought/Oversold","html":"<h3>What RSI actually computes</h3><p>The Relative Strength Index, designed by J. Welles Wilder in 1978, answers one question: <strong>over the last N bars, how much of the total movement was up versus down?</strong> It is not &quot;relative strength&quot; in the sense of one stock versus another &mdash; that is a different concept. RSI compares a market's gains to its own losses.</p><div class='box law'><div class='bt'>Formula.</div> RS = (Average Gain over N) &divide; (Average Loss over N). Then RSI = 100 &minus; 100 &divide; (1 + RS). The default is N = 14. If average loss = 0, RSI = 100; if average gain = 0, RSI = 0. The output is bounded in [0, 100].</div><h3>Building a 14-period RSI by hand</h3><p>The first calculation uses a simple average of the up-moves and down-moves over the first 14 bars. Suppose over 14 days NOVA's gains and losses sum as follows:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>RSI step-by-step (N = 14)</span></div><div class='term-body'><span class='dim'>Sum of up-closes over 14 bars</span> = <span class='cm'>10.50</span>\n<span class='dim'>Sum of down-closes over 14 bars</span> = <span class='cm'>3.00</span>\n<span class='dim'>Average Gain</span> = 10.50 &divide; 14 = <span class='cm'>0.750</span>\n<span class='dim'>Average Loss</span> = 3.00 &divide; 14 = <span class='cm'>0.214</span>\n<span class='dim'>RS</span> = 0.750 &divide; 0.214 = <span class='cm'>3.50</span>\n<span class='dim'>RSI</span> = 100 &minus; 100 &divide; (1 + 3.50) = <span class='ok'>77.8</span>  <span class='am'>&rarr; deep into overbought</span></div></div><p>After the first bar, Wilder uses a <em>smoothed</em> (Wilder) average so the line does not jump: Avg Gain = (prior Avg Gain &times; 13 + current Gain) &divide; 14, and likewise for losses. This smoothing is why RSI behaves like an exponential moving average of relative strength rather than a jumpy raw ratio.</p><div class='box tip'><div class='bt'>Insight.</div> RSI is just a ratio of average up-moves to average down-moves, re-scaled. RSI = 50 means up and down energy were balanced over the window. RSI = 80 means up-moves outweighed down-moves roughly 4-to-1. That intuition is more useful than memorising the formula.</div><h3>Reading the 70/30 zones</h3><p>Wilder's convention: above <strong>70</strong> is overbought, below <strong>30</strong> is oversold. These are not buy/sell buttons &mdash; they are <em>statements about recent kinetic energy</em>. An RSI of 78 says &quot;the move up has been lopsided and fast; it is statistically stretched.&quot; That is all. Whether to fade it depends entirely on context, which is the theme of the rest of this part.</p><div class='chart' data-scenario='range' data-pane='rsi' data-marks='hline:70:OB;hline:30:OS' data-title='NOVA · Daily' data-cap='In a sideways range, RSI tagging 78 at the highs and 24 at the lows lines up with the turns.'></div><p>Study the chart. NOVA is chopping sideways. Each time price pokes the top of the range the RSI pane reads near 78; each time it flushes to the bottom the RSI reads near 24. In this <em>range</em> environment the 70/30 lines are gold &mdash; they front-run the reversals because there is no trend to overpower the mean-reversion instinct of buyers and sellers. Mark how the RSI extremes coincide almost exactly with the price extremes.</p><h3>The skepticism you must carry</h3><p>The reading &quot;78&quot; carries zero information about whether price will turn. In the range above it did. In the trend of the next lesson it will not &mdash; price will rip higher with RSI pinned over 70 for weeks. The number is identical; the meaning is opposite. So treat 70/30 as a <strong>condition flag</strong>, never a signal. A condition (stretched) plus a trigger (a reversal bar, a divergence, a break of a micro-level) is a setup. A condition alone is a coin flip.</p><div class='box danger'><div class='bt'>Pitfall.</div> &quot;RSI over 70, so I'll short&quot; is the most expensive sentence in technical analysis. In a strong uptrend RSI living above 70 is a sign of <em>strength</em>, not a sell. Selling overbought into an uptrend is how new traders donate capital. We dissect exactly why in 8.3.</div><h4>Choosing N</h4><p>Lower N (say 7) makes RSI faster and noisier, hitting extremes more often &mdash; useful for short-term swing work but more false flags. Higher N (21) is slower and smoother, with fewer but more meaningful extremes. The 14 default is a reasonable middle. Whatever you pick, keep it consistent so your sense of &quot;normal&quot; for that setting stays calibrated.</p><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: build RSI intuition from raw numbers.</p><ol><li>Pull 15 daily closes for any instrument.</li><li>Classify each day's change as a gain or a loss, and sum each over the 14 changes.</li><li>Compute Average Gain, Average Loss, RS, and RSI using the formula above.</li><li>Compare your hand figure to the platform's RSI(14) reading &mdash; they should be within rounding once a few bars of smoothing pass.</li></ol></div></div>"},{"id":"p8-3","part":"08 · Oscillators","nav":"RSI Divergence","num":"8.3","kicker":"Part 08 · Lesson 3","title":"RSI Divergence and Why Overbought Can Stay Overbought","html":"<h3>Why overbought stays overbought</h3><p>This lesson resolves the paradox that ruins beginners. In a powerful uptrend, RSI can sit above 70 for days or weeks and price keeps climbing the whole time. The reason is mechanical. RSI = 100 &minus; 100 &divide; (1 + RS). For RSI to <em>fall</em>, the average loss must grow relative to the average gain. But in a strong trend, pullbacks are tiny and brief &mdash; average loss stays small, average gain stays large, RS stays huge, and RSI stays pinned high. <strong>The oscillator is not malfunctioning; it is correctly reporting that down-moves are scarce.</strong></p><div class='box law'><div class='bt'>Definition.</div> An <strong>overbought trend</strong> is one where RSI repeatedly holds above 70 (or 80) on shallow pullbacks. This is a hallmark of <em>strength</em>. Some traders shift the zones in a confirmed uptrend to 80/40 &mdash; treating 40 as the buy-the-dip floor rather than 30.</p></div><div class='chart' data-scenario='uptrend' data-overlays='sma20' data-pane='rsi' data-marks='hline:70:OB' data-title='APEX · Daily' data-cap='RSI holds above 70 for three weeks of a clean uptrend - overbought is a feature, not a warning.'></div><p>Look at APEX. The trend marches up the 20-day average. In the lower pane RSI vaults above 70 early and simply <em>refuses to come back</em> &mdash; every dip in price barely dents it. Anyone who shorted the first 70 print was run over for the next three weeks. The lesson is visceral: in a trend, overbought is the cost of admission to being long, not a reason to sell.</p><h3>What actually marks the top: divergence</h3><p>If the 70 line does not call the top, what does? Often, <strong>divergence</strong>. Divergence is a disagreement between price and momentum: price makes a higher high, but RSI makes a <em>lower</em> high. Price is still climbing; its internal energy is not. The new high was made on weaker thrust &mdash; exactly the deceleration we measured in Lesson 8.1, now visible on a bounded scale.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Bearish divergence at the APEX top</span></div><div class='term-body'><span class='dim'>Price high #1</span>  = <span class='cm'>118.0</span>   <span class='dim'>RSI</span> = <span class='cm'>79</span>\n<span class='dim'>Price high #2</span>  = <span class='cm'>122.0</span>   <span class='dim'>RSI</span> = <span class='bad'>71</span>  <span class='am'>(higher price, LOWER RSI)</span>\n<span class='dim'>Verdict</span>: price &uarr; but momentum &darr;  <span class='bad'>&rarr; bearish divergence</span>\n<span class='dim'>Trigger</span>: only act when price then breaks the swing-low / the 20-SMA</div></div><p>The two flavours mirror each other:</p><ul><li><strong>Bearish (regular) divergence:</strong> price higher high, RSI lower high &mdash; warns of a top. Best near or above 70.</li><li><strong>Bullish (regular) divergence:</strong> price lower low, RSI higher low &mdash; warns of a bottom. Best near or below 30.</li></ul><div class='chart' data-scenario='rsi-divergence' data-pane='rsi' data-title='APEX · Daily' data-cap='The textbook setup: price prints a marginally higher high while RSI rolls over to a lower high, then price breaks down.'></div><p>This second chart isolates the classic. Price grinds to a final, slightly higher peak; the RSI pane visibly tops at a lower level than its previous peak. The dotted disagreement between the two slopes is the divergence. Then price breaks its recent swing low &mdash; that break is the <em>trigger</em>. Notice the order of operations: divergence is the <em>condition</em>; the break is the <em>confirmation</em>. Acting on divergence alone is how you get chopped up, because divergence can persist as price grinds higher in a parabola.</p><div class='box danger'><div class='bt'>Pitfall.</div> Divergence is not a timing tool by itself &mdash; it is a warning that can repeat several times before the turn. The strongest trends print three or four bearish divergences before they actually break. Never short purely on the divergence; wait for price to confirm by breaking structure.</div><div class='box tip'><div class='bt'>Insight.</div> Hidden divergence is the trend-continuation cousin: in an uptrend, price makes a <em>higher</em> low while RSI makes a <em>lower</em> low &mdash; signalling the dip is bought and the trend resumes. Regular divergence warns of reversal; hidden divergence confirms continuation.</div><h3>Putting it together</h3><p>The mature read of RSI in a trend is therefore two-layered. First, accept that overbought is normal and stop fading it. Second, watch for the day the new price high comes with weaker RSI &mdash; that is your early warning &mdash; and then demand a price-structure break before you act. That sequence (overbought tolerated &rarr; divergence noticed &rarr; structure break confirmed) turns RSI from a beginner's trap into a genuine edge.</p><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: separate condition from trigger.</p><ol><li>Find a past uptrend that topped out. Mark every bar where RSI first crossed 70.</li><li>Count how many of those 70-crosses were followed by an immediate reversal (usually almost none).</li><li>Now find the final two price highs. Record the RSI at each &mdash; confirm the second high had lower RSI (bearish divergence).</li><li>Mark where price then broke its prior swing low. That break, not the divergence, was the actionable moment.</li></ol></div></div>"},{"id":"p8-4","part":"08 · Oscillators","nav":"Stochastics","num":"8.4","kicker":"Part 08 · Lesson 4","title":"Stochastics: %K and %D","html":"<h3>A different question</h3><p>George Lane's Stochastic Oscillator asks: <strong>where does today's close sit within the recent high-low range?</strong> The premise is behavioural &mdash; in an uptrend closes tend to cluster near the top of the range; in a downtrend they cluster near the bottom. When closes start finishing low even though price is high, the move is weakening. Where RSI compares gains to losses, Stochastics compares the close to its <em>range</em>.</p><div class='box law'><div class='bt'>Formula.</div> %K = (Close &minus; Lowest Low<sub>N</sub>) &divide; (Highest High<sub>N</sub> &minus; Lowest Low<sub>N</sub>) &times; 100. Then %D = the 3-period simple moving average of %K. The popular &quot;14,3,3&quot; setting means N=14, an initial 3-period smoothing of raw %K (slow stochastic), and a 3-period %D. Output is bounded 0&ndash;100; overbought above 80, oversold below 20.</div><h3>A worked %K</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Stochastic %K (N = 14)</span></div><div class='term-body'><span class='dim'>Highest high over 14 bars</span> = <span class='cm'>110.0</span>\n<span class='dim'>Lowest low over 14 bars</span>  = <span class='cm'>100.0</span>\n<span class='dim'>Today's close</span>          = <span class='cm'>108.0</span>\n<span class='dim'>%K</span> = (108 &minus; 100) &divide; (110 &minus; 100) &times; 100 = <span class='ok'>80.0</span>  <span class='am'>&rarr; closing high in range</span>\n<span class='dim'>If close were 101</span> &rarr; %K = (1 &divide; 10) &times; 100 = <span class='bad'>10.0</span>  <span class='am'>&rarr; closing low in range</span></div></div><p>So a close of 108 inside a 100&ndash;110 range scores 80: buyers controlled the finish. A close of 101 in the same range scores 10: sellers controlled the finish even though the high was 110. That is the elegance &mdash; it measures <em>who won the day relative to the battlefield</em>.</p><h3>The %K / %D crossover</h3><p>The signal traders watch is the crossover of the fast %K through the slower %D, especially when it happens in an extreme zone. A %K crossing <em>up</em> through %D from below 20 is a classic range-bottom buy trigger. A %K crossing <em>down</em> through %D from above 80 is a range-top sell trigger. The smoothing of the slow stochastic deliberately cuts down the whipsaw that the raw (fast) version produces.</p><div class='chart' data-scenario='range' data-pane='stoch' data-marks='zone:20:0:OS;zone:100:80:OB' data-title='ORION · Daily' data-cap='A 14,3,3 stochastic curling up through %D from below 20 at the bottom of a trading range.'></div><p>In ORION's range, walk through the lower pane. At the bottom of the channel %K plunges below 20, then hooks up and crosses above %D &mdash; that hook-and-cross is the entry cue, and it lands right as price bounces off support. At the top of the range the mirror happens: %K climbs above 80, then rolls down through %D as price stalls at resistance. In a clean range these crossovers are remarkably well-timed because the oscillator is built for exactly this mean-reverting behaviour.</p><div class='box tip'><div class='bt'>Insight.</div> Stochastics is the most range-native of the common oscillators. It fires frequently and reaches extremes easily, which makes it superb inside a defined range and treacherous in a trend &mdash; it will give crossover buy signals all the way down a waterfall.</div><h3>RSI vs Stochastics &mdash; a quick contrast</h3><table><tr><td><strong>Aspect</strong></td><td><strong>RSI</strong></td><td><strong>Stochastics</strong></td></tr><tr><td>Measures</td><td>Avg gain vs avg loss</td><td>Close vs recent range</td></tr><tr><td>Extreme lines</td><td>70 / 30</td><td>80 / 20</td></tr><tr><td>Speed</td><td>Smoother, fewer signals</td><td>Faster, more signals</td></tr><tr><td>Primary signal</td><td>Divergence, zone exit</td><td>%K/%D crossover in zone</td></tr><tr><td>Best habitat</td><td>Trend (divergence) &amp; range</td><td>Range / chop</td></tr></table><p>Many traders run both: RSI for the divergence read and trend strength, Stochastics for the crisp entry trigger inside a range. Just remember they often disagree, and disagreement is information &mdash; not an error to be averaged away.</p><div class='box danger'><div class='bt'>Pitfall.</div> Because Stochastics maxes out so easily, a single explosive up-day can drive %K to 95+ and keep it there. Selling that first 80-cross in a breakout is a classic way to short strength. Confirm you are in a range, not a breakout, before trading the crossover.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: read crossovers in their proper habitat.</p><ol><li>Add a 14,3,3 slow stochastic to a chart currently in a sideways range.</li><li>Mark each %K/%D crossover that occurred below 20 or above 80.</li><li>Note how each lined up with a touch of range support or resistance.</li><li>Now switch to a chart in a strong downtrend and watch the same crossovers fire repeatedly on the way down &mdash; proof that habitat is everything.</li></ol></div></div>"},{"id":"p8-5","part":"08 · Oscillators","nav":"CCI & Williams","num":"8.5","kicker":"Part 08 · Lesson 5","title":"CCI and Williams %R","html":"<h3>Two more lenses on the same idea</h3><p>RSI and Stochastics are not the only momentum gauges. The Commodity Channel Index (Donald Lambert, 1980) and Williams %R (Larry Williams) measure stretch and range-position with different scales and quirks. Knowing them broadens your toolkit and, more importantly, teaches you that &quot;extreme&quot; is a relative idea each indicator defines for itself.</p><h3>CCI: deviation from the typical price</h3><div class='box law'><div class='bt'>Formula.</div> CCI = (Typical Price &minus; SMA of TP) &divide; (0.015 &times; Mean Deviation), where Typical Price = (High + Low + Close) &divide; 3. The 0.015 constant is chosen so that roughly 70&ndash;80% of values fall within &plusmn;100. Unlike RSI, CCI is <strong>unbounded</strong> &mdash; it can read +250 or &minus;300 in violent moves.</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>CCI worked example</span></div><div class='term-body'><span class='dim'>Typical Price today</span> = (114 + 110 + 113) &divide; 3 = <span class='cm'>112.33</span>\n<span class='dim'>20-bar SMA of TP</span>     = <span class='cm'>106.00</span>\n<span class='dim'>Mean deviation</span>      = <span class='cm'>3.20</span>\n<span class='dim'>CCI</span> = (112.33 &minus; 106.00) &divide; (0.015 &times; 3.20)\n     = 6.33 &divide; 0.048 = <span class='ok'>+131.9</span>  <span class='am'>&rarr; thrust above +100</span></div></div><p>The standard read: above <strong>+100</strong> indicates a strong up-thrust (often the <em>start</em> of a trend leg, not its end); below <strong>&minus;100</strong> a strong down-thrust. Because it is unbounded, CCI is excellent at flagging the <em>initiation</em> of a powerful move &mdash; a cross above +100 can mark a breakout's ignition rather than an overbought top.</p><div class='chart' data-scenario='breakout-up' data-pane='atr' data-title='VERTEX · Daily' data-cap='A breakout thrust: as price clears resistance, a CCI reading vaulting past +100 signals ignition, not exhaustion.'></div><p>Picture CCI on VERTEX's breakout. As price clears the prior ceiling, CCI spikes through +100. A naive oscillator trader sees &quot;overbought&quot; and fades it &mdash; and gets steamrolled, because for CCI the +100 cross during a breakout is a <em>go</em> signal. The volatility expansion you can see in the lower pane confirms real participation behind the thrust. This is the opposite instinct from Stochastics, and that contrast is the whole point of learning multiple tools.</p><h3>Williams %R: an inverted stochastic</h3><div class='box law'><div class='bt'>Formula.</div> %R = (Highest High<sub>N</sub> &minus; Close) &divide; (Highest High<sub>N</sub> &minus; Lowest Low<sub>N</sub>) &times; &minus;100. The scale runs from 0 (close at the very top of the range) to &minus;100 (close at the very bottom). Overbought is roughly &minus;20 to 0; oversold is &minus;80 to &minus;100.</div><p>Williams %R is essentially the Stochastic %K flipped onto a negative scale. A reading near <strong>&minus;10</strong> means the close is sitting near the top of the recent range &mdash; strong, and in a powerful uptrend it can stay pinned there for a long stretch, just like RSI staying above 70.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Williams %R worked example</span></div><div class='term-body'><span class='dim'>Highest high (14)</span> = <span class='cm'>115.0</span>\n<span class='dim'>Lowest low (14)</span>   = <span class='cm'>100.0</span>\n<span class='dim'>Close</span>            = <span class='cm'>113.5</span>\n<span class='dim'>%R</span> = (115 &minus; 113.5) &divide; (115 &minus; 100) &times; &minus;100\n    = (1.5 &divide; 15) &times; &minus;100 = <span class='ok'>&minus;10.0</span>  <span class='am'>&rarr; pinned near the top, strong</span></div></div><div class='chart' data-scenario='uptrend' data-overlays='ema21' data-title='VERTEX · Daily' data-cap='In a strong advance, Williams %R would sit pinned near -10 for the duration - strength, not a sell.'></div><p>On VERTEX's advance, %R hugging &minus;10 day after day is the signature of a healthy trend. Reading that as &quot;sell, it's overbought&quot; is the same error we keep warning about. The correct read is that closes keep finishing at the top of the range &mdash; buyers are in firm control.</p><div class='box tip'><div class='bt'>Insight.</div> Use CCI to catch the <em>ignition</em> of a move (cross of &plusmn;100) and Williams %R to gauge whether closes are still finishing strong within the range. Both, like every oscillator, flip meaning between trend and range &mdash; the subject of the next lesson.</div><div class='box danger'><div class='bt'>Pitfall.</div> CCI's unbounded scale tempts traders to fade ever-bigger numbers (&quot;it's at +200, surely it turns now&quot;). In a true trend CCI can ride above +100 for the entire leg. Treat &plusmn;100 as a momentum-state line, not a reversal line.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: compare the personalities of CCI and Williams %R.</p><ol><li>Add both CCI(20) and Williams %R(14) to the same chart.</li><li>On a recent breakout, note whether CCI crossing +100 marked ignition or exhaustion.</li><li>On a strong trend, watch how long %R stays pinned past &minus;20 (or &minus;80 in a downtrend).</li><li>Write one sentence on how each behaves differently from RSI in the same spots.</li></ol></div></div>"},{"id":"p8-6","part":"08 · Oscillators","nav":"Trend vs Range","num":"8.6","kicker":"Part 08 · Lesson 6","title":"Oscillators in a Trend vs a Range","html":"<h3>The single most important oscillator skill</h3><p>If you remember one idea from this entire part, make it this: <strong>an oscillator signal means the opposite thing in a trend versus a range.</strong> The identical RSI-30 print is a beautiful buy in a sideways market and a falling-knife disaster in a downtrend. The number does not change; the <em>environment</em> changes its meaning. Mastering oscillators is really mastering the question &quot;what regime am I in?&quot; <em>before</em> you read the indicator.</p><div class='box law'><div class='bt'>Definition.</div> In a <strong>range</strong>, use oscillators for <em>mean reversion</em>: fade extremes (buy oversold, sell overbought). In a <strong>trend</strong>, use oscillators for <em>trend confirmation</em>: buy pullbacks toward the midline in the trend direction, ignore the counter-trend extreme, and watch for divergence to warn of the end.</div><h3>The same RSI-30, two fates</h3><div class='chart' data-scenario='range' data-pane='rsi' data-marks='hline:30:OS;hline:70:OB' data-title='HELIX · Daily' data-cap='Range regime: RSI-30 prints at the bottom of the box and price bounces - a textbook mean-reversion buy.'></div><p>First, the range. HELIX oscillates in a box. When RSI dips to 30 it is sitting at the lower band of the range, sellers are exhausted, and the mean-reversion buy works because there is no larger force pulling price down &mdash; the market keeps returning to its average. Fading the extreme is exactly right here.</p><div class='chart' data-scenario='downtrend' data-pane='rsi' data-marks='hline:30:OS' data-title='HELIX · Daily' data-cap='Downtrend regime: the identical RSI-30 reads oversold all the way down - buying it catches a falling knife.'></div><p>Now the downtrend &mdash; same instrument, same RSI-30 reading. Here price is in a sustained decline. RSI hits 30 and the beginner buys &quot;oversold.&quot; But in a downtrend oversold is
