t without triggering a taxable sale.</div><div class='box danger'><div class='bt'>Pitfall.</div> A zero-cost collar is not free — you pay in surrendered upside. If ACME is acquired at 70, the short call caps you at 55 and you miss $15. Widen the call strike (accept a small net debit) when you want more room to run, or narrow the put strike (a higher floor) when protection matters most.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: tune a collar to your risk tolerance.</p><ol><li>Start from long stock at 50. Add a 45 put at 1.50 and confirm the floored max loss of 6.50.</li><li>Sell a 55 call at 1.50 to zero out the cost; verify the box from &minus;5 to +5.</li><li>Now move the call to 60 (collect only ~0.60). Recompute the small net debit and the wider ceiling, and note how the upside room grows.</li></ol></div></div>"},{"id":"p12-4","part":"12 · Options Strategies","nav":"Vertical Spreads","num":"12.4","kicker":"Part 12 · Lesson 4","title":"Vertical Spreads: Bull and Bear, Call and Put","html":"<p>A <strong>vertical spread</strong> buys one option and sells another of the same type and expiration at a different strike. The short leg pays for part of the long leg, cutting cost and defining risk — at the price of capping profit. There are exactly four, and once you can build one you can build all of them.</p><h3>The four verticals</h3><table><tr><td><strong>Spread</strong></td><td><strong>Legs</strong></td><td><strong>Cash flow</strong></td><td><strong>View</strong></td></tr><tr><td>Bull call</td><td>long lower call, short higher call</td><td>net debit</td><td>bullish</td></tr><tr><td>Bear put</td><td>long higher put, short lower put</td><td>net debit</td><td>bearish</td></tr><tr><td>Bull put</td><td>short higher put, long lower put</td><td>net credit</td><td>bullish / neutral</td></tr><tr><td>Bear call</td><td>short lower call, long higher call</td><td>net credit</td><td>bearish / neutral</td></tr></table><h3>The bull call spread</h3><p>You are bullish on ACME near 50. Buy the 50 call for <code>$3</code> and sell the 55 call for <code>$1</code>, a net <strong>debit of $2</strong>. The sold call subsidizes the purchase, but in return you give up everything above 55.</p><div class='box law'><div class='bt'>Definition.</div> Bull call spread: max loss = net debit = <code>$2</code>; max profit = (width &minus; debit) = (5 &minus; 2) = <code>$3</code>; break-even = lower strike + debit = <code>$52</code>.</div><div class='chart' data-type='payoff' data-legs='lc:50,sc:55' data-title='Bull Call Spread · +50 call / &minus;55 call · $2 debit' data-cap='Defined risk $2, defined reward $3, fully realized once the stock clears 55.'></div><p>The chart is a staircase. Below 50 both calls expire worthless and you lose the $2 debit — flat <strong>max loss</strong>. From 50 to 55 the long call gains while the short is still out of the money, so the line climbs. It crosses zero at the 52 break-even and flattens at 55, where the short call's losses start exactly offsetting further long-call gains, locking the <strong>$3 max profit</strong>. Your risk-reward is 2 risked to make 3.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Bull call spread at expiration</span></div><div class='term-body'><span class='dim'>+50 call ($3), &minus;55 call ($1), net debit $2</span>\n<span class='cm'>S = 48:</span> both worthless = <span class='bad'>&minus;$2 (max loss)</span>\n<span class='cm'>S = 52:</span> long +2, short 0, debit &minus;2 = <span class='dim'>$0 (break-even)</span>\n<span class='cm'>S = 55:</span> long +5, short 0, debit &minus;2 = <span class='ok'>+$3 (max)</span>\n<span class='cm'>S = 60:</span> long +10, short &minus;5, debit &minus;2 = <span class='ok'>+$3 (capped)</span></div></div><h3>The bear put spread</h3><p>The bearish mirror. Buy the 50 put for <code>$3</code> and sell the 45 put for <code>$1</code>, again a $2 debit. You profit as ACME falls toward 45, with the same defined geometry reflected.</p><div class='chart' data-type='payoff' data-legs='lp:50,sp:45' data-title='Bear Put Spread · +50 put / &minus;45 put · $2 debit' data-cap='Mirror of the bull call: max loss $2, max profit $3, break-even at 48.'></div><p>Here max loss is the $2 debit (stock above 50), max profit $3 (stock at or below 45), and break-even is 48 — the long strike minus the debit. Same risk-reward, opposite direction.</p><h3>Credit verticals: selling the spread</h3><p>Reverse the cash flow and you get the credit spreads. A <strong>bull put spread</strong> sells the 50 put and buys the 45 put for a net <em>credit</em>; you keep it if ACME stays above 50, and your max loss is the width minus the credit. A <strong>bear call spread</strong> sells the 50 call and buys the 55 call for a credit, profiting if ACME stays below 50. Credit verticals win from time decay and falling volatility, which is why they shine in high-IV regimes — a theme we return to in 12.10.</p><div class='box tip'><div class='bt'>Insight.</div> A debit spread and its mirror-strike credit spread are the same position. Long the 50/55 call spread for a $2 debit is identical in payoff to selling the 50/55 put spread for a $3 credit. Trade whichever has better fills and pin risk; the economics are the same.</div><div class='box danger'><div class='bt'>Pitfall.</div> Width matters. A 5-point spread for a $2 debit risks $2 to make $3 (1.5:1). A 5-point spread for a $4 debit risks $4 to make $1 — a poor 0.25:1 payout that needs to be right most of the time. Always express the spread as risk-to-reward, not just dollars.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: build all four verticals from one strike ladder.</p><ol><li>Using strikes 45/50/55 on ACME at 50, write the legs for a bull call, bear put, bull put and bear call spread.</li><li>For each, compute net debit/credit, max profit, max loss and break-even.</li><li>Pair the bull call (debit) with the matching bull put (credit) and confirm their payoffs are identical.</li></ol></div></div>"},{"id":"p12-5","part":"12 · Options Strategies","nav":"Straddle & Strangle","num":"12.5","kicker":"Part 12 · Lesson 5","title":"Straddles and Strangles","html":"<p>Vertical spreads bet on <em>direction</em>. Straddles and strangles bet on <em>magnitude</em>: they profit from a big move either way and lose if the stock sits still. These are pure volatility plays, and the central question is always whether the move you expect is bigger than the move the premium has already priced in.</p><h3>The long straddle</h3><p>ACME sits at <code>50</code> before an earnings report. You expect a violent move but have no idea which way. Buy the 50 call for <code>$3</code> and the 50 put for <code>$3</code> — same strike, same expiry — for a total debit of <code>$6</code>. You now own a position that wins on a large move in either direction.</p><div class='box law'><div class='bt'>Definition.</div> Long straddle = long ATM call + long ATM put. Cost = combined premium = <code>$6</code> = max loss (at S = strike). Break-evens = strike &plusmn; cost = <code>44</code> and <code>56</code>. Profit is unlimited above 56 and large (to 44) below.</div><div class='chart' data-type='payoff' data-legs='lc:50,lp:50' data-title='Long Straddle · +50 call +50 put · $6 debit' data-cap='A V-shaped valley: max loss at the strike, profit beyond 44 or 56 in either direction.'></div><p>Read the V. The single worst outcome is the stock pinning the strike at exactly 50, where both options expire worthless and you lose the full $6 — the bottom of the valley. Move away from 50 in either direction and one leg gains intrinsic value. The position breaks even at <strong>44 and 56</strong> (the strike plus or minus the $6 cost) and profits beyond them: unlimited to the upside, and down to a price of 44 on the downside. You do not need to guess direction — only that the move exceeds $6.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Long straddle outcomes</span></div><div class='term-body'><span class='dim'>+50 call ($3) + 50 put ($3), total cost $6</span>\n<span class='cm'>S = 50:</span> both worthless = <span class='bad'>&minus;$6 (max loss)</span>\n<span class='cm'>S = 56:</span> call +6, put 0, cost &minus;6 = <span class='dim'>$0 (upper BE)</span>\n<span class='cm'>S = 44:</span> call 0, put +6, cost &minus;6 = <span class='dim'>$0 (lower BE)</span>\n<span class='cm'>S = 62:</span> call +12, put 0, cost &minus;6 = <span class='ok'>+$6</span></div></div><h3>The long strangle</h3><p>A straddle is expensive because both options are at the money. Widen the strikes to cheapen it: buy the 55 call for <code>$1.50</code> and the 45 put for <code>$1.50</code>, a debit of just <code>$3</code>. This is a <strong>strangle</strong> — half the cost, but it needs a bigger move to pay off.</p><div class='chart' data-type='payoff' data-legs='lc:55,lp:45' data-title='Long Strangle · +55 call +45 put · $3 debit' data-cap='A flat-bottomed valley: cheaper than the straddle but needs a move beyond 42 or 58.'></div><p>The strangle's payoff has a flat trough between 45 and 55 — anywhere in that range both options expire worthless and you lose the full $3 debit. The break-evens are <strong>42 and 58</strong>: the put strike minus the cost and the call strike plus the cost. You paid half the straddle's premium, but the move needed to break even is larger (you must clear 58 versus 56). The trade-off is structural: lower cost, lower probability of a big enough move.</p><div class='box tip'><div class='bt'>Insight.</div> The make-or-break is <em>implied vs. realized volatility</em>. The $6 straddle is the market's priced-in expected move. You profit only if the stock moves more than the premium already discounts. Buying a straddle into already-elevated earnings IV often loses even on a real move, because IV collapses afterward (the volatility crush) and drains both legs.</div><div class='box danger'><div class='bt'>Pitfall.</div> These are long-theta-negative positions: every day of calm bleeds time value from both legs. A straddle held through a quiet week loses money even if your eventual thesis is right. Sellers take the opposite side — a short straddle or strangle collects the premium and profits from stillness, but with unlimited risk, so it is only for the well-margined and risk-aware.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: compare a straddle and strangle on the same expected move.</p><ol><li>Price the 50 straddle ($6) and the 45/55 strangle ($3); write each pair of break-evens.</li><li>Suppose ACME moves to 59 after earnings. Compute the P/L of each and see which captured more of the move.</li><li>Now suppose it moves only to 52. Compute both P/Ls and confirm both lose — the move was too small for either.</li></ol></div></div>"},{"id":"p12-6","part":"12 · Options Strategies","nav":"Iron Condor/Fly","num":"12.6","kicker":"Part 12 · Lesson 6","title":"The Iron Condor and Iron Butterfly","html":"<p>If the straddle buyer bets on a big move, the iron condor and iron butterfly are the sellers' answer: defined-risk credit strategies that profit when the stock <em>stays put</em>. They are the bread and butter of range-bound, premium-selling traders.</p><h3>The iron condor</h3><p>ACME is rangebound near <code>50</code>. You sell an out-of-the-money strangle — short the 55 call and short the 45 put — to collect premium, then buy a 60 call and a 40 put as <em>wings</em> to cap the risk. The wings turn unlimited short-strangle risk into a defined-risk box.</p><div class='box law'><div class='bt'>Definition.</div> Iron condor = bull put spread (short 45 / long 40 put) + bear call spread (short 55 / long 60 call). Net credit here = <code>$2</code>. Max profit = credit = $2. Max loss = wing width &minus; credit = (5 &minus; 2) = <code>$3</code>. Profit zone = short strikes &plusmn; credit = <code>43 to 57</code>.</div><div class='chart' data-type='payoff' data-legs='sp:45,lp:40,sc:55,lc:60' data-title='Iron Condor · short 45/55, long 40/60 · $2 credit' data-cap='A flat-topped plateau of profit between 43 and 57, with defined-risk shoulders.'></div><p>Read the plateau. Between the short strikes 45 and 55 all four legs are out of the money, so you keep the entire $2 credit — the flat <strong>max profit</strong> roof. The position stays profitable out to the <strong>43 and 57 break-evens</strong> (the short strikes widened by the credit). Beyond the wings at 40 and 60 the loss is fully capped at <strong>$3</strong>. You are paid to bet ACME finishes inside a band, and the wings guarantee you cannot be hurt by a tail event.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Iron condor at expiration</span></div><div class='term-body'><span class='dim'>Short 45 put / 55 call, long 40 put / 60 call, credit $2</span>\n<span class='cm'>S = 50:</span> all worthless, keep credit = <span class='ok'>+$2 (max)</span>\n<span class='cm'>S = 57:</span> call spread &minus;2, credit +2 = <span class='dim'>$0 (upper BE)</span>\n<span class='cm'>S = 43:</span> put spread &minus;2, credit +2 = <span class='dim'>$0 (lower BE)</span>\n<span class='cm'>S = 62:</span> call spread &minus;5, credit +2 = <span class='bad'>&minus;$3 (max loss)</span></div></div><h3>The iron butterfly</h3><p>Pull the short strikes together to the money and you get an <strong>iron butterfly</strong>: short the 50 call and short the 50 put (an at-the-money short straddle), with long 45 put and long 55 call wings. Because the short options are ATM, you collect far more credit — say <code>$4</code> — but the profitable range is narrower.</p><div class='chart' data-type='payoff' data-legs='sp:50,lp:45,sc:55,lc:50' data-title='Iron Butterfly · short 50 straddle, 45/55 wings · $4 credit' data-cap='A sharp tent peaking at the 50 strike; bigger credit, tighter profit zone than the condor.'></div><p>The iron butterfly's payoff is a tent peaking at the 50 strike, where both short options expire worthless and you keep the full $4. Break-evens are <strong>46 and 54</strong> (strike &plusmn; credit), and max loss is the wing width minus credit, (5 &minus; 4) = <strong>$1</strong>. Compared with the condor it offers a higher max profit and smaller max loss, but a much narrower target — it wants the stock to pin 50, whereas the condor is happy anywhere in a wide band.</p><div class='box tip'><div class='bt'>Insight.</div> Both structures are <em>short volatility</em> and short theta-positive: they decay in your favor and gain when implied volatility falls. Sell them when IV is rich and you expect a quiet drift. The condor trades a wider, safer range for a smaller credit; the butterfly trades a tighter target for a fatter credit and a tiny max loss.</div><div class='box danger'><div class='bt'>Pitfall.</div> Range strategies have an asymmetric feel: many small wins, occasional larger losses. A single trend day can blow through a short strike. Manage by closing or rolling when price tests a short strike, and size so a max-loss outcome is survivable — the defined risk is real but it is still 1.5&times; your credit on the condor.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: contrast the condor and butterfly.</p><ol><li>Write out the four legs of the 40/45/55/60 condor and the 45/50/55 iron butterfly.</li><li>Compute credit, max profit, max loss and break-evens for each.</li><li>Decide which you would prefer if you expected ACME to hover tightly around 50 versus drift somewhere within 45-55, and justify it.</li></ol></div></div>"},{"id":"p12-7","part":"12 · Options Strategies","nav":"Butterflies","num":"12.7","kicker":"Part 12 · Lesson 7","title":"Long and Short Butterflies","html":"<p>A butterfly is a precision instrument. Built from three strikes in a 1&ndash;2&ndash;1 ratio, it targets a single price at expiration for a tiny cost and a high potential payoff. The long butterfly is a cheap bet on stillness; the short butterfly is a bet on movement.</p><h3>The long call butterfly</h3><p>You think ACME, at <code>50</code>, will be near 50 at expiration. Build a 45/50/55 long call butterfly: buy one 45 call, sell two 50 calls, buy one 55 call. The two short calls finance the wings, so the whole structure costs only a small net debit — say <code>$1</code>.</p><div class='box law'><div class='bt'>Definition.</div> Long butterfly = +1 lower / &minus;2 middle / +1 upper, equal spacing. Max loss = net debit = <code>$1</code> (outside the wings). Max profit = wing width &minus; debit = (5 &minus; 1) = <code>$4</code>, achieved only at the body strike. Break-evens = body &plusmn; (max profit) = <code>46</code> and <code>54</code>.</div><div class='chart' data-type='payoff' data-legs='lc:45,sc:50:2,lc:55' data-title='Long Call Butterfly · +45 / &minus;2&times;50 / +55 · $1 debit' data-cap='A sharp peak at 50: pay $1 to make up to $4 if the stock pins the body strike.'></div><p>The payoff is a tent with its apex precisely at 50. There, the long 45 call is worth $5 while the two short 50 calls and long 55 call expire worthless, netting $5 of intrinsic minus the $1 debit for <strong>$4 max profit</strong>. Stray to the wings (45 or 55) and the structure decays back to the $1 cost. Outside the wings everything cancels and you simply lose the $1 debit — the flat <strong>max loss</strong>. You risk $1 to make $4 if your pin is right: a 4:1 payout that rewards precision.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Long butterfly at expiration</span></div><div class='term-body'><span class='dim'>+45 call, &minus;2&times;50 call, +55 call, debit $1</span>\n<span class='cm'>S = 42:</span> all worthless = <span class='bad'>&minus;$1 (max loss)</span>\n<span class='cm'>S = 46:</span> +45 worth 1, debit &minus;1 = <span class='dim'>$0 (lower BE)</span>\n<span class='cm'>S = 50:</span> +45 worth 5, shorts 0, debit &minus;1 = <span class='ok'>+$4 (max)</span>\n<span class='cm'>S = 54:</span> +45 worth 9, &minus;2&times;4, debit &minus;1 = <span class='dim'>$0 (upper BE)</span></div></div><h3>The short butterfly</h3><p>Invert every leg — sell one 45 call, buy two 50 calls, sell one 55 call — and you have a <strong>short butterfly</strong>, taken in for a <em>credit</em>. It is the mirror: it profits when the stock moves <em>away</em> from the body and loses if it pins 50.</p><div class='chart' data-type='payoff' data-legs='sc:45,lc:50:2,sc:55' data-title='Short Call Butterfly · &minus;45 / +2&times;50 / &minus;55 · $1 credit' data-cap='An inverted tent: keep the credit if the stock leaves the 45-55 range, lose most if it pins 50.'></div><p>Here the picture flips: a valley at 50 where you suffer the max loss of (width &minus; credit) = $4, and flat plateaus of <strong>+$1 max profit</strong> outside the wings, where you keep the credit. The short butterfly is a low-cost, defined-risk way to bet against a pin — a cousin of the strangle, but cheaper and capped.</p><div class='box tip'><div class='bt'>Insight.</div> A butterfly can be built from calls or puts with an identical payoff (put-call parity guarantees it). It can also be read as two adjacent verticals: the long call butterfly is a bull 45/50 call spread plus a bear 50/55 call spread sharing the 50 strike. Seeing it as two spreads makes the geometry obvious.</div><div class='box danger'><div class='bt'>Pitfall.</div> The headline 4:1 payout is misleading because the bullseye is tiny — full profit needs the stock to land essentially on 50 at expiration. Realistically you close early for a fraction of max. Also beware <em>pin risk</em>: if ACME settles right at 50, your short legs may or may not be assigned, leaving an unhedged stock position over the weekend. Close butterflies before expiration to avoid that ambiguity.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: see the butterfly as two verticals and price its edges.</p><ol><li>Split the 45/50/55 long call butterfly into a 45/50 bull call spread and a 50/55 bear call spread; confirm the leg counts match.</li><li>Tabulate P/L at S = 44, 50, 56 and verify max loss &minus;$1 and max profit +$4.</li><li>Now flip to the short butterfly and confirm the payoff is the exact mirror.</li></ol></div></div>"},{"id":"p12-8","part":"12 · Options Strategies","nav":"Calendar & Diagonal","num":"12.8","kicker":"Part 12 · Lesson 8","title":"Calendar and Diagonal Spreads","html":"<p>Every strategy so far used a single expiration. Calendar and diagonal spreads add a second one, selling a near-term option against a longer-dated one. They harvest the fact that <em>time decay accelerates as expiration nears</em> — the front-month option bleeds theta faster than the back-month you own.</p><h3>Why theta is uneven</h3><p>An option's time value does not decay linearly. It erodes slowly when far out and then collapses in the final weeks, roughly with the square root of time remaining. Sell the fast-decaying front month and own the slow-decaying back month, and the difference accrues to you while both share the same strike.</p><div class='box law'><div class='bt'>Definition.</div> Calendar (horizontal) spread = short near-term option + long longer-term option, <em>same strike</em>. Established for a net debit. Profit comes from the front leg decaying faster (positive net theta) and from a rise in implied volatility (positive net vega).</div><h3>The long call calendar</h3><p>ACME is at <code>50</code> and you expect it to stay near there for a few weeks. Sell the front-month 50 call for <code>$1.50</code> and buy the back-month 50 call for <code>$3</code>, a net debit of <code>$1.50</code>. Each day the front call decays faster than the back call, widening the spread's value in your favor — provided the stock cooperates by staying near 50.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Calendar mechanics at front-month expiry</span></div><div class='term-body'><span class='dim'>Short front 50 call $1.50, long back 50 call $3, debit $1.50</span>\n<span class='cm'>S near 50:</span> front expires ~worthless (you keep 1.50), back retains time value &rarr; <span class='ok'>net gain</span>\n<span class='cm'>S = 38 (far below):</span> both calls ~worthless &rarr; lose most of the <span class='bad'>$1.50 debit</span>\n<span class='cm'>S = 65 (far above):</span> both deep ITM, values converge &rarr; spread shrinks toward <span class='bad'>~debit loss</span>\n<span class='am'>Best case:</span> S pins the strike at front expiry</div></div><p>Because the two legs do not expire together, a calendar's true payoff cannot be drawn as a clean expiration hockey stick — its value at the front-month expiry depends on the back-month's remaining time value. But the <em>shape</em> resembles a tent centered on the strike, much like a long butterfly: max value when the stock sits at 50, decaying toward the debit as the stock runs far in either direction.</p><div class='chart' data-type='curve' data-curve='time-decay' data-title='Theta accelerates into expiration' data-cap='Time value erodes slowly far out, then plunges in the final weeks &mdash; the engine behind the calendar.'></div><p>This decay curve is the calendar's whole thesis. The front-month option you are short lives at the right end of the curve, where the slope is steepest and value falls fastest. The back-month you are long sits further left, decaying gently. You pocket the difference in slopes — as long as the stock does not run away and rob the strike of its relevance.</p><h3>The diagonal spread</h3><p>A <strong>diagonal</strong> changes both the expiration <em>and</em> the strike — for example, sell the front-month 52 call and buy the back-month 50 call. It blends a calendar's time-decay edge with a vertical's directional lean. A call diagonal carries a mild bullish bias (you want a gentle grind up toward the short strike), making it a flexible way to express both a view and a volatility opinion.</p><div class='box tip'><div class='bt'>Insight.</div> Calendars are <em>long vega</em>: they gain if implied volatility rises because the longer-dated leg has more vega than the front leg. Put them on when IV is low and you expect it to climb into an event, with the stock pinned near the strike. They are among the few strategies that profit from both calm price action and rising volatility at once.</div><div class='box danger'><div class='bt'>Pitfall.</div> A calendar's risk is a <em>big move in either direction</em>, which flattens the tent and erases the debit. It is also short gamma near the strike at front expiry — a sudden jump hurts. And rolling the short leg forward each cycle racks up commissions and assignment risk. Treat calendars as positions to manage actively, not set-and-forget.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: reason about a calendar's behavior through time.</p><ol><li>Set up the 50 calendar: short front 50 call $1.50, long back 50 call $3, debit $1.50.</li><li>Describe what happens to each leg if ACME sits at 50 until front-month expiry, then if it gaps to 65.</li><li>Convert it to a diagonal by moving the short leg to the 52 strike and explain the added directional tilt.</li></ol></div></div>"},{"id":"p12-9","part":"12 · Options Strategies","nav":"Ratio Spreads","num":"12.9","kicker":"Part 12 · Lesson 9","title":"Ratio Spreads","html":"<p>A ratio spread breaks the one-to-one symmetry of a vertical by selling <em>more</em> contracts than it buys. That extra short option cheapens the trade — often financing it to zero cost or a credit — but it also leaves a naked leg, introducing an uneven and sometimes unlimited risk zone. Ratio spreads are powerful and treacherous in equal measure.</p><h3>The 1&times;2 call ratio</h3><p>ACME is at <code>50</code> and you are moderately bullish — you think it drifts toward 55 but no higher. Buy one 50 call for <code>$3</code> and sell two 55 calls for <code>$1</code> each, collecting $2 against the $3 paid for a net debit of just <code>$1</code>. One of the two short calls is covered by the long call; the second is <em>naked</em>.</p><div class='box law'><div class='bt'>Definition.</div> 1&times;2 call ratio = +1 lower call, &minus;2 higher calls. Below the lower strike: lose the net debit. Peak profit at the upper strike = (strike width) + credit &minus; debit = (5) &minus; 1 = <code>$4</code>. Above the upper strike the extra short call creates an <em>upside risk zone</em>; the upper break-even = upper strike + max profit = <code>59</code>, beyond which losses are <strong>unlimited</strong>.</div><div class='chart' data-type='payoff' data-legs='lc:50,sc:55:2' data-title='1&times;2 Call Ratio · +50 / &minus;2&times;55 · $1 debit' data-cap='Peak profit at 55, then a falling right tail into unlimited upside risk past 59.'></div><p>Walk the chart. Below 50 everything expires worthless and you lose the small $1 debit. From 50 to 55 the long call gains while both shorts stay out of the money, climbing to the <strong>peak profit of $4 right at 55</strong>. Above 55 the two short calls together lose two dollars for every dollar the long gains one — a net loss of one dollar per point — so the line turns <em>down</em>. It re-crosses zero at the <strong>upper break-even of 59</strong> and then keeps falling: above 59 the position has <strong>unlimited risk</strong> because you are effectively short one naked call.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>1&times;2 call ratio at expiration</span></div><div class='term-body'><span class='dim'>+50 call ($3), &minus;2&times;55 call ($1 each), net debit $1</span>\n<span class='cm'>S = 48:</span> all worthless = <span class='bad'>&minus;$1 (debit)</span>\n<span class='cm'>S = 55:</span> long +5, shorts 0, debit &minus;1 = <span class='ok'>+$4 (peak)</span>\n<span class='cm'>S = 59:</span> long +9, shorts &minus;2&times;4, debit &minus;1 = <span class='dim'>$0 (upper BE)</span>\n<span class='cm'>S = 70:</span> long +20, shorts &minus;2&times;15, debit &minus;1 = <span class='bad'>&minus;$11 and falling</span></div></div><h3>The put ratio and the front spread</h3><p>The bearish mirror is the <strong>1&times;2 put ratio</strong>: buy one 50 put, sell two 45 puts. It peaks at the lower strike and carries a downside risk zone if the stock collapses past the lower break-even. When a ratio is established for a net <em>credit</em> rather than a debit, traders call it a <em>front spread</em>: you cannot lose on the side away from the strikes (you keep the credit), and your only real risk lies in the runaway direction.</p><div class='box tip'><div class='bt'>Insight.</div> Read a 1&times;2 ratio as a vertical spread plus an extra naked short option. The +50/&minus;55 call vertical gives the rising left side; the additional short 55 call adds the income that cheapens it and the unlimited right-tail risk. This decomposition tells you exactly where the danger lives and how a sharp move would hurt.</div><div class='box danger'><div class='bt'>Pitfall.</div> The naked leg is the whole story. A 1&times;2 call ratio looks benign and may even be a credit, but a takeover gap to 75 turns that tidy diagram into a six-figure loss. Many brokers require naked-option approval and heavy margin for exactly this reason. If you trade ratios, consider capping the tail with a far wing (turning it into a defined-risk <em>ratioed butterfly</em>), and never run them through binary events.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: map the danger zone of a ratio.</p><ol><li>For the +50 / &minus;2&times;55 call ratio at a $1 debit, compute P/L at S = 48, 55, 59 and 68.</li><li>Identify the peak, the upper break-even and the slope of the right tail (loss per point above 55).</li><li>Add a long 60 call to cap the tail; describe how the unlimited risk becomes defined and what it costs in peak profit.</li></ol></div></div>"},{"id":"p12-10","part":"12 · Options Strategies","nav":"Choosing a Strategy","num":"12.10","kicker":"Part 12 · Lesson 10","title":"Choosing a Strategy from Outlook and IV","html":"<p>You now own a toolbox of a dozen strategies. The final skill is selection: matching the right structure to two inputs — your <strong>directional outlook</strong> (bullish, neutral, bearish) and the <strong>implied-volatility regime</strong> (high or low). Get these two axes right and the strategy almost picks itself.</p><h3>The two questions</h3><p>Before any trade, answer:</p><ol><li><strong>Which way, and how far?</strong> Strongly directional, mildly directional, or going nowhere? This sets the skeleton — call structures for up, put structures for down, balanced structures for sideways.</li><li><strong>Is volatility rich or cheap?</strong> Compare current IV to its own history (IV rank/percentile). High IV favors <em>selling</em> premium (credit, short-vega); low IV favors <em>buying</em> it (debit, long-vega).</li></ol><div class='box law'><div class='bt'>Rule of thumb.</div> High IV &rarr; be a net <em>seller</em> (collect inflated premium, profit as IV reverts down). Low IV &rarr; be a net <em>buyer</em> (cheap premium, profit as IV expands). Then overlay your direction to choose calls vs. puts vs. balanced.</div><h3>The selection grid</h3><table><tr><td><strong>Outlook</strong></td><td><strong>High IV (sell premium)</strong></td><td><strong>Low IV (buy premium)</strong></td></tr><tr><td>Bullish</td><td>Bull <em>put</em> spread (credit); cash-secured put</td><td>Bull <em>call</em> spread (debit); long call</td></tr><tr><td>Neutral</td><td>Iron condor; iron butterfly; short strangle</td><td>Long calendar; long butterfly</td></tr><tr><td>Bearish</td><td>Bear <em>call</em> spread (credit)</td><td>Bear <em>put</em> spread (debit); long put</td></tr><tr><td>Big move, no direction</td><td>(avoid buying) sell premium only if you expect calm</td><td>Long straddle / strangle</td></tr></table><p>Notice the pattern: in each cell the <em>direction</em> picks calls or puts, while the <em>IV regime</em> picks whether you sell a credit spread or buy a debit spread. A bullish view in high IV becomes a bull put spread; the same view in low IV becomes a bull call spread. Both lean bullish; they differ only in how they treat volatility.</p><h3>Worked selection: bullish into high IV</h3><p>ACME trades at <code>50</code>, you are bullish, and IV is in the 80th percentile after a scare. Buying calls would overpay for inflated premium and suffer if IV mean-reverts. Instead sell a <strong>bull put spread</strong>: short the 48 put, long the 43 put, for a <code>$1.50</code> credit. You profit if ACME holds above 48, you are short vega (gaining as IV falls), and your risk is defined at (width &minus; credit) = (5 &minus; 1.50) = <code>$3.50</code>.</p><div class='chart' data-type='payoff' data-legs='sp:48,lp:43' data-title='Bull Put Spread · &minus;48 / +43 put · $1.50 credit' data-cap='The high-IV bullish choice: collect a credit, profit above 46.50, defined risk below.'></div><p>The payoff is a credit spread's plateau: keep the full $1.50 anywhere above 48, break even at <strong>46.50</strong> (short strike minus credit), and bottom out at the <strong>&minus;$3.50 max loss</strong> below 43. You expressed a bullish view, sold expensive volatility, and capped your risk — three boxes ticked at once. Had IV instead been cheap, the right answer would flip to a long call or a bull <em>call</em> debit spread, buying the cheap premium for unlimited or defined upside.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Matching the trade to the regime</span></div><div class='term-body'><span class='cm'>Bullish + high IV:</span> <span class='ok'>bull put spread</span> (credit, short vega) &mdash; profit if stock holds, IV falls\n<span class='cm'>Bullish + low IV:</span> <span class='ok'>bull call spread / long call</span> (debit, long vega) &mdash; profit if stock rises, IV rises\n<span class='cm'>Neutral + high IV:</span> <span class='ok'>iron condor</span> &mdash; profit if stock stalls, IV falls\n<span class='cm'>Neutral + low IV:</span> <span class='ok'>calendar / butterfly</span> &mdash; profit if stock pins, IV rises\n<span class='am'>Always:</span> let direction pick call vs. put; let IV pick buy vs. sell</div></div><div class='box tip'><div class='bt'>Insight.</div> The grid is a starting map, not a straitjacket. Refine with your <em>conviction</em> (defined-risk spreads when unsure, fuller exposure when confident), your <em>time horizon</em> (theta works for sellers, against buyers), and the <em>event calendar</em> (earnings inflate IV and then crush it). Strategy selection is the disciplined intersection of view, volatility, and risk tolerance.</div><div class='box danger'><div class='bt'>Pitfall.</div> The classic error is fighting the regime: buying long premium into elevated IV before earnings, then losing on the post-event volatility crush even when the direction was right. Always check IV rank before choosing buy-vs-sell. Being right on direction but wrong on volatility is one of the most common ways an options thesis still loses money.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: drive the grid on live-style scenarios.</p><ol><li>Bearish on NOVA with IV in the 90th percentile: pick a strategy from the grid and write its legs and break-even.</li><li>Neutral on ACME with IV in the 15th percentile before a catalyst: choose between a calendar and a butterfly and justify it.</li><li>For each, state explicitly how the trade benefits from the volatility regime, not just the direction.</li></ol></div></div>"},{"id":"p13-1","part":"13 · Risk & Psychology","nav":"Position Sizing","num":"13.1","kicker":"Part 13 · Lesson 1","title":"Position Sizing and Risk of Ruin","html":"<h3>The first job is survival</h3><p>Most beginners obsess over <em>entries</em> — the perfect setup, the magic indicator. Professionals obsess over <em>size</em>. You can be right about direction and still go broke if you bet too much on any single trade. Position sizing is the discipline that keeps a string of losses — which is statistically <strong>guaranteed</strong> to happen — from ending your career. The math is simple, and ignoring it is the single most common reason traders blow up.</p><div class='box law'><div class='bt'>The fixed-fractional rule.</div> Risk a small <em>fixed fraction</em> of your account equity on each trade — commonly 0.5% to 2%. Shares = (Account &times; Risk%) &divide; (Entry &minus; Stop). The dollars you risk stay proportional to your account, so losses shrink as you draw down and gains compound as you grow.</div><h4>The core worked example</h4><p>You have a $50,000 account and risk <strong>1%</strong> per trade. That is $500 of <em>risk</em> — not $500 of position, but the maximum you intend to lose if the stop is hit. You buy ACME at $40 with a stop at $38, so your per-share risk is $2.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>1% sizing on a $2 stop</span></div><div class='term-body'><span class='dim'>Account equity</span> <span class='cm'>$50,000</span>\n<span class='dim'>Risk per trade (1%)</span> <span class='cm'>$50,000 &times; 0.01 = $500</span>\n<span class='dim'>Entry &minus; Stop</span> <span class='cm'>$40 &minus; $38 = $2 per share</span>\n<span class='dim'>Shares</span> <span class='ok'>$500 &divide; $2 = 250 shares</span>\n<span class='dim'>Position value</span> <span class='am'>250 &times; $40 = $10,000 (20% of account)</span>\n<span class='dim'>If stopped out</span> <span class='bad'>250 &times; $2 = &minus;$500 (&minus;1%)</span></div></div><p>Notice the position is $10,000 — a fifth of the account — yet you only risk $500. The <em>stop distance</em>, not the position size, controls your risk. A tight $1 stop would let you buy 500 shares; a wide $5 stop only 100 shares. Same $500 at risk every time. This is the key insight: <strong>let the stop set the size</strong>, never the other way around.</p><div class='chart' data-scenario='breakdown' data-overlays='sma20' data-marks='note:8:40:Entry $40; support:38' data-title='ACME · Daily' data-cap='Stop sits at $38 below structure; the $2 distance drives the 250-share size.'></div><p>Above, the entry is near $40 with a structural stop at $38. If price breaks down to the stop, the loss is contained to a known, pre-budgeted $500. You decided the size <em>before</em> you clicked buy, when you were calm.</p><h4>Why 2% bets are more than twice as dangerous</h4><p>Risk of ruin is the probability that a losing streak draws your account down to a level you cannot recover from. It rises <em>non-linearly</em> with bet size because drawdowns compound. Lose 1% ten times in a row and you are down ~9.6%. Lose 2% ten times and you are down ~18.3% — nearly double, and the deeper hole demands a bigger percentage gain to climb out.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>The drawdown asymmetry</span></div><div class='term-body'><span class='dim'>Lose 10% &rarr; need to recover</span> <span class='cm'>+11.1%</span>\n<span class='dim'>Lose 25% &rarr; need to recover</span> <span class='am'>+33.3%</span>\n<span class='dim'>Lose 50% &rarr; need to recover</span> <span class='bad'>+100%</span>\n<span class='dim'>Lose 75% &rarr; need to recover</span> <span class='bad'>+300%</span></div></div><p>A 50% loss requires a 100% gain just to break even. This is why big bets are poison: a single bad streak forces a recovery so large that most accounts never make it back. Cutting size from 2% to 1% does not merely halve the pain — it dramatically collapses the tail probability of an unrecoverable drawdown.</p><div class='box danger'><div class='bt'>The ruin trap.</div> With a 50% win rate, an 8-loss streak happens roughly once every 256 sequences — common over a trading career. At 2% per loss that is a ~15% drawdown; pile on a few more and you are in the danger zone. The trader who risks 5% per trade and hits that same streak is down ~34% and emotionally wrecked.</div><h4>Practical guardrails</h4><ul><li><strong>Beginners:</strong> risk 0.25%–0.5% while you are still learning whether your edge is real. You are paying tuition; pay it in small bills.</li><li><strong>Established edge:</strong> 1% is the durable workhorse. It survives long losing streaks and still compounds.</li><li><strong>Never average:</strong> adding to a loser to lower your cost basis silently doubles your risk past the budget. The stop is the stop.</li></ul><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Build your own sizing table for a $25,000 account at 1% risk.</p><ol><li>Compute your dollar risk per trade (account &times; 0.01).</li><li>For stop distances of $0.50, $1, $2, and $4, calculate shares = $250 &divide; distance.</li><li>Note the position value in each case and confirm the dollar risk stays constant at $250.</li><li>Now redo it at 2% and compare how much faster a 10-loss streak would draw you down.</li></ol></div></div>"},{"id":"p13-2","part":"13 · Risk & Psychology","nav":"R:R & Expectancy","num":"13.2","kicker":"Part 13 · Lesson 2","title":"Risk/Reward and Expectancy","html":"<h3>Win rate is a vanity metric</h3><p>New traders chase high win rates and feel proud of being right 70% of the time — then lose money. The reason is that <em>how much</em> you make when right and <em>how much</em> you lose when wrong matters more than how often. The two numbers that actually decide your fate are <strong>risk/reward</strong> per trade and <strong>expectancy</strong> across many trades. Master these and you can be wrong most of the time and still get rich.</p><h4>Risk/reward (R:R)</h4><p>R:R compares your potential reward to your risk on a single trade. Define one unit of risk as <strong>R</strong> = the distance from entry to stop. Reward is the distance from entry to target. A trade that risks $2 to make $4 is a 2:1 trade, or a <strong>2R</strong> target.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Computing R:R on a long</span></div><div class='term-body'><span class='dim'>Entry</span> <span class='cm'>$50.00</span>\n<span class='dim'>Stop</span> <span class='cm'>$48.00  &rarr; risk (1R) = $2.00</span>\n<span class='dim'>Target</span> <span class='cm'>$54.00  &rarr; reward = $4.00</span>\n<span class='dim'>Risk/reward</span> <span class='ok'>$4 &divide; $2 = 2.0  (a 2R trade)</span></div></div><div class='chart' data-scenario='breakout-up' data-marks='hline:48:Stop (1R); note:6:50:Entry; hline:54:Target (2R)' data-title='NOVA · Daily' data-cap='Entry at $50, stop at $48 (1R), target at $54 (2R) — a 2:1 trade.'></div><p>The chart shows the geometry: a small fixed downside to the stop and double the room to the target. Demanding a minimum R:R — say, no trade below 2:1 — is a filter that quietly does most of the work. It forces you to skip marginal setups and only deploy capital where the payoff justifies the risk.</p><h4>Expectancy: the only number that compounds</h4><p>Expectancy is the average profit (in R) you expect <em>per trade</em>, blending win rate and R:R. It tells you whether your system has a real mathematical edge.</p><div class='box law'><div class='bt'>Expectancy formula.</div> Expectancy (in R) = (Win% &times; AvgWin<sub>R</sub>) &minus; (Loss% &times; AvgLoss<sub>R</sub>). A positive number means each trade, on average, adds value. Multiply by your dollar risk to get expected dollars per trade.</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>50% win rate at 2:1 reward</span></div><div class='term-body'><span class='dim'>Win probability</span> <span class='cm'>0.50, average win = +2R</span>\n<span class='dim'>Loss probability</span> <span class='cm'>0.50, average loss = &minus;1R</span>\n<span class='dim'>Expectancy</span> <span class='ok'>(0.50 &times; 2) &minus; (0.50 &times; 1) = +0.50R</span>\n<span class='dim'>At $500 risk/trade</span> <span class='ok'>+0.50R &times; $500 = +$250 per trade (avg)</span></div></div><p>Half the time you lose; you still make $250 per trade on average. Over 200 trades that is roughly +$50,000 of expected edge before compounding. This is the engine of professional trading: a modest positive expectancy applied with discipline over a large sample.</p><h4>Why high win rates can lose money</h4><p>Consider a trader who wins 70% of the time but only takes 0.5:1 trades — risking $2 to make $1 — because cutting winners early <em>feels</em> good.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>70% win rate at 0.5:1 — a losing system</span></div><div class='term-body'><span class='dim'>Wins</span> <span class='cm'>0.70 &times; (+0.5R) = +0.35R</span>\n<span class='dim'>Losses</span> <span class='cm'>0.30 &times; (&minus;1R) = &minus;0.30R</span>\n<span class='dim'>Expectancy</span> <span class='dim'>+0.35 &minus; 0.30 = +0.05R (barely positive)</span>\n<span class='dim'>After ~$0.05R in costs/slippage</span> <span class='bad'>&asymp; 0R or negative</span></div></div><p>Being right 70% of the time produces almost no edge here, and trading costs push it underwater. Meanwhile the 50%-win, 2:1 trader prints +0.50R. <strong>It is the size of the wins relative to the losses that builds wealth, not the frequency of being right.</strong></p><div class='box tip'><div class='bt'>Insight.</div> Expectancy &times; number of trades &times; dollar risk = your expected profit. Improve any of the three: raise expectancy (better setups/exits), trade more (within your edge), or — carefully — size up once the edge is proven. The first is by far the safest lever.</div><div class='box danger'><div class='bt'>Sample-size warning.</div> A handful of trades tells you nothing. Expectancy is only meaningful over 50–100+ trades. A short hot streak can mask a negative-expectancy system, and a short cold streak can hide a great one. Judge the process, not the last five outcomes.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Compute expectancy for three hypothetical systems.</p><ol><li>System A: 40% win rate, 3:1 reward. Calculate (0.40&times;3) &minus; (0.60&times;1).</li><li>System B: 60% win rate, 1:1 reward.</li><li>System C: 35% win rate, 2:1 reward.</li><li>Rank them by expectancy in R, then by expected dollars if you risk $400 per trade. Which surprised you?</li></ol></div></div>"},{"id":"p13-3","part":"13 · Risk & Psychology","nav":"Stops & Exits","num":"13.3","kicker":"Part 13 · Lesson 3","title":"Where to Place Stops and How to Exit","html":"<h3>The exit is the trade</h3><p>Your entry gets all the attention, but your <em>exits</em> determine your actual P&L. A stop that is too tight gets shaken out by noise; one that is too loose bleeds capital. And on the winning side, the difference between a mediocre and an exceptional trader is almost entirely how they handle the exit — whether they bank a small gain in fear or let a winner run into a multi-R home run.</p><h4>Place stops at structure, not at round numbers</h4><p>A stop should sit at a price where your trade thesis is <strong>proven wrong</strong>, not at an arbitrary dollar amount. For a long, that is typically just below a swing low, a support shelf, or a moving average the trend has been respecting. The logic: if price violates that structure, the reason you entered no longer holds.</p><div class='box law'><div class='bt'>Structural stop.</div> Long: place the stop a small buffer <em>below</em> the most recent higher-low / support. Short: place it <em>above</em> the most recent lower-high / resistance. Add an ATR-based buffer so normal volatility does not clip you — e.g. stop = swing low &minus; (0.5 &times; ATR).</div><div class='chart' data-scenario='pullback-uptrend' data-overlays='atr' data-marks='support:96; note:5:97:Buy the pullback; hline:95:Stop below swing low' data-title='ORCA · Daily' data-cap='Stop sits just below the swing low; the ATR pane shows the volatility buffer needed.'></div><p>In the chart the entry is on a pullback within an uptrend. The swing low is the line in the sand — below it the higher-high/higher-low structure breaks. Placing the stop just beneath it, plus a fraction of ATR, keeps you in the trade through ordinary wiggles while still defining a clean invalidation point. Remember: <strong>you set size from this stop distance</strong> (Lesson 13.1), so a structurally-correct stop and correct sizing are the same decision.</p><div class='box danger'><div class='bt'>Avoid the obvious stop.</div> Do not cluster your stop at the exact round number or the exact prior low where everyone else parks theirs — those pools of stops are precisely where price gets hunted. A small buffer below the herd often saves the trade.</div><h4>Scaling out: partials and runners</h4><p>You rarely have to be all-in or all-out. A robust exit plan banks some profit early to reduce risk, then lets a remainder ride for outsized gains. A common structure: <strong>exit half at 2R, move the stop to breakeven, and trail the rest.</strong></p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Partial at 2R + trailing runner</span></div><div class='term-body'><span class='dim'>Entry $50, stop $48 (1R = $2), size 250 sh</span> <span class='cm'>risk = $500</span>\n<span class='dim'>Price hits 2R = $54</span> <span class='ok'>sell 125 sh &rarr; +$500 banked</span>\n<span class='dim'>Move stop on remaining 125 to $50</span> <span class='ok'>trade now risk-free</span>\n<span class='dim'>Runner trails up, exits at $60 (5R)</span> <span class='ok'>125 &times; $10 = +$1,250</span>\n<span class='dim'>Total on the trade</span> <span class='ok'>+$1,750 = +3.5R</span></div></div><p>After the partial at $54 you have already covered your initial risk; the stop to breakeven means the worst case is now a scratch. The runner then captures a large move you would have missed by exiting everything at 2R. This structure converts the occasional trend into the outsized winners that carry an entire month — without forcing you to predict the top.</p><h4>Trailing methods</h4><ul><li><strong>Swing-low trail:</strong> ratchet the stop up under each new higher-low. Simple and respects market structure.</li><li><strong>ATR / Chandelier trail:</strong> stop = highest high since entry &minus; (3 &times; ATR). Adapts to volatility, gives trends room to breathe.</li><li><strong>Moving-average trail:</strong> exit on a close below the 20-EMA. Good for smooth trends, but lags at sharp tops.</li></ul><div class='chart' data-scenario='uptrend' data-overlays='ema21,psar' data-title='ORCA · Daily' data-cap='PSAR dots and the 21-EMA both offer mechanical trailing exits as the trend extends.'></div><p>Here the Parabolic SAR dots flip below price during the trend, giving a clear trailing-stop trigger, while the 21-EMA provides a smoother alternative. Both let profits run while defining the point where you step aside. The right choice depends on temperament: tighter trails bank more often but cut winners short; looser trails give back more but capture the big moves.</p><div class='box tip'><div class='bt'>Insight.</div> Decide all three exits — stop, first target, and trail rule — <em>before</em> you enter, and write them down. In the heat of a moving market your judgment is compromised; pre-committed exits let your calm self trade for your panicked self.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Design a full exit plan for one paper trade.</p><ol><li>Pick a chart and mark the swing low; set your stop a half-ATR below it.</li><li>Define a 2R target and decide what fraction you will sell there.</li><li>Choose a trailing rule (swing-low, ATR, or MA) for the runner and write the exact trigger.</li><li>Track how the trade would have played out and compare total R against simply exiting all at 2R.</li></ol></div></div>"},{"id":"p13-4","part":"13 · Risk & Psychology","nav":"Portfolio Risk","num":"13.4","kicker":"Part 13 · Lesson 4","title":"Portfolio Risk, Correlation and Diversification","html":"<h3>Your real risk is the sum, not the parts</h3><p>You can size every individual trade perfectly at 1% and still be carrying catastrophic risk. Why? Because positions do not move independently. If five of your 1% trades all rise and fall together, you do not have five small bets — you have <strong>one 5% bet wearing five tickers</strong>. Portfolio-level risk management is about controlling the <em>aggregate</em> exposure that correlation creates.</p><h4>Correlation: the hidden multiplier</h4><p>Correlation (&rho;) measures how two assets move together, ranging from +1 (lockstep) to &minus;1 (perfect opposites), with 0 meaning unrelated. When you hold several highly-correlated positions, their risks add up rather than cancel out.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Five 'separate' tech longs</span></div><div class='term-body'><span class='dim'>5 positions, each risking 1%</span> <span class='cm'>feels like 'diversified'</span>\n<span class='dim'>All mega-cap tech, &rho; &asymp; 0.9</span> <span class='bad'>they move as one</span>\n<span class='dim'>Sector sells off &rarr; all 5 hit stops</span> <span class='bad'>&minus;1% &times; 5 = &minus;5% in a day</span>\n<span class='dim'>Effective single bet</span> <span class='bad'>~5% account risk, not 1%</span></div></div><p>This is the trap. The trader believed they spread risk across five names, but a single sector headline — a rate surprise, a regulatory shock — knocks all five down together. The portfolio behaves like one oversized position. Genuine diversification requires positions whose drivers are <em>different</em>.</p><div class='box danger'><div class='bt'>Correlation regime shift.</div> In a crisis, correlations spike toward +1. Assets that looked unrelated in calm markets all crash together when liquidity vanishes. Size for the correlated case, not the calm case — your diversification disappears exactly when you need it most.</div><h4>How diversification actually reduces risk</h4><p>The benefit comes from <em>imperfect</em> correlation. Two positions with &rho; below 1 partly offset each other's swings, so portfolio volatility is less than the simple sum of the parts.</p><div class='box law'><div class='bt'>Two-asset portfolio risk.</div> &sigma;<sub>p</sub> = &radic;(w<sub>1</sub><sup>2</sup>&sigma;<sub>1</sub><sup>2</sup> + w<sub>2</sub><sup>2</sup>&sigma;<sub>2</sub><sup>2</sup> + 2w<sub>1</sub>w<sub>2</sub>&rho;&sigma;<sub>1</sub>&sigma;<sub>2</sub>). When &rho; = 1 the risks add fully; as &rho; falls, the cross term shrinks and total risk drops below the sum.</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Two equal 10%-vol positions</span></div><div class='term-body'><span class='dim'>&rho; = +1.0 (identical bet)</span> <span class='bad'>&sigma;<sub>p</sub> = 10.0% — no benefit</span>\n<span class='dim'>&rho; = +0.5</span> <span class='am'>&sigma;<sub>p</sub> &asymp; 8.7%</span>\n<span class='dim'>&rho; = 0 (unrelated)</span> <span class='ok'>&sigma;<sub>p</sub> &asymp; 7.1%</span>\n<span class='dim'>&rho; = &minus;0.5 (offsetting)</span> <span class='ok'>&sigma;<sub>p</sub> &asymp; 5.0%</span></div></div><p>At &rho; = 0 the two positions together carry only ~71% of the volatility of putting it all in one — diversification gave you a free reduction in risk for the same expected return. At &rho; = &minus;0.5 it drops to half. This is the closest thing to a free lunch in markets, but it only exists when your positions are genuinely driven by different forces.</p><h4>Practical portfolio rules</h4><ul><li><strong>Cap total open risk.</strong> Sum the risk across all open trades and keep it under a ceiling — e.g. 5%–6% of equity at any time. If you are already at the cap, a new idea must replace an old one, not stack on top.</li><li><strong>Group by correlation, not by ticker.</strong> Treat all your tech longs, or all your USD-sensitive trades, as <em>one</em> bucket and limit risk per bucket (e.g. 2% per theme).</li><li><strong>Watch the net directional tilt.</strong> Ten longs and zero shorts in a bull market is a leveraged bet on the index, however clever each name looks.</li><li><strong>Stress test.</strong> Ask: if my main theme drops 10% overnight, what is my total loss? If the answer scares you, you are too concentrated.</li></ul><div class='box tip'><div class='bt'>Insight.</div> Diversification is not owning <em>many</em> things — it is owning many <em>uncorrelated</em> things. Twenty crypto tokens is one bet. A stock, a bond, a commodity, and a currency pair driven by different macro forces is real diversification.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Audit a hypothetical 6-position portfolio for hidden concentration.</p><ol><li>List six positions you might realistically hold and their individual 1% risks.</li><li>Group them into correlation buckets (sector, factor, currency, direction).</li><li>Estimate your true exposure per bucket and your worst-case loss if the largest bucket drops together.</li><li>Rebalance on paper so no single theme exceeds 2% of account risk.</li></ol></div></div>"},{"id":"p13-5","part":"13 · Risk & Psychology","nav":"Fear & Greed","num":"13.5","kicker":"Part 13 · Lesson 5","title":"The Psychology: Fear, Greed, Tilt and Biases","html":"<h3>The market is a mirror</h3><p>You can know the math of sizing and expectancy cold and still lose, because in the moment of decision your <em>emotions</em> override your rules. Fear makes you cut winners early and freeze on entries; greed makes you oversize and chase. The losing trader is rarely defeated by the market — they are defeated by their own nervous system. Learning to recognize these states is the difference between a plan on paper and a plan that survives contact with real money.</p><h4>The anatomy of a tilt spiral</h4><p>The single most destructive sequence in trading starts with <strong>loss aversion</strong> — the well-documented finding that losses hurt about twice as much as equivalent gains feel good. That asymmetry drives a predictable, account-ending chain.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>The tilt cascade</span></div><div class='term-body'><span class='dim'>1. Price hits the stop</span> <span class='am'>'It will come back — I'll give it room'</span>\n<span class='dim'>2. Stop cancelled, loss grows</span> <span class='bad'>&minus;1R becomes &minus;3R</span>\n<span class='dim'>3. Position finally closed in pain</span> <span class='bad'>realized 3&times; the planned loss</span>\n<span class='dim'>4. Anger &rarr; revenge trade</span> <span class='bad'>oversized, no setup, 'get it back'</span>\n<span class='dim'>5. Revenge trade also loses</span> <span class='bad'>&minus;6R day from one &minus;1R mistake</span></div></div><p>Every step is an emotional decision dressed as a rational one. Holding past the stop is loss aversion refusing to accept a sure small loss in exchange for a chance to avoid it. The revenge trade is <em>tilt</em> — the poker term for letting a bad outcome corrupt your judgment. A disciplined &minus;1R becomes a &minus;6R catastrophe, not because the analysis was wrong, but because the trader could not feel a small loss without trying to erase it.</p><div class='box danger'><div class='bt'>Tilt is physical.</div> After a painful loss your body floods with cortisol and adrenaline; your prefrontal cortex — the part that does math and follows rules — is literally less active. You are not the same trader you were an hour ago. The only reliable defense is a pre-committed rule that removes the decision: walk away.</div><h4>The cognitive biases that wreck accounts</h4><p>Beyond raw emotion, a set of systematic thinking errors quietly degrades decisions. Naming them is the first step to catching them in real time.</p><ul><li><strong>Loss aversion:</strong> holding losers too long, cutting winners too soon — the exact opposite of positive expectancy.</li><li><strong>Confirmation bias:</strong> seeking only news and chart reads that support your open position while ignoring the warning signs.</li><li><strong>Recency bias:</strong> over-weighting the last few trades — going timid after losses or reckless after wins, when each trade is statistically independent.</li><li><strong>Sunk-cost fallacy:</strong> 'I've already lost so much here, I can't sell now' — past losses are irrelevant to the forward decision.</li><li><strong>Anchoring:</strong> fixating on your entry price or a past high as 'fair value,' refusing to act until price returns there.</li><li><strong>Overconfidence / house money:</strong> after a winning streak, sizing up and skipping checks because you feel invincible. Streaks end; oversized positions during them do real damage.</li><li><strong>FOMO:</strong> chasing a move already extended, buying the top because watching others profit is unbearable.</li></ul><div class='box tip'><div class='bt'>Insight.</div> You cannot eliminate these biases — they are hardwired. You can only build <em>systems</em> that act before the bias does: hard stops entered at trade time, position sizes calculated in advance, and a checklist that must be satisfied before any click. The goal is to make the disciplined action the <em>default</em>, requiring effort to override rather than effort to follow.</div><h4>Greed: the bull-market killer</h4><p>Fear gets the headlines, but greed empties more accounts in good times. After a few wins, the temptation to risk 3% instead of 1%, to add a sixth correlated position, or to hold past the target 'because it keeps going' feels like confidence. It is actually the setup for giving back weeks of gains in a single overexposed day. The most dangerous moment in trading is right after a winning streak, when your guard is down and your size is up.</p><div class='box law'><div class='bt'>Definition — tilt.</div> A state of emotional, reactive trading triggered by a loss, a streak, or frustration, in which decisions are driven by the urge to recover or to feel right rather than by the trading plan. Detectable signs: oversizing, trading setups you would normally skip, abandoning stops, and a racing pulse.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Build your personal tilt early-warning system.</p><ol><li>Recall your last three painful trading decisions and label the bias behind each (loss aversion, FOMO, revenge, etc.).</li><li>Write down your personal physical tilt signals (clenched jaw, refreshing the chart constantly, anger).</li><li>Define a single hard rule: 'When I notice X, I close the platform for the rest of the day.'</li><li>Post it where you trade and commit to it for one week.</li></ol></div></div>"},{"id":"p13-6","part":"13 · Risk & Psychology","nav":"Rules & Discipline","num":"13.6","kicker":"Part 13 · Lesson 6","title":"Building Rules and Discipline","html":"<h3>Discipline is a system, not a virtue</h3><p>Telling yourself to 'be more disciplined' fails for the same reason resolutions fail: it relies on willpower, which collapses under stress — exactly when you need it. The professional solution is to <strong>pre-commit</strong>. You make your important decisions in advance, while calm, and encode them as concrete rules and routines. Then in the heat of the moment you are not deciding; you are merely executing. Discipline becomes an environment you build, not a muscle you strain.</p><h4>The pre-trade checklist</h4><p>A checklist forces every trade through the same gate, stripping out impulse and FOMO. If a trade cannot pass every line, you do not take it — no exceptions, no 'just this once.' Surgeons and pilots use checklists for the same reason: under pressure, smart people skip obvious steps.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Pre-trade checklist (must be ALL yes)</span></div><div class='term-body'><span class='ok'>&#10003;</span> <span class='dim'>Setup matches a defined strategy in my plan</span>\n<span class='ok'>&#10003;</span> <span class='dim'>Higher-timeframe trend agrees with the trade</span>\n<span class='ok'>&#10003;</span> <span class='dim'>R:R is at least 2:1 to a logical target</span>\n<span class='ok'>&#10003;</span> <span class='dim'>Stop is at structure; size calculated for 1% risk</span>\n<span class='ok'>&#10003;</span> <span class='dim'>Total open portfolio risk stays under 5%</span>\n<span class='ok'>&#10003;</span> <span class='dim'>I am calm, not chasing or revenge-trading</span>\n<span class='bad'>&#10007;</span> <span class='dim'>Any 'no' &rarr; no trade. Walk away.</span></div></div><p>The power of the checklist is that it converts vague judgment into a binary gate. The marginal trades — the ones taken out of boredom or fear of missing out — are precisely the ones that fail the list, and they are precisely the ones that drain accounts. Filtering them out raises your average trade quality without you having to be more talented, only more consistent.</p><h4>The hard daily-loss limit</h4><p>The most important rule a trader can have is a circuit breaker: a fixed maximum loss per day after which you stop, no matter what. This single rule prevents the tilt cascade from Lesson 13.5 — it caps a bad day before it becomes a career-ending day.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>The &minus;3R circuit breaker</span></div><div class='term-body'><span class='dim'>Daily loss limit</span> <span class='cm'>&minus;3R (three full stop-outs)</span>\n<span class='dim'>Trade 1</span> <span class='bad'>&minus;1R</span>\n<span class='dim'>Trade 2</span> <span class='bad'>&minus;1R (running &minus;2R)</span>\n<span class='dim'>Trade 3</span> <span class='bad'>&minus;1R &rarr; hit &minus;3R limit</span>\n<span class='dim'>Action</span> <span class='ok'>platform closed, done for the day</span>\n<span class='dim'>Worst case protected</span> <span class='ok'>&minus;3R, never &minus;10R revenge spiral</span></div></div><p>Without the limit, that third loss is the trigger for tilt — the revenge trade, the oversize, the cancelled stop. With it, &minus;3R is simply the worst your day can be. You lived to trade tomorrow with a clear head and an intact account. Over a career, surviving the bad days matters more than maximizing the good ones, because one uncapped day can erase a year.</p><div class='box law'><div class='bt'>Pre-commitment.</div> The practice of locking in a decision in advance so your future, emotionally-compromised self cannot override it. Examples: bracket orders that auto-place the stop, a daily-loss limit enforced by your broker's lockout, and a written plan reviewed before the session.</div><h4>Routines that build the habit</h4><ul><li><strong>Pre-market routine:</strong> review the plan, mark levels, check the economic calendar, set your max-loss limit for the day before the open.</li><li><strong>In-session discipline:</strong> place the stop the instant you enter — use a bracket/OCO order so the exit exists before emotion can interfere.</li><li><strong>Post-session journal:</strong> log every trade with the setup, the R outcome, and — crucially — whether you <em>followed your rules</em>, separate from whether you made money. A rule-following loss is a good trade; a rule-breaking win is a bad trade you got lucky on.</li><li><strong>Weekly review:</strong> tally expectancy, count rule violations, and identify your single most expensive mistake to target next week.</li></ul><div class='box tip'><div class='bt'>Insight.</div> Grade yourself on <em>process</em>, not P&L. Outcomes are noisy over any short window; rule-adherence is fully in your control. A trader who follows their rules 95% of the time, even through a losing week, is winning. The money follows the process, not the other way around.</div><div class='box danger'><div class='bt'>The 'just this once' trap.</div> Every blown account has a moment where the trader broke one rule 'just this once' and it worked — teaching the brain that breaking rules pays. That lucky win is more dangerous than a loss, because it trains the exact behavior that eventually ruins you. Defend your rules hardest when breaking them would have worked.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Draft your personal rulebook.</p><ol><li>Write a 5-line pre-trade checklist tailored to your strategy; every line must be answerable yes/no.</li><li>Set a hard daily-loss limit in R and decide the exact action when you hit it.</li><li>Create a one-line journal template that records setup, R result, and rule-adherence (yes/no).</li><li>Trade ten paper trades using all three and review how often you would have followed them.</li></ol></div></div>"},{"id":"p13-7","part":"13 · Risk & Psychology","nav":"Trading Plan","num":"13.7","kicker":"Part 13 · Lesson 7","title":"Writing a Concrete Trading Plan","html":"<h3>If it is not written, it does not exist</h3><p>Everything in this part — sizing, expectancy, stops, portfolio limits, psychology, rules — only becomes operational when it is assembled into a single <strong>written trading plan</strong>. A plan in your head is not a plan; it is a mood that changes with the market. A written plan is a contract with yourself that you can be held to and, just as importantly, that you can <em>review and improve</em>. The best traders treat their plan as a living document, refined over hundreds of trades.</p><h4>What a complete plan specifies</h4><p>A good plan answers, in advance, every decision you would otherwise make under pressure. It does not need to be long — one page is ideal — but it must be <em>concrete</em>. 'Buy strong stocks' is not a plan; 'buy the first pullback to the 20-EMA in an uptrend, entering on the reclaim of the prior day's high' is.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>One-page trading plan template</span></div><div class='term-body'><span class='pr'>MARKET</span> <span class='dim'>Liquid US large-cap stocks, daily timeframe</span>\n<span class='pr'>EDGE</span> <span class='dim'>Trend-pullback continuation</span>\n<span class='pr'>SETUP</span> <span class='dim'>Uptrend (price &gt; rising 50-SMA), pullback to 20-EMA</span>\n<span class='pr'>TRIGGER</span> <span class='dim'>Entry on reclaim of prior-day high</span>\n<span class='pr'>RISK</span> <span class='dim'>1% of equity per trade; max 5% open</span>\n<span class='pr'>STOP</span> <span class='dim'>0.5 ATR below the pullback swing low</span>\n<span class='pr'>TARGETS</span> <span class='dim'>Half at 2R, trail remainder under swing lows</span>\n<span class='pr'>LIMITS</span> <span class='dim'>Stop trading at &minus;3R on the day</span>\n<span class='pr'>REVIEW</span> <span class='dim'>Journal daily, tally expectancy weekly</span></div></div><p>Notice how each line maps to a lesson in this part: RISK to position sizing (13.1), the 2R target to risk/reward (13.2), the structural stop and trailing exit to 13.3, the 5% open cap to portfolio risk (13.4), the daily limit to discipline (13.5–13.6). The plan is the integration point where all the theory becomes a single repeatable procedure.</p><div class='chart' data-scenario='pullback-uptrend' data-overlays='sma50,ema21' data-marks='note:5:98:Pullback to 20-EMA; note:9:101:Trigger: prior-day high reclaim; hline:95:Stop' data-title='APEX · Daily' data-cap='The plan made visible: trend above the 50-SMA, pullback to the EMA, trigger on the reclaim, stop below structure.'></div><p>The chart shows the plan executing exactly as written. Price holds above the rising 50-SMA (trend filter), pulls back to the 21-EMA (setup), then reclaims the prior-day high (trigger). The stop sits below the swing low, defining the 1R that sets the share count. Because every step was specified in advance, the actual trade requires zero improvisation — you are simply matching reality to your checklist and acting.</p><h4>A worked plan-to-trade walkthrough</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Plan applied: APEX trade on a $40,000 account</span></div><div class='term-body'><span class='dim'>Risk budget (1%)</span> <span class='cm'>$40,000 &times; 0.01 = $400</span>\n<span class='dim'>Trigger fills at</span> <span class='cm'>$100.00</span>\n<span class='dim'>Stop (0.5 ATR below swing low)</span> <span class='cm'>$96.00 &rarr; 1R = $4</span>\n<span class='dim'>Size</span> <span class='ok'>$400 &divide; $4 = 100 shares</span>\n<span class='dim'>Target 1 (2R = $108)</span> <span class='ok'>sell 50 sh &rarr; +$400, stop to breakeven</span>\n<span class='dim'>Runner trails, exits $116 (4R)</span> <span class='ok'>50 &times; $16 = +$800</span>\n<span class='dim'>Trade result</span> <span class='ok'>+$1,200 = +3R, fully rule-based</span></div></div><p>Every number flows mechanically from the plan. There was no moment of 'how much should I buy?' or 'should I take profits?' — those answers existed before the trade. That is the entire point: the plan does your thinking when thinking is hardest.</p><div class='box law'><div class='bt'>Definition — trading plan.</div> A written document specifying the markets you trade, your edge, exact entry/exit/sizing rules, risk limits, and review cadence — designed so that any given trade can be executed without discretionary judgment in the moment.</div><div class='box tip'><div class='bt'>Insight.</div> Your first plan will be imperfect, and that is fine. The value is not in writing the perfect plan but in having <em>a</em> plan you can test against reality, measure with your journal, and refine. A mediocre plan followed consistently beats a brilliant plan abandoned under stress every single time.</div><div class='box danger'><div class='bt'>Don't over-edit mid-stream.</div> Change your plan during scheduled reviews with a sample of trades behind you — never mid-trade or right after a loss. Tweaking rules in reaction to the last outcome is just tilt with extra steps; it destroys the consistency that makes the plan measurable.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Write your own one-page trading plan.</p><ol><li>Fill in every line of the template: market, edge, setup, trigger, risk%, stop logic, targets, daily limit, review cadence.</li><li>Make each line concrete enough that a stranger could execute it without asking you a question.</li><li>Run one real chart through it end-to-end, computing size and the full exit sequence as in the worked example.</li><li>Commit to following it unchanged for 20 trades, then schedule a review to refine it.</li></ol></div></div>"},{"id":"p14-1","part":"14 · Backtesting & Systems","nav":"What Is an Edge","num":"14.1","kicker":"Part 14 · Lesson 1","title":"What a Trading Edge Is","html":"<p>Everyone who trades has an opinion. Very few have an <strong>edge</strong>. The difference between the two is the whole subject of this part of the course. An opinion is a story about where price might go. An edge is a measurable, repeatable reason to expect that, <em>across many trades</em>, your wins multiplied by their size will outweigh your losses multiplied by theirs. This lesson defines an edge precisely so the rest of the part can teach you how to find, test and trust one.</p>\n<h3>An edge is positive expectancy from a repeatable rule</h3>\n<p>The mathematical heart of an edge is <strong>expectancy</strong> &mdash; the average profit or loss you expect from a single trade, expressed in <strong>R</strong> (multiples of the amount you risk). If you risk $200 on a trade and make $400, that is +2R. If you lose the full $200, that is &minus;1R.</p>\n<div class='box law'><div class='bt'>Definition.</div> Expectancy = (Win% &times; Avg Win in R) &minus; (Loss% &times; Avg Loss in R). A genuine edge is a <em>rule</em> whose expectancy is reliably positive over a large, representative sample of trades.</div>\n<p>Notice three load-bearing words. <strong>Rule:</strong> the entry, exit and sizing must be defined precisely enough that two people following them get the same trades. <strong>Reliably:</strong> the positive number must survive on data the rule was not built on. <strong>Large sample:</strong> a handful of winners proves nothing.</p>\n<h4>A worked example: the breakout rule</h4>\n<p>Suppose you trade a simple breakout: buy when price closes above a 20-day high, risk to the 20-day low, target +2R. Over 500 historical signals you record the results below.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>breakout expectancy</span></div><div class='term-body'><span class='dim'>Sample size</span> <span class='cm'>500 trades</span>\n<span class='dim'>Winners</span> <span class='ok'>195 (39%) averaging +2.0R</span>\n<span class='dim'>Losers</span> <span class='bad'>305 (61%) averaging &minus;1.0R</span>\n<span class='dim'>Expectancy</span> = (0.39 &times; 2.0) &minus; (0.61 &times; 1.0)\n<span class='dim'>Expectancy</span> = 0.78 &minus; 0.61 = <span class='ok'>+0.17R per trade</span></div></div>\n<p>A losing rule on most individual trades &mdash; you lose 61% of the time &mdash; is s
