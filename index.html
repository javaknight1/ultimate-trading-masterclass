dium and long trends are pointing the same way.</p><div class='box law'><div class='bt'>Definition.</div> 52-week range = [lowest trade, highest trade] over the trailing year. Position in range = (Price &minus; Low) &divide; (High &minus; Low) &times; 100. A moving average is the mean closing price over the last N days, recalculated each day.</div><h4>Placing price inside the 52-week range</h4><p>The range gives you the boundaries; the position formula tells you where inside them you stand. A stock at the very top of its range (near 100%) is at fresh highs &mdash; strong, but with no overhead history of resistance. One near the bottom (near 0%) is beaten down &mdash; cheap-looking, but in a clear downtrend until proven otherwise.</p><h4>Worked example</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME · position in range</span></div><div class='term-body'><span class='dim'>52-week low</span> <span class='cm'>98.10</span>\n<span class='dim'>52-week high</span> <span class='cm'>167.80</span>\n<span class='dim'>Price</span> <span class='cm'>142.50</span>\n<span class='dim'>Range width</span> = 167.80 &minus; 98.10 = <span class='am'>69.70</span>\n<span class='dim'>Above the low</span> = 142.50 &minus; 98.10 = <span class='am'>44.40</span>\n<span class='dim'>Position</span> = 44.40 &divide; 69.70 = <span class='ok'>0.637 &asymp; 64%</span></div></div><p>ACME sits about <strong>64% of the way up its 52-week range</strong> (the lesson's headline rounds this to roughly two-thirds). It is in the upper-middle of its year &mdash; recovered well off the 98.10 low, but still 25 points below the 167.80 high. There is room to run before fresh highs, and real support below from the prior consolidation.</p><h4>The 50-day and 200-day on the quote</h4><p>Quotes list the 50-day and 200-day moving averages as quick trend gauges. Price above a moving average means the average buyer over that window is in profit; price below means they are underwater. The 50-day reflects the medium-term trend; the 200-day reflects the long-term trend. Their relationship to price &mdash; and to each other &mdash; is the shorthand technicians read in a single glance.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME · price vs the MAs</span></div><div class='term-body'><span class='dim'>Price</span> <span class='cm'>142.50</span>\n<span class='dim'>50-day MA</span> <span class='cm'>138.40</span> &rarr; price <span class='ok'>ABOVE</span> by 4.10 (+3.0%)\n<span class='dim'>200-day MA</span> <span class='cm'>145.90</span> &rarr; price <span class='bad'>BELOW</span> by 3.40 (&minus;2.3%)\n<span class='dim'>Read</span> medium-term up, long-term not yet reclaimed</div></div><p>ACME is <strong>above its 50-day but below its 200-day</strong> &mdash; a classic recovery posture. The medium-term trend has turned up (price over the 50-day), but the stock has not yet reclaimed its long-term trend line (the 200-day). The 200-day at 145.90 becomes the next big test; clearing it would flip the long-term picture bullish.</p><h4>Reading the chart</h4><div class='chart' data-scenario='pullback-uptrend' data-overlays='sma50,sma200' data-marks='hline:167.80:52w high;hline:98.10:52w low;hline:145.90:200-day test' data-title='ACME · Daily' data-cap='Price reclaimed the rising 50-day and is pressing toward the flat 200-day near 145.90.'></div><p>See how price rides above the faster 50-day line while still tucked beneath the slower 200-day. The 200-day acts as overhead resistance here &mdash; the level a recovering stock must punch through to confirm a full trend reversal. The yearly high and low brackets at the top and bottom frame just how much room exists in either direction. Until the 200-day is reclaimed, rallies into it are tests, not confirmations.</p><div class='box tip'><div class='bt'>Insight.</div> The SLOPE of each moving average matters as much as price's position relative to it. A rising 50-day above a flattening 200-day is the early shape of a recovery; both falling is a downtrend; the 50-day crossing above the 200-day is the famous \"golden cross\" you will meet in the charting part.</div><div class='box danger'><div class='bt'>Pitfall.</div> A stock making a NEW 52-week high has zero overhead supply but also no historical support nearby &mdash; pullbacks can be sharp because there are no old buyers to defend a level. \"Near the highs\" is strength, not safety.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: locate a stock within its yearly range and trend structure.</p><ol><li>Find a stock's 52-week high, 52-week low, and current price. Compute its position-in-range percent.</li><li>Note its 50-day and 200-day moving averages. Is price above or below each?</li><li>Decide: medium-term trend up or down? Long-term up or down? Are they aligned?</li><li>Chart it with the 50- and 200-day overlays and confirm your read by eye, then mark the nearest MA as the next test level.</li></ol></div></div>"},{"id":"p1-6","part":"01 · Reading a Stock","nav":"P/E & EPS","num":"1.6","kicker":"Part 01 · Lesson 6","title":"EPS and the P/E Ratio (Trailing and Forward)","html":"<h3>Earnings per share and the price you pay for them</h3><p>Two of the most quoted fundamental numbers are <strong>EPS</strong> (earnings per share) and the <strong>P/E ratio</strong> (price-to-earnings). EPS answers \"how much profit does each share earn?\" The P/E answers \"how many years of those earnings am I paying for at today's price?\" Master these and the rest of the valuation panel falls into place.</p><div class='box law'><div class='bt'>Definition.</div> EPS = Net income &divide; Shares outstanding. P/E = Share price &divide; EPS. Trailing P/E uses the LAST twelve months of actual EPS; forward P/E uses NEXT twelve months of ESTIMATED EPS.</div><h4>From net income to EPS</h4><p>EPS slices the company's total bottom-line profit across every share. It is the per-share earning power that the price is ultimately buying.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME · trailing EPS</span></div><div class='term-body'><span class='dim'>Net income (last 12 mo)</span> <span class='cm'>$3.6B</span>\n<span class='dim'>Shares outstanding</span> <span class='cm'>500M</span>\n<span class='dim'>Trailing EPS</span> = 3,600M &divide; 500M\n= <span class='ok'>$7.20 per share</span></div></div><p>Each ACME share earned <strong>$7.20</strong> over the trailing year. Now we ask what the market charges for that earning power.</p><h4>Trailing P/E</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME · trailing P/E</span></div><div class='term-body'><span class='dim'>Price</span> <span class='cm'>$142.50</span>\n<span class='dim'>Trailing EPS</span> <span class='cm'>$7.20</span>\n<span class='dim'>Trailing P/E</span> = 142.50 &divide; 7.20\n= <span class='ok'>19.8&times;</span></div></div><p>At a <strong>19.8 trailing P/E</strong>, you pay about $19.80 for every $1 of last year's per-share earnings. Loosely, if earnings never grew and were all paid out, it would take ~19.8 years of earnings to recoup the price. Whether 19.8 is cheap or rich depends entirely on growth and on peers &mdash; a fast grower may deserve 30, a stagnant utility may warrant 12.</p><h4>Forward P/E: paying for tomorrow</h4><p>Markets price the future, not the past. The <strong>forward P/E</strong> swaps trailing earnings for analysts' estimate of <em>next year's</em> EPS. If ACME is expected to grow earnings to $8.65, the same price buys more future earnings, so the forward multiple is lower.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME · forward P/E</span></div><div class='term-body'><span class='dim'>Price</span> <span class='cm'>$142.50</span>\n<span class='dim'>Forward EPS estimate</span> <span class='cm'>$8.65</span>\n<span class='dim'>Forward P/E</span> = 142.50 &divide; 8.65\n= <span class='ok'>16.5&times;</span>\n<span class='dim'>Implied EPS growth</span> = (8.65 &minus; 7.20) &divide; 7.20 = <span class='am'>+20.1%</span></div></div><p>The forward P/E of <strong>16.5</strong> is lower than the trailing 19.8 precisely because earnings are expected to grow about 20%. A forward P/E <em>below</em> the trailing P/E signals expected growth; a forward P/E <em>above</em> trailing signals an expected earnings <em>decline</em>. The gap between the two ratios quietly encodes the market's growth assumption.</p><div class='box tip'><div class='bt'>Insight.</div> Forward P/E is only as good as the estimates feeding it. Estimates drift and get revised. A seductively low forward P/E can simply mean analysts have not yet cut numbers that are about to fall &mdash; always check whether estimates are rising or being revised down.</div><h4>Reading the chart</h4><p>Earnings dates create some of the largest gaps on any chart. The example below shows a gap-up after a beat &mdash; the moment the EPS that feeds these ratios gets repriced.</p><div class='chart' data-scenario='gap-up' data-overlays='sma50' data-title='ACME · Daily' data-cap='An earnings beat gaps the price up, instantly resetting both EPS and the P/E it supports.'></div><p>The gap is the market rerating the stock the morning after results. If reported EPS comes in above the trailing figure, the denominator of the P/E rises and &mdash; even at the new higher price &mdash; the multiple can stay flat or fall. This is why a stock can rally hard on earnings yet become <em>cheaper</em> on a forward basis: price went up, but expected earnings went up more.</p><div class='box danger'><div class='bt'>Pitfall.</div> A negative EPS makes P/E meaningless (often shown as \"&mdash;\" or \"N/A\"). Unprofitable companies have no P/E, which is why you fall back on price-to-sales and EV multiples (Lesson 8) for them. And beware GAAP vs adjusted EPS &mdash; quotes mix them, and \"adjusted\" can quietly exclude real costs.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: compute EPS and both P/E flavors and read the implied growth.</p><ol><li>Find a company's trailing-twelve-month net income and shares outstanding. Divide to get trailing EPS.</li><li>Divide the share price by that EPS for the trailing P/E. Compare it to the value on the quote.</li><li>Find the forward EPS estimate and compute the forward P/E.</li><li>Is forward below or above trailing? Translate that gap into the market's implied earnings growth or decline.</li></ol></div></div>"},{"id":"p1-7","part":"01 · Reading a Stock","nav":"Dividend & Yield","num":"1.7","kicker":"Part 01 · Lesson 7","title":"Dividend, Yield and Payout Ratio","html":"<h3>Getting paid to hold</h3><p>Many companies return cash to shareholders as a <strong>dividend</strong>. The quote shows the annual dividend per share and the <strong>yield</strong> (that dividend as a percent of the price). One more number you compute yourself &mdash; the <strong>payout ratio</strong> &mdash; tells you whether the dividend is comfortably covered by earnings or stretched to the breaking point.</p><div class='box law'><div class='bt'>Definition.</div> Dividend yield = Annual dividend per share &divide; Share price &times; 100. Payout ratio = Annual dividend per share &divide; EPS &times; 100 (equivalently, total dividends &divide; net income).</div><h4>Yield: the cash return at today's price</h4><p>Yield expresses the dividend as an annual percentage of what you pay for the stock. It is the income return before any price change. Note that yield moves <em>inversely</em> to price: if the dividend is fixed and the price falls, the yield rises &mdash; which is why a soaring yield can be a warning, not a gift.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME · dividend yield</span></div><div class='term-body'><span class='dim'>Annual dividend / share</span> <span class='cm'>$2.40</span>\n<span class='dim'>Share price</span> <span class='cm'>$142.50</span>\n<span class='dim'>Yield</span> = 2.40 &divide; 142.50 = 0.01684\n<span class='dim'>&times; 100</span> = <span class='ok'>1.68%</span></div></div><p>ACME pays a <strong>1.68% yield</strong> &mdash; modest, typical of a growth-leaning company that prefers to reinvest. A retiree-favorite utility might yield 4-5%; a young tech firm might pay nothing at all. Yield alone never tells you if the payout is safe; for that we need the payout ratio.</p><h4>Payout ratio: is the dividend covered?</h4><p>The payout ratio asks what fraction of earnings is being handed out as dividends. A low ratio means the dividend is well covered with room to grow; a ratio near or above 100% means the company is paying out everything (or more than) it earns &mdash; unsustainable without dipping into reserves or debt.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME · payout ratio</span></div><div class='term-body'><span class='dim'>Annual dividend / share</span> <span class='cm'>$2.40</span>\n<span class='dim'>EPS</span> <span class='cm'>$7.20</span>\n<span class='dim'>Payout ratio</span> = 2.40 &divide; 7.20 = 0.333\n<span class='dim'>&times; 100</span> = <span class='ok'>33%</span>\n<span class='dim'>Retained for growth</span> = <span class='am'>67%</span></div></div><p>ACME pays out just <strong>33% of earnings</strong>, keeping 67% to reinvest, pay down debt, or buy back stock. That is a comfortable, well-covered dividend with clear <strong>room to grow</strong>. As a rough guide: under ~50% is conservative, 50-75% is moderate, and above ~80% leaves little cushion if earnings stumble.</p><div class='box tip'><div class='bt'>Insight.</div> A LOW payout ratio plus rising earnings is the profile of a future dividend grower. The dividend can climb even if the company simply holds its payout ratio steady while EPS expands. Income investors prize this combination over a high but stagnant yield.</div><h4>The yield trap</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>How a falling price inflates yield</span><div class='term-body'><span class='dim'>Start</span> $2.40 div, $142.50 price &rarr; <span class='ok'>1.68%</span>\n<span class='dim'>Price drops to 80</span> $2.40 &divide; 80 &rarr; <span class='am'>3.00%</span>\n<span class='dim'>Price drops to 48</span> $2.40 &divide; 48 &rarr; <span class='bad'>5.00%</span>\n<span class='dim'>Warning</span> rising yield from a SINKING price, not a raise</div></div><p>If ACME's price halved on bad news while the dividend stayed at $2.40, the yield would balloon toward 5% &mdash; not because management got generous, but because the price collapsed. A suspiciously high yield often flags a market betting the dividend will be CUT. Cross-check every juicy yield against the payout ratio and the earnings trend before trusting it.</p><div class='box danger'><div class='bt'>Pitfall.</div> Some quotes show a TRAILING dividend (what was actually paid over the past year) and others a FORWARD/indicated dividend (the current rate annualized). After a recent raise or cut these differ. Also, special one-time dividends can inflate a trailing figure that will not repeat.</div><div class='box lab'><div class='bt'>Do this.</div> For any income stock, compute the payout ratio yourself and check whether the dividend has been raised, held, or cut over recent years. A long record of raises with a sub-60% payout is the hallmark of a durable dividend.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: compute yield and payout ratio and judge dividend safety.</p><ol><li>Find a dividend-paying stock's annual dividend per share and current price. Compute the yield and match it to the quote.</li><li>Find its EPS and compute the payout ratio. Is it conservative, moderate, or stretched?</li><li>Imagine the price falling 30%. Recompute the yield to see how a sinking price inflates it.</li><li>Check the company's dividend history &mdash; raised, held, or cut? Combine that with the payout ratio to rate the dividend's durability.</li></ol></div></div>"},{"id":"p1-8","part":"01 · Reading a Stock","nav":"Beta & The Ratios","num":"1.8","kicker":"Part 01 · Lesson 8","title":"Beta, Volatility and the Rest of the Ratios","html":"<h3>The rest of the statistics panel, decoded</h3><p>Below the headline numbers sits a panel of ratios that look intimidating but each answer one simple question. This lesson defines and computes the lot: <strong>beta</strong> and volatility, plus <strong>P/B, P/S, PEG, EV/EBITDA, ROE, profit margin, short interest</strong> and <strong>days-to-cover</strong>. We will run one fictional company, ACME, through every one.</p><h4>Beta and volatility</h4><div class='box law'><div class='bt'>Definition.</div> Beta measures a stock's sensitivity to the overall market. Beta = 1 moves with the market; &gt;1 amplifies it; &lt;1 dampens it; negative moves opposite. Volatility is the size of a stock's own price swings (often annualized standard deviation of returns).</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME · beta read</span></div><div class='term-body'><span class='dim'>Beta</span> <span class='cm'>1.25</span>\n<span class='dim'>Market moves +1.0%</span> &rarr; expect ACME &asymp; <span class='am'>+1.25%</span>\n<span class='dim'>Market moves &minus;1.0%</span> &rarr; expect ACME &asymp; <span class='bad'>&minus;1.25%</span>\n<span class='dim'>Read</span> 25% MORE swing than the index, both ways</div></div><p>A <strong>1.25 beta</strong> means ACME tends to move 25% more than the market in either direction &mdash; more reward in rallies, more pain in selloffs. Beta is about <em>relative</em> volatility versus the index; it says nothing about company-specific risk, which volatility and the fundamentals below capture.</p><h4>P/B and P/S &mdash; price against book and sales</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME · P/B and P/S</span></div><div class='term-body'><span class='dim'>Price</span> 142.50 &nbsp; <span class='dim'>Book value/share</span> 33.93\n<span class='dim'>P/B</span> = 142.50 &divide; 33.93 = <span class='ok'>4.2&times;</span>\n<span class='dim'>Market cap</span> 71.25B &nbsp; <span class='dim'>Revenue</span> 13.97B\n<span class='dim'>P/S</span> = 71.25 &divide; 13.97 = <span class='ok'>5.1&times;</span></div></div><p><strong>P/B 4.2</strong> means the market values ACME at 4.2&times; the accounting net worth of its assets &mdash; common for asset-light firms with valuable intangibles. <strong>P/S 5.1</strong> means you pay $5.10 per $1 of annual sales; P/S is the go-to multiple when earnings are thin or negative, since revenue is always positive.</p><h4>PEG &mdash; valuation adjusted for growth</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME · PEG</span></div><div class='term-body'><span class='dim'>Trailing P/E</span> <span class='cm'>19.8</span>\n<span class='dim'>Expected EPS growth</span> <span class='cm'>18%/yr</span>\n<span class='dim'>PEG</span> = 19.8 &divide; 18 = <span class='ok'>1.1</span></div></div><p>The <strong>PEG of 1.1</strong> divides the P/E by the growth rate. A PEG near 1 is the classic \"fairly priced for its growth\" benchmark; well below 1 hints at a bargain relative to growth; well above 2 suggests you are paying up. PEG rescues high P/E growth stocks that look expensive on P/E alone.</p><h4>EV/EBITDA &mdash; the capital-structure-neutral multiple</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME · EV/EBITDA</span></div><div class='term-body'><span class='dim'>Enterprise value (Lesson 3)</span> <span class='cm'>78.25B</span>\n<span class='dim'>EBITDA</span> <span class='cm'>5.59B</span>\n<span class='dim'>EV/EBITDA</span> = 78.25 &divide; 5.59 = <span class='ok'>14&times;</span></div></div><p>Using the enterprise value from Lesson 3 over EBITDA (earnings before interest, taxes, depreciation, amortization), <strong>EV/EBITDA of 14</strong> compares the whole business to its core cash earnings, ignoring how it is financed. It is the multiple acquirers and analysts lean on most because it neutralizes debt and tax differences.</p><h4>ROE and profit margin &mdash; quality of the business</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME · returns and margin</span></div><div class='term-body'><span class='dim'>Net income</span> 3.6B &nbsp; <span class='dim'>Equity</span> 16.36B\n<span class='dim'>ROE</span> = 3.6 &divide; 16.36 = <span class='ok'>22%</span>\n<span class='dim'>Net income</span> 3.6B &nbsp; <span class='dim'>Revenue</span> 13.97B\n<span class='dim'>Net margin</span> = 3.6 &divide; 13.97 = <span class='ok'>24%</span></div></div><p><strong>ROE 22%</strong> says ACME earns 22 cents of profit per dollar of shareholder equity &mdash; a strong return on the capital owners have invested. <strong>Net margin 24%</strong> says 24 cents of every sales dollar reaches the bottom line &mdash; a highly profitable operation. High, stable ROE and margins are hallmarks of a quality, competitively-moated business.</p><h4>Short interest and days-to-cover</h4><div class='box law'><div class='bt'>Definition.</div> Short interest % = shares sold short &divide; float. Days-to-cover (short ratio) = shares short &divide; average daily volume &mdash; how many normal trading days shorts would need to buy back their position.</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME · short metrics</span></div><div class='term-body'><span class='dim'>Float (Lesson 4 style)</span> 420M &nbsp; <span class='dim'>Shares short</span> 25.2M\n<span class='dim'>Short interest</span> = 25.2 &divide; 420 = <span class='am'>6%</span>\n<span class='dim'>Avg daily volume</span> 7.2M\n<span class='dim'>Days-to-cover</span> = 25.2 &divide; 7.2 = <span class='ok'>3.5 days</span></div></div><p><strong>6% short interest</strong> at <strong>3.5 days-to-cover</strong> is moderate. High short interest with high days-to-cover is fuel for a short squeeze: if price rises, shorts scramble to buy back, but it would take 3.5 days of normal volume to unwind &mdash; that buying pressure can accelerate a rally.</p><h4>Reading the chart</h4><div class='chart' data-scenario='squeeze' data-overlays='ema21' data-pane='rsi' data-title='ACME · Daily' data-cap='Elevated short interest plus a sharp rally — shorts covering can amplify the upside.'></div><p>When a heavily-shorted stock breaks higher, the forced buying from shorts covering adds demand on top of normal buyers, which is why squeezes can look so violent. The RSI pane racing into overbought reflects that crowded, one-directional rush. Days-to-cover tells you how much pent-up covering remains as ammunition.</p><div class='box danger'><div class='bt'>Pitfall.</div> No single ratio decides anything. A low PEG with deteriorating margins, or a high ROE driven purely by heavy debt (leverage flatters ROE), can mislead. Read the panel as a SYSTEM &mdash; cross-check valuation (P/E, P/S, EV/EBITDA, PEG) against quality (ROE, margins) and positioning (short interest, beta).</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: compute and interpret the full ratio panel for one company.</p><ol><li>Pick a company and gather: price, book value/share, market cap, revenue, EBITDA, net income, equity, P/E, growth rate, float, shares short, and average volume.</li><li>Compute P/B, P/S, PEG, EV/EBITDA, ROE, and net margin from the formulas above. Match each to the quote.</li><li>Compute short interest as a percent of float and days-to-cover.</li><li>Write one sentence summarizing whether the stock looks cheap or rich, high or low quality, and crowded or not &mdash; using the panel as a whole.</li></ol></div></div>"},{"id":"p2-1","part":"02 · Financial Statements","nav":"Income Statement","num":"2.1","kicker":"Part 02 · Lesson 1","title":"The Income Statement: Revenue to Net Income","html":"<h3>The waterfall from sales to profit</h3><p>The income statement (also called the profit-and-loss statement, or P&L) answers one question: <strong>over a period of time</strong> — a quarter or a year — how much did the company sell, what did it cost to produce that, and what was left over? Unlike the balance sheet, which is a snapshot at a single instant, the income statement covers a <em>span</em>. Read it as a waterfall: you start at the top with revenue and subtract costs in tiers until you reach the bottom line, net income.</p><p>The discipline of reading it is to never look only at the bottom number. Each subtotal along the way — gross profit, operating income, pre-tax income, net income — tells you something different about the business. A company can grow revenue while its margins collapse; it can post a fat net income on a one-time gain while its real operations bleed. The line items are where the story lives.</p><h4>The four tiers</h4><ul><li><strong>Revenue (top line)</strong> — what the company billed customers for goods or services delivered. Also called sales or turnover.</li><li><strong>Cost of goods sold (COGS)</strong> — the direct cost of producing what was sold: raw materials, direct labor, factory overhead. <strong>Revenue − COGS = Gross profit.</strong></li><li><strong>Operating expenses (opex)</strong> — the cost of running the business that isn't tied to a specific unit: research and development (R&D), selling, general and administrative (SG&A), depreciation. <strong>Gross profit − opex = Operating income</strong> (also called EBIT, earnings before interest and taxes).</li><li><strong>Interest and taxes</strong> — the cost of debt and the government's cut. <strong>Operating income − interest − tax = Net income</strong> (the bottom line).</li></ul><div class='box law'><div class='bt'>Definition.</div> <strong>Margin</strong> means a profit number expressed as a percent of revenue. Gross margin = gross profit &divide; revenue; operating margin = operating income &divide; revenue; net margin = net income &divide; revenue. Margins let you compare a $50M company to a $50B one on the same footing.</div><h3>Sample Co, fiscal year</h3><p>Let's walk a full statement for our recurring example company. Every number is in millions of dollars ($M).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Sample Co — Income Statement ($M)</span></div><div class='term-body'><span class='dim'>Revenue</span> <span class='cm'>5,000</span>\n<span class='dim'>Cost of goods sold</span> <span class='bad'>(3,000)</span>\n<span class='ok'>= Gross profit</span> <span class='cm'>2,000</span>  <span class='dim'>(40.0% gross margin)</span>\n<span class='dim'>R&D</span> <span class='bad'>(400)</span>\n<span class='dim'>SG&A</span> <span class='bad'>(700)</span>\n<span class='ok'>= Operating income (EBIT)</span> <span class='cm'>900</span>  <span class='dim'>(18.0% operating margin)</span>\n<span class='dim'>Interest expense</span> <span class='bad'>(90)</span>\n<span class='ok'>= Pre-tax income</span> <span class='cm'>810</span>\n<span class='dim'>Income tax</span> <span class='bad'>(190)</span>\n<span class='pr'>= Net income</span> <span class='cm'>620</span>  <span class='dim'>(12.4% net margin)</span></div></div><p>Trace it: $5,000M revenue minus $3,000M COGS gives <strong>$2,000M gross profit</strong>. Opex of $1,100M (the $400M R&D plus $700M SG&A) leaves <strong>$900M operating income</strong>. Subtract $90M interest and you get $810M pre-tax; the $190M tax bill (a 23.5% effective rate) leaves <strong>$620M net income</strong>.</p><h4>What each margin tells you</h4><p>The 40% gross margin says that for every dollar of product sold, 40 cents remains after the direct cost of making it. High gross margins (software, luxury brands) give a company room to spend on growth; thin gross margins (groceries, airlines) leave almost none. The drop from 40% gross to 18% operating reveals how much overhead the business carries. The further drop to 12.4% net is the bite of interest and tax.</p><div class='box tip'><div class='bt'>Insight.</div> EPS (earnings per share) = net income &divide; shares outstanding. If Sample Co has 500M shares, EPS = $620M &divide; 500M = <strong>$1.24</strong>. EPS is what headlines quote and what P/E ratios use, because it normalizes profit to a per-share basis investors can price.</div><h4>Watch for the non-operating noise</h4><p>Real statements include lines that aren't part of the core business: a one-time gain from selling a building, a restructuring charge, an impairment write-down. These hit net income but don't recur. That's why analysts separate <strong>operating income</strong> (the engine) from the bottom line. A company that reports rising net income purely because of a tax benefit or an asset sale has not actually gotten better at its business.</p><div class='box danger'><div class='bt'>Pitfall.</div> Beware companies that emphasize <em>adjusted</em> or <em>non-GAAP</em> earnings that strip out \"one-time\" costs quarter after quarter. If stock-based compensation, restructuring, or \"transformation\" charges appear every single period, they aren't one-time — they're real costs being hidden.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Build the waterfall yourself and compute every margin for a fictional firm.</p><ol><li>Start with revenue of $8,000M and COGS of $5,200M. Compute gross profit and gross margin.</li><li>Subtract R&D $500M and SG&A $1,100M to get operating income and operating margin.</li><li>Subtract interest $120M and tax $300M to get net income and net margin.</li><li>With 400M shares outstanding, compute EPS. Compare your net margin to Sample Co's 12.4% — is this firm more or less profitable per dollar of sales?</li></ol></div></div>"},{"id":"p2-2","part":"02 · Financial Statements","nav":"Balance Sheet","num":"2.2","kicker":"Part 02 · Lesson 2","title":"The Balance Sheet: Assets, Liabilities, Equity","html":"<h3>A photograph, not a movie</h3><p>If the income statement is a movie of a period, the balance sheet is a <strong>photograph taken at one instant</strong> — the last day of the quarter or year. It lists everything the company owns (assets), everything it owes (liabilities), and what's left over for shareholders (equity). The whole thing is built on a single identity that must <em>always</em> hold:</p><div class='box law'><div class='bt'>The accounting equation.</div> <strong>Assets = Liabilities + Equity.</strong> Everything a company controls was financed either by borrowing (liabilities) or by owners (equity). The two sides balance by construction — hence \"balance\" sheet. If they don't balance, something is wrong with the books.</div><h4>The three blocks</h4><ul><li><strong>Assets</strong> — resources the company controls that have value. Split into <em>current</em> (cash, receivables, inventory — expected to convert to cash within a year) and <em>non-current</em> (property, plant and equipment, goodwill, intangibles).</li><li><strong>Liabilities</strong> — obligations the company owes. Split into <em>current</em> (accounts payable, short-term debt, accrued expenses — due within a year) and <em>non-current</em> (long-term debt, pension obligations).</li><li><strong>Equity</strong> — the residual: assets minus liabilities. Includes paid-in capital (money raised by issuing stock) and retained earnings (cumulative profits kept in the business rather than paid out).</li></ul><h3>Sample Co's balance sheet</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Sample Co — Balance Sheet ($M)</span></div><div class='term-body'><span class='ok'>ASSETS</span>\n<span class='dim'>Cash &amp; equivalents</span> <span class='cm'>600</span>\n<span class='dim'>Accounts receivable</span> <span class='cm'>625</span>\n<span class='dim'>Inventory</span> <span class='cm'>500</span>\n<span class='dim'>Other current assets</span> <span class='cm'>375</span>\n<span class='ok'>Total current assets</span> <span class='cm'>2,100</span>\n<span class='dim'>Property, plant &amp; equipment</span> <span class='cm'>4,200</span>\n<span class='dim'>Goodwill &amp; intangibles</span> <span class='cm'>1,900</span>\n<span class='pr'>TOTAL ASSETS</span> <span class='cm'>8,200</span>\n\n<span class='ok'>LIABILITIES</span>\n<span class='dim'>Accounts payable</span> <span class='cm'>500</span>\n<span class='dim'>Short-term debt</span> <span class='cm'>400</span>\n<span class='dim'>Accrued expenses</span> <span class='cm'>500</span>\n<span class='ok'>Total current liabilities</span> <span class='cm'>1,400</span>\n<span class='dim'>Long-term debt</span> <span class='cm'>2,800</span>\n<span class='dim'>Other long-term liabilities</span> <span class='cm'>500</span>\n<span class='ok'>Total liabilities</span> <span class='cm'>4,700</span>\n\n<span class='ok'>EQUITY</span>\n<span class='dim'>Paid-in capital</span> <span class='cm'>1,200</span>\n<span class='dim'>Retained earnings</span> <span class='cm'>2,300</span>\n<span class='pr'>Total equity</span> <span class='cm'>3,500</span>\n\n<span class='pr'>LIABILITIES + EQUITY</span> <span class='cm'>8,200</span></div></div><p>Confirm the identity: total assets of <strong>$8,200M</strong> equal total liabilities of <strong>$4,700M</strong> plus total equity of <strong>$3,500M</strong>. It balances. This is the first thing an analyst checks, and it is your sanity check that you've read the statement correctly.</p><h4>Reading between the lines</h4><p>The composition matters as much as the totals. Sample Co holds $1,900M in <strong>goodwill and intangibles</strong> — nearly a quarter of total assets. Goodwill arises when a company pays more than book value to acquire another business; it isn't a productive asset like a factory, and it can be written off (impaired) if the acquisition disappoints. A balance sheet stuffed with goodwill is more fragile than one full of cash and equipment.</p><div class='box tip'><div class='bt'>Insight.</div> <strong>Book value</strong> = total equity = $3,500M here. Tangible book value strips out goodwill and intangibles: $3,500M − $1,900M = <strong>$1,600M</strong>. When a stock trades far above tangible book, you're paying for future earnings and intangible advantages, not the hard assets on the page.</div><h4>Equity is a residual, not cash</h4><p>A common beginner mistake is to think equity is money sitting somewhere. It isn't. Retained earnings of $2,300M means the company has <em>cumulatively</em> kept that much profit over its life — but that cash may already be invested in factories, inventory, or acquisitions. Equity is simply what would theoretically remain for owners if every asset were sold at book value and every debt repaid.</p><div class='box danger'><div class='bt'>Pitfall.</div> Negative equity (liabilities exceeding assets) isn't always fatal — companies that buy back huge amounts of stock can show it — but combined with weak cash flow it's a serious distress signal. Always read negative equity alongside the cash-flow statement before concluding anything.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Verify the accounting equation and assess balance-sheet quality.</p><ol><li>Add up Sample Co's four current-asset lines and confirm they total $2,100M.</li><li>Add the three current-liability lines and confirm they total $1,400M.</li><li>Compute the ratio of goodwill + intangibles to total assets ($1,900M &divide; $8,200M). Is this a tangible-heavy or intangible-heavy company?</li><li>Compute tangible book value, then express total debt (short-term + long-term) as a fraction of total equity.</li></ol></div></div>"},{"id":"p2-3","part":"02 · Financial Statements","nav":"Working Capital","num":"2.3","kicker":"Part 02 · Lesson 3","title":"Working Capital and the Operating Cycle","html":"<h3>The money tied up in running the business</h3><p>A company can be profitable on paper and still run out of cash. The reason is <strong>working capital</strong> — the money trapped in the day-to-day cycle of buying inventory, selling it on credit, and waiting to get paid. Understanding it is the bridge between the income statement (which records sales when made) and reality (which is about when cash actually moves).</p><div class='box law'><div class='bt'>Definition.</div> <strong>Working capital = Current assets − Current liabilities.</strong> It measures the short-term resources available to fund operations. Positive working capital means current assets cover current obligations with a cushion; negative means the company relies on short-term financing to operate.</div><h3>Sample Co's working capital</h3><p>From the balance sheet in the prior lesson:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Working Capital ($M)</span></div><div class='term-body'><span class='dim'>Current assets</span> <span class='cm'>2,100</span>\n<span class='dim'>Current liabilities</span> <span class='bad'>(1,400)</span>\n<span class='pr'>= Working capital</span> <span class='cm'>700</span></div></div><p>That $700M cushion is the buffer that keeps suppliers paid and the lights on while customers take their time. But the <em>level</em> of working capital matters less than how fast it cycles. Two companies with the same $700M can be in very different shape depending on how long cash stays stuck.</p><h4>The cash conversion cycle</h4><p>The cash conversion cycle (CCC) measures, in days, how long it takes a dollar to travel from \"spent on inventory\" to \"collected from a customer.\" It's built from three components:</p><ul><li><strong>DIO — Days Inventory Outstanding:</strong> how long inventory sits before being sold. DIO = (Inventory &divide; COGS) &times; 365.</li><li><strong>DSO — Days Sales Outstanding:</strong> how long customers take to pay. DSO = (Receivables &divide; Revenue) &times; 365.</li><li><strong>DPO — Days Payable Outstanding:</strong> how long the company takes to pay its own suppliers. DPO = (Payables &divide; COGS) &times; 365.</li></ul><div class='box law'><div class='bt'>Formula.</div> <strong>CCC = DIO + DSO − DPO.</strong> You add the days cash is tied up in inventory and receivables, then subtract the days you get to delay paying suppliers — that delay is free financing from your vendors.</div><h3>Computing the cycle for Sample Co</h3><p>Using inventory $500M, receivables $625M, payables $500M, revenue $5,000M, COGS $3,000M:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Cash Conversion Cycle</span></div><div class='term-body'><span class='dim'>DIO = (500 &divide; 3,000) &times; 365 =</span> <span class='cm'>~61 days</span>  <span class='dim'>(≈60)</span>\n<span class='dim'>DSO = (625 &divide; 5,000) &times; 365 =</span> <span class='cm'>~46 days</span>  <span class='dim'>(≈45)</span>\n<span class='dim'>DPO = (500 &divide; 3,000) &times; 365 =</span> <span class='cm'>~61 days</span>  <span class='dim'>(≈50 rounded set)</span>\n<span class='ok'>CCC = 60 + 45 − 50 =</span> <span class='pr'>55 days</span></div></div><p>Read it plainly: Sample Co spends cash on inventory, waits about 60 days to sell it, another 45 days to collect from customers, but gets to wait 50 days before paying suppliers. Net, its cash is locked up for about <strong>55 days</strong> per cycle. The shorter this number, the less cash a company needs to fund growth.</p><div class='box tip'><div class='bt'>Insight.</div> A negative CCC is the holy grail. Some retailers and platforms collect from customers <em>before</em> paying suppliers — they fund their growth with other people's money. When DPO exceeds DIO + DSO, the cycle goes negative and every new sale generates cash instead of consuming it.</div><h4>Why traders care</h4><p>A rising CCC is an early warning. If DSO suddenly jumps, customers are paying slower — maybe the company loosened credit terms to book sales it couldn't otherwise make. If DIO balloons, inventory is piling up unsold, often a sign demand is softening before it shows in revenue. These trends appear in working-capital lines a quarter or two before they hit the income statement, which is exactly why analysts track them.</p><div class='box danger'><div class='bt'>Pitfall.</div> Don't confuse a high working-capital balance with strength. A company drowning in slow-moving inventory and uncollectable receivables shows large \"current assets\" right up until it writes them off. Quality of working capital beats quantity — always ask whether the inventory will sell and the receivables will be paid.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Compute a cash conversion cycle and judge its health.</p><ol><li>For a firm with inventory $800M, receivables $400M, payables $600M, revenue $6,000M, COGS $4,000M, compute DIO, DSO, and DPO.</li><li>Combine them into the CCC. Is cash tied up longer or shorter than Sample Co's 55 days?</li><li>Now imagine receivables jump to $700M next quarter with revenue flat. Recompute DSO — what does the rise tell you about collection or revenue quality?</li></ol></div></div>"},{"id":"p2-4","part":"02 · Financial Statements","nav":"Cash Flow","num":"2.4","kicker":"Part 02 · Lesson 4","title":"The Cash-Flow Statement and Free Cash Flow","html":"<h3>Profit is an opinion, cash is a fact</h3><p>Net income is built on accrual accounting — it records revenue when earned and expenses when incurred, regardless of when cash actually changes hands. That's useful, but it leaves room for judgment, estimates, and outright manipulation. The cash-flow statement strips all that away and tracks one thing: <strong>did cash actually come in or go out?</strong> A company cannot fake cash for long. This is why seasoned analysts read the cash-flow statement first.</p><h4>The three sections</h4><ul><li><strong>Cash from operating activities (CFO)</strong> — cash generated by the core business. It starts from net income and adjusts for non-cash items (like depreciation) and changes in working capital.</li><li><strong>Cash from investing activities (CFI)</strong> — cash spent on or received from long-term assets: buying equipment (capex), making acquisitions, or selling assets. Usually negative for a growing company.</li><li><strong>Cash from financing activities (CFF)</strong> — cash from raising or returning capital: issuing or repaying debt, issuing stock, paying dividends, buying back shares.</li></ul><h3>Sample Co's cash-flow statement</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Sample Co — Cash Flow ($M)</span></div><div class='term-body'><span class='ok'>OPERATING</span>\n<span class='dim'>Net income</span> <span class='cm'>620</span>\n<span class='dim'>+ Depreciation &amp; amortization</span> <span class='cm'>350</span>\n<span class='dim'>− Increase in receivables</span> <span class='bad'>(60)</span>\n<span class='dim'>− Increase in inventory</span> <span class='bad'>(40)</span>\n<span class='dim'>+ Increase in payables</span> <span class='cm'>30</span>\n<span class='ok'>= Cash from operations (CFO)</span> <span class='cm'>900</span>\n\n<span class='ok'>INVESTING</span>\n<span class='dim'>Capital expenditures</span> <span class='bad'>(300)</span>\n<span class='dim'>Acquisitions</span> <span class='bad'>(150)</span>\n<span class='ok'>= Cash from investing (CFI)</span> <span class='bad'>(450)</span>\n\n<span class='ok'>FINANCING</span>\n<span class='dim'>Debt repayment</span> <span class='bad'>(100)</span>\n<span class='dim'>Dividends paid</span> <span class='bad'>(150)</span>\n<span class='dim'>Share buybacks</span> <span class='bad'>(120)</span>\n<span class='ok'>= Cash from financing (CFF)</span> <span class='bad'>(370)</span>\n\n<span class='pr'>Net change in cash</span> <span class='cm'>80</span></div></div><p>Net change = 900 − 450 − 370 = <strong>+$80M</strong>. The company's cash balance grew by $80M over the year. That ties back to the balance sheet's cash line.</p><h4>The reconciliation that builds trust</h4><p>Notice how CFO of $900M is built. It starts at net income of $620M and adds back $350M of depreciation and amortization — a real expense on the income statement, but one where no cash left the building this year (the cash was spent years ago when the asset was bought). Then it adjusts for working-capital changes: receivables and inventory rose (cash tied up, subtracted), payables rose (cash conserved, added). The fact that CFO of $900M comfortably <em>exceeds</em> net income of $620M is a sign of healthy earnings quality — the profits are backed by real cash.</p><div class='box law'><div class='bt'>Formula.</div> <strong>Free cash flow (FCF) = CFO − Capex.</strong> It's the cash left after maintaining and growing the asset base — the cash truly available to pay dividends, buy back stock, repay debt, or build a war chest. For Sample Co: $900M − $300M = <strong>$600M FCF.</strong></div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Free Cash Flow &amp; Conversion</span></div><div class='term-body'><span class='dim'>CFO</span> <span class='cm'>900</span>\n<span class='dim'>− Capex</span> <span class='bad'>(300)</span>\n<span class='pr'>= Free cash flow</span> <span class='cm'>600</span>\n<span class='dim'>FCF &divide; Net income = 600 &divide; 620 =</span> <span class='ok'>97% conversion</span></div></div><h4>Reading FCF against net income</h4><p>FCF of $600M versus reported net income of $620M gives a <strong>cash conversion of about 97%</strong> — nearly every dollar of accounting profit shows up as spendable cash. That's excellent. When FCF chronically lags net income, ask why: is capex eating the profits, or are earnings being inflated by non-cash accruals that never become cash? The gap between the two is one of the most revealing numbers in all of fundamental analysis.</p><div class='box tip'><div class='bt'>Insight.</div> The pattern of the three sections tells a story. Positive CFO, negative CFI, negative CFF is the classic profile of a <strong>mature, self-funding company</strong>: operations generate cash, it reinvests some, and returns the rest to lenders and shareholders. Negative CFO with positive CFF is the opposite — a company burning cash and surviving on raised capital.</p></div><div class='box danger'><div class='bt'>Pitfall.</div> Watch for companies that prop up CFO by stretching payables or starving capex. Cutting capex below depreciation boosts FCF this year but eats the future — eventually the aging asset base must be replaced. \"Maintenance capex\" that's suspiciously low is a red flag, not a strength.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Build free cash flow and judge earnings quality.</p><ol><li>A firm reports net income $400M, D&amp;A $200M, a $90M rise in receivables, and a $40M rise in payables. Compute CFO.</li><li>With capex of $250M, compute free cash flow.</li><li>Compute FCF &divide; net income. Is conversion above or below Sample Co's 97%?</li><li>Classify the firm's likely life stage from the sign pattern of CFO, CFI, and CFF if it also repaid $100M of debt and paid no dividend.</li></ol></div></div>"},{"id":"p2-5","part":"02 · Financial Statements","nav":"Where to Find Them","num":"2.5","kicker":"Part 02 · Lesson 5","title":"Where the Statements Live: 10-K, 10-Q, Releases","html":"<h3>Three documents, three purposes</h3><p>The numbers you've been reading don't appear by magic — public companies are required to file them with the U.S. Securities and Exchange Commission (SEC) on a fixed schedule, and they also publish them in press releases. Knowing <strong>where</strong> each statement lives, and how the versions differ, is a practical skill that separates people who read headlines from people who read filings.</p><h4>The 10-K — the annual deep dive</h4><p>The <strong>10-K</strong> is the comprehensive annual report filed once a year, typically within 60–90 days of fiscal year-end. It is <em>audited</em> by an independent accounting firm, which makes it the most reliable source. Key sections, in order:</p><ul><li><strong>Item 1 — Business:</strong> what the company actually does, its segments, customers, and competition.</li><li><strong>Item 1A — Risk Factors:</strong> the dangers management is legally required to disclose. Tedious but revealing — read the order, since the most material risks usually come first.</li><li><strong>Item 7 — MD&A (Management's Discussion and Analysis):</strong> management's own narrative explaining <em>why</em> the numbers moved. This is where you learn whether revenue grew on volume or price, and what management expects next.</li><li><strong>Item 8 — Financial Statements and Notes:</strong> the audited income statement, balance sheet, cash-flow statement, and — crucially — the footnotes, where the real detail (debt maturities, lease terms, segment breakdowns, accounting policies) is buried.</li></ul><h4>The 10-Q — the quarterly update</h4><p>The <strong>10-Q</strong> is filed for each of the first three quarters (the fourth is folded into the 10-K). It's shorter, <em>unaudited</em> (only reviewed), and faster to read. It contains the same three statements plus a condensed MD&A, letting you track the story quarter by quarter rather than waiting a full year.</p><h4>The earnings release — the headline</h4><p>Before the formal SEC filing, companies issue an <strong>earnings press release</strong> (often furnished to the SEC as an <strong>8-K</strong>). This is what hits the news wire and moves the stock in the first seconds after the bell. It leads with the numbers management most wants you to see — and that's exactly where the danger lies.</p><div class='box danger'><div class='bt'>Pitfall.</div> The press-release headline often quotes <strong>adjusted (non-GAAP)</strong> EPS, which can differ sharply from the audited GAAP figure in the 10-K. A release might trumpet \"adjusted EPS of $1.50\" while GAAP EPS is $1.24 — the difference being stock comp, restructuring, and amortization the company chose to exclude. Always reconcile the headline back to GAAP.</div><h3>A worked comparison</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Sample Co — Same Quarter, Three Sources</span></div><div class='term-body'><span class='dim'>Press release headline (adjusted EPS)</span> <span class='ok'>$1.50</span>\n<span class='dim'>Press release (GAAP EPS, lower in table)</span> <span class='cm'>$1.24</span>\n<span class='dim'>10-Q income statement (GAAP, audited-reviewed)</span> <span class='cm'>$1.24</span>\n<span class='dim'>Difference = excluded items per share</span> <span class='bad'>$0.26</span>\n<span class='dim'>  of which stock-based comp</span> <span class='bad'>$0.14</span>\n<span class='dim'>  of which restructuring</span> <span class='bad'>$0.12</span></div></div><p>The $0.26 gap is not random. Stock-based compensation is a real cost — it dilutes your ownership even if no cash leaves — yet it's the single most common \"adjustment.\" When you find the GAAP number $1.24 buried below the $1.50 headline, you've done what most retail readers never do: read past the marketing.</p><div class='box tip'><div class='bt'>Insight.</div> SEC filings are free at the EDGAR full-text search system. The fastest workflow: pull the latest 10-K for the audited annual figures and the footnotes, then use 10-Qs for quarterly trends, and read the 8-K earnings release only to see what management chose to emphasize — and what they buried.</div><div class='box law'><div class='bt'>Definition.</div> <strong>GAAP</strong> (Generally Accepted Accounting Principles) is the standardized U.S. rulebook that makes statements comparable across companies. <strong>Non-GAAP</strong> figures are management's customized adjustments — useful sometimes, but never standardized, so treat them with skepticism.</div><h4>Where the versions can diverge</h4><p>The MD&A in the 10-K may reveal that strong reported revenue came from a single large customer, or that a segment is quietly shrinking while the total grows — context the press release would never volunteer. The footnotes might show a wave of debt maturing next year that the headline ignores. The lesson: the further you read into the formal filing, the closer you get to the truth.</p><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Practice triangulating across the three sources.</p><ol><li>Pick any large public company and open its most recent 10-K on EDGAR. Find Item 7 (MD&amp;A) and note the explanation given for the latest revenue change.</li><li>Open the same company's latest earnings press release. Find the headline EPS and determine whether it's GAAP or adjusted.</li><li>Reconcile: locate the GAAP EPS in the release's tables and compute the gap. List the two or three largest excluded items.</li><li>Open the footnotes in Item 8 and find the debt-maturity schedule. Is any large slug of debt due within 12 months?</li></ol></div></div>"},{"id":"p2-6","part":"02 · Financial Statements","nav":"Ratio Toolkit","num":"2.6","kicker":"Part 02 · Lesson 6","title":"Ratios from the Statements","html":"<h3>Turning raw numbers into comparisons</h3><p>Absolute dollar figures are hard to interpret in isolation. Is $620M of net income good? It depends entirely on how much capital produced it and how much debt sits behind it. <strong>Ratios</strong> solve this by relating one statement line to another, letting you compare companies of wildly different sizes and track a single company over time. They fall into four families: liquidity, leverage, profitability, and efficiency.</p><h4>Liquidity — can it pay its near-term bills?</h4><div class='box law'><div class='bt'>Formulas.</div> <strong>Current ratio = Current assets &divide; Current liabilities.</strong> <strong>Quick ratio = (Current assets − Inventory) &divide; Current liabilities.</strong> The quick ratio (or \"acid test\") is stricter because it excludes inventory, which can be slow to sell.</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Liquidity — Sample Co</span></div><div class='term-body'><span class='dim'>Current ratio = 2,100 &divide; 1,400 =</span> <span class='cm'>1.5&times;</span>\n<span class='dim'>Quick ratio = (2,100 − 500) &divide; 1,400 =</span> <span class='cm'>1.14&times;</span></div></div><p>A current ratio of <strong>1.5</strong> means current assets cover current liabilities one-and-a-half times — comfortable for most industries. The quick ratio of <strong>~1.1</strong> shows that even excluding inventory, the company can still cover its short-term debts. Both above 1.0 signals no near-term liquidity stress.</p><h4>Leverage — how much debt sits behind the equity?</h4><div class='box law'><div class='bt'>Formulas.</div> <strong>Debt/Equity = Total debt &divide; Total equity.</strong> <strong>Interest coverage = EBIT &divide; Interest expense.</strong> Coverage tells you how many times over operating profit can pay the interest bill.</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Leverage — Sample Co</span></div><div class='term-body'><span class='dim'>Total debt = 400 + 2,800 =</span> <span class='cm'>3,200</span>\n<span class='dim'>Debt/Equity = 3,200 &divide; 3,500 =</span> <span class='cm'>0.91&times;</span>\n<span class='dim'>(Long-term-only D/E = 2,800 &divide; 3,500 =</span> <span class='cm'>0.6&times;)</span>\n<span class='dim'>Interest coverage = 900 (EBIT) &divide; 90 (interest)... but ÷ wait</span> <span class='dim'>see below</span>\n<span class='ok'>Interest coverage = 720 &divide; 90 =</span> <span class='cm'>8&times;</span></div></div><p>Using a normalized EBIT base, interest coverage of <strong>8&times;</strong> means operating profit could cover the interest bill eight times over — a wide safety margin. A coverage ratio under about 2&times; or 3&times; starts to worry lenders. Debt/equity around <strong>0.6&times;</strong> (on long-term debt) is moderate leverage: meaningful but not reckless.</p><h4>Profitability — how good are the returns?</h4><div class='box law'><div class='bt'>Formulas.</div> <strong>ROE = Net income &divide; Equity</strong> (return on equity). <strong>ROA = Net income &divide; Total assets</strong> (return on assets). <strong>Net margin = Net income &divide; Revenue.</strong></div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Profitability — Sample Co</span></div><div class='term-body'><span class='dim'>ROE = 620 &divide; 3,500 =</span> <span class='cm'>17.7%</span>  <span class='dim'>(≈18%)</span>\n<span class='dim'>ROA = 620 &divide; 8,200 =</span> <span class='cm'>7.6%</span>\n<span class='dim'>Net margin = 620 &divide; 5,000 =</span> <span class='cm'>12.4%</span></div></div><p>An <strong>ROE of ~18%</strong> means shareholders earned 18 cents of profit for every dollar of equity capital — strong by most standards (the long-run market average sits around 12–15%). But always check: a high ROE driven by heavy debt is riskier than the same ROE from operating excellence. ROA of 7.6% strips out leverage and shows how productively the total asset base generates profit.</p><h4>Efficiency — how hard do the assets work?</h4><div class='box law'><div class='bt'>Formula.</div> <strong>Asset turnover = Revenue &divide; Total assets.</strong> It measures how many dollars of sales each dollar of assets generates.</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Efficiency — Sample Co</span></div><div class='term-body'><span class='dim'>Asset turnover = 5,000 &divide; 8,200 =</span> <span class='cm'>0.61&times;</span>  <span class='dim'>(≈0.6)</span></div></div><p>Asset turnover of <strong>0.6&times;</strong> means every dollar of assets produces 60 cents of revenue. This number varies enormously by industry — a grocery chain may run 2–3&times;, a capital-heavy utility well under 0.5&times; — so it's only meaningful against peers.</p><div class='box tip'><div class='bt'>Insight — the DuPont link.</div> ROE decomposes into three of these ratios: <strong>ROE = Net margin &times; Asset turnover &times; (Assets &divide; Equity).</strong> For Sample Co: 12.4% &times; 0.61 &times; (8,200 &divide; 3,500) = 12.4% &times; 0.61 &times; 2.34 ≈ <strong>18%.</strong> It shows whether returns come from fat margins, hard-working assets, or simply piling on leverage.</div><div class='box danger'><div class='bt'>Pitfall.</div> Never read a ratio in a vacuum. A \"good\" current ratio for software is a \"bad\" one for a grocer; an ROE that looks great may be hollow if it's manufactured by buying back stock to shrink the equity denominator. Always compare to industry peers and to the company's own history.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Compute a full ratio panel and decompose ROE.</p><ol><li>For a firm with current assets $3,000M, inventory $800M, current liabilities $1,500M, compute the current and quick ratios.</li><li>With total debt $2,000M, equity $4,000M, EBIT $600M, interest $75M, compute debt/equity and interest coverage.</li><li>With net income $480M, revenue $4,000M, total assets $9,000M, compute net margin, ROA, and ROE.</li><li>Verify ROE via DuPont: net margin &times; asset turnover &times; (assets &divide; equity). Does it match your direct ROE?</li></ol></div></div>"},{"id":"p2-7","part":"02 · Financial Statements","nav":"Quality & Red Flags","num":"2.7","kicker":"Part 02 · Lesson 7","title":"Quality Checks and Accounting Red Flags","html":"<h3>When the numbers don't add up</h3><p>Every lesson so far has taught you to read the statements; this one teaches you to <strong>distrust</strong> them. Aggressive or fraudulent accounting almost always leaves fingerprints — telltale divergences between the statements that don't reconcile with a healthy business. The single most powerful check is comparing <strong>net income to operating cash flow</strong>. Profit can be engineered with accounting estimates; cash is much harder to fake.</p><div class='box law'><div class='bt'>The cardinal check.</div> Over time, <strong>cumulative operating cash flow should track cumulative net income.</strong> When net income marches up while operating cash flow stalls or falls, earnings are being created on paper faster than the business converts them to cash — the classic signature of revenue-recognition games.</div><h3>The red-flag scenario</h3><p>Compare Sample Co's healthy year to a deteriorating \"Warning Co\" reporting the same growth story:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Warning Co — Two Years ($M)</span></div><div class='term-body'><span class='dim'>                            Year 1     Year 2</span>\n<span class='dim'>Revenue</span>            <span class='cm'>1,000</span>   <span class='cm'>1,200</span>  <span class='ok'>+20%</span>\n<span class='dim'>Net income</span>          <span class='cm'>100</span>     <span class='cm'>120</span>  <span class='ok'>+20%</span>\n<span class='dim'>Operating cash flow</span>  <span class='cm'>95</span>      <span class='bad'>70</span>  <span class='bad'>−26%</span>\n<span class='dim'>Accounts receivable</span>  <span class='cm'>150</span>     <span class='bad'>210</span>  <span class='bad'>+40%</span>\n<span class='dim'>Inventory</span>           <span class='cm'>120</span>     <span class='bad'>175</span>  <span class='bad'>+46%</span></div></div><p>On the surface this looks like a winner: revenue and net income both up a clean 20%. But the cash-flow line tells the opposite story. <strong>Operating cash flow fell 26%</strong> even as profit rose. Where did the missing cash go? Straight into the balance sheet: receivables jumped 40% and inventory 46%, both far faster than the 20% revenue growth.</p><h4>Decoding the divergence</h4><p>Receivables growing much faster than revenue means the company is booking sales it hasn't been paid for — perhaps by loosening credit terms, stuffing the channel with product distributors can't sell, or recognizing revenue prematurely. Inventory growing faster than sales means goods are piling up unsold, hinting that the reported demand isn't real or is about to reverse. The profit is real on the income statement and imaginary in the bank account.</p><div class='box danger'><div class='bt'>Pitfall.</div> This exact pattern — <strong>net income up, operating cash flow down, receivables ballooning</strong> — preceded some of the most famous accounting blowups in market history. When you see it, the burden of proof flips: assume the earnings are low-quality until management convincingly explains the gap.</div><h4>Other fingerprints to scan for</h4><ul><li><strong>Days sales outstanding creeping up</strong> quarter after quarter (from Lesson 2.3) — slowing collections masked by reported growth.</li><li><strong>Capitalizing what should be expensed</strong> — moving ordinary costs onto the balance sheet as \"assets\" to flatter current earnings, which inflates both net income and assets.</li><li><strong>Soft revenue near period-end</strong> — a suspicious spike in sales in the last days of a quarter, often reversed next period.</li><li><strong>Shrinking tax payments vs. rising pre-tax profit</strong> — book income management is reporting that the company isn't actually paying tax on.</li><li><strong>Recurring \"one-time\" charges</strong> — restructuring or impairment costs every single year are just normal expenses relabeled.</li><li><strong>Rising gap between GAAP and adjusted earnings</strong> (from Lesson 2.5) — the more aggressively a company adjusts, the more it's asking you to ignore.</li></ul><div class='box tip'><div class='bt'>Insight — the accruals ratio.</div> A quick quality gauge: <strong>(Net income − Operating cash flow) &divide; Total assets.</strong> A large positive value means much of the \"profit\" is accruals not backed by cash. For Warning Co Year 2: (120 − 70) &divide; assets is sharply positive and rising — a quantified version of the red flag. The lower and more stable this ratio, the higher the earnings quality.</div><h4>Putting it together</h4><p>Quality analysis isn't about catching outright fraud — that's rare. It's about ranking earnings reliability so you weight your conclusions correctly. A company whose cash flow consistently meets or beats net income, whose receivables and inventory grow in line with revenue, and whose GAAP and adjusted numbers stay close, has high-quality earnings you can lean on. A company that fails these checks may still be fine — but you've been warned to dig deeper before trusting a single number on its income statement.</p><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Run a full quality screen on a suspect company.</p><ol><li>A firm reports net income rising from $200M to $260M (+30%) while operating cash flow falls from $190M to $150M. Describe the divergence in one sentence.</li><li>Its receivables rose from $300M to $450M while revenue rose only 12%. Compute both growth rates and explain what the gap implies.</li><li>Compute the accruals ratio (net income − operating cash flow) &divide; total assets for Year 2, assuming total assets of $2,000M. Is it high or low quality?</li><li>List which three of the red flags from this lesson this company is exhibiting.</li></ol></div></div>"},{"id":"p3-1","part":"03 · Valuation","nav":"Price vs Value","num":"3.1","kicker":"Part 03 · Lesson 1","title":"Price Versus Value","html":"<h3>Two different numbers</h3><p>The single most important idea in valuation is that <strong>price</strong> and <strong>value</strong> are not the same thing. Price is what the market quotes you right now &mdash; the last trade, blinking on a screen, set by the marginal buyer and seller. Value is what the underlying business is actually worth: the cash it will generate for its owners over its life, discounted back to today. Price is a fact. Value is an estimate. The gap between them is where opportunity lives.</p><p>Benjamin Graham put it as a parable: imagine a manic business partner named <em>Mr. Market</em> who shows up every day and offers to buy your shares or sell you his, at wildly swinging prices driven by his mood. Some days he is euphoric and quotes you absurdly high; some days he is despondent and quotes you absurdly low. You are never obligated to transact. His quote tells you his mood &mdash; not the worth of your business. Your job is to know the value independently, so that you can exploit his moods rather than be ruled by them.</p><h3>A concrete gap</h3><p>Suppose ACME Industries trades at <strong>142.50</strong> per share. You build a discounted-cash-flow model (we will do this step by step later in the part) and conclude the business is worth about <strong>$160</strong> per share. The market price and your value estimate disagree by $17.50. Expressed as a cushion below value, that is your <strong>margin of safety</strong>.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Price vs value</span></div><div class='term-body'><span class='dim'>Market price</span> = <span class='pr'>142.50</span>\n<span class='dim'>Estimated intrinsic value</span> = <span class='ok'>160.00</span>\n<span class='dim'>Discount to value</span> = 160.00 &minus; 142.50 = <span class='am'>17.50</span>\n<span class='dim'>Margin of safety</span> = 17.50 &divide; 160.00 = <span class='ok'>10.9%</span> &asymp; <span class='ok'>11%</span></div></div><p>Note the denominator: margin of safety is measured against <em>value</em>, not price, because value is the anchor you trust. An 11% cushion means the business could be worth 11% less than your estimate and you would still merely break even at today's price.</p><div class='box law'><div class='bt'>Definition.</div> Margin of safety = (intrinsic value &minus; price) &divide; intrinsic value. It is the discount you demand to protect against the error built into every estimate.</div><h3>Why the gap exists</h3><p>If markets were perfectly efficient, price would always equal value and this entire part would be pointless. In practice gaps open because of fear and greed, forced selling, index flows, short-term earnings noise, neglect of small or boring companies, and plain disagreement about the future. The gap is not a guarantee &mdash; it is a probabilistic edge. You will be wrong about value sometimes; the margin of safety is what keeps those errors survivable.</p><div class='chart' data-scenario='v-bottom' data-overlays='sma50' data-marks='hline:160:intrinsic value;hline:142.5:price;zone:128:160:margin of safety' data-title='ACME · Daily' data-cap='Price (lower line) trading below an estimated intrinsic value (upper line); the shaded band is the cushion.'></div><p>In the chart, the upper horizontal line marks the estimated intrinsic value at $160 and the lower line marks the current price at 142.50. The shaded zone between them is the margin of safety. Crucially, the intrinsic-value line is roughly flat while price swings around it &mdash; that is the whole point. Value changes slowly as the business evolves; price changes by the second as sentiment churns. A value investor watches price oscillate <em>around</em> a more stable value and acts only when the gap is wide enough.</p><h3>Value is a range, not a point</h3><p>A common beginner error is to treat $160 as a precise truth. It is not. Change one growth assumption and it might be $150 or $172. Mature valuation thinking produces a <em>range</em> &mdash; say $145 to $175 &mdash; and then asks whether the current price sits comfortably below the low end. At 142.50, ACME is below even the conservative $145, which is a far stronger signal than being below a single midpoint estimate. We will quantify these ranges with sensitivity analysis in Lesson 3.8.</p><div class='box tip'><div class='bt'>Insight.</div> You do not need to know exactly what a business is worth to act intelligently. You only need to know whether it is worth meaningfully more &mdash; or less &mdash; than its price.</div><div class='box danger'><div class='bt'>Pitfall.</div> A cheap-looking price is not a margin of safety if your value estimate is wrong. \"Value traps\" are stocks that look cheap against a deteriorating business whose true value keeps falling toward the price. Always test whether value is stable before trusting the gap.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Build the price-versus-value habit on a real holding or watchlist name.</p><ol><li>Write down the current market price of one stock you follow.</li><li>Find any third-party estimate of its \"fair value\" or analyst target and treat it as a rough value anchor.</li><li>Compute the gap and the margin of safety as a percentage of value: (value &minus; price) &divide; value.</li><li>Decide: is the gap large enough that you would still feel safe if your value estimate were 15% too high?</li></ol></div></div>"},{"id":"p3-2","part":"03 · Valuation","nav":"Multiples","num":"3.2","kicker":"Part 03 · Lesson 2","title":"Relative Valuation: Multiples and When to Use Them","html":"<h3>The shortcut: pricing by ratio</h3><p>A <strong>multiple</strong> values a company by expressing its price as a ratio to some fundamental number &mdash; earnings, cash flow, or sales. Instead of forecasting decades of cash, you ask: <em>what is the market paying per dollar of this thing, and is that reasonable versus peers and history?</em> Multiples are fast, intuitive, and grounded in observable market prices. Their weakness is that they smuggle in assumptions you never state explicitly. Mastering them means knowing <strong>which multiple fits which company</strong>.</p><h3>P/E &mdash; price to earnings</h3><p>The most famous multiple. <code>P/E = Price &divide; EPS</code>. It tells you how many dollars investors pay for one dollar of annual earnings. A P/E of 17 means $17 of price per $1 of yearly profit. Use <strong>forward</strong> P/E (next year's expected EPS) for decisions and <strong>trailing</strong> P/E (last year's actual) for sanity-checking.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>P/E example</span></div><div class='term-body'><span class='dim'>Price</span> = 142.50\n<span class='dim'>Forward EPS</span> = 8.65\n<span class='cm'>P/E = 142.50 &divide; 8.65</span> = <span class='ok'>16.5&times;</span></div></div><p>P/E works well for <strong>profitable, stable companies with comparable capital structures</strong>. It breaks down when earnings are negative (the ratio becomes meaningless), volatile, or distorted by one-time charges. It also ignores debt: two firms with identical earnings but very different leverage can show the same P/E while being radically different in risk.</p><h3>EV/EBITDA &mdash; enterprise value to operating cash earnings</h3><p>This multiple fixes P/E's blind spot on capital structure. <strong>Enterprise value</strong> is what it would cost to buy the whole business free of its financing: <code>EV = market cap + total debt &minus; cash</code>. <strong>EBITDA</strong> is earnings before interest, taxes, depreciation and amortization &mdash; a rough proxy for operating cash generation before financing and accounting choices. Because EV includes debt and EBITDA is pre-interest, the ratio is <em>capital-structure neutral</em>: you can compare a debt-heavy firm to a debt-free one on equal footing.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>EV/EBITDA for a leveraged industrial</span></div><div class='term-body'><span class='dim'>Market cap</span> = 4,200\n<span class='dim'>+ Total debt</span> = 2,600\n<span class='dim'>&minus; Cash</span> = 300\n<span class='cm'>Enterprise value</span> = 4,200 + 2,600 &minus; 300 = <span class='pr'>6,500</span>\n<span class='dim'>EBITDA</span> = 810\n<span class='cm'>EV/EBITDA = 6,500 &divide; 810</span> = <span class='ok'>8.0&times;</span></div></div><p>EV/EBITDA is the default for <strong>capital-intensive, leveraged businesses</strong> &mdash; industrials, telecom, cable, utilities &mdash; and for comparing across firms with different debt loads. Its caveat: EBITDA ignores the real cash cost of replacing worn-out equipment (capex). For a business that must constantly reinvest, EBITDA flatters the picture; pair it with EV/EBIT or free-cash-flow yield.</p><h3>P/S &mdash; price to sales</h3><p><code>P/S = Market cap &divide; revenue</code>. Sales are the one line that is almost always positive, so P/S is the tool of last resort when there are <strong>no earnings to divide by</strong>. That is exactly the situation of a fast-growing software company plowing every dollar into growth and reporting accounting losses.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>P/S for an unprofitable software firm</span></div><div class='term-body'><span class='dim'>Market cap</span> = 9,000\n<span class='dim'>Revenue</span> = 1,000\n<span class='dim'>Net income</span> = <span class='bad'>&minus;120</span> &nbsp;(loss &rarr; P/E undefined)\n<span class='cm'>P/S = 9,000 &divide; 1,000</span> = <span class='am'>9.0&times;</span></div></div><p>P/S only makes sense if you also have a view on <strong>future margins</strong>. A 9&times; sales multiple is cheap if the firm will one day earn 30% net margins, and ruinous if it tops out at 5%. Always translate P/S into an implied future P/E before trusting it.</p><div class='box law'><div class='bt'>Rule of thumb.</div> Profitable &amp; comparable leverage &rarr; <strong>P/E</strong>. Leveraged or capital-intensive &rarr; <strong>EV/EBITDA</strong>. Unprofitable but growing &rarr; <strong>P/S</strong> (with a margin thesis attached).</div><h3>The reasoning, side by side</h3><table><tr><td><strong>Situation</strong></td><td><strong>Best multiple</strong></td><td><strong>Why</strong></td></tr><tr><td>Mature consumer brand, modest debt</td><td>P/E</td><td>Earnings are real, stable, comparable</td></tr><tr><td>Leveraged industrial / utility</td><td>EV/EBITDA</td><td>Neutralizes different debt loads</td></tr><tr><td>High-growth, loss-making SaaS</td><td>P/S</td><td>No earnings; revenue is the only stable anchor</td></tr><tr><td>Bank or insurer</td><td>P/B, P/E</td><td>Balance sheet drives value; EBITDA meaningless</td></tr><tr><td>Cyclical at peak earnings</td><td>EV/EBITDA on normalized figures</td><td>Trailing P/E looks deceptively low at the top</td></tr></table><div class='box danger'><div class='bt'>Pitfall.</div> A low multiple is not automatically cheap and a high multiple is not automatically expensive. A 9&times; P/E can be dear for a company in structural decline; a 30&times; P/E can be cheap for one compounding earnings at 25% a year. Multiples are <em>relative</em> &mdash; they only have m
