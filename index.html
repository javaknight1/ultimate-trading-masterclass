eaning against growth, risk, and peers.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Pick the right multiple for three different businesses.</p><ol><li>Choose a profitable consumer company, a debt-heavy industrial, and an unprofitable growth firm.</li><li>For each, compute the multiple from the rule of thumb (P/E, EV/EBITDA, P/S respectively).</li><li>Write one sentence justifying why that multiple, and not the others, fits the company.</li><li>For the P/S name, estimate a plausible mature net margin and convert the P/S into an implied forward P/E.</li></ol></div></div>"},{"id":"p3-3","part":"03 · Valuation","nav":"Comparables","num":"3.3","kicker":"Part 03 · Lesson 3","title":"Building a Comparables Table","html":"<h3>Valuation by company you keep</h3><p>A <strong>comparables analysis</strong> (\"comps\") values a company by benchmarking its multiples against a set of similar businesses. The logic is simple: if the market pays roughly 17&times; earnings for companies like this one, and our company earns $8.65 per share, then a fair price is about 17 &times; $8.65. Comps anchor your estimate in <em>what investors are actually paying today</em> for comparable risk and growth, which is a useful cross-check against the more abstract DCF.</p><h3>Step 1 &mdash; choose a clean peer set</h3><p>The whole method lives or dies on peer selection. Good peers share the company's <strong>industry, business model, growth rate, margins, and capital intensity</strong>. Bad peers share only a sector label. For Sample Co &mdash; a mid-cap branded products company &mdash; we pick five peers of similar size and growth, deliberately excluding a turnaround case and a much faster grower that would distort the average.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Peer set screen</span></div><div class='term-body'><span class='dim'>Include</span> &rarr; <span class='ok'>similar revenue, 4-8% growth, 12-16% margins</span>\n<span class='dim'>Exclude</span> &rarr; <span class='bad'>distressed turnaround (depressed EPS distorts P/E)</span>\n<span class='dim'>Exclude</span> &rarr; <span class='bad'>hyper-grower at 30% (commands a premium multiple)</span></div></div><h3>Step 2 &mdash; build the table</h3><p>Pull each peer's forward P/E. Real comps tables carry several multiples (EV/EBITDA, P/S, EV/Sales) side by side, but we will follow P/E here for clarity.</p><table><tr><td><strong>Peer</strong></td><td><strong>Price</strong></td><td><strong>Fwd EPS</strong></td><td><strong>Fwd P/E</strong></td></tr><tr><td>BravoCorp</td><td>96.00</td><td>6.00</td><td>16.0&times;</td></tr><tr><td>CedarWorks</td><td>132.00</td><td>7.50</td><td>17.6&times;</td></tr><tr><td>DeltaGoods</td><td>88.00</td><td>5.20</td><td>16.9&times;</td></tr><tr><td>EchoBrands</td><td>210.00</td><td>11.70</td><td>17.9&times;</td></tr><tr><td>FoxtrotInc</td><td>54.00</td><td>3.30</td><td>16.4&times;</td></tr></table><h3>Step 3 &mdash; pick a central tendency</h3><p>Average the peer multiples &mdash; but check the <strong>median</strong> too, because a single outlier can drag the mean. Here mean and median nearly agree, which gives confidence the set is clean.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Central P/E</span></div><div class='term-body'><span class='dim'>Sum</span> = 16.0 + 17.6 + 16.9 + 17.9 + 16.4 = <span class='pr'>84.8</span>\n<span class='cm'>Mean P/E</span> = 84.8 &divide; 5 = <span class='ok'>16.96&times;</span> &asymp; <span class='ok'>17&times;</span>\n<span class='dim'>Median P/E</span> = <span class='ok'>16.9&times;</span> &nbsp;(agrees &rarr; set is clean)</div></div><h3>Step 4 &mdash; apply to Sample Co</h3><p>Multiply the peer-average multiple by Sample Co's own forward EPS to back out an implied fair value.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Implied fair value</span></div><div class='term-body'><span class='dim'>Peer-average forward P/E</span> = 17&times;\n<span class='dim'>Sample Co forward EPS</span> = 8.65\n<span class='cm'>Fair value = 17 &times; 8.65</span> = <span class='ok'>147.05</span> &asymp; <span class='ok'>$147</span></div></div><p>So the comps approach says Sample Co is worth about <strong>$147</strong> per share. Against a market price of 142.50, the stock sits slightly <em>below</em> peer-implied fair value &mdash; a modest discount, consistent with (and independent of) the DCF we will build next.</p><h3>Adjust for differences</h3><p>Sample Co is rarely the exact average of its peers. If it grows faster or earns higher margins than the group, it deserves a <strong>premium</strong> multiple; if it is more leveraged or slower-growing, a <strong>discount</strong>. Suppose Sample Co's margins run two points above the peer mean &mdash; you might justify nudging the applied multiple to 17.5&times;, lifting fair value to about $151. Document every such adjustment; an undefended premium is just wishful thinking.</p><div class='box tip'><div class='bt'>Insight.</div> Comps tell you what the market <em>currently</em> pays for similar businesses. They are powerful when the whole peer group is fairly priced &mdash; and dangerous when the entire sector is in a bubble or a panic, because comps inherit the crowd's error.</div><div class='box danger'><div class='bt'>Pitfall.</div> Garbage peers produce garbage values. A loss-making peer (negative EPS) silently corrupts an average P/E; a peer with a different fiscal year or a one-time gain distorts the multiple. Inspect every row before trusting the mean.</div><div class='box law'><div class='bt'>Formula.</div> Implied value per share = peer-average multiple &times; company's own per-share metric (EPS for P/E, EBITDA-per-share for EV/EBITDA, etc.).</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Build a five-peer comps table and value a target company.</p><ol><li>Pick a target company and find five genuine peers (similar size, growth, margins).</li><li>For each peer, record price and forward EPS, then compute forward P/E.</li><li>Calculate both the mean and median P/E; if they diverge sharply, hunt for the outlier and decide whether to drop it.</li><li>Apply the central multiple to your target's forward EPS to get an implied fair value, then adjust up or down for any growth or margin differences &mdash; and justify the adjustment in one sentence.</li></ol></div></div>"},{"id":"p3-4","part":"03 · Valuation","nav":"Projecting FCF","num":"3.4","kicker":"Part 03 · Lesson 4","title":"DCF Step 1: Projecting Free Cash Flow","html":"<h3>What a DCF actually claims</h3><p>A <strong>discounted cash flow</strong> model rests on one idea: a business is worth the sum of all the cash it will hand to its owners in the future, with each future dollar shrunk to its value today. There are three steps &mdash; (1) project the cash, (2) choose a discount rate, (3) add a terminal value and total it up. This lesson is step one: forecasting <strong>free cash flow</strong>.</p><h3>Free cash flow defined</h3><p>Free cash flow (FCF) is the cash a business generates <em>after</em> paying to keep itself running and growing &mdash; the cash genuinely available to all investors. The standard build:</p><div class='box law'><div class='bt'>Formula.</div> FCF = operating cash flow &minus; capital expenditures. Or from earnings: FCF = EBIT &times; (1 &minus; tax) + depreciation &amp; amortization &minus; capex &minus; change in working capital.</div><p>We use <strong>unlevered</strong> free cash flow (FCF to the whole firm, before interest) so it pairs with WACC and enterprise value in the next lessons. The discipline is to forecast it from <em>drivers</em> &mdash; revenue growth and margins &mdash; not to pull a number from the air.</p><h3>The decay principle</h3><p>The cardinal rule of forecasting: growth fades. No company compounds at a high rate forever; competition, market saturation, and the law of large numbers pull every growth rate toward the economy's. So a credible forecast <strong>decays</strong> the growth rate year by year toward a sustainable long-run figure. We start Sample Co at $600M of FCF and fade growth from 10% down to 4% over five explicit years.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Five-year FCF projection (USD millions)</span></div><div class='term-body'><span class='dim'>Base FCF (year 0)</span> = <span class='pr'>600</span>\n<span class='cm'>Year 1</span>: 600 &times; 1.10 = <span class='ok'>660.0</span> &nbsp;<span class='dim'>(+10%)</span>\n<span class='cm'>Year 2</span>: 660.0 &times; 1.08 = <span class='ok'>712.8</span> &nbsp;<span class='dim'>(+8%)</span>\n<span class='cm'>Year 3</span>: 712.8 &times; 1.06 = <span class='ok'>755.6</span> &nbsp;<span class='dim'>(+6%)</span>\n<span class='cm'>Year 4</span>: 755.6 &times; 1.05 = <span class='ok'>793.4</span> &nbsp;<span class='dim'>(+5%)</span>\n<span class='cm'>Year 5</span>: 793.4 &times; 1.04 = <span class='ok'>825.1</span> &nbsp;<span class='dim'>(+4%)</span></div></div><p>The decaying-growth path lands Sample Co near <strong>$825M</strong> of FCF in year five &mdash; in the neighborhood of the roughly $880M you would reach with slightly richer assumptions, and a far more honest figure than naively extending 10% growth (which would imply $966M and overstate value). The exact number matters less than the <em>shape</em>: rising cash, decelerating growth.</p><h3>Forecasting from drivers, not from FCF directly</h3><p>In a real model you do not grow FCF as one lump; you build it from revenue and margin so the assumptions are inspectable. Watch how the same year-1 figure emerges from drivers:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Year 1 FCF from drivers (USD millions)</span></div><div class='term-body'><span class='dim'>Revenue</span> = 5,000 &times; 1.07 = <span class='pr'>5,350</span> &nbsp;<span class='dim'>(7% sales growth)</span>\n<span class='dim'>EBIT margin</span> = 18% &rarr; EBIT = <span class='pr'>963</span>\n<span class='dim'>&minus; tax @ 21%</span> &rarr; NOPAT = 963 &times; 0.79 = <span class='cm'>760.8</span>\n<span class='dim'>+ D&amp;A</span> = +250\n<span class='dim'>&minus; capex</span> = &minus;300\n<span class='dim'>&minus; &Delta; working capital</span> = &minus;51\n<span class='cm'>Unlevered FCF</span> = 760.8 + 250 &minus; 300 &minus; 51 &asymp; <span class='ok'>660</span></div></div><p>This is the discipline that separates a model from a guess: every FCF number traces back to a revenue assumption, a margin, a tax rate, and reinvestment. If a reviewer disputes your value, they can argue with a specific lever &mdash; \"I think the EBIT margin holds at 18%, not your assumed expansion\" &mdash; rather than waving at a black box.</p><div class='box tip'><div class='bt'>Insight.</div> The early forecast years drive a surprisingly small share of total value &mdash; often well under half. Most DCF value lives in the terminal value (Lesson 3.6). So get the long-run growth and margin <em>trend</em> right; do not obsess over year-2 precision.</div><div class='box danger'><div class='bt'>Pitfall.</div> The \"hockey stick\" &mdash; flat history followed by a forecast that suddenly accelerates &mdash; is the most common modeling sin. If your projected growth exceeds the company's recent reality, you must name the specific catalyst (new product, capacity, pricing power) that justifies it, or decay the rate down instead.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Project five years of free cash flow for a company you follow.</p><ol><li>Find its most recent annual free cash flow (operating cash flow minus capex).</li><li>Choose a year-1 growth rate from its recent trend, then decay it down toward 3-4% by year five.</li><li>Compute FCF for each of the five years by compounding the decaying rates.</li><li>Cross-check year 1 by rebuilding it from revenue growth and an EBIT margin &mdash; do the two approaches roughly agree?</li></ol></div></div>"},{"id":"p3-5","part":"03 · Valuation","nav":"Discount Rate","num":"3.5","kicker":"Part 03 · Lesson 5","title":"DCF Step 2: The Discount Rate and WACC","html":"<h3>Why future cash is worth less</h3><p>A dollar in five years is worth less than a dollar today &mdash; you could have invested today's dollar, and the future is uncertain. The <strong>discount rate</strong> converts future cash into present value and encodes the riskiness of those cash flows: riskier cash is discounted harder. For unlevered free cash flow that belongs to the whole firm, the correct rate is the <strong>weighted average cost of capital (WACC)</strong> &mdash; the blended return demanded by all the company's investors, both equity and debt.</p><div class='box law'><div class='bt'>Formula.</div> WACC = (E&divide;V) &times; r<sub>e</sub> + (D&divide;V) &times; r<sub>d</sub> &times; (1 &minus; tax), where E is equity value, D is debt, V = E + D, r<sub>e</sub> is cost of equity, r<sub>d</sub> is cost of debt.</div><h3>The cost of equity via CAPM</h3><p>Equity holders are last in line and bear the most risk, so they demand the highest return. The <strong>Capital Asset Pricing Model</strong> estimates that required return:</p><div class='box law'><div class='bt'>Formula.</div> r<sub>e</sub> = r<sub>f</sub> + &beta; &times; (r<sub>m</sub> &minus; r<sub>f</sub>). Risk-free rate plus beta times the equity risk premium.</div><p>The <strong>risk-free rate</strong> (r<sub>f</sub>) is typically the 10-year government bond yield. <strong>Beta</strong> (&beta;) measures how much the stock moves relative to the market: &beta; = 1 moves with the market, &beta; &gt; 1 is more volatile, &beta; &lt; 1 less so. The <strong>equity risk premium</strong> (r<sub>m</sub> &minus; r<sub>f</sub>) is the extra return stocks have historically paid over bonds &mdash; commonly taken near 4&ndash;5%.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Cost of equity (CAPM)</span></div><div class='term-body'><span class='dim'>Risk-free rate r<sub>f</sub></span> = 4.0%\n<span class='dim'>Beta &beta;</span> = 1.25\n<span class='dim'>Equity risk premium</span> = 4.4%\n<span class='cm'>r<sub>e</sub> = 4.0% + 1.25 &times; 4.4%</span>\n   = 4.0% + 5.5% = <span class='ok'>9.5%</span></div></div><h3>The cost of debt</h3><p>Debt is cheaper than equity for two reasons: lenders are paid before shareholders, and interest is <strong>tax-deductible</strong>. Take the company's effective borrowing rate and multiply by (1 &minus; tax) to get the after-tax cost. Here a pre-tax rate near 5.06% at a 21% tax rate gives roughly 4%.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>After-tax cost of debt</span></div><div class='term-body'><span class='dim'>Pre-tax cost of debt</span> = 5.06%\n<span class='dim'>Tax rate</span> = 21%\n<span class='cm'>r<sub>d</sub> after tax = 5.06% &times; (1 &minus; 0.21)</span> = <span class='ok'>4.0%</span></div></div><h3>Blending into WACC</h3><p>Now weight the two by their share of total capital. Sample Co funds itself roughly <strong>70% equity, 30% debt</strong> (using market values, not book values &mdash; this matters).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>WACC</span></div><div class='term-body'><span class='dim'>Equity weight E&divide;V</span> = 70% &nbsp; <span class='dim'>at r<sub>e</sub></span> = 9.5%\n<span class='dim'>Debt weight D&divide;V</span> = 30% &nbsp; <span class='dim'>at r<sub>d</sub></span> = 4.0%\n<span class='cm'>WACC = 0.70 &times; 9.5% + 0.30 &times; 4.0%</span>\n   = 6.65% + 1.20% = <span class='ok'>7.85%</span> &asymp; <span class='ok'>7.9%</span></div></div><p>Sample Co's WACC is about <strong>7.9%</strong>. This is the rate we will use to discount every projected free cash flow in the next lesson. Read it intuitively: the company must earn at least 7.9% on its capital to satisfy its investors; cash flows are worth more the lower this hurdle, and less the higher.</p><div class='box tip'><div class='bt'>Insight.</div> WACC is the single most powerful lever in a DCF. Moving it from 7.9% to 8.9% can knock 15-20% off the valuation, because it discounts every future year and compounds in the terminal value. Treat your discount rate with the same care as your growth rate &mdash; we will stress both in Lesson 3.8.</div><div class='box danger'><div class='bt'>Pitfall.</div> Using <em>book</em> weights instead of <em>market</em> weights, or forgetting the (1 &minus; tax) on debt, are the two classic WACC errors. Also resist false precision: WACC is an estimate good to maybe a quarter-point, so 7.9% really means \"call it 8%.\"</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Estimate the WACC for a company you are analyzing.</p><ol><li>Look up the current 10-year government bond yield (risk-free rate) and the company's beta.</li><li>Compute cost of equity with CAPM using a 4.5% equity risk premium: r<sub>f</sub> + &beta; &times; 4.5%.</li><li>Find the company's borrowing rate and tax rate, then compute after-tax cost of debt.</li><li>Estimate market-value equity and debt weights and blend the two costs into WACC. Then recompute it with the equity weight 10 points higher to see how sensitive it is.</li></ol></div></div>"},{"id":"p3-6","part":"03 · Valuation","nav":"Terminal Value","num":"3.6","kicker":"Part 03 · Lesson 6","title":"DCF Step 3: Terminal Value and Intrinsic Value","html":"<h3>Value beyond the forecast</h3><p>We projected five years of free cash flow (Lesson 3.4) and a 7.9% WACC (Lesson 3.5). But a healthy business does not stop generating cash in year six &mdash; it keeps going indefinitely. The <strong>terminal value</strong> captures all the cash flows <em>after</em> the explicit forecast, collapsed into a single number at the end of year five. For most companies, terminal value is the <em>largest</em> component of the valuation, so getting it right is decisive.</p><h3>The Gordon growth method</h3><p>The cleanest approach assumes that after year five, FCF grows forever at a modest, sustainable rate <strong>g</strong> &mdash; never above the long-run growth of the economy (roughly 2&ndash;3%), or you would be implying the company eventually swallows the world.</p><div class='box law'><div class='bt'>Formula.</div> Terminal value (at end of year 5) = FCF<sub>5</sub> &times; (1 + g) &divide; (WACC &minus; g). Then discount that lump back to today like any other future cash flow.</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Terminal value (USD millions)</span></div><div class='term-body'><span class='dim'>Year-5 FCF</span> = 825.1\n<span class='dim'>Terminal growth g</span> = 2.5%\n<span class='dim'>WACC</span> = 7.9%\n<span class='cm'>TV<sub>5</sub> = 825.1 &times; 1.025 &divide; (0.079 &minus; 0.025)</span>\n   = 845.7 &divide; 0.054 = <span class='ok'>15,661</span></div></div><h3>Discounting every cash flow to today</h3><p>Each future amount is divided by (1 + WACC)<sup>t</sup>, where t is the number of years away. The terminal value, sitting at the end of year 5, is discounted by the same year-5 factor.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Present value of cash flows (USD millions, WACC 7.9%)</span></div><div class='term-body'><span class='dim'>Yr1</span> 660.0 &divide; 1.079<sup>1</sup> = <span class='cm'>611.7</span>\n<span class='dim'>Yr2</span> 712.8 &divide; 1.079<sup>2</sup> = <span class='cm'>612.3</span>\n<span class='dim'>Yr3</span> 755.6 &divide; 1.079<sup>3</sup> = <span class='cm'>601.5</span>\n<span class='dim'>Yr4</span> 793.4 &divide; 1.079<sup>4</sup> = <span class='cm'>585.3</span>\n<span class='dim'>Yr5</span> 825.1 &divide; 1.079<sup>5</sup> = <span class='cm'>564.2</span>\n<span class='dim'>TV</span> 15,661 &divide; 1.079<sup>5</sup> = <span class='pr'>10,709</span>\n<span class='cm'>Enterprise value = sum</span> = <span class='ok'>13,684</span></div></div><p>Notice that the discounted terminal value (<strong>10,709</strong>) is about <em>78%</em> of the total enterprise value &mdash; a vivid illustration of why long-run assumptions dominate. The five explicit years together contribute under a quarter of the value.</p><h3>From enterprise value to value per share</h3><p>Enterprise value is the worth of the whole business to all capital providers. To reach value <em>per share</em>, subtract net debt (debt minus cash) to get equity value, then divide by shares outstanding.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Per-share intrinsic value</span></div><div class='term-body'><span class='dim'>Enterprise value</span> = 13,684\n<span class='dim'>&minus; Net debt (debt 2,000 &minus; cash 300)</span> = &minus;1,700\n<span class='cm'>Equity value</span> = 13,684 &minus; 1,700 = <span class='pr'>11,984</span>\n<span class='dim'>&divide; Shares outstanding</span> = 75.0M\n<span class='cm'>Intrinsic value per share = 11,984 &divide; 75</span> = <span class='ok'>$159.8</span> &asymp; <span class='ok'>$160</span></div></div><p>The DCF concludes Sample Co is worth about <strong>$160</strong> per share &mdash; the very figure introduced back in Lesson 3.1. Against a market price of 142.50, that is an 11% discount to intrinsic value. Reassuringly, it sits in the same neighborhood as the $147 comps estimate, with the DCF a touch higher because it gives full credit to the company's long-run cash generation.</p><div class='box tip'><div class='bt'>Insight.</div> Always sanity-check terminal value with an <em>exit multiple</em>: divide it by year-5 FCF (15,661 &divide; 825 &asymp; 19&times;). If that implied multiple is wildly out of line with what such businesses actually trade for, your growth or discount assumption is off.</div><div class='box danger'><div class='bt'>Pitfall.</div> The terminal-value formula is explosive near WACC = g. Setting g too close to WACC (say 6% growth against 7.9% WACC) sends the denominator toward zero and the value to absurdity. Keep g safely below WACC and at or under long-run GDP growth.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Complete a DCF you started in Lesson 3.4.</p><ol><li>Take your year-5 FCF and compute terminal value with g = 2.5% and your WACC.</li><li>Discount each of the five FCFs and the terminal value back to today using (1 + WACC) raised to the year.</li><li>Sum them for enterprise value, subtract net debt for equity value, divide by shares for per-share value.</li><li>Check the implied exit multiple (terminal value &divide; year-5 FCF) for sanity, and compare your per-share value to the current price.</li></ol></div></div>"},{"id":"p3-7","part":"03 · Valuation","nav":"Dividend Discount","num":"3.7","kicker":"Part 03 · Lesson 7","title":"The Dividend Discount Model","html":"<h3>Valuing the cash you actually receive</h3><p>For a shareholder in a stable company, the cash that physically reaches you is the <strong>dividend</strong>. The <strong>dividend discount model (DDM)</strong> takes this literally: a share is worth the present value of all future dividends. When dividends grow at a steady rate forever, the infinite sum collapses into one elegant equation &mdash; the <strong>Gordon growth model</strong>, the same mathematics behind a DCF terminal value, applied to dividends instead of free cash flow.</p><div class='box law'><div class='bt'>Formula.</div> Value per share = D<sub>1</sub> &divide; (r &minus; g), where D<sub>1</sub> is next year's dividend, r is the required return (cost of equity), and g is the perpetual dividend growth rate. Note D<sub>1</sub> = D<sub>0</sub> &times; (1 + g).</div><h3>A worked example</h3><p>Take a mature utility-like company paying a current dividend of <strong>$2.40</strong>, which has reliably grown about <strong>4%</strong> a year. Investors require an <strong>8%</strong> return on the equity. First grow the dividend one year forward, then apply the formula.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Gordon growth valuation</span></div><div class='term-body'><span class='dim'>Current dividend D<sub>0</sub></span> = 2.40\n<span class='dim'>Growth g</span> = 4%\n<span class='dim'>Required return r</span> = 8%\n<span class='cm'>D<sub>1</sub> = 2.40 &times; 1.04</span> = <span class='pr'>2.496</span>\n<span class='cm'>Value = 2.496 &divide; (0.08 &minus; 0.04)</span>\n   = 2.496 &divide; 0.04 = <span class='ok'>$62.40</span></div></div><p>The model values the share at <strong>$62.40</strong>. The intuition: a $2.50 dividend that grows 4% forever, when you demand 8%, behaves like a stream worth 4% &mdash; the spread between return and growth &mdash; per year, so you pay roughly 25 times the forward dividend (1 &divide; 0.04). If the same stock traded at $55, the model would flag it as undervalued; at $75, overvalued.</p><h3>Why the spread (r &minus; g) is everything</h3><p>The entire valuation hinges on the gap between the required return and the growth rate. The denominator is small, so tiny changes swing the value enormously &mdash; exactly the sensitivity we saw in the DCF terminal value.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Sensitivity of value to (r &minus; g)</span></div><div class='term-body'><span class='dim'>g = 3%, r = 8%</span> &rarr; 2.472 &divide; 0.05 = <span class='cm'>$49.44</span>\n<span class='dim'>g = 4%, r = 8%</span> &rarr; 2.496 &divide; 0.04 = <span class='ok'>$62.40</span>\n<span class='dim'>g = 5%, r = 8%</span> &rarr; 2.520 &divide; 0.03 = <span class='am'>$84.00</span>\n<span class='dim'>g = 6%, r = 8%</span> &rarr; 2.544 &divide; 0.02 = <span class='bad'>$127.20</span></div></div><p>A single percentage point of assumed growth moves the value from $62 to $84 &mdash; and as g approaches r the value runs away to nonsense. This fragility is the model's defining weakness.</p><h3>When the DDM fits &mdash; and when it fails</h3><p>The DDM is excellent for <strong>mature, stable, reliably dividend-paying companies</strong>: regulated utilities, consumer staples, established banks &mdash; firms with long, smooth dividend histories and growth comfortably below the required return. It fails badly for:</p><ul><li><strong>Non-dividend payers</strong> &mdash; growth and tech firms returning cash via buybacks or reinvestment have D<sub>0</sub> = 0, and the model returns zero.</li><li><strong>High or erratic growth</strong> &mdash; when g exceeds or nears r, the formula breaks; you need a multi-stage model (high growth fading to a stable tail).</li><li><strong>Companies whose payout doesn't track earnings</strong> &mdash; if dividends are propped up beyond what cash flow supports, the model values an unsustainable promise.</li></ul><div class='box tip'><div class='bt'>Insight.</div> A buyback is an economic cousin of a dividend &mdash; both return cash to owners. For firms that favor repurchases, value the <em>total</em> shareholder yield (dividends + net buybacks) rather than dividends alone, or you will badly understate the stock.</div><div class='box danger'><div class='bt'>Pitfall.</div> Forcing the DDM onto a fast grower by plugging in a high g produces a wildly inflated value precisely because (r &minus; g) collapses. If g is anywhere near r, abandon the single-stage model and use a two-stage approach or a full DCF instead.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Value a dividend payer with the Gordon growth model.</p><ol><li>Pick a mature, consistent dividend-paying company and note its current annual dividend per share.</li><li>Estimate a sustainable long-run growth rate g from its dividend history (keep it below the required return).</li><li>Use a required return r near its cost of equity, then compute value = D<sub>0</sub> &times; (1 + g) &divide; (r &minus; g).</li><li>Rebuild the value with g one point higher and one point lower to feel how sensitive it is, then compare your range to the market price.</li></ol></div></div>"},{"id":"p3-8","part":"03 · Valuation","nav":"Full Valuation","num":"3.8","kicker":"Part 03 · Lesson 8","title":"Sensitivity, Margin of Safety and a Full Valuation","html":"<h3>One number is a lie; a range is the truth</h3><p>Our DCF produced an intrinsic value of about $160 for Sample Co. But that single figure rests on two estimates we can never know exactly: the <strong>discount rate (WACC)</strong> and the <strong>terminal growth rate (g)</strong>. Mature valuation does not report one number &mdash; it maps how the value moves as those assumptions flex. That map is the <strong>sensitivity analysis</strong>, and it transforms a brittle point estimate into an honest range.</p><h3>The sensitivity grid</h3><p>We rebuild the DCF across a grid of WACC and g combinations. Lower WACC and higher g push value up; higher WACC and lower g push it down. Each cell is the full per-share intrinsic value recomputed end to end.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Intrinsic value per share &mdash; WACC (rows) &times; terminal g (cols)</span></div><div class='term-body'><span class='dim'>          g=2.0%   g=2.5%   g=3.0%</span>\n<span class='dim'>WACC 7.0%</span>  <span class='am'>178</span>     <span class='am'>189</span>     <span class='bad'>198</span>\n<span class='dim'>WACC 7.9%</span>  <span class='ok'>152</span>     <span class='ok'>160</span>     <span class='ok'>168</span>\n<span class='dim'>WACC 9.0%</span>  <span class='pr'>128</span>     <span class='pr'>133</span>     <span class='cm'>139</span></div></div><p>The grid spans roughly <strong>$128 to $198</strong> per share. Read it carefully. The base case (7.9% WACC, 2.5% g) sits at $160 in the center. The bearish corner &mdash; a demanding 9% discount rate and feeble 2% growth &mdash; still produces <strong>$128</strong>. The bullish corner reaches $198. This is the actual output of a valuation: not \"$160,\" but \"$128 on pessimistic assumptions, $160 base, $198 optimistic.\"</p><h3>Reading the grid against the price</h3><p>Now overlay the market price of <strong>142.50</strong>. The crucial observation: 142.50 falls <em>below the base case</em> ($160) and, more importantly, the stock is worth more than its price across most of the grid. Even in the fairly conservative 9% WACC / 3% g cell, value is $139 &mdash; still under price by a hair, which marks the rough boundary of the bear case.</p><div class='chart' data-scenario='pullback-uptrend' data-overlays='sma50' data-marks='hline:160:base value 160;hline:142.5:price 142.5;zone:128:198:value range' data-title='SAMPLE CO · Daily' data-cap='Price at 142.50 sits below the 160 base-case value, within a 128-198 valuation band (shaded).'></div><p>The chart frames the decision visually: price (lower line) trades beneath the base-case value (upper line), and the shaded band shows the full range of plausible value. The buy thesis is that price sits in the lower third of the band &mdash; you are paying 142.50 for something worth $160 in the base case and at least $128 even if you are meaningfully wrong.</p><h3>Quantifying the margin of safety</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Margin of safety at 142.50</span></div><div class='term-body'><span class='dim'>vs base value 160</span> &rarr; (160 &minus; 142.5) &divide; 160 = <span class='ok'>10.9%</span>\n<span class='dim'>vs bear value 128</span> &rarr; (128 &minus; 142.5) &divide; 128 = <span class='bad'>&minus;11.3%</span>\n<span class='dim'>vs comps 147</span> &rarr; (147 &minus; 142.5) &divide; 147 = <span class='cm'>3.1%</span></div></div><p>The honest reckoning: an <strong>11% margin of safety to the base case</strong>, a comfortable upside to the bull case, but the bear case ($128) sits <em>below</em> today's price. So this is not a fat-pitch, deep-value bargain &mdash; it is a moderately undervalued, reasonable-quality business. Whether 11% is enough depends on your conviction in the assumptions and the quality of the company: for a durable franchise an 11% discount may suffice; for a riskier business you would demand 30&ndash;40%.</p><h3>Tying every number back to the business</h3><p>Reconcile the threads. The <strong>comps</strong> said ~$147 (what the market pays for peers today). The <strong>DCF</strong> said ~$160 (the discounted cash the business itself will generate). The <strong>sensitivity grid</strong> said $128&ndash;$198 (the range across honest assumption error). All three are independent roads to roughly the same neighborhood &mdash; the convergence is what gives confidence. The quoted price of 142.50 is simply <em>Mr. Market's mood today</em>; our work says the business is worth somewhat more.</p><div class='box law'><div class='bt'>The full process.</div> (1) Forecast FCF from drivers &rarr; (2) discount at WACC &rarr; (3) add terminal value for intrinsic value &rarr; (4) cross-check with comps &rarr; (5) flex assumptions into a range &rarr; (6) buy only with a margin of safety appropriate to the risk.</div><div class='box tip'><div class='bt'>Insight.</div> Convergence of independent methods is the strongest signal in valuation. When a DCF, a comps table, and a dividend model all point to a similar value, your estimate is robust. When they diverge sharply, that disagreement is itself information &mdash; find out which assumption drives the gap.</div><div class='box danger'><div class='bt'>Pitfall.</div> Sensitivity analysis can become \"assumption laundering\": quietly choosing the rosy corner of the grid to justify a purchase you already wanted. Anchor on the base case and the bear case, not the bull corner, and let the price-versus-value gap &mdash; not your hopes &mdash; drive the decision.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Stress-test a full valuation and frame a buy decision.</p><ol><li>Take your completed DCF and recompute per-share value across three WACC levels (base, +1%, &minus;1%) and three g levels (2%, 2.5%, 3%) &mdash; a 3&times;3 grid.</li><li>Note the lowest (bear) and highest (bull) values and the base-case center.</li><li>Compute the margin of safety of the current price against both the base case and the bear case.</li><li>Decide: is the discount large enough for the quality and riskiness of this business? Cross-check against a comps value before concluding.</li></ol></div></div>"},{"id":"p4-1","part":"04 · TA vs FA","nav":"Two Philosophies","num":"4.1","kicker":"Part 04 · Lesson 1","title":"The Two Philosophies and What Each Claims","html":"<h3>Two answers to one question</h3><p>Every trade is a bet about price. The two great schools of market analysis disagree about <em>where the information that moves price lives</em>. <strong>Fundamental analysis (FA)</strong> says value comes from the business behind the ticker: its earnings, cash flows, debts, and growth. <strong>Technical analysis (TA)</strong> says everything you need is already in the price and volume record, because the chart is the aggregate footprint of every buyer and seller who has acted.</p><p>These are not just different toolkits; they rest on different claims about reality. Read them as testable assertions, not slogans.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>core claims, side by side</span></div><div class='term-body'><span class='cm'>Fundamental analysis claims:</span>\n<span class='ok'>1.</span> A security has an <span class='pr'>intrinsic value</span> set by future cash flows.\n<span class='ok'>2.</span> Price can diverge from value, sometimes for years.\n<span class='ok'>3.</span> Over the long run, price converges to value.\n<span class='dim'>Edge = estimating value better than the crowd.</span>\n\n<span class='cm'>Technical analysis claims:</span>\n<span class='ok'>1.</span> Price <span class='pr'>discounts everything</span> — all known facts are in it.\n<span class='ok'>2.</span> Prices move in trends and patterns driven by human behaviour.\n<span class='ok'>3.</span> History rhymes because crowd psychology repeats.\n<span class='dim'>Edge = reading the tape and managing risk better than the crowd.</span></div></div><h3>The 30% drop: two interrogations</h3><p>Imagine ACME falls 30% in three weeks. Same chart, two analysts, two completely different questions.</p><div class='chart' data-scenario='breakdown' data-overlays='sma50' data-marks='support:96;note:34:96:support breaks' data-title='ACME · Daily' data-cap='A 30% slide that breaks a prior support shelf near 96.'></div><p>The chart above shows the slide and the moment price slices through a support shelf near 96 that had held twice before. The <strong>fundamentalist</strong> ignores the line. She asks: <em>did anything about the business change?</em> If earnings guidance was cut 35%, a 30% price drop may be rational — or even insufficient. If nothing changed and only sentiment soured, she sees a sale. Her question is <strong>\"is it cheap?\"</strong></p><p>The <strong>technician</strong> barely cares why. He sees that a level which previously attracted buyers has failed, volume expanded on the break, and price is now below a falling 50-day average. To him the message is structural: supply has overwhelmed demand and the path of least resistance is down until proven otherwise. His question is <strong>\"did support hold?\"</strong> — and it did not.</p><div class='box tip'><div class='bt'>Insight.</div> Notice they are not really arguing. The fundamentalist is answering <em>what to own</em>; the technician is answering <em>when and at what risk</em>. The conflict is mostly an illusion created by people who only own one tool.</div><h3>What each is actually trying to predict</h3><p>This is the cleanest way to keep them straight: they forecast different variables over different horizons.</p><table><tr><td><strong>Dimension</strong></td><td><strong>Fundamental</strong></td><td><strong>Technical</strong></td></tr><tr><td>Predicts</td><td>Long-run value / fair price</td><td>Near-term direction & volatility</td></tr><tr><td>Horizon</td><td>Quarters to years</td><td>Minutes to months</td></tr><tr><td>Primary data</td><td>Financial statements, macro</td><td>Price, volume, time</td></tr><tr><td>Fails when</td><td>Timing — value takes years to be recognised</td><td>Regime change — old patterns break</td></tr><tr><td>Key risk</td><td>\"Value trap\" (cheap stays cheap)</td><td>\"Whipsaw\" (false signal)</td></tr></table><h3>Why the dispute persists</h3><p>If one school were simply right, the other would have died decades ago. Both survive because markets are layered. On a <strong>quiet Tuesday</strong>, an index can drift on order-flow and positioning with no fundamental news at all — a technical environment. On an <strong>earnings night</strong>, a stock gaps 12% on a number no chart predicted — a fundamental environment. The same instrument is governed by different forces at different moments, which is precisely why professionals refuse to pick a side (Lesson 4.5).</p><div class='box law'><div class='bt'>Definition.</div> <strong>Intrinsic value</strong> is the present value of all cash a business will return to owners. <strong>Price</strong> is what the last marginal buyer and seller agreed on. FA trades the <em>gap</em> between them; TA trades the <em>path</em> of price itself.</div><div class='box danger'><div class='bt'>Pitfall.</div> Beginners adopt a school as an identity (\"I'm a chartist,\" \"I'm a value guy\") and then dismiss disconfirming evidence. The market does not reward loyalty to a method — only loyalty to reality. Hold both frameworks loosely.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: feel the two questions on one event.</p><ol><li>Pick a stock that recently moved more than 15% in a week.</li><li>Write the <em>fundamentalist</em> question: did earnings, guidance, or the balance sheet change enough to justify the move?</li><li>Write the <em>technician</em> question: did the move break or hold a level that mattered before?</li><li>Decide which question your trading horizon makes you care about more — and notice that the other still matters.</li></ol></div></div>"},{"id":"p4-2","part":"04 · TA vs FA","nav":"Efficient Markets","num":"4.2","kicker":"Part 04 · Lesson 2","title":"The Efficient-Market Hypothesis and Its Critics","html":"<h3>The idea that haunts every analyst</h3><p>If markets instantly and correctly price all information, then <em>no</em> analysis — technical or fundamental — can produce a durable edge. That uncomfortable claim is the <strong>Efficient-Market Hypothesis (EMH)</strong>, formalised by Eugene Fama in 1970. You cannot honestly study analysis without first staring it down, because EMH is the null hypothesis your edge must beat.</p><div class='box law'><div class='bt'>Definition.</div> A market is <strong>efficient</strong> if prices fully reflect available information, so the expected risk-adjusted return from trading on that information is zero. Prices then move only on genuinely new (unpredictable) news — a <em>random walk</em>.</div><h3>The three forms</h3><p>Fama split the hypothesis into three strengths, defined by <em>which</em> information set is already in the price. Each form, if true, kills a different kind of analysis.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>the three forms of EMH</span></div><div class='term-body'><span class='cm'>WEAK form</span> — price reflects all <span class='pr'>past prices & volume</span>.\n<span class='bad'>If true:</span> technical analysis cannot work.\n\n<span class='cm'>SEMI-STRONG form</span> — price reflects all <span class='pr'>public information</span> (filings, news).\n<span class='bad'>If true:</span> fundamental analysis on public data cannot work.\n\n<span class='cm'>STRONG form</span> — price reflects <span class='pr'>everything, including private/insider</span> info.\n<span class='bad'>If true:</span> even insiders cannot beat the market.\n<span class='dim'>Almost nobody believes the strong form — insiders demonstrably profit.</span></div></div><p>Notice the structure: the weak form is the direct enemy of TA, the semi-strong form is the enemy of FA, and the strong form is so extreme that insider-trading prosecutions disprove it daily. The real debate lives in the weak and semi-strong forms.</p><h3>The case FOR efficiency</h3><p>It is not a strawman; the evidence is genuinely strong. Most active fund managers underperform a cheap index fund over 10–15 years after fees — roughly 80–90% in long-horizon studies. If beating the market were easy, that number would be reversed. Markets also react fast: major public news is typically reflected in price within seconds, leaving little for a retail analyst to harvest.</p><h3>The serious critiques</h3><p>But \"hard to beat\" is not \"impossible to beat,\" and several findings sit awkwardly with strict efficiency.</p><div class='chart' data-scenario='parabolic' data-marks='note:38:128:euphoria;down:44' data-title='NOVA · Daily' data-cap='A parabolic run and crash — the shape efficiency theory struggles to explain.'></div><p>The parabola above is the kind of episode critics point to. A perfectly efficient price should not melt up 60% and then collapse without proportionate news — yet bubbles and crashes recur. Consider the headline anomalies:</p><ul><li><strong>The 1987 crash.</strong> On 19 October 1987 the Dow fell about 22.6% in a single day with <em>no</em> commensurate news. What fundamental fact changed by a fifth overnight? Robert Shiller's surveys found the move was driven by feedback and portfolio insurance, not information — hard to square with rational pricing.</li><li><strong>Momentum.</strong> Jegadeesh and Titman (1993) showed that stocks which outperformed over 3–12 months keep outperforming for a while. That is a <em>past-price</em> signal predicting future returns — a direct violation of the weak form, and it persists across decades and countries.</li><li><strong>Value & size.</strong> Cheap (low price-to-book) and small stocks have historically earned premiums. Fama himself absorbed these into multi-factor models — arguably saving EMH by redefining \"risk.\"</li><li><strong>Excess volatility.</strong> Shiller showed prices swing far more than the discounted stream of future dividends ever did — markets are too jumpy to be purely rational.</li></ul><div class='box tip'><div class='bt'>Insight.</div> The honest synthesis, from Andrew Lo's <strong>Adaptive Markets Hypothesis</strong>: markets are <em>mostly</em> efficient but not perfectly, and the inefficiencies are real, small, crowded, and decay as people exploit them. Edge exists — it is just scarce, competitive, and perishable.</div><h3>What this means for you</h3><p>EMH should make you humble, not paralysed. Three working conclusions:</p><ol><li><strong>The strong form is false</strong> — so private edges (genuine information, speed, structure) can pay.</li><li><strong>The semi-strong form is mostly true</strong> — so reading a public 10-K everyone has read rarely gives an edge by itself; the edge is in superior <em>interpretation</em>.</li><li><strong>The weak form is leaky</strong> — momentum survives, which is why technical trend-following is not pure superstition.</li></ol><div class='box danger'><div class='bt'>Pitfall.</div> Anomalies shrink after publication. The value and size premiums weakened markedly after academics broadcast them in the 1990s. Any edge you find that is easy to describe is probably already being arbitraged. Assume your signal is decaying.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: locate your strategy against the three forms.</p><ol><li>Write down one strategy you believe in (e.g., \"buy 200-day breakouts\").</li><li>Identify which EMH form it must violate to work (this one violates the weak form).</li><li>Ask: why hasn't this been arbitraged away? Name the real reason — a behavioural bias, a structural constraint, or a risk premium.</li><li>If you can't name one, treat the edge as suspect.</li></ol></div></div>"},{"id":"p4-3","part":"04 · TA vs FA","nav":"What TA Is Good At","num":"4.3","kicker":"Part 04 · Lesson 3","title":"What Technical Analysis Is Genuinely Good and Bad At","html":"<h3>Separating the signal from the folklore</h3><p>Technical analysis carries a lot of baggage — fans who believe candlestick names have magic, and skeptics who dismiss the whole field as astrology. The truth is in between and is <em>specific</em>: TA is excellent at a few things and weak at others, and the evidence lets us say which is which.</p><h3>Where TA genuinely adds value</h3><h4>1. Defining risk with precision</h4><p>This is TA's strongest, least disputed contribution. A chart gives you objective, pre-decided <strong>exit levels</strong>. You do not need to believe a trendline predicts anything to use it as a line in the sand that says \"I was wrong.\"</p><div class='chart' data-scenario='uptrend' data-overlays='trend' data-marks='note:30:104:stop just below line' data-title='ACME · Daily' data-cap='A rising trendline that cleanly defines where the thesis is invalidated.'></div><p>In the chart, the rising trendline connects the swing lows. Whatever you think of its predictive power, it gives you a clean, unambiguous stop: if price closes decisively below it, the up-structure is broken and you exit. That converts a vague feeling into a measurable risk of, say, 4% — which lets you <strong>size the position</strong> correctly. FA gives you no such line; \"it's undervalued\" tells you nothing about where to bail.</p><h4>2. Timing entries and exits</h4><p>Fundamentals tell you <em>what</em>; they are nearly silent on <em>when</em>. TA fills that gap. Waiting for a pullback to a moving average, or for a breakout to confirm, can dramatically improve entry price and reduce time spent underwater.</p><h4>3. Reading liquidity and order flow</h4><p>Support, resistance, and volume are real reflections of where supply and demand cluster. A high-volume breakout above a multi-month resistance reveals that a price ceiling has been absorbed — genuine information about positioning, not myth.</p><div class='box tip'><div class='bt'>Insight.</div> The strongest empirical support is for <strong>trend / momentum</strong> and <strong>volume confirmation</strong>. Decades of data across asset classes show price persistence is real. If you keep one technical idea, keep \"the trend is your friend until it bends\" — it has the receipts.</div><h3>Where TA is weak — and the evidence is thin</h3><h4>1. Complex named patterns as predictions</h4><p>The famous chart patterns sound authoritative but test poorly out-of-sample. A head-and-shoulders is supposed to signal reversal; in controlled studies its hit rate hovers near a coin flip once you account for the many that fail or are drawn after the fact.</p><div class='chart' data-scenario='head-shoulders' data-title='NOVA · Daily' data-cap='A textbook head-and-shoulders — clean in hindsight, unreliable in real time.'></div><p>The pattern above is gorgeous in hindsight. The problem is twofold: <strong>hindsight bias</strong> (you only notice the ones that completed) and <strong>subjectivity</strong> (two analysts draw the neckline differently). A 'prediction' that fails roughly half the time is not useless, but it is not the precise forecast its name implies — treat it as a <em>risk map</em>, not a crystal ball.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>TA scorecard — by the evidence</span></div><div class='term-body'><span class='cm'>STRONG evidence</span>\n<span class='ok'>+</span> Trend / momentum persistence\n<span class='ok'>+</span> Support & resistance as risk levels\n<span class='ok'>+</span> Volume confirming a move\n\n<span class='cm'>WEAK / MIXED evidence</span>\n<span class='bad'>~</span> Named reversal patterns (H&S, double tops)\n<span class='bad'>~</span> Oscillator overbought/oversold as standalone signals\n<span class='bad'>~</span> Precise price 'targets' from pattern height\n\n<span class='cm'>NO credible evidence</span>\n<span class='bad'>x</span> Elliott Wave exact counts, Fibonacci to the cent\n<span class='dim'>Rule of thumb: the more precise the claim, the weaker the evidence.</span></div></div><h4>2. Oscillators in a trend</h4><p>An RSI screaming \"overbought\" in a powerful uptrend is a classic trap — strong trends stay overbought for weeks. Oscillators describe momentum; they do not, by themselves, time reversals.</p><h4>3. Over-fitting and self-deception</h4><p>With enough indicators and parameters you can always find a setting that 'worked' on the past. This is the deepest danger in TA: it is so flexible that it can manufacture confidence with no real edge.</p><div class='box danger'><div class='bt'>Pitfall.</div> Curve-fitting. If your backtest improved every time you added an indicator, you are probably fitting noise. A robust technical edge is usually <em>simple</em> (one or two rules) and survives on data it was never tuned on.</div><div class='box lab'><div class='bt'>Do this.</div> Use TA for what it's strong at — risk levels, timing, trend, volume — and demote the ornate pattern-naming to context. Anchor every technical trade to a hard invalidation level <em>before</em> you enter.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: separate TA's risk-management value from its prediction claims.</p><ol><li>On any chart, draw the most recent swing low or trendline.</li><li>Write the exact price where your trade idea is \"wrong\" — that's your stop.</li><li>Now resist drawing a fancy pattern. Just ask: is price trending up, down, or ranging, and is volume confirming?</li><li>Notice you've extracted TA's reliable value without relying on a single named pattern.</li></ol></div></div>"},{"id":"p4-4","part":"04 · TA vs FA","nav":"What FA Is Good At","num":"4.4","kicker":"Part 04 · Lesson 4","title":"What Fundamental Analysis Is Genuinely Good and Bad At","html":"<h3>The discipline of asking what a thing is worth</h3><p>Fundamental analysis answers a question technicals never even pose: <em>what is this business actually worth, and can it survive?</em> Done well, it is the difference between owning a productive asset and owning a ticker symbol you hope someone pays more for. But its strengths and weaknesses are as specific as TA's, and the biggest weakness is one word: <strong>timing</strong>.</p><h3>Where FA genuinely adds value</h3><h4>1. Estimating long-run value</h4><p>Over years, prices really do track earnings and cash flow. A business compounding free cash flow at 15% a year will, eventually, drag its stock price up with it. FA is the only toolkit that can tell you whether the thing you're buying generates value at all.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>a quick valuation sketch — ACME</span></div><div class='term-body'><span class='cm'>Inputs</span>\nPrice = <span class='pr'>$60</span>   EPS (this year) = <span class='pr'>$5</span>\nEarnings growth ~ <span class='pr'>10%/yr</span>   Debt/Equity = <span class='pr'>0.3</span> (low)\n\n<span class='cm'>P/E = Price &divide; EPS</span> = 60 &divide; 5 = <span class='am'>12&times;</span>\n<span class='dim'>Peers trade at 18&times;. Same growth, less debt.</span>\n\n<span class='cm'>PEG = P/E &divide; growth</span> = 12 &divide; 10 = <span class='ok'>1.2</span>\n<span class='dim'>Below the ~2 where peers sit &rarr; relatively cheap.</span>\n\n<span class='ok'>Read:</span> a solvent business priced below comparable peers.\n<span class='bad'>Unknown:</span> WHEN the market agrees. FA is silent on that.</div></div><p>That sketch shows FA's power and its hole in one frame. It can tell you ACME is statistically cheap and financially sound — but nothing in the math says whether the re-rating happens next month or in three years.</p><h4>2. Judging solvency and survival</h4><p>This is FA's quiet superpower and TA's blind spot. A chart cannot see a debt wall. Reading the balance sheet — leverage, interest coverage, cash runway — is how you avoid owning a company that goes to zero. No trendline warns you a firm can't refinance; the footnotes do.</p><h4>3. Sizing the margin of safety</h4><p>Buying at a discount to conservative value gives you a cushion against being wrong. That cushion is a fundamental concept with no technical equivalent.</p><h3>Where FA falls short</h3><h4>1. Timing — the value trap</h4><p>This is the central, brutal weakness. Being right about value and wrong about <em>when</em> can be financially indistinguishable from being wrong, period.</p><div class='chart' data-scenario='range' data-overlays='sma200' data-marks='zone:55:66:cheap, going nowhere;note:40:60:still cheap' data-title='ACME · Weekly' data-cap='A correctly-judged cheap stock that drifts sideways for years before the market agrees.'></div><p>The chart is the value investor's nightmare: ACME is genuinely undervalued at $60, and the analyst is <em>right</em> — but the stock grinds sideways in a $55–$66 box for three years while the thesis sits dead money. Capital that could have compounded elsewhere is trapped waiting for a catalyst that hasn't arrived. \"The market can stay irrational longer than you can stay solvent\" is the FA practitioner's epitaph.</p><div class='box danger'><div class='bt'>Pitfall.</div> The <strong>value trap</strong>: a stock is cheap <em>because it deserves to be</em> — eroding moat, dying industry, hidden liability. Cheapness alone is not a thesis. Without a catalyst (new management, a buyback, a cycle turn), \"cheap\" can mean \"cheap forever.\"</div><h4>2. Garbage-in estimates</h4><p>A discounted cash flow model is only as good as its assumptions, and small changes in the growth or discount rate swing the output enormously. False precision is FA's vanity: a model outputting \"intrinsic value = $84.37\" is pretending to a confidence it does not have.</p><h4>3. Reflexivity and narrative</h4><p>Fundamentals are not fully independent of price. A falling stock can raise a company's cost of capital and actually <em>worsen</em> the fundamentals — Soros's reflexivity. The clean separation of value and price is an idealisation.</p><div class='box tip'><div class='bt'>Insight.</div> FA and TA fail in opposite places, which is why they pair so well. FA is strong on <em>what</em> and <em>whether it survives</em>, weak on <em>when</em>. TA is strong on <em>when</em> and <em>risk levels</em>, weak on <em>what it's worth</em>. Each covers the other's blind spot.</div><table><tr><td><strong>FA is good at</strong></td><td><strong>FA is bad at</strong></td></tr><tr><td>Long-run value</td><td>Timing the realisation</td><td></td></tr><tr><td>Solvency / survival</td><td>Short-term moves</td></tr><tr><td>Margin of safety</td><td>False precision in models</td></tr><tr><td>Avoiding zeros</td><td>Reflexive feedback with price</td></tr></table><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: stress-test a 'cheap' stock for the value trap.</p><ol><li>Find a stock with a low P/E relative to its peers.</li><li>Ask <em>why</em> it's cheap — list one bullish reason and one bearish reason the market might be right.</li><li>Name a concrete catalyst that would force a re-rating, and a rough timeframe.</li><li>If you can't name a catalyst, label it a potential value trap and move on.</li></ol></div></div>"},{"id":"p4-5","part":"04 · TA vs FA","nav":"Timeframe & Blend","num":"4.5","kicker":"Part 04 · Lesson 5","title":"Timeframe, and How Professionals Blend the Two","html":"<h3>Timeframe decides the winner</h3><p>The endless TA-vs-FA debate dissolves the moment you specify a <strong>holding period</strong>. The two methods do not compete across all horizons — each dominates a different one. Get the horizon right and the choice of tool follows automatically.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>which force dominates, by horizon</span></div><div class='term-body'><span class='cm'>Seconds &rarr; days</span>  flow, sentiment, levels  <span class='ok'>&rarr; TA dominates</span>\n<span class='dim'>Fundamentals don't change minute to minute; positioning does.</span>\n\n<span class='cm'>Weeks &rarr; months</span>  mix of both  <span class='am'>&rarr; blend</span>\n<span class='dim'>Trends + catalysts both matter on this scale.</span>\n\n<span class='cm'>Years</span>  earnings & cash flow  <span class='ok'>&rarr; FA dominates</span>\n<span class='dim'>Over years price tracks value; noise averages out.</span></div></div><p>Benjamin Graham's line captures it: <em>\"In the short run the market is a voting machine; in the long run it is a weighing machine.\"</em> TA reads the voting; FA estimates the weight. A day trader who ignores the tape is handicapped; a decade-long investor who frets over a 5-day moving average is fooling himself with noise.</p><h3>How professionals actually blend them</h3><p>Serious shops almost never pick a side. The dominant pattern is a clean division of labour: <strong>fundamentals choose the security; technicals choose the moment.</strong> FA narrows a universe of thousands to a short list of businesses worth owning; TA decides the entry, the stop, and the size.</p><div class='chart' data-scenario='pullback-uptrend' data-overlays='sma50' data-marks='note:33:101:buy the dip to 50-MA' data-title='ACME · Daily' data-cap='Fundamentally chosen, technically timed: a pullback to the rising 50-day MA.'></div><p>This is the textbook blend in one chart. A fund's analysts decide ACME is undervalued — that's the FA <em>selection</em>. But rather than buy at any price, the trading desk waits for a pullback to the rising 50-day moving average and buys into that dip. The fundamental work answers <em>what</em> and <em>whether</em>; the technical work answers <em>where</em> and <em>how much risk</em>. The stop sits just below the moving average, so a clean invalidation level is defined the instant they enter.</p><div class='box lab'><div class='bt'>Do this.</div> Adopt the two-question protocol on every trade: <strong>(1) FA: is this worth owning / is the direction justified?</strong> If no, stop. <strong>(2) TA: is now a good entry, and where am I wrong?</strong> If no clean level, wait. You only act when both answer yes.</div><h3>Different professionals, different blends</h3><ul><li><strong>Value / long-only funds.</strong> Heavily FA for selection; light TA to avoid catching a falling knife and to scale in. Holding period years — FA leads.</li><li><strong>Systematic trend funds (CTAs).</strong> Almost pure TA — they trade price signals across hundreds of markets and don't model individual fundamentals at all. Holding period weeks to months.</li><li><strong>Global macro.</strong> A genuine fusion: a fundamental thesis (\"this currency is overvalued and the central bank must cut\") expressed only when the chart confirms the move has begun — fundamentals for the idea, technicals for timing and risk.</li><li><strong>Event-driven / catalysts.</strong> FA identifies the catalyst (merger, spin-off, earnings inflection); TA frames the risk around the event.</li></ul><div class='box tip'><div class='bt'>Insight.</div> The best blend reflects the failure modes from Lessons 4.3–4.4. FA's blind spot is timing; TA's blind spot is value and solvency. Bolting them together patches both holes — FA stops you buying a chart of a company about to go bankrupt; TA stops you buying a 'cheap' stock the day before it falls another 30%.</div><h3>An honest word on what works</h3><p>After all five lessons, the evidence-based summary is uncomfortable but liberating:</p><ol><li><strong>Markets are mostly efficient.</strong> Easy, well-known edges are arbitraged away. Assume your edge is small and perishable.</li><li><strong>Some inefficiencies are real.</strong> Trend/momentum (a technical effect) and value (a fundamental effect) have persisted across decades — these are the most defensible edges.</li><li><strong>Risk management beats prediction.</strong> The most reliable contribution of TA is not forecasting but defining where you're wrong. The most reliable contribution of FA is not pinpoint valuation but avoiding ruin.</li><li><strong>Process over method.</strong> Survivors aren't the ones with the 'right' school; they're the ones who size positions, honour stops, and stay solvent long enough for a small edge to compound.</li></ol><div class='box danger'><div class='bt'>Pitfall.</div> Don't blend into mush. \"Use both\" can become an excuse to override a stop because \"the fundamentals are still good,\" or to abandon a thesis because of one red candle. Define in advance which tool governs which decision: FA for <em>what to own</em>, TA for <em>when and how much risk</em> — and don't let them veto each other's job.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: run one trade through the professional blend.</p><ol><li>State your holding period in plain words (days? months? years?). Let it tell you which tool leads.</li><li>FA step: write one sentence on why the security is worth owning or the direction is justified.</li><li>TA step: identify a specific entry trigger (e.g., pullback to the 50-day MA) and the exact stop level below it.</li><li>Size the position from the distance to that stop — and only enter if both the FA and TA answers are yes.</li></ol></div></div>"},{"id":"p5-1","part":"05 · Charting Foundations","nav":"Chart Types","num":"5.1","kicker":"Part 05 · Lesson 1","title":"Chart Types: Line, Bar and Candlestick","html":"<p>A price chart is a map of a crowd's decisions over time. Before we can read trends, levels and patterns, we have to choose <em>how</em> to draw the data. Three chart types dominate: the <strong>line chart</strong>, the <strong>OHLC bar chart</strong>, and the <strong>candlestick chart</strong>. Each takes the same underlying numbers and emphasizes something different. Picking the wrong one hides exactly the information you need.</p>\n<h3>The four numbers behind every period</h3>\n<p>Every bar on a chart summarizes one slice of time — a day, an hour, five minutes. For that slice the market records four prices: the <strong>open</strong> (first trade), the <strong>high</strong> (highest trade), the <strong>low</strong> (lowest trade), and the <strong>close</strong> (last trade). We abbreviate these <code>OHLC</code>. A line chart throws away three of them and keeps only the close. A bar or candle keeps all four.</p>\n<div class='box law'><div class='bt'>Definition.</div> A <strong>line chart</strong> connects only the closing prices. A <strong>bar (OHLC) chart</strong> draws a vertical line from low to high with a left tick for the open and a right tick for the close. A <strong>candlestick</strong> draws a rectangular body between open and close, with thin wicks reaching to the high and low.</div>\n<h3>The same week, three ways</h3>\n<p>Imagine NOVA trades a single volatile week. Here is the raw tape:</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>NOVA — one week of OHLC</span></div><div class='term-body'><span class='cm'>Day      Open    High    Low     Close</span>\nMon      <span class='dim'>100.0</span>   <span class='dim'>101.5</span>   <span class='dim'>98.0</span>    <span class='ok'>101.0</span>\nTue      <span class='dim'>101.0</span>   <span class='dim'>106.0</span>   <span class='dim'>100.5</span>   <span class='ok'>105.5</span>\nWed      <span class='dim'>105.5</span>   <span class='dim'>106.2</span>   <span class='dim'>99.0</span>    <span class='bad'>99.5</span>\nThu      <span class='dim'>99.5</span>    <span class='dim'>100.0</span>   <span class='dim'>94.0</span>    <span class='bad'>95.0</span>\nFri      <span class='dim'>95.0</span>    <span class='dim'>102.0</span>   <span class='dim'>94.5</span>    <span class='ok'>101.5</span>\n<span class='cm'>Line chart sees only:</span> <span class='pr'>101.0 → 105.5 → 99.5 → 95.0 → 101.5</span></div></div>\n<p>The <strong>line</strong> tells a tidy story: up, up, down hard, down, back up. Clean — but it is silent about <em>how</em> each day was fought. Wednesday closed at 99.5, yet it had been as high as 106.2 — buyers were crushed intraday. The line shows none of that drama; it just plots one dot.</p>\n<div class='chart' data-scenario='v-bottom' data-title='NOVA · Daily — candlesticks' data-cap='Candlesticks expose Thursday capitulation and Friday recovery the line hides.'></div>\n<p>Now look at the candlestick view above. The down days have long bodies and long lower wicks — you can <em>see</em> the selling pressure and the spot where buyers finally stepped in near the lows. The final bar reverses with a tall green body off the bottom: a classic recovery the line chart blurred into a single rising dot. The candle chart turns four numbers into a readable battle.</p>\n<h3>When to use each</h3>\n<ul><li><strong>Line</strong> — best for the big picture and for long, noisy histories where intraday detail is clutter. Also ideal for comparing several instruments at once, or for indicators (like a moving average of closes). Use it when you want signal, not texture.</li><li><strong>Bar (OHLC)</strong> — favored by many systematic and Western technicians. Compact, every bar shows the full range, and it does not over-dramatize color. Good for densely packed daily/weekly charts.</li><li><strong>Candlestick</strong> — the default for most discretionary traders. Color and body size make momentum and reversals jump off the screen, and they are the language of every pattern in later lessons.</li></ul>\n<table><tr><td><strong>Chart</strong></td><td><strong>Shows</strong></td><td><strong>Hides</strong></td><td><strong>Best for</strong></td></tr><tr><td>Line</td><td>Close only</td><td>Range, open, intraday fight</td><td>Trend, comparison</td></tr><tr><td>Bar</td><td>O,H,L,C — neutral</td><td>Color-driven emotion</td><td>Systematic reading</td></tr><tr><td>Candle</td><td>O,H,L,C — vivid</td><td>Can over-emphasize one bar</td><td>Patterns, reversals</td></tr></table>\n<div class='box tip'><div class='bt'>Insight.</div> The line chart is not inferior — it is <em>focused</em>. Pros often flip a messy candle chart to a line to find the true level a market keeps closing around, because closing prices carry more conviction than wicks. Switching chart types is a deliberate analytical move, not just a preference.</div>\n<div class='box danger'><div class='bt'>Pitfall.</div> Beginners stare at candlestick wicks and invent stories from random intraday noise. A long wick on low volume in a quiet stock may mean nothing. Always ask whether the chart type is showing you <em>information</em> or just <em>texture</em>.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: feel how chart type changes the story.</p><ol><li>Pick any liquid stock on a free charting site and view six months as a <strong>line</strong> chart. Note the overall trend in one sentence.</li><li>Switch the exact same window to <strong>candlesticks</strong>. Find one day where the candle reveals drama (a long wick or big body) the line hid.</li><li>Switch to <strong>bar (OHLC)</strong>. Decide which of the three you read most easily, and write down why.</li></ol></div></div>"},{"id":"p5-2","part":"05 · Charting Foundations","nav":"Candle Anatomy","num":"5.2","kicker":"Part 05 · Lesson 2","title":"Candlestick Anatomy: Body and Wicks","html":"<p>One candlestick is a complete story of a single session: who showed up, who pushed, and who won by the closing bell. Learn to read one candle and you can read a thousand. This lesson dissects a candle down to its anatomy and decodes what each part means.</p>\n<h3>The parts of a candle</h3>\n<div class='box law'><div class='bt'>Definition.</div> The <strong>body</strong> is the rectangle between the <em>open</em> and the <em>close</em>. A <strong>green</strong> (or hollow) body means close &gt; open — buyers won the session. A <strong>red</strong> (or filled) body means close &lt; open — sellers won. The thin lines are <strong>wicks</strong> (also shadows or tails): the <em>upper wick</em> reaches up to the high, the <em>lower wick</em> reaches down to the low.</div>\n<p>Body size measures conviction: a long body means price traveled far from open to close with little backtracking. Wick length measures rejection: a long wick means price went there and got pushed back out before the close. The body says who finished in control; the wicks say where control was contested and lost.</p>\n<h3>Decoding one candle</h3>\n<p>Take the lesson's headline example. A candle <strong>opens at 100, closes at 104, prints a high of 106, and a low of 99</strong>. Let's measure it.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Anatomy of the 100 → 104 candle</span></div><div class='term-body'><span class='cm'>Open  = 100   Close = 104   High = 106   Low = 99</span>\nDirection      close &gt; open  &rarr;  <span class='ok'>GREEN (buyers won)</span>\nBody           |close &minus; open|   = |104 &minus; 100| = <span class='pr'>4.0</span>\nUpper wick     high &minus; close     = 106 &minus; 104   = <span class='am'>2.0</span>\nLower wick     open &minus; low       = 100 &minus; 99    = <span class='am'>1.0</span>\nTotal range    high &minus; low       = 106 &minus; 99    = <span class='pr'>7.0</span>\nBody fraction  body &divide; range    = 4 &divide; 7        = <span class='ok'>57%</span></div></div>\n<p>Read it as a narrative. The session <strong>opened at 100</strong>. Sellers first dragged price down to <strong>99</strong> — but that dip was bought, leaving only a small 1-point lower tail. Buyers then drove price all the way to <strong>106</strong>, the high. They couldn't hold it: the last 2 points were given back, leaving a 2-point upper wick — a minor <em>rejection</em> near the top. Still, price <strong>closed at 104</strong>, comfortably above the open. Net verdict: <strong>buyers were in control, with a hint of supply overhead at 106.</strong> The body is the majority of the range (57%), so this is a conviction candle, not indecision.</p>\n<div class='chart' data-scenario='uptrend' data-marks='note:18:106:upper wick = rejection;note:14:99:lower tail bought' data-title='NOVA · Daily — candle bodies vs wicks' data-cap='Tall bodies show trend conviction; tails show where price was rejected.'></div>\n<p>On the chart above, notice how the trending advance is built from candles with <em>tall green bodies and short wicks</em> — that is what healthy demand looks like. Where you see a long upper wick, supply briefly overwhelmed buyers at that price; where a long lower tail appears, dip-buyers defended. The body/wick mix is your read on the balance of power bar by bar.</p>\n<h3>Four archetype candles</h3>\n<ul><li><strong>Marubozu</strong> — almost all body, no wicks. Total domination by one side. A green marubozu (open = low, close = high) is maximum bullishness.</li><li><strong>Doji</strong> — open and close nearly equal, so the body is a sliver. Buyers and sellers fought to a draw: <em>indecision</em>. Powerful at the end of a trend as a warning of exhaustion.</li><li><strong>Hammer</strong> — small body up top, long lower tail (2&times;+ the body), little upper wick. Sellers shoved price down, buyers slammed it back. Bullish when it appears after a decline.</li><li><strong>Shooting star</strong> — small body at the bottom, long upper wick. The mirror image: buyers ran price up and got rejected. Bearish after an advance.</li></ul>\n<div class='box tip'><div class='bt'>Insight.</div> A wick is a <em>memory of rejection</em>. The price at the tip of a long wick is where the market said \"no\" — those tips often become future support or resistance, because the level mattered enough to spark a reversal once.</div>\n<div class='box danger'><div class='bt'>Pitfall.</div> Context beats the candle. A perfect hammer in the middle of a sideways chop means little; the same hammer at a tested support level after a sharp drop is a high-value signal. Never trade a single candle in isolation — read it against the trend and the levels around it.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: decode candles into one-sentence stories.</p><ol><li>Open a daily candlestick chart and pick five recent candles at random.</li><li>For each, eyeball the body color, body size, and which wick is longer. Write one sentence: \"Buyers/sellers won, with rejection at the high/low.\"</li><li>Find one doji or hammer on the chart and check what price did in the next two sessions. Did the candle's hint play out?</li></ol></div></div>"},{"id":"p5-3","part":"05 · Charting Foundations","nav":"Timeframes","num":"5.3","kicker":"Part 05 · Lesson 3","title":"Timeframes and Multiple-Timeframe Analysis","html":"<p>The same market looks bullish, bearish, and flat at the same instant — depending on which timeframe you choose. A stock ripping higher on the weekly can be plunging on the 5-minute. Neither chart lies; they answer different questions. <strong>Multiple-timeframe analysis (MTA)</strong> is the discipline of letting a higher timeframe set direction while a lower one times the entry.</p>\n<h3>What a timeframe is</h3>\n<div class='box law'><div class='bt'>Definition.</div> A chart's <strong>timeframe</strong> is the period each candle represents. On a <em>daily</em> chart one candle = one trading day. On a <em>1-hour</em> chart one candle = sixty minutes. Higher timeframes (weekly, daily) show the dominant trend and matter to more participants; lower timeframes (hourly, 5-minute) show the texture and let you fine-tune entries — but they are noisier.</div>\n<p>A useful rule of thumb is the <strong>rule of four to six</strong>: step between timeframes by roughly a factor of 4–6. A swing trader might pair the <em>weekly</em> (context) with the <em>daily</em> (signal) and the <em>4-hour</em> (entry). A day trader might use the <em>daily</em>, the <em>1-hour</em>, and the <em>5-minute</em>. Skipping from monthly to 1-minute gives you no useful relationship — the gap is too wide.</p>\n<h3>The classic setup: daily uptrend, hourly pullback</h3>\n<p>Here is the scenario every dip-buyer learns to love. On the <strong>daily</strong> chart, ACME is in a clean uptrend — a staircase of higher highs and higher lows. Zoom into the <strong>hourly</strong> and you'll catch the stock in the middle of a pullback: three or four red candles, momentum oscillators dipping. The hourly screams \"weak.\" The daily whispers \"this is just a dip in an uptrend — the place to buy.\"</p>\n<div class='chart' data-scenario='uptrend' data-overlays='sma50' data-title='ACME · Daily — the trend that frames everything' data-cap='Higher timeframe: a sustained uptrend riding its 50-day average. Direction = up.'></div>\n<p>The daily above defines the <em>bias</em>: long only. The rising 50-day average underlines the trend, and every prior dip to that average was bought. This is your permission slip — you are now hunting for a <em>buy</em>, and you will ignore bea
