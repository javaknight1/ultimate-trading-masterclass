rish hourly signals because they fight the higher-timeframe tide.</p>\n<div class='chart' data-scenario='pullback-uptrend' data-overlays='ema21' data-pane='rsi' data-title='ACME · 1-Hour — the pullback that times the entry' data-cap='Lower timeframe: a counter-trend dip into support with RSI cooling — the entry window.'></div>\n<p>Now the hourly. Price has pulled back into a support area, the 21-EMA, and RSI has cooled from overbought toward the midline — exactly the reset a trend needs before its next leg. Because the <em>daily</em> already told us the trend is up, this hourly weakness is not a reason to fear; it is the discounted entry. When the hourly prints a reversal candle off support and turns back up, the two timeframes <strong>align</strong>: higher-timeframe trend + lower-timeframe trigger.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Aligning the two charts</span></div><div class='term-body'><span class='cm'>Timeframe   Reads          Job</span>\nDaily       <span class='ok'>Uptrend (HH/HL)</span>   set direction &rarr; <span class='ok'>LONG only</span>\n1-Hour      <span class='am'>Pullback to EMA</span>   find the entry trigger\nVerdict     trend + dip &rarr;   <span class='ok'>buy the dip, not fade it</span>\nConflict?   if daily were DOWN, this dip = <span class='bad'>continuation, skip</span></div></div>\n<h3>The cardinal rule of MTA</h3>\n<div class='box tip'><div class='bt'>Insight.</div> <strong>Trade in the direction of the higher timeframe; time your entry on the lower one.</strong> The higher timeframe is the river's current; the lower timeframe is the eddy near the bank. Swim with the current and use the eddy to push off — never fight the current because the eddy looked inviting.</div>\n<p>The most common beginner failure is <em>timeframe whiplash</em>: getting bullish on the daily, opening the 5-minute, seeing red, and bailing — or worse, flipping short — only to watch the daily uptrend resume without them. Each timeframe must be assigned a <em>job</em> before you look at it: context, signal, or trigger. Decide the jobs first; then the conflicting pictures stop being confusing and start being a workflow.</p>\n<div class='box danger'><div class='bt'>Pitfall.</div> Do not let a lower timeframe <em>override</em> a higher one. If the daily is up and the hourly turns ugly, the worst case is your dip-buy was early — manageable with a stop. But abandoning your higher-timeframe plan every time the 5-minute wiggles guarantees death by a thousand cuts.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: practice top-down alignment.</p><ol><li>Choose a stock and open its <strong>weekly</strong> chart. Label the trend up, down, or sideways. This is your bias.</li><li>Drop to the <strong>daily</strong>. Is price pulling back <em>against</em> the weekly trend or extending <em>with</em> it?</li><li>Drop to the <strong>1-hour</strong>. Find one spot where a lower-timeframe pullback lined up with the higher-timeframe trend, and mark where the two agreed.</li></ol></div></div>"},{"id":"p5-4","part":"05 · Charting Foundations","nav":"Reading Volume","num":"5.4","kicker":"Part 05 · Lesson 4","title":"Reading Volume on a Chart","html":"<p>Price tells you <em>where</em> the market went. Volume tells you <em>how hard it tried</em> to get there. A move on heavy volume has the crowd behind it; a move on thin volume is a few traders pushing an empty room. Volume is the single best built-in lie detector on a price chart — and it is free, sitting in the bottom pane of almost every chart you'll ever open.</p>\n<h3>What volume measures</h3>\n<div class='box law'><div class='bt'>Definition.</div> <strong>Volume</strong> is the number of shares (or contracts) traded during a bar's period. It is plotted as vertical bars beneath price. We judge volume <em>relative to its own average</em> — typically a 20- or 50-period average — not in absolute terms. A bar is \"high volume\" if it dwarfs the recent average; \"low\" if it shrinks below it.</div>\n<p>The core principle: <strong>volume should expand in the direction of the prevailing move and contract on counter-moves.</strong> Rising prices on rising volume = healthy demand. Rising prices on falling volume = a move running out of fuel. Volume <em>confirms</em> or <em>questions</em> what price is claiming.</p>\n<h3>The breakout test: conviction vs. drift</h3>\n<p>Picture two stocks both clearing a resistance level. Stock A breaks out on a wide green candle with volume <strong>three times its average</strong>. Stock B oozes above the same level on a narrow candle with <em>below-average</em> volume. Same price action; opposite meaning.</p>\n<div class='chart' data-scenario='breakout-up' data-marks='resistance:108' data-title='ACME · Daily — breakout on heavy volume' data-cap='The breakout candle prints a volume spike: real demand confirms the move.'></div>\n<p>On ACME above, the breakout candle through resistance is accompanied by a towering volume bar — far above the surrounding bars. That spike says institutions and a wide crowd committed capital to push through the level. Breakouts on expanding volume tend to <em>hold</em>, because the buyers who created them have a stake in defending the level. This is the move you want to trust.</p>\n<div class='chart' data-scenario='breakout-up' data-marks='resistance:108;note:30:110:low-volume drift fades' data-title='NOVA · Daily — quiet drift that fades' data-cap='A breakout on shrinking volume lacks sponsorship and is prone to failing back.'></div>\n<p>Now contrast the quiet drift. When price edges above resistance but the volume bars are <em>shrinking</em>, there is no sponsorship behind the move. A handful of buyers lifted a thin market; the moment they stop, price slides back below the level — a classic <strong>false breakout</strong> (a \"bull trap\"). The lesson: <em>price alone said breakout; volume said don't believe it.</em></p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Volume-confirmation checklist</span></div><div class='term-body'><span class='cm'>Scenario                     Volume       Read</span>\nBreakout up                  <span class='ok'>3&times; average</span>   <span class='ok'>confirmed — trust it</span>\nBreakout up                  <span class='bad'>below avg</span>    <span class='bad'>suspect — likely false</span>\nUptrend, rallies vs dips     <span class='ok'>up on rallies</span> <span class='ok'>healthy demand</span>\nUptrend, dips on big volume  <span class='am'>spikes on drops</span> <span class='am'>distribution warning</span>\nNew high, volume fading       <span class='am'>declining</span>     <span class='am'>momentum waning</span>\nClimactic spike after long run <span class='bad'>huge 1-bar</span>   <span class='am'>possible exhaustion top</span></div></div>\n<h3>Volume in a trend, and the climax</h3>\n<p>Inside a healthy uptrend you want to see <strong>volume swell on up-days and dry up on pullbacks</strong> — buyers are eager, sellers are apathetic. The opposite (heavy selling volume on down-days, weak volume on bounces) is a sign of <em>distribution</em>: larger holders quietly handing shares to latecomers. And after a long run, a single enormous volume bar on a sharp price spike can mark a <strong>climax</strong> — the last frantic buyers piling in just as smart money sells to them, often preceding a top.</p>\n<div class='box tip'><div class='bt'>Insight.</div> The cleanest volume tell is <em>divergence of effort and result</em>. Huge volume but the candle barely moves means a wall of supply is absorbing every buyer — even though price didn't fall, the heavy effort with no progress warns the up-move is stalling.</div>\n<div class='box danger'><div class='bt'>Pitfall.</div> Volume is comparative and context-bound. Don't compare today's volume to a stock with ten times the float, and remember holiday sessions, the first/last minutes of the day, and options-expiration days are distorted. Always benchmark a bar against its <em>own</em> recent average, not a raw number.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: use volume to grade conviction.</p><ol><li>Add a 20-period volume moving average to a daily chart so you can see \"high\" vs \"low\" at a glance.</li><li>Find a recent breakout. Was the breakout bar above or below average volume? Then check whether the breakout held or failed.</li><li>Inside any uptrend, compare volume on the up-days vs. the pullback days. Note whether the trend looked healthy or whether distribution was creeping in.</li></ol></div></div>"},{"id":"p5-5","part":"05 · Charting Foundations","nav":"Defining Trend","num":"5.5","kicker":"Part 05 · Lesson 5","title":"Defining a Trend: Higher Highs, Higher Lows","html":"<p>\"The trend is your friend\" is the most-quoted line in trading and the least-defined. What <em>is</em> a trend, precisely? Not a feeling, not a moving average — a trend is a <strong>sequence of swing points</strong>. Learn to mark swings and you can classify any market objectively as up, down, or sideways, and know the exact bar that ends a trend.</p>\n<h3>Swings: the skeleton of price</h3>\n<div class='box law'><div class='bt'>Definition.</div> A <strong>swing high</strong> is a peak with lower highs on either side; a <strong>swing low</strong> is a trough with higher lows on either side. A market is in an <strong>uptrend</strong> when it makes successive <em>higher highs (HH)</em> and <em>higher lows (HL)</em>. It is in a <strong>downtrend</strong> when it makes <em>lower highs (LH)</em> and <em>lower lows (LL)</em>. When highs and lows are flat or mixed, it is <strong>sideways (a range)</strong>.</div>\n<p>Strip price down to its swing points and a trend becomes a staircase. An uptrend's staircase climbs: each step up (a new high) is followed by a shallow step back that <em>holds above</em> the prior step (a higher low). The instant a step back breaks <em>below</em> the prior low, the staircase has cracked.</p>\n<h3>Four ascending pairs, then the break</h3>\n<div class='chart' data-scenario='uptrend' data-title='ACME · Daily — a textbook uptrend' data-cap='Each pullback bottoms above the last: a clean ladder of higher highs and higher lows.'></div>\n<p>Read the chart above as a ladder. Price pushes to a high, pulls back to a low, then pushes to a <em>higher</em> high and pulls back to a <em>higher</em> low — and repeats. Mark each swing and you'd label them H&#8321;, L&#8321;, H&#8322;, L&#8322;, H&#8323;, L&#8323;, H&#8324;, L&#8324; — four ascending pairs. As long as that pattern holds, the verdict is unambiguous: <strong>uptrend, stay long-biased.</strong> Every higher low is a place where buyers stepped in earlier than they had to — a vote of confidence.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Reading the swing sequence</span></div><div class='term-body'><span class='cm'>Swing   Price   vs prior   Trend status</span>\nH&#8321;      <span class='dim'>110</span>     &mdash;          forming\nL&#8321;      <span class='dim'>104</span>     &mdash;          forming\nH&#8322;      <span class='ok'>116</span>     <span class='ok'>higher high</span>   <span class='ok'>UP confirmed</span>\nL&#8322;      <span class='ok'>108</span>     <span class='ok'>higher low</span>    <span class='ok'>UP intact</span>\nH&#8323;      <span class='ok'>122</span>     <span class='ok'>higher high</span>   <span class='ok'>UP intact</span>\nL&#8323;      <span class='ok'>114</span>     <span class='ok'>higher low</span>    <span class='ok'>UP intact</span>\nH&#8324;      <span class='ok'>126</span>     <span class='ok'>higher high</span>   <span class='ok'>UP intact</span>\nL&#8324;      <span class='bad'>110</span>     <span class='bad'>LOWER low</span>     <span class='bad'>UPTREND BROKEN</span></div></div>\n<p>The table tells the whole story. Pairs one through three confirm and extend the uptrend. But the final swing low at 110 prints <em>below</em> the prior low of 114 — the first <strong>lower low</strong>. That single event is the structural break: the ladder no longer rises. The trend is now in question, and it shifts to a downtrend only once a <em>lower high</em> follows. Note the precision — we don't say \"it feels weak\"; we point to the exact swing that violated the pattern.</p>\n<div class='chart' data-scenario='downtrend' data-title='NOVA · Daily — the trend that flipped' data-cap='After the broken low, lower highs and lower lows stack up: a confirmed downtrend.'></div>\n<p>Once the first lower low arrives and the next bounce fails to exceed the prior high, the sequence inverts: lower highs and lower lows, as the downtrend chart above shows. Now the bias flips — sell rallies rather than buy dips. The discipline is identical, just mirrored: track the swings, and let the <em>sequence</em>, not your hopes, define the regime.</p>\n<h3>Trend vs. range</h3>\n<p>When swing highs cluster around the same ceiling and swing lows around the same floor, there is no trend at all — the market is <strong>ranging</strong>. Forcing a trend label onto a range is a costly error: trend tactics (buy strength, ride it) bleed money inside a range, where the right tactic is to fade the edges. Always classify regime <em>first</em>; strategy follows from it.</p>\n<div class='box tip'><div class='bt'>Insight.</div> The higher low is the heartbeat of an uptrend. As long as pullbacks keep bottoming above the previous pullback, demand is winning. Watch the higher lows even more closely than the highs — they break <em>first</em> when a trend is dying.</div>\n<div class='box danger'><div class='bt'>Pitfall.</div> Trends are timeframe-specific. A daily uptrend contains dozens of hourly down-swings. Define which swings you mean (a 2% wiggle or a 10% leg?) before declaring a trend broken — or you'll \"break\" an uptrend on every minor pullback and never hold a winner.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: classify trend from swings alone.</p><ol><li>On a daily chart, mark the last six obvious swing highs and swing lows with dots.</li><li>Write the sequence as HH/HL or LH/LL and state the regime in one word: up, down, or sideways.</li><li>Find the most recent swing low. If price later closes below it, note that as the moment the uptrend was first put in question.</li></ol></div></div>"},{"id":"p5-6","part":"05 · Charting Foundations","nav":"Support & Resistance","num":"5.6","kicker":"Part 05 · Lesson 6","title":"Horizontal Support and Resistance","html":"<p>Markets have memory. Price levels where buyers or sellers showed up forcefully once tend to matter again — traders remember them, place orders around them, and so make them self-fulfilling. <strong>Horizontal support and resistance</strong> are the most fundamental levels on any chart, and the single most useful skill in technical analysis is drawing them well and watching them <em>flip roles</em>.</p>\n<h3>The two horizontal levels</h3>\n<div class='box law'><div class='bt'>Definition.</div> <strong>Support</strong> is a price floor where buying repeatedly overwhelms selling and price stops falling. <strong>Resistance</strong> is a price ceiling where selling repeatedly overwhelms buying and price stops rising. Both are best seen as <em>zones</em>, not razor-thin lines — draw them through the cluster of touches, ideally anchored to candle bodies (closes) rather than every wick tip.</p></div>\n<p>Why do these levels work? Memory and order flow. A buyer who missed a bounce at a level wants a second chance there. A trader trapped long at a high wants to \"get out at breakeven\" if price returns. These pending decisions cluster around remembered prices, and that clustering creates the floor or ceiling.</p>\n<h3>The $50 level: rejected three times, then flipped</h3>\n<div class='chart' data-scenario='ascending-triangle' data-marks='resistance:50' data-title='ACME · Daily — resistance at $50' data-cap='Three rejections at $50 carve out a ceiling buyers cannot yet clear.'></div>\n<p>Watch ACME approach the round number <strong>$50</strong>. The first time, sellers slam it down. It rallies back; rejected again at $50. A third attempt — rejected a third time. Three touches with no close above make $50 a <em>confirmed</em> resistance: each failed attempt tells you a wall of supply is parked there. (Notice the rising lows underneath in the chart — buyers are getting more aggressive even as the ceiling holds, which often precedes a breakout.)</p>\n<div class='box tip'><div class='bt'>Insight.</div> The <em>more times</em> a level is tested, the more traders are watching it — so its eventual break is more significant. But each test also <em>consumes</em> some of the orders defending it. A level touched three times is well-defined; a level touched eight times may be about to give way because the defenders are exhausted.</div>\n<h3>The role reversal (polarity)</h3>\n<p>Here is the concept that separates novices from chartists. When price finally <strong>breaks through resistance and closes above it, that old resistance becomes new support.</strong> The ceiling becomes the floor. Symmetrically, broken support becomes resistance. Technicians call this <em>polarity</em> or the flip.</p>\n<div class='chart' data-scenario='breakout-up' data-marks='hline:50:old resistance = new support' data-title='ACME · Daily — $50 breaks and retests' data-cap='After the break, price pulls back to $50, holds, and uses the old ceiling as a floor.'></div>\n<p>The chart above shows the textbook sequence. Price breaks above $50, then <em>pulls back</em> to retest it. If $50 now holds as support — buyers defend the old ceiling — the breakout is validated and the retest is one of the highest-quality long entries that exists: a tested level, a clear invalidation just below, and trend in your favor. If instead price falls back <em>through</em> $50, the breakout failed and the level reasserts as resistance.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Life cycle of the $50 level</span></div><div class='term-body'><span class='cm'>Event                          Role of $50      Read</span>\nTouch 1, rejected              <span class='am'>resistance</span>       supply present\nTouch 2, rejected              <span class='am'>resistance</span>       supply confirmed\nTouch 3, rejected              <span class='bad'>strong resistance</span> wall holding\nClose ABOVE 50 on volume       <span class='ok'>breakout</span>         supply absorbed\nPullback to 50, holds          <span class='ok'>NEW support</span>       <span class='ok'>polarity flip — buy</span>\nFalls back below 50            <span class='bad'>resistance again</span>  <span class='bad'>false breakout</span></div></div>\n<h3>What makes a level strong</h3>\n<ul><li><strong>More touches</strong> — repeated reactions confirm participants care about the price.</li><li><strong>Higher volume at the level</strong> — a heavy-volume reversal marks a price many traders transacted at.</li><li><strong>Round numbers</strong> — $50, $100, all-time highs and psychological figures attract orders.</li><li><strong>Confluence</strong> — a horizontal level that lines up with a moving average or Fibonacci level is stronger than one standing alone.</li></ul>\n<div class='box danger'><div class='bt'>Pitfall.</div> Levels are zones, not lines, and stop-hunts are real. Price often <em>pokes</em> a hair beyond support to trigger stops before reversing. Wait for a <em>candle close</em> beyond a level before calling it broken, and give the zone a little width — a level violated by a single wick has not truly broken.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: draw and validate horizontal levels.</p><ol><li>On a daily chart, find a price that has been touched and reversed at least twice. Draw a horizontal line through the cluster of closes.</li><li>Label it support or resistance based on whether price sat above or below it.</li><li>Find one level that price later broke. Did the old level flip roles on the retest? Mark where it became new support or new resistance.</li></ol></div></div>"},{"id":"p5-7","part":"05 · Charting Foundations","nav":"Trendlines","num":"5.7","kicker":"Part 05 · Lesson 7","title":"Trendlines and Their Slope","html":"<p>Support and resistance run horizontally; <strong>trendlines</strong> run on a slant. A trendline is a diagonal level that tracks a trend's rising floor or falling ceiling. Drawn correctly, it shows you where pullbacks should bottom, flags when momentum is overheating, and — when broken — gives an early warning that the trend may be changing.</p>\n<h3>How to draw a valid trendline</h3>\n<div class='box law'><div class='bt'>Definition.</div> An <strong>up-trendline</strong> connects two or more <em>rising swing lows</em> and is drawn beneath price — it is diagonal support. A <strong>down-trendline</strong> connects two or more <em>falling swing highs</em> and is drawn above price — it is diagonal resistance. Two points <em>define</em> a line; the <strong>third touch confirms</strong> it. The more touches without a break, the more valid the line.</p></div>\n<p>Drawing discipline matters. In an uptrend, anchor the line to swing <em>lows</em> (the floor); in a downtrend, anchor to swing <em>highs</em> (the ceiling). Connect the obvious pivots and try to touch bodies, tolerating minor wick overshoots. If you have to bend the line through the middle of candles or ignore obvious violations to make it \"fit,\" the line is invalid — you are drawing the chart you wish you saw.</p>\n<h3>Three rising lows: a confirmed up-trendline</h3>\n<div class='chart' data-scenario='uptrend' data-overlays='trend' data-title='ACME · Daily — up-trendline under three rising lows' data-cap='A line beneath three ascending lows acts as dynamic support for the advance.'></div>\n<p>On ACME above, the trendline is drawn beneath the rising swing lows. The <em>first two</em> lows define the line; the <em>third</em> touch — where price dips to the line and bounces again — confirms it. Now the line is a working tool: each subsequent return to it is a potential dynamic-support entry, with a clean invalidation just below the line. The advance is \"riding the trendline,\" and as long as pullbacks keep finding it, demand is intact.</p>\n<h3>Slope: how steep is too steep</h3>\n<p>A trendline's <strong>slope</strong> is its rate of climb — and slope is a health gauge. A gentle, sustainable slope (think 30–45 degrees on a well-scaled chart) can persist for months. A near-vertical line is a <em>warning</em>: parabolic advances are unsustainable and tend to collapse violently. When a market accelerates and you must redraw your trendline steeper and steeper, the trend is overheating, not strengthening.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Reading slope</span></div><div class='term-body'><span class='cm'>Slope                    Meaning</span>\nGentle (30&ndash;45&deg;)         <span class='ok'>sustainable, healthy trend</span>\nModerate, steady          <span class='ok'>strong but normal</span>\nSteepening repeatedly     <span class='am'>momentum accelerating — fragile</span>\nNear-vertical (parabolic)  <span class='bad'>blow-off risk, expect sharp break</span>\nFlattening                 <span class='am'>trend losing energy</span>\nLine slope &asymp; (P&#8322; &minus; P&#8321;) &divide; (bars between)</div></div>\n<p>The slope is literally rise over run: how many points the line gains per bar. You don't need to compute it precisely — but noticing that you've had to <em>re-anchor a steeper line</em> three times is the tell that the trend has gone parabolic and the eventual reversion will be fast.</p>\n<h3>The trendline break as a warning</h3>\n<div class='chart' data-scenario='channel-up' data-overlays='trend' data-title='NOVA · Daily — the line gives way' data-cap='A decisive close below the up-trendline flags a possible change of character.'></div>\n<p>When price closes <em>decisively below</em> an up-trendline (or above a down-trendline), the trend's rhythm has changed. Crucially, a trendline break is a <strong>warning, not a reversal signal by itself.</strong> It often means the trend is shifting from steep to gentle, or pausing into a range — not flipping outright. Confirm with the swing structure from Lesson 5.5: a true trend change needs a broken trendline <em>plus</em> a lower low (in a former uptrend). The line break is the smoke; the broken swing low is the fire.</p>\n<div class='box tip'><div class='bt'>Insight.</div> Trendlines and horizontal levels are cousins — both are levels price respects, just at different angles. A broken trendline can flip polarity too: a former up-trendline (support) sometimes becomes resistance on the bounce that follows the break.</div>\n<div class='box danger'><div class='bt'>Pitfall.</div> Trendlines are the most <em>subjective</em> tool on the chart — give three traders the same data and you'll get three lines. Resist the urge to redraw your line every time it's threatened just to keep it \"unbroken.\" Pick your anchor points once, draw the line, and respect what it tells you, including bad news.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: draw and judge a trendline.</p><ol><li>Find an uptrend and connect two rising swing lows with a straight line extended to the right.</li><li>Wait for or find a third touch — did price respect the line? If yes, it's confirmed.</li><li>Judge the slope: gentle, steady, or steepening? Then find a chart where a trendline broke, and check whether the swing structure confirmed an actual trend change or just a slowdown.</li></ol></div></div>"},{"id":"p5-8","part":"05 · Charting Foundations","nav":"Channels","num":"5.8","kicker":"Part 05 · Lesson 8","title":"Channels and Trading the Range","html":"<p>A single trendline marks one edge of a trend. A <strong>channel</strong> adds a parallel line on the opposite edge, boxing the trend between two rails. Channels turn a trend into a tradeable rhythm: buy near the lower rail, trim near the upper rail, and let the structure tell you when the trend itself is accelerating, stalling, or breaking.</p>\n<h3>Building a channel</h3>\n<div class='box law'><div class='bt'>Definition.</div> A <strong>channel</strong> is a pair of parallel trendlines containing price. In a <em>rising channel</em>, the lower rail (support) connects rising lows and the upper rail (resistance) is a parallel line touching the rising highs. In a <em>falling channel</em>, the upper rail connects falling highs and the parallel lower rail touches the falling lows. A <em>horizontal channel</em> is simply a range between flat support and resistance.</p></div>\n<p>The practical method: first draw the valid trendline (from Lesson 5.7) along the trend's main edge, then draw a <em>parallel</em> copy of it touching the extreme on the other side. Two clean touches on each rail give you a usable channel. The width of the channel — top rail to bottom rail — is the swing you're trying to harvest.</p>\n<h3>The rising channel: buy the rail, trim the rail</h3>\n<div class='chart' data-scenario='channel-up' data-title='ACME · Daily — a rising channel' data-cap='Price oscillates between a rising support rail and a parallel resistance rail.'></div>\n<p>On ACME above, price bounces up the channel like a ball between two walls. The strategy writes itself: when price falls to the <strong>lower rail</strong> and shows a reversal candle, that is a buy with the trend, a tight stop just below the rail, and a target at the upper rail. When price reaches the <strong>upper rail</strong>, momentum typically stalls — a place to <em>trim</em> the position or take profit, not to chase. You are buying support and selling resistance, but both are tilted upward in your favor.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Trading a rising channel — worked plan</span></div><div class='term-body'><span class='cm'>Rail prices (illustrative):  lower = 100   upper = 112</span>\nEntry      reversal candle at lower rail  &rarr; buy <span class='ok'>~100</span>\nStop       just below the rail            &rarr; <span class='bad'>~97</span>\nTarget     opposite (upper) rail          &rarr; trim <span class='ok'>~112</span>\nReward     112 &minus; 100                     = <span class='ok'>12 pts</span>\nRisk       100 &minus; 97                       = <span class='bad'>3 pts</span>\nR-multiple reward &divide; risk = 12 &divide; 3     = <span class='ok'>4.0 : 1</span></div></div>\n<p>That worked plan shows why channel trading is attractive: buying at the lower rail puts your stop close (risk small) and your target far (reward large), so the reward-to-risk runs favorably — here 4 to 1. Contrast buying in the <em>middle</em> of the channel, where you'd have less room to the top and a wider stop. <strong>Location within the channel is the whole edge.</strong></p>\n<h3>Falling channels and breakouts</h3>\n<div class='chart' data-scenario='channel-down' data-title='NOVA · Daily — a falling channel' data-cap='In a downtrend the mirror plan: sell rallies to the upper rail, cover near the lower.'></div>\n<p>A falling channel is the mirror image — the bias is down, so you favor <em>selling</em> rallies into the upper rail and covering near the lower rail, never buying dips against the trend. Eventually every channel ends. Watch the rails for the tell: when price <strong>breaks out of the channel</strong> — closing beyond a rail with conviction — the established rhythm is over. A break <em>above</em> a falling channel can signal a trend reversal up; a break <em>below</em> a rising channel warns the uptrend is failing.</p>\n<div class='box tip'><div class='bt'>Insight.</div> How price <em>reaches</em> a rail matters. If price climbs to the upper rail of a rising channel but keeps failing to touch it — making lower highs <em>inside</em> the channel — demand is weakening and a downside break of the lower rail becomes likely. The internal structure leads the rails.</div>\n<div class='box danger'><div class='bt'>Pitfall.</div> Channel-trading works beautifully <em>until it doesn't</em> — the day the trend breaks, the rail you were buying gives way and the \"cheap\" entry becomes a losing trade. Always trade channel bounces <em>with</em> a stop just beyond the rail, and never widen a channel to keep a losing position \"inside\" it. The break is information; honor it.</div>\n<div class='box lab'><div class='bt'>Do this.</div> Before trading any channel, mark three things: the two rails, the channel width (your potential reward), and the exact price that invalidates the channel (a close beyond the far rail). If reward-to-risk from your entry isn't at least 2:1, skip the trade.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: build and plan a channel trade.</p><ol><li>Find a trending chart, draw the main trendline, then add a parallel rail touching the opposite extreme.</li><li>Mark a recent touch of the favorable rail (lower rail in an uptrend). Estimate entry, a stop just beyond the rail, and a target at the opposite rail, then compute the reward-to-risk.</li><li>Find a chart where price broke out of its channel. Note whether the breakout led to a trend acceleration or a reversal, and how the rails warned you first.</li></ol></div></div>"},{"id":"p6-1","part":"06 · Patterns","nav":"Doji & Spinning","num":"6.1","kicker":"Part 06 · Lesson 1","title":"Single-Candle Indecision: Doji and Spinning Tops","html":"<h3>The candles that say nothing — and why that matters</h3><p>A <strong>doji</strong> is a candle whose open and close are essentially equal, so the body is a thin horizontal line. A <strong>spinning top</strong> is its softer cousin: a small body centered between two longer wicks. Both are <em>indecision</em> candles. They tell you that buyers and sellers fought for the whole session and ended in a draw. That is genuinely useful information — but only in context. By itself, a doji is one of the weakest standalone signals in all of technical analysis.</p><p>Let me be blunt about base rates up front, because most courses hide this. A doji appearing somewhere in the middle of a sideways chart predicts almost nothing; you would do no better than a coin flip trading it. The same doji at the <em>exhaustion point of an extended trend</em>, confirmed by the next candle, is a meaningfully different animal. Location is everything.</p><div class='chart' data-scenario='uptrend' data-overlays='sma20' data-marks='note:38:128:doji caps the run' data-title='ACME · Daily' data-cap='A doji forming after an extended advance into stretched territory.'></div><p>In the chart above, price has rallied hard and run well above its 20-day average. The doji near the top is not a sell signal on its own — it is a <em>question</em>. It asks: now that buyers have stopped making progress, will sellers show up? You do not answer that question. The next candle does.</p><h4>Anatomy and the named variants</h4><ul><li><strong>Standard doji</strong> — open ≈ close, modest wicks on both sides. Balanced indecision.</li><li><strong>Long-legged doji</strong> — very long upper and lower wicks. Violent two-sided battle, maximum uncertainty.</li><li><strong>Dragonfly doji</strong> — long lower wick, little or no upper wick, open/close near the high. Sellers pushed down, buyers reclaimed all of it. Mildly bullish <em>at support</em>.</li><li><strong>Gravestone doji</strong> — long upper wick, open/close near the low. Buyers pushed up and were rejected. Mildly bearish <em>at resistance</em>.</li><li><strong>Four-price doji</strong> — open, high, low, close nearly identical. Usually illiquidity, not a signal.</li></ul><div class='box law'><div class='bt'>Definition.</div> A doji forms when |close &minus; open| is a tiny fraction of the day's range, conventionally |close &minus; open| &le; 0.1 &times; (high &minus; low). The smaller that ratio and the longer the wicks, the more genuine the indecision.</div><h4>How to actually use them</h4><p>Treat indecision candles as a <em>trigger to pay attention</em>, not a trade. The workflow is mechanical:</p><ol><li>Require <strong>location</strong>: the doji must sit at a meaningful level — a prior high/low, a moving average, a trendline, the edge of a range. A doji in no-man's-land is noise.</li><li>Require a <strong>prior trend</strong> to reverse. Indecision is only informative when there was a decision in progress that is now stalling.</li><li>Require <strong>confirmation</strong>: wait for the next candle to close in the reversal direction and ideally take out the doji's extreme.</li><li>Place the <strong>stop</strong> beyond the far wick of the doji, where your thesis is wrong.</li></ol><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Reading a top doji — worked example</span></div><div class='term-body'><span class='dim'>Setup: ACME rallies 80 &rarr; 132 over six weeks.</span>\n<span class='dim'>Doji day:</span> open <span class='am'>129.8</span>  close <span class='am'>130.1</span>  high <span class='am'>133.0</span>  low <span class='am'>128.5</span>\n<span class='dim'>Body / range =</span> |130.1 &minus; 129.8| &divide; (133.0 &minus; 128.5) = 0.3 &divide; 4.5 = <span class='cm'>0.067</span>  &rarr; <span class='ok'>true doji</span>\n<span class='dim'>Confirmation candle closes</span> <span class='bad'>below 128.5</span> (the doji low)  &rarr; signal valid\n<span class='dim'>Entry</span> <span class='pr'>short 128.3</span>   <span class='dim'>Stop</span> <span class='pr'>133.2</span> (above doji high)   <span class='dim'>Risk</span> = <span class='cm'>4.9 pts</span></div></div><div class='box danger'><div class='bt'>Failure mode.</div> The single most common loss is trading the doji <em>before</em> confirmation. Indecision resolves <strong>in the direction of the trend</strong> more often than against it, so a naked doji-fade in a strong uptrend is a low-probability bet. Roughly speaking, an unconfirmed reversal doji works closer to one time in three; a confirmed one at a real level closer to one in two. Neither number justifies skipping the stop.</div><div class='box tip'><div class='bt'>Insight.</div> A doji is a noun describing the market's state of mind, not a verb telling you to act. The verb is supplied by the candle that follows.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Build the discipline to ignore most dojis and respect the few that matter.</p><ol><li>Open any daily chart and mark every doji and spinning top you can find over the last year.</li><li>Tag each one by location: in-trend, at a level (high/low/MA/range edge), or mid-range noise.</li><li>For the at-a-level group, check whether the <em>next</em> candle confirmed a turn. Record the hit rate.</li><li>Compare that hit rate to the mid-range group. Convince yourself with your own data that location and confirmation are doing all the work.</li></ol></div></div>"},{"id":"p6-2","part":"06 · Patterns","nav":"Hammer & Star","num":"6.2","kicker":"Part 06 · Lesson 2","title":"Hammer, Shooting Star and Reversal Candles","html":"<h3>One candle that rejects a price</h3><p>Where the doji shows a stalemate, the <strong>hammer</strong> and <strong>shooting star</strong> show a <em>rout</em> — one side pushed price hard in one direction and got slammed back before the close. The long wick is a footprint of rejection. These are the most useful single-candle signals you will trade, but the same caveat from the doji lesson applies even harder: a hammer is only a hammer if it forms in the right place.</p><h4>The shapes</h4><ul><li><strong>Hammer</strong> — small body near the top of the range, long lower wick at least twice the body, little or no upper wick. Sellers drove price down; buyers reclaimed it all. Bullish <em>after a decline, at support</em>.</li><li><strong>Inverted hammer</strong> — small body near the bottom, long upper wick. Buyers probed up and faded, but the bounce hints at demand. Bullish <em>after a decline</em>, weaker than the hammer, needs confirmation.</li><li><strong>Shooting star</strong> — small body near the bottom of the range, long upper wick at least twice the body. Buyers pushed up and were rejected. Bearish <em>after an advance, at resistance</em>.</li><li><strong>Hanging man</strong> — same shape as a hammer but appearing <em>after an advance</em>. The long lower wick warns that sellers are now testing. Bearish, needs confirmation.</li></ul><p>Notice that shape and location together name the candle. A hammer shape after a rally is a hanging man; a shooting-star shape after a decline is an inverted hammer. The pixels are identical — the context flips the meaning.</p><div class='chart' data-scenario='v-bottom' data-overlays='sma50' data-marks='support:88; note:30:88:hammer at support' data-title='NOVA · Daily' data-cap='A hammer prints a long lower wick exactly at a tested support shelf.'></div><p>Above, NOVA sells off into a support shelf near 88 and prints a hammer: the session traded well below 88 intraday, then buyers reclaimed the whole drop to close back at the top of the range. That is a textbook rejection of lower prices <em>at a level that matters</em>. The follow-through candle closing higher is what converts the footprint into a trade.</p><div class='box law'><div class='bt'>Formula.</div> Hammer test: lower wick &ge; 2 &times; |close &minus; open| <strong>and</strong> upper wick &le; 0.25 &times; (high &minus; low) <strong>and</strong> body in the top third of the range. The mirror conditions define a shooting star.</div><h4>Location and confirmation, made concrete</h4><p>Compare two hammers of identical shape.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Same shape, opposite outcomes</span></div><div class='term-body'><span class='dim'>Hammer A — at support after a clean downtrend</span>\nrange 86.0&ndash;91.2  body 90.6&ndash;91.0  lower wick = 90.6 &minus; 86.0 = <span class='cm'>4.6</span>  body = <span class='cm'>0.4</span>  ratio <span class='ok'>11.5&times;</span>\nsits on prior support <span class='am'>88</span>; next day closes <span class='ok'>92.0</span>  &rarr; <span class='ok'>confirmed long</span>\nEntry <span class='pr'>92.1</span>  Stop <span class='pr'>85.7</span> (below wick)  first target prior swing <span class='pr'>98</span>\n\n<span class='dim'>Hammer B — identical shape, mid-range, no level nearby</span>\nno trend to reverse, no support under it; next day closes <span class='bad'>flat</span>\n&rarr; <span class='bad'>no edge</span> — skip it</div></div><p>Hammer A has a reason to work: price reached a level where buyers had defended before, rejected the breakdown, and confirmed. Hammer B is the same candle drawn in a place where rejection means nothing. Most losing hammer trades are Hammer B trades.</p><div class='box danger'><div class='bt'>Failure mode.</div> The notorious failure is the <strong>hammer in a strong downtrend with no support beneath it</strong> — a falling knife. The long lower wick looks like a bottom, but the trend simply continues and your stop under the wick gets hit on the next leg down. Standalone hammers hit somewhere around 50&ndash;60% when confirmed at support, and far worse when faded into momentum. Always ask: <em>is there a level here, and did the next candle agree?</em></p></div><div class='box tip'><div class='bt'>Insight.</div> The wick is the story; the close is the punctuation. A hammer that closes at the very top of its range (a strong close) is worth more than one that closes mid-body, because the close shows who held the field at the end.</div><div class='box lab'><div class='bt'>Do this.</div> Never enter on the hammer candle itself. Enter on a stop-order one tick above the hammer's high (for longs) so the market must <em>prove</em> follow-through before filling you. This single rule discards a large share of false hammers for free.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Separate location-backed reversals from cosmetic ones.</p><ol><li>Find ten hammers and ten shooting stars on daily charts.</li><li>For each, mark whether a support/resistance level, moving average, or trendline coincides with the wick's extreme.</li><li>Apply the confirmation rule: would a stop-entry beyond the candle have filled, and did it follow through five days later?</li><li>Tally the with-level vs. no-level groups separately and see the reliability gap for yourself.</li></ol></div></div>"},{"id":"p6-3","part":"06 · Patterns","nav":"Engulfing & Stars","num":"6.3","kicker":"Part 06 · Lesson 3","title":"Engulfing Patterns and Morning/Evening Stars","html":"<h3>When two or three candles tell a cleaner story</h3><p>Single candles are noisy. Multi-candle patterns are more reliable because they require a <em>sequence</em> of behavior — a shift in control that plays out over two or three sessions rather than one. The two workhorses are the <strong>engulfing</strong> pattern (two candles) and the <strong>morning/evening star</strong> (three candles). Both are reversal patterns, and both still want location and confirmation, but they start from a stronger base.</p><h4>Engulfing patterns</h4><p>A <strong>bullish engulfing</strong> is a down candle followed by an up candle whose <em>body completely engulfs</em> the prior body — it opens at or below the previous close and closes at or above the previous open. The market gapped against the bulls and they took the entire prior session back plus more. A <strong>bearish engulfing</strong> is the mirror: an up candle swallowed whole by a larger down candle.</p><div class='chart' data-scenario='double-bottom' data-overlays='sma20' data-marks='support:90; note:34:91:bullish engulfing' data-title='ACME · Daily' data-cap='A bullish engulfing forms the second low of a base, reversing control to buyers.'></div><p>In the chart, ACME retests its base and prints a wide up-candle that engulfs the prior down-candle near 91. The size matters: the bigger the engulfing body relative to recent candles, and the higher its volume, the more decisively control has changed hands. A bullish engulfing on heavy volume at support is one of the better two-candle reversal signals available.</p><div class='box law'><div class='bt'>Definition.</div> Bullish engulfing: candle&#8322; close &gt; candle&#8321; open <strong>and</strong> candle&#8322; open &lt; candle&#8321; close, with candle&#8321; red and candle&#8322; green. Compare <em>bodies</em>, not wicks. The cleaner the full-body engulf and the larger the size, the stronger the signal.</div><h4>Morning and evening stars</h4><p>The <strong>evening star</strong> tops a rally in three acts: (1) a strong up candle continuing the trend; (2) a small-bodied candle or doji that gaps up but stalls — the <em>star</em> of indecision; (3) a strong down candle that closes well into the body of candle one. The <strong>morning star</strong> is the bullish mirror at a bottom: big red, small star, big green.</p><div class='chart' data-scenario='downtrend' data-overlays='sma20' data-marks='resistance:120; note:30:119:evening star tops the rally' data-title='NOVA · Daily' data-cap='An evening star: trend candle, indecision star, then a decisive reversal candle.'></div><p>The three-candle structure is informative precisely because it shows the hand-off: momentum, then hesitation, then reversal. That middle indecision candle is the tell. An evening star whose third candle closes below the midpoint of the first is more reliable than a shallow one.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Evening star — confirmation and risk</span></div><div class='term-body'><span class='dim'>Candle 1 (up):</span> 110.0 &rarr; <span class='am'>117.0</span>  midpoint = <span class='cm'>113.5</span>\n<span class='dim'>Candle 2 (star):</span> small body around 118&ndash;119, gaps up, stalls\n<span class='dim'>Candle 3 (down):</span> opens 118.0, closes <span class='bad'>112.5</span>  &rarr; below 113.5 midpoint  <span class='ok'>valid star</span>\n<span class='dim'>Penetration</span> = (117.0 &minus; 112.5) &divide; (117.0 &minus; 110.0) = 4.5 &divide; 7.0 = <span class='cm'>64%</span> &rarr; <span class='ok'>deep, strong</span>\n<span class='dim'>Entry</span> <span class='pr'>short 112.3</span>  <span class='dim'>Stop</span> <span class='pr'>119.2</span> (above star high)  <span class='dim'>Risk</span> <span class='cm'>6.9 pts</span></div></div><div class='box danger'><div class='bt'>Failure mode.</div> Engulfing patterns fail most often when they form <em>mid-trend with no level</em> or when the engulfing candle's strength is just a low-volume gap. Stars fail when the third candle barely penetrates candle one (shallow penetration = weak conviction). Honest base rates: a confirmed engulfing or star at a tested level reverses price meaningfully perhaps 55&ndash;65% of the time on the next swing; the same pattern in open space is close to random. Volume and penetration depth are your filters.</div><div class='box tip'><div class='bt'>Insight.</div> Engulfing and star patterns already <em>contain</em> a degree of confirmation — the reversal candle has closed against the trend before you act. That is why they outperform lone hammers and dojis. You are not predicting the turn; you are reading one that has begun.</div><div class='box lab'><div class='bt'>Do this.</div> Grade every engulfing/star on three axes before sizing: (1) is it at a level? (2) is the reversal body large and on rising volume? (3) for stars, did the third candle penetrate past the midpoint of the first? Three yeses gets full size; fewer gets a probe or a pass.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Calibrate your eye to penetration depth and engulf size.</p><ol><li>Collect five bullish engulfings and five evening/morning stars at swing highs or lows.</li><li>For each engulfing, measure the engulfing body as a multiple of the prior body and note the volume.</li><li>For each star, compute the third-candle penetration percentage into candle one.</li><li>Rank all ten by your grades, then check which actually delivered the next swing. The strongest grades should cluster at the top.</li></ol></div></div>"},{"id":"p6-4","part":"06 · Patterns","nav":"Head & Shoulders","num":"6.4","kicker":"Part 06 · Lesson 4","title":"Head and Shoulders Tops and Bottoms","html":"<h3>The most famous reversal — and one of the better ones</h3><p>The <strong>head and shoulders</strong> is the chart pattern everyone has heard of, and unlike many famous patterns it actually earns its reputation when traded with discipline. It is a <em>topping</em> structure: three peaks, the middle one (the head) higher than the two flanking peaks (the shoulders), all sharing a common support line called the <strong>neckline</strong>. The <strong>inverse head and shoulders</strong> is the bottoming mirror — three troughs with a lower middle trough — and projects upward.</p><h4>The structure and why it works</h4><p>Read the story in the volume and the swings. Price makes a high (left shoulder) and pulls back. It rallies to a higher high (head) — but often on <em>lower</em> volume, a warning. It pulls back to the same support. It rallies again but only to a <em>lower</em> high (right shoulder), failing to confirm the uptrend's pattern of higher highs. The trend is now making a lower high; when price breaks the neckline that connected the two pullback lows, the uptrend is structurally broken.</p><div class='chart' data-scenario='head-shoulders' data-overlays='sma50' data-marks='hline:60:neckline' data-title='ACME · Daily' data-cap='Left shoulder, higher head, lower right shoulder, all resting on a neckline near 60.'></div><p>Above, the neckline sits near 60. The pattern is not actionable while price floats above it — many would-be H&S tops never break and simply resume higher. The signal is the <em>neckline break</em>, ideally on expanding volume, optionally followed by a retest of the neckline from below that fails (the cleanest entry).</p><div class='box law'><div class='bt'>Formula.</div> Measured target = neckline &minus; (head height) for a top, where head height = head price &minus; neckline at the head. For an inverse pattern, target = neckline + head depth. Project the same vertical distance the head stood above the neckline, downward from the break.</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Setting the neckline target</span></div><div class='term-body'><span class='dim'>Neckline</span> = <span class='am'>60</span>   <span class='dim'>Head peak</span> = <span class='am'>68</span>   head height = 68 &minus; 60 = <span class='cm'>8</span>\n<span class='dim'>Target</span> = 60 &minus; 8 = <span class='bad'>52</span>\n<span class='dim'>Entry</span> on neckline break: <span class='pr'>short 59.5</span>\n<span class='dim'>Stop</span> above right shoulder: <span class='pr'>63.5</span>   risk = <span class='cm'>4.0 pts</span>\n<span class='dim'>Reward</span> to target = 59.5 &minus; 52 = <span class='cm'>7.5 pts</span>   R-multiple &asymp; <span class='ok'>1.9R</span>\n<span class='dim'>Better entry:</span> wait for neckline retest near 60 that fails &rarr; tighter stop, &gt;2R</div></div><p>The example matches the skeleton: an 8-point head on a 60 neckline projects a 52 target. Note that the measured move is a <em>typical</em> objective, not a guarantee — many H&S patterns reach roughly the target, some overshoot, and a meaningful minority stall partway. Take partial profit into the target rather than expecting the full move every time.</p><h4>Failure modes you must respect</h4><div class='box danger'><div class='bt'>Failure mode.</div> Three classic ways the pattern burns traders: (1) <strong>premature entry</strong> before the neckline breaks — the right shoulder fails to form and price runs to new highs; (2) the <strong>failed retest</strong> — price breaks down, you short the break, then price reclaims the neckline and squeezes you out (the retest that <em>holds above</em> the neckline invalidates the pattern); (3) <strong>no follow-through volume</strong> — a break on declining volume is suspect and frequently reverses. Studies and trader experience put a well-formed, volume-confirmed H&S in the rough vicinity of a 60&ndash;70% follow-through to a partial target, but unconfirmed breaks are far weaker.</div><p>The right-shoulder stop is non-negotiable. If price closes back above the right shoulder after you are short, the structure has failed and you exit — no averaging into a broken thesis.</p><div class='box tip'><div class='bt'>Insight.</div> The neckline does not have to be horizontal. A gently up-sloping neckline in a top is common and still valid; a down-sloping neckline is weaker because the lows are already deteriorating. Draw the line through the two pullback extremes and break it on that line, wherever it points.</div><div class='box lab'><div class='bt'>Do this.</div> Mark the right-shoulder high as your invalidation the moment you identify the pattern, and the neckline break as your trigger. Pre-commit to both prices in writing before the break so you are not negotiating with yourself in real time.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Practice mapping and measuring without anticipating.</p><ol><li>Find three head-and-shoulders tops and two inverse patterns on historical charts.</li><li>Draw each neckline through the two pullback extremes; mark head height and project the measured target.</li><li>Note whether the neckline break came on rising volume and whether a retest occurred.</li><li>Check each outcome against the target, and log every case where the right-shoulder high was reclaimed — those are your invalidations.</li></ol></div></div>"},{"id":"p6-5","part":"06 · Patterns","nav":"Double & Triple","num":"6.5","kicker":"Part 06 · Lesson 5","title":"Double and Triple Tops and Bottoms","html":"<h3>M-tops and W-bottoms: failure to make a new extreme</h3><p>A <strong>double top</strong> is two peaks at roughly the same price with a valley between them — an <em>M</em> shape. It says the market tried to break a level twice and failed both times. A <strong>double bottom</strong> is the <em>W</em>-shaped mirror: two troughs at a similar low, signaling that sellers could not push lower. <strong>Triple tops and bottoms</strong> add a third test; more tests of a level make the eventual break more significant but also rarer.</p><p>The single most important rule with these patterns: <strong>they are not confirmed until the level between the two extremes breaks.</strong> Two equal highs are just resistance until price breaks the intervening valley low; two equal lows are just support until price breaks the intervening peak. Trading the second touch in anticipation is guessing.</p><div class='chart' data-scenario='double-bottom' data-overlays='sma50' data-marks='support:40; resistance:46; note:40:46:break of mid peak confirms' data-title='NOVA · Daily' data-cap='Two troughs near 40 with a middle peak at 46; the break above 46 confirms the W.'></div><p>In this double bottom, price bottoms near 40, rallies to a middle peak at 46, falls back to retest 40 (holding), then rallies again. Nothing is confirmed until price <em>closes above 46</em>, the middle peak. That break is the entry. Before it, you have only a pair of lows and a hope.</p><div class='box law'><div class='bt'>Formula.</div> Measured target = breakout level &plusmn; pattern height, where height = |middle peak/valley &minus; the two extremes|. Double bottom: target = mid-peak + (mid-peak &minus; bottom). Double top: target = mid-valley &minus; (top &minus; mid-valley).</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Double bottom — confirm and measure</span></div><div class='term-body'><span class='dim'>Two bottoms</span> &asymp; <span class='am'>40</span>   <span class='dim'>middle peak</span> = <span class='am'>46</span>   height = 46 &minus; 40 = <span class='cm'>6</span>\n<span class='dim'>Confirmation:</span> close <span class='ok'>above 46</span>\n<span class='dim'>Target</span> = 46 + 6 = <span class='ok'>52</span>\n<span class='dim'>Entry</span> <span class='pr'>46.2</span> on the breakout   <span class='dim'>Stop</span> <span class='pr'>43.8</span> (below the retest low / mid-pattern)\n<span class='dim'>Risk</span> = 2.4 pts   <span class='dim'>Reward</span> = 52 &minus; 46.2 = 5.8 pts   R &asymp; <span class='ok'>2.4R</span>\n<span class='dim'>Optional:</span> a pullback retest of 46 from above that holds = lower-risk add</div></div><p>This is the skeleton example exactly: a double bottom at 40 confirming on the break above the 46 middle peak, measured to a 52 target. The clean structure here gives you a defined risk (below 44) and a defined objective (52), which is the whole point of trading patterns — they convert a vague bullish feeling into specific prices.</p><h4>What makes them more or less reliable</h4><ul><li><strong>Separation in time.</strong> The two extremes should be days or weeks apart, not adjacent candles. A wide separation means two genuine, independent tests of the level.</li><li><strong>Roughly equal extremes.</strong> The second top can be marginally higher or lower; a small overshoot that immediately reverses (a failed breakout) is actually a strong version of the pattern.</li><li><strong>Volume.</strong> On a double bottom, volume ideally rises into the confirming breakout. A breakout on thin volume is the weak version.</li></ul><div class='box danger'><div class='bt'>Failure mode.</div> The dominant failure is <strong>anticipating the pattern</strong> — shorting the second top before the valley breaks, or buying the second bottom before the peak breaks. In a strong trend, the level often does <em>not</em> hold and the pattern never completes; you are then fighting the trend with no confirmation. Confirmed double tops/bottoms reach a partial target maybe 60&ndash;70% of the time; unconfirmed second-touch trades are far worse. A secondary failure is the <strong>breakout that fails to hold</strong> — the close back inside the pattern is your exit.</div><div class='box tip'><div class='bt'>Insight.</div> Triple tops/bottoms are rarer and feel more reliable because the level held three times — but each additional test also chips away at the level. The third failure can precede a <em>powerful</em> break in either direction. Do not assume a triple top must reverse down; trade the confirmed break, whichever way it goes.</div><div class='box lab'><div class='bt'>Do this.</div> Draw the confirmation line (middle peak or valley) the instant you suspect the pattern, and set a stop-entry order on it. Let the market trigger you. If it never breaks, you never traded a guess.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Drill confirmation discipline and measured targets.</p><ol><li>Find two double tops, two double bottoms, and one triple pattern.</li><li>For each, mark the two/three extremes and the middle peak/valley that defines confirmation.</li><li>Compute the measured target from the pattern height and note where you would place the stop.</li><li>Verify whether the confirmation line actually broke and whether the move reached the target — and flag any that failed to hold the break.</li></ol></div></div>"},{"id":"p6-6","part":"06 · Patterns","nav":"Rounding & Cup","num":"6.6","kicker":"Part 06 · Lesson 6","title":"Rounding Bottoms and the Cup and Handle","html":"<h3>Slow turns and the breakout that follows</h3><p>Not all reversals are sharp V-bottoms or three-peak tops. Some are slow, patient curves where sentiment shifts gradually from selling to buying. The <strong>rounding bottom</strong> (a saucer) is the purest form, and the <strong>cup and handle</strong> is a refined, tradeable version that pairs a rounding base with a short consolidation before a breakout.</p><h4>The rounding bottom</h4><p>A rounding bottom forms when a downtrend decelerates, flattens out over weeks or months, and gradually accelerates back up — tracing a smooth U. Volume often mirrors the price: heavy as it falls in, light and dry at the bottom (capitulation and apathy), then expanding as it lifts out. There is no single trigger candle; the pattern is confirmed when price reclaims the left rim of the saucer, the high where the decline began.</p><div class='box law'><div class='bt'>Definition.</div> A rounding bottom is a gradual, roughly symmetric U-shaped base with no sharp swing lows, completing when price closes back above the left rim (the start-of-decline high). Target &asymp; rim + depth of the cup.</div><h4>The cup and handle</h4><p>The cup and handle adds one crucial feature. After the cup's right side rallies back to near the old rim, price does not break out immediately — it drifts down in a small, tight pullback called the <strong>handle</strong>, shaking out the last weak holders. The breakout above the rim, out of the handle, on expanding volume, is the entry. The handle is what makes the pattern <em>tradeable</em>: it gives you a tight risk level and a clear trigger.</p><div class='chart' data-scenario='cup-handle' data-overlays='sma50' data-marks='resistance:100; note:44:100:breakout above rim' data-title='ACME · Daily' data-cap='A months-long rounded cup, a short downward-drifting handle, then a breakout above the rim near 100 on rising volume.'></div><p>In the chart, ACME carves a deep, rounded cup over several months and forms a tight handle in the upper third of the cup before breaking out above the rim near 100. Quality cues matter: the cup should be rounded (a sharp V is lower quality), the handle should be <em>shallow</em> — drifting down no more than about a third of the cup's depth — and ideally form in the upper half of the cup. A deep, sloppy handle that gives back most of the cup is a warning, not a setup.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Cup and handle — entry, stop, target</span></div><div class='term-body'><span class='dim'>Cup left rim</span> = <span class='am'>100</span>   <span class='dim'>cup low</span> = <span class='am'>72</span>   cup depth = 100 &minus; 72 = <span class='cm'>28</span>\n<span class='dim'>Handle range</span> &asymp; 100 &rarr; <span class='am'>93</span>  (pullback 7 pts = 25% of depth) &rarr; <span class='ok'>shallow, good</span>\n<span class='dim'>Breakout</span> close above <span class='ok'>100</span>  &rarr; entry <span class='pr'>100.5</span>\n<span class='dim'>Stop</span> below handle low: <span class='pr'>92.5</span>   risk = <span class='cm'>8.0 pts</span>\n<span class='dim'>Conservative target</span> = rim + depth = 100 + 28 = <span class='ok'>128</span>\n<span class='dim'>Reward</span> = 27.5 pts   R &asymp; <span class='ok'>3.4R</span>  (depth targets are optimistic — scale out)</div></div><p>This matches the skeleton: a multi-month cup with a tight two-week handle breaking out on rising volume above the rim. The measured target adds the full cup depth to the breakout, but in practice the full depth is an optimistic objective — treat the first push as the high-probability portion and trail the rest.</p><div class='box danger'><div class='bt'>Failure mode.</div> The cup and handle fails most often on (1) a <strong>breakout with no volume expansion</strong> — quiet breakouts above the rim frequently get sucked back in; (2) a <strong>too-deep handle</strong> that erases most of the right side, signaling the demand was not really there; (3) a <strong>V-shaped cup</strong> with no real base, which lacks the accumulation the pattern relies on. Even good cup-and-handles fail a meaningful share of the time, so the stop under the handle is essential. The pattern's edge is its favorable risk-reward, not a high hit rate.</div><div class='box tip'><div class='bt'>Insight.</div> The handle's job is psychological: it removes impatient holders just before the move so there is less overhead supply to fight on the breakout. A handle that drifts gently <em>down</em> on declining volume is healthier than one that chops sideways on rising volume.</div><div class='box lab'><div class='bt'>Do this.</div> Demand three things before buying a cup-and-handle breakout: a rounded (not spiked) cup, a handle in the upper half that retraces less than a third of the cup, and a breakout candle on volume clearly above its recent average. Missing any one downgrades the trade to a probe.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Learn to grade cup quality, not just spot the shape.</p><ol><li>Find three cup-and-handle candidates and one rounding bottom on weekly or daily charts.</li><li>Measure cup depth and handle retracement; reject any handle deeper than a third of the cup.</li><li>Mark the rim breakout level, the handle-low stop, and the depth-based target for each.</li><li>Check whether the breakout came on rising volume and whether price reached even half the measured target — note how volume separated the winners from the failures.</li></ol></div></div>"},{"id":"p6-7","part":"06 · Patterns","nav":"Triangles","num":"6.7","kicker":"Part 06 · Lesson 7","title":"Triangles: Ascending, Descending, Symmetrical","html":"<h3>Coiling ranges that resolve into trends</h3><p>A <strong>triangle</strong> is a contracting range — price swings get smaller, the highs and lows converge, and volatility compresses until the pattern resolves with a breakout. Triangles are usually <em>continuation</em> patterns (the prior trend resumes) but can mark reversals, so the rule is the same as always: trade the break, not the build. There are three flavors, distinguished by which boundary is flat and which is sloping.</p><h4>The three types</h4><ul><li><strong>Ascending triangle</strong> — flat top (horizontal resistance) with <em>rising</em> lows. Buyers keep paying up while sellers defend one price. The pressure usually resolves <strong>upward</strong>. Bullish bias.</li><li><strong>Descending triangle</strong> — flat bottom (horizontal support) with <em>falling</em> highs. Sellers keep pressing while buyers defend one price. Usually resolves <strong>downward</strong>. Bearish bias.</li><li><strong>Symmetrical triangle</strong> — both boundaries sloping toward each other (lower highs and higher lows). Neutral; it resolves in the direction of the prior trend more often than not, but you wait for the break to know.</li></ul><div class='chart' data-scenario='ascending-triangle' data-overlays='trend' data-marks='resistance:30; note:40:30:break above flat top' data-title='NOVA · Daily' data-cap='Flat resistance at 30 with a series of rising lows — an ascending triangle pressing into the top.'></div><p>Above, NOVA presses repeatedly against a flat 30 ceiling while each pullback bottoms higher than the last. The rising lows show demand absorbing supply at progressively higher prices; eventually the 30 sellers are exhausted and price breaks out. This is the bullish bias in action — but the break above 30 on volume is the trigger, not the third touch of the trendline.</p><div class='box law'><div class='bt'>Formula.</div> Triangle measured move = breakout level + the triangle's <em>height at its widest point</em> (for an upside break). Ascending example: height = flat top &minus; the first/lowest swing low; project that height up from the breakout.</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Ascending triangle — measured target</span></div><div class='term-body'><span class='dim'>Flat top (resistance)</span> = <span class='am'>30</span>   <span class='dim'>widest swing low</span> = <span class='am'>26</span>   height = 30 &minus; 26 = <span class='cm'>4</span>\n<span class='dim'>Breakout</span> close above <span class='ok'>30</span>  &rarr; entry <span class='pr'>30.2</span>\n<span class='dim'>Target</span> = 30 + 4 = <span class='ok'>34</span>\n<span class='dim'>Stop</span> = below last higher low, &asymp; <span class='pr'>28.8</span>   risk = <span class='cm'>1.4 pts</span>\n<span class='dim'>Reward</span> = 34 &minus; 30.2 = 3.8 pts   R &asymp; <span class='ok'>2.7R</span></div></div><p>This is the skeleton example: an ascending triangle with a flat 30 top and rising lows breaking up to a 34 measured-move target. Note how tight the risk is — the last higher low sits just under the breakout, giving an excellent reward-to-risk that is a big part of why triangles are popular.</p><h4>Reliability, timing, and the apex</h4><p>Two timing rules sharpen the edge. First, the <strong>best breaks happen before the apex</strong> — roughly in the back half but not the final tip of the triangle. As price coils into the apex, the pattern loses energy and breaks become weak and choppy. Second, <strong>volume should dry up during the coil and expand on the break</strong>. A breakout on declining volume is the classic trap.</p><div class='box danger'><div class='bt'>Failure mode.</div> Triangles are infamous for <strong>false breaks</strong> — price pokes through a boundary, traps breakout buyers/sellers, then reverses hard back through the triangle. This is so common that many traders wait for either a close beyond the boundary <em>plus</em> volume, or a successful retest of the broken boundary, before committing. Symmetrical triangles in particular break the &quot;expected&quot; way only modestly more than half the time. Even directional triangles (ascending/descending) follow their bias on the order of two-thirds of breaks at best. The narrow stop is what makes the math work despite the mediocre hit rate.</div><div class='box tip'><div class='bt'>Insight.</div> An <strong>ascending triangle in a downtrend</strong> or a <strong>descending triangle in an uptrend</strong> is a counter-trend setup and less reliable than one aligned with the trend. The most trustworthy triangle is a continuation: an ascending triangle within an established uptrend breaking up.</div><div class='box lab'><div class='bt'>Do this.</div> Draw both boundaries with at least two touches each, mark the apex, and only act on breaks that occur before the final quarter of the triangle and close beyond the line on above-average volume. Set the stop just inside the broken boundary so a false break ejects you cheaply.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Classify triangles and respect the apex-timing rule.</p><ol><li>Find one ascending, one descending, and one symmetrical triangle.</li><li>Draw both boundaries, mark the apex, and note where in the triangle the eventual break occurred.</li><li>Compute the measured target from the widest height for each.</li><li>Check the break&rsquo;s volume and whether it held or was a false break — and see how many resolved with the trend versus against it.</li></ol></div></div>"},{"id":"p6-8","part":"06 · Patterns","nav":"Flags & Wedges","num":"6.8","kicker":"Part 06 · Lesson 8","title":"Flags, Pennants and Wedges","html":"<h3>Brief pauses inside a strong trend</h3><p>After a sharp move, a trend often needs to catch its breath. <strong>Flags</strong>, <strong>pennants</strong>, and <strong>wedges</strong> are the short consolidations where it does so — small, brief patterns that interrupt a powerful move and then let it resume. They are the bread-and-butter continuation patterns of trend trading because they offer a clean entry to join a move already in progress with tightly defined risk.</p><h4>Flags and pennants</h4><p>Both begin with a <strong>pole</strong> — a steep, near-vertical price thrust. Then price consolidates:</p><ul><li><strong>Flag</strong> — a small rectangular channel that drifts <em>against</em> the trend (a bull flag drifts gently down, a bear flag drifts gently up). Two roughly parallel boundaries.</li><li><strong>Pennant</strong> — a tiny symmetrical triangle, converging boundaries, also after a pole. Functionally a flag with a triangular shape.</li></ul><p>The key feature: the consolidation is <em>shallow, brief, and on declining volume</em>. It should retrace only a modest part of the pole — not half of it. A pullback that retraces most of the pole is not a flag; it is a reversal in progress.</p><div class='chart' data-scenario='bull-flag' data-overlays='ema21' data-marks='note:30:108:flag breakout resumes trend' data-title='ACME · Daily' data-cap='A steep pole, a shallow downward-drifting flag on lighter volume, then a breakout that resumes the advance.'></div><p>In the chart, ACME thrusts up (the pole), pauses in a tidy down-drifting flag on quieter volume, then breaks out the top of the flag to resume the move. The trade is the breakout from the flag in the direction of the pole, with the measured target adding the pole's height to the breakout point.</p><div class='box law'><div class='bt'>Formula.</div> Flag/pennant target = breakout price + pole height (bull) or breakout price &minus; pole height (bear). Pole height = pole top &minus; pole base. The flag &quot;flies at half-mast&quot; — it often forms near the midpoint of the entire move.</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Bull flag — measured move</span></div><div class='term-body'><span class='dim'>Pole base</span> = <span class='am'>90</span>   <span class='dim'>pole top</span> = <span class='am'>106</span>   pole height = 106 &minus; 90 = <span class='cm'>16</span>\n<span class='dim'>Flag drifts</span> 106 &rarr; <span class='am'>102</span>  (retrace 4 of 16 = 25%) &rarr; <span class='ok'>shallow, healthy</span>\n<span class='dim'>Breakout</span> above flag top <span class='ok'>106</span>  &rarr; entry <span class='pr'>106.3</span>\n<span class='dim'>Target</span> = 106.3 + 16 = <span class='ok'>122.3</span>\n<span class='dim'>Stop</span> below flag low: <span class='pr'>101.5</span>   risk = <span class='cm'>4.8 pts</span>   reward = 16 pts   R &asymp; <span class='ok'>3.3R</span></div></div><p>This is the skeleton example: a bull flag pausing after a sharp pole, breaking up to project the pole&rsquo;s height added to the breakout. Flags resolve <em>quickly</em> — within roughly one to four weeks on a daily chart. A &quot;flag&quot; that drags on for months has lost its momentum and is really just a range.</p><h4>Wedges — the trickier cousins</h4><p>A <strong>wedge</strong> has both boundaries sloping the <em>same</em> direction (both up or both down) while converging. Wedges are counter-intuitive:</p><ul><li><strong>Rising wedge</strong> — both lines slope up but converge; momentum is fading even as price rises. Usually <strong>bearish</strong> — breaks down. As a continuation it appears in downtrends; as a reversal it tops uptrends.</li><li><strong>Falling wedge</strong> — both lines slope down but converge; selling is decelerating. Usually <strong>bullish</strong> — breaks up.</li></ul><p>The trap is intuition: a rising wedge <em>looks</em> bullish because price is rising, but the narrowing range and weakening thrusts betray exhaustion. Trade the break, which is typically against the wedge&rsquo;s slope.</p><div class='box danger'><div class='bt'>Failure mode.</div> Flags fail when (1) the &quot;flag&quot; is too deep — retracing more than half the pole means the trend may be over; (2) volume <em>rises</em> during the consolidation, signaling real distribution/accumulation against the trend rather than a pause; (3) the pattern drags on too long. Wedges fail when traders take the visually obvious direction instead of the break. Flags and pennants are among the higher-reliability continuation patterns when the pole is genuine and volume contracts in the flag — but a flat or trendless market produces fake flags constantly. No clean pole, no trade.</div><div class='box tip'><div class='bt'>Insight.</div> The quality of the <em>pole</em> predicts the quality of the flag. A pole that is steep, on heavy volume, and breaks a prior level gives a flag worth trading. A weak, choppy run-up produces a flag that fails. Grade the pole first.</div><div class='box lab'><div class='bt'>Do this.</div> Require declining volume through the flag and a volume pop on the breakout. Enter on a stop just beyond the flag boundary in the pole&rsquo;s direction, stop on the far side of the flag, and target the pole height projected from the breakout — taking partial profit as price approaches it.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Tie continuation patterns to their poles and volume.</p><ol><li>Find two bull flags, one bear flag, and one wedge.</li><li>For each flag, measure the pole height and the flag&rsquo;s retracement percentage — reject any retracing more than half the pole.</li><li>Project the measured target and mark the breakout entry and far-side stop.</li><li>Confirm volume contracted in the flag and expanded on the break, and for the wedge note which way it actually resolved relative to its slope.</li></ol></div></div>"},{"id":"p6-9","part":"06 · Patterns","nav":"Gaps","num":"6.9","kicker":"Part 06 · Lesson 9","title":"Gaps: Common, Breakaway, Runaway, Exhaustion","html":"<h3>Empty space on the chart, full of information</h3><p>A <strong>gap</strong> is a void between one session&rsquo;s range and the next — price opens beyond the prior bar with no trading in between, usually from overnight news, earnings, or a shift in sentiment. The gap itself is just a fact; the <em>type</em> of gap, defined by where it occurs in the price structure, tells you whether to fade it or ride it. The four classic types form a life-cycle of a move.</p><h4>The four gap types</h4><
