till a real edge. Each trade is worth, on average, <strong>+0.17R</strong>. Across 500 trades that is roughly +85R of accumulated gain. If you push the same logic harder and reach +0.30R expectancy, the same 500 trades produce +150R. That gap is the difference between a marginal system and an excellent one.</p>\n<div class='chart' data-scenario='breakout-up' data-overlays='sma20' data-marks='resistance:112; note:34:113:20-day high break' data-title='ACME · Daily' data-cap='A clean close above the 20-day high is the type of repeatable, testable trigger an edge is built on.'></div>\n<p>The chart shows the kind of event the rule fires on: a decisive close above prior resistance. The edge does not come from <em>this</em> breakout working &mdash; it comes from the fact that, tested across hundreds of breakouts, the winners are big enough and frequent enough to overcome the many that fail.</p>\n<h3>Edge versus a lucky streak</h3>\n<p>The most dangerous thing in trading is a small sample of wins. Flip a fair coin and you will sometimes get six heads in a row; that streak is not a coin-flipping edge. The same is true of trades. To separate signal from luck we need enough trades that randomness washes out.</p>\n<div class='box danger'><div class='bt'>The streak trap.</div> A trader who is up after 12 trades feels invincible. But with a true 50/50 system, runs of 8&ndash;10 winners happen regularly by chance. Confidence built on a dozen trades is confidence built on noise.</div>\n<p>How many trades is enough? There is no magic number, but a rough rule is that you want your <em>expectancy</em> to be several times larger than its <em>standard error</em>. For a system with around 100 trades and modest variability, an edge of +0.2R or more starts to look statistically distinguishable from zero. With 500 trades you can trust much smaller edges. This is why every serious trader logs trades obsessively: sample size is the currency of confidence.</p>\n<h3>Where edges come from</h3>\n<p>An edge is always a small, durable inefficiency in how a market prices risk or reacts to information. Common sources include:</p>\n<ul><li><strong>Behavioral:</strong> crowds over-react (mean reversion) or under-react (momentum and trend-following).</li><li><strong>Structural:</strong> forced flows &mdash; index rebalancing, option-hedging, end-of-quarter selling.</li><li><strong>Risk-premium:</strong> getting paid to hold something others want to offload (carry, volatility selling).</li><li><strong>Execution:</strong> being faster, cheaper or more disciplined than the average participant.</li></ul>\n<p>You do not need a secret. You need a definable pattern, a reason it should persist, and the discipline to test it honestly. The rest of this part is that test.</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Estimate the expectancy of a setup you already use or want to use.</p><ol><li>Write the rule in one sentence: exact entry, stop and target.</li><li>From your records or charts, collect at least 30 past instances and label each a win or loss in R.</li><li>Compute Win%, average win (R), average loss (R).</li><li>Plug into Expectancy = (Win% &times; AvgWin) &minus; (Loss% &times; AvgLoss). Is it positive &mdash; and is your sample big enough to believe it?</li></ol></div></div>"},{"id":"p14-2","part":"14 · Backtesting & Systems","nav":"Backtesting","num":"14.2","kicker":"Part 14 · Lesson 2","title":"Backtesting a Strategy","html":"<p>A <strong>backtest</strong> applies a fully-specified set of rules to historical data and records what would have happened. Done well, it converts a vague hunch (&ldquo;moving-average crossovers seem to work&rdquo;) into a table of trades with hard numbers. Done badly, it produces a beautiful equity curve that has nothing to do with the future. This lesson walks through a clean backtest end to end; the next lesson covers the ways backtests lie.</p>\n<h3>Step 1: Specify the strategy with zero ambiguity</h3>\n<p>Before touching data, every decision must be mechanical. We will backtest the classic <strong>50/200 simple moving-average crossover</strong> on a single instrument, NOVA, over ten years of daily bars.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>strategy spec</span></div><div class='term-body'><span class='dim'>Universe</span> <span class='cm'>NOVA, daily bars, 10 years</span>\n<span class='dim'>Entry</span> <span class='ok'>SMA50 crosses ABOVE SMA200 &rarr; buy next open</span>\n<span class='dim'>Exit</span> <span class='bad'>SMA50 crosses BELOW SMA200 &rarr; sell next open</span>\n<span class='dim'>Position</span> <span class='cm'>fully invested, long only, no leverage</span>\n<span class='dim'>Costs</span> <span class='cm'>0.05% commission + 0.05% slippage per side</span></div></div>\n<p>Two details already matter. We enter on the <strong>next open</strong>, not the signal close &mdash; you cannot trade a bar that has not finished. And we model <strong>costs</strong>, because a frictionless backtest flatters every strategy.</p>\n<div class='chart' data-scenario='golden-cross' data-overlays='sma50,sma200' data-marks='up:60; note:60:104:50 crosses above 200' data-title='NOVA · Daily' data-cap='The golden cross: the entry trigger for our backtest fires when the faster average crosses above the slower one.'></div>\n<p>The chart shows one such crossover. Visually it looks obvious in hindsight, which is exactly the danger: a backtest forces us to count <em>every</em> crossover, including the whipsaws that look like noise on the chart but cost real money.</p>\n<h3>Step 2: Generate the trade list</h3>\n<p>Running the rules over ten years of NOVA produces a trade-by-trade ledger. Here is a representative excerpt and the summary.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>trade ledger (excerpt)</span></div><div class='term-body'><span class='dim'>#1</span> in 100.0 out 118.4 <span class='ok'>+18.4%</span>\n<span class='dim'>#2</span> in 121.0 out 117.6 <span class='bad'>&minus;2.8%</span>\n<span class='dim'>#3</span> in 119.2 out 116.1 <span class='bad'>&minus;2.6%</span>\n<span class='dim'>#4</span> in 124.5 out 151.0 <span class='ok'>+21.3%</span>\n<span class='dim'>#5</span> in 148.0 out 144.9 <span class='bad'>&minus;2.1%</span>\n<span class='dim'>...</span> <span class='dim'>(18 trades total)</span></div></div>\n<p>The pattern is typical of trend-following: a cluster of small losing whipsaws punctuated by a few large winners. Out of 18 trades, perhaps 7 win and 11 lose, but the winners are multiples of the losers.</p>\n<h3>Step 3: Tabulate the results honestly</h3>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>backtest summary</span></div><div class='term-body'><span class='dim'>Trades</span> <span class='cm'>18</span>\n<span class='dim'>Win rate</span> <span class='cm'>39% (7 of 18)</span>\n<span class='dim'>Avg win</span> <span class='ok'>+16.0%</span>\n<span class='dim'>Avg loss</span> <span class='bad'>&minus;3.4%</span>\n<span class='dim'>Total return</span> <span class='ok'>+182%</span>\n<span class='dim'>Buy &amp; hold</span> <span class='cm'>+150%</span>\n<span class='dim'>Max drawdown</span> <span class='bad'>&minus;22%</span>\n<span class='dim'>Time in market</span> <span class='cm'>61%</span></div></div>\n<p>Several questions immediately matter. Did the strategy <em>beat buy-and-hold</em>? Here, modestly. Did it do so with <em>less risk</em> &mdash; smaller drawdown, less time exposed? It cut time in market to 61%, which is meaningful. With only 18 trades, can we <em>trust</em> any of this? Not much &mdash; that is a tiny sample, and a single instrument over one decade is one path through history.</p>\n<div class='box tip'><div class='bt'>Insight.</div> A backtest is not a verdict; it is evidence. The number of trades, the number of instruments, and the variety of market regimes covered determine how much weight that evidence can bear. Eighteen trades on one stock is a sketch, not a proof.</div>\n<h3>What a clean backtest must include</h3>\n<ul><li><strong>Realistic fills:</strong> trade the open or close <em>after</em> the signal, never the signal bar itself.</li><li><strong>Costs and slippage:</strong> commission, spread and the gap between signal price and fill.</li><li><strong>Survivorship-free data:</strong> include instruments that later died or delisted (next lesson).</li><li><strong>Full trade ledger:</strong> keep every trade, not just the summary, so you can audit and re-test.</li><li><strong>A benchmark:</strong> compare to buy-and-hold or a passive index, or you cannot tell skill from beta.</li></ul>\n<p>With the mechanics in place, the trade list is just arithmetic. The hard part &mdash; making sure that arithmetic means anything &mdash; is the subject of the next lesson.</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Backtest the 50/200 crossover yourself on any instrument with at least 5 years of daily data.</p><ol><li>Mark every point where SMA50 crosses SMA200 up (buy) and down (sell).</li><li>Record entry and exit using the <em>next bar's open</em>, and subtract 0.1% round-trip costs.</li><li>Build a trade ledger and compute win rate, average win, average loss and total return.</li><li>Compare the result to simply buying and holding over the same period. Did the system add value?</li></ol></div></div>"},{"id":"p14-3","part":"14 · Backtesting & Systems","nav":"Backtest Pitfalls","num":"14.3","kicker":"Part 14 · Lesson 3","title":"Pitfalls: Overfitting, Look-Ahead, Survivorship","html":"<p>A backtest can show a 400% return, a smooth equity curve and a tiny drawdown &mdash; and still be worthless. The reason is that several powerful biases all push results in the <em>same</em> direction: they make the past look more tradeable than it was. This lesson names the three deadliest &mdash; <strong>overfitting</strong>, <strong>look-ahead bias</strong> and <strong>survivorship bias</strong> &mdash; and shows how to defend against each.</p>\n<h3>Overfitting (curve-fitting)</h3>\n<p>Overfitting is tuning a strategy so closely to historical data that it memorizes that specific past instead of learning a general pattern. Every extra parameter and every optimized threshold is another knob you can twist until the backtest looks perfect &mdash; on data you already have.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>the curve-fit collapse</span></div><div class='term-body'><span class='dim'>In-sample (2014&ndash;2021)</span>\n<span class='dim'>Parameters tuned</span> <span class='bad'>14</span>\n<span class='dim'>Annual return</span> <span class='ok'>+41%</span>\n<span class='dim'>Max drawdown</span> <span class='ok'>&minus;6%</span>\n<span class='dim'>Sharpe</span> <span class='ok'>2.9</span>\n<span class='dim'>Out-of-sample (2022&ndash;2025)</span>\n<span class='dim'>Annual return</span> <span class='bad'>&minus;8%</span>\n<span class='dim'>Max drawdown</span> <span class='bad'>&minus;31%</span>\n<span class='dim'>Sharpe</span> <span class='bad'>&minus;0.4</span></div></div>\n<p>This is the signature of a curve-fit system: spectacular in-sample, catastrophic out-of-sample. The 14 parameters did not capture a market truth &mdash; they traced the exact wiggles of 2014&ndash;2021, which never repeat the same way.</p>\n<div class='box danger'><div class='bt'>Pitfall.</div> The more parameters you optimize and the smaller your sample, the more your backtest describes noise. A rule with 2&ndash;3 robust parameters that earns +0.2R is worth far more than a 14-parameter monster that earns +0.6R in-sample only.</div>\n<h4>Defenses against overfitting</h4>\n<ul><li><strong>Out-of-sample testing:</strong> develop on one slice of history, then test once on a slice you never looked at.</li><li><strong>Walk-forward analysis:</strong> repeatedly optimize on a window, test on the next, and roll forward.</li><li><strong>Parameter sensitivity:</strong> a robust edge degrades <em>gracefully</em> as you nudge parameters; a fragile one falls off a cliff.</li><li><strong>Fewer knobs:</strong> prefer simple rules with an economic reason behind them.</li></ul>\n<h3>Look-ahead bias</h3>\n<p>Look-ahead bias is using information in your backtest that you could not have known at the moment of the trade. It is sneaky because the code looks innocent.</p>\n<ul><li><strong>Trading the signal bar:</strong> entering at a bar's close using an indicator computed from that same close &mdash; but you only know the close <em>after</em> it prints.</li><li><strong>Using the day's high/low:</strong> assuming you bought the exact low of the day.</li><li><strong>Restated data:</strong> using earnings or economic figures as later revised, not as first reported.</li><li><strong>Future-derived universe:</strong> picking today's S&amp;P 500 members and testing them ten years back &mdash; you could not have known the membership then.</li></ul>\n<div class='box law'><div class='bt'>Rule of thumb.</div> At every bar in a backtest, ask: <em>could I have actually had this number, at this price, at this instant?</em> If any answer is &ldquo;only in hindsight,&rdquo; you have look-ahead bias.</div>\n<p>The fix is structural: lag every signal by at least one bar, fill at the next open or a conservative price, and use point-in-time data that reflects what was known then.</p>\n<h3>Survivorship bias</h3>\n<p>Survivorship bias comes from testing only the instruments that <em>survived</em> to today. The losers &mdash; bankruptcies, delistings, funds that closed &mdash; quietly vanish from the dataset, so the average looks far healthier than reality.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>survivorship distortion</span></div><div class='term-body'><span class='dim'>Test on today's survivors only</span>\n<span class='dim'>Avg annual return</span> <span class='ok'>+12%</span>\n<span class='dim'>Worst stock</span> <span class='cm'>&minus;35% (recovered)</span>\n<span class='dim'>Test on full point-in-time universe</span>\n<span class='dim'>Avg annual return</span> <span class='bad'>+7%</span>\n<span class='dim'>Worst stocks</span> <span class='bad'>&minus;100% (delisted, removed)</span></div></div>\n<p>Five percentage points a year vanished simply because the companies that went to zero were never in the test. For any strategy that buys individual names &mdash; especially &ldquo;buy the dip&rdquo; rules &mdash; survivorship bias is devastating, because the deepest dips are often companies that never came back.</p>\n<div class='chart' data-scenario='downtrend' data-marks='note:40:88:delisted &mdash; absent from survivor data' data-title='ZERO Corp · Daily' data-cap='Stocks that trended to zero and delisted silently disappear from survivor-only datasets, inflating backtest results.'></div>\n<p>The chart is the kind of instrument a survivor-only dataset erases. A buy-the-dip backtest never sees it, so it never books the &minus;100% &mdash; and reports a fantasy.</p>\n<div class='box tip'><div class='bt'>Insight.</div> These three biases are not exotic edge cases. They are the <em>default</em> outcome of casual backtesting. Assume your first backtest is corrupted by all three until you have specifically ruled each one out.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Audit a backtest (yours or a published one) for the three biases.</p><ol><li>Count optimized parameters and ask whether the in-sample window is large enough to support them &mdash; then check if out-of-sample results exist.</li><li>Trace one trade: confirm the entry uses only information available <em>before</em> the fill.</li><li>Ask whether the instrument list was the universe <em>at the time</em>, or just today's survivors.</li><li>Write one sentence on how you would fix the worst offender.</li></ol></div></div>"},{"id":"p14-4","part":"14 · Backtesting & Systems","nav":"Metrics","num":"14.4","kicker":"Part 14 · Lesson 4","title":"The Metrics That Matter","html":"<p>A trade ledger is just raw data until you summarize it. The right metrics tell you whether a system has an edge, how much pain it inflicts to deliver that edge, and whether you can actually live through it. This lesson defines the five that matter most &mdash; <strong>win rate, expectancy, profit factor, max drawdown</strong> and <strong>Sharpe ratio</strong> &mdash; and shows how a system can look mediocre on one and excellent overall.</p>\n<h3>Win rate: necessary but nearly useless alone</h3>\n<p><strong>Win rate</strong> is simply the fraction of trades that profit. It is the metric beginners worship and professionals distrust, because it says nothing about the <em>size</em> of wins versus losses.</p>\n<div class='box law'><div class='bt'>Definition.</div> Win rate = Winning trades &divide; Total trades. A 90% win rate with one catastrophic loss can still bankrupt you; a 35% win rate with large winners can compound beautifully.</div>\n<h3>Expectancy: the average trade</h3>\n<p>As in Lesson 1, <strong>expectancy</strong> is the average R per trade and is the single best summary of edge.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>expectancy</span></div><div class='term-body'><span class='dim'>Win rate</span> <span class='cm'>45%</span>\n<span class='dim'>Avg win</span> <span class='ok'>+2.0R</span>\n<span class='dim'>Avg loss</span> <span class='bad'>&minus;1.0R</span>\n<span class='dim'>Expectancy</span> = (0.45 &times; 2.0) &minus; (0.55 &times; 1.0)\n<span class='dim'>Expectancy</span> = 0.90 &minus; 0.55 = <span class='ok'>+0.35R</span></div></div>\n<h3>Profit factor: dollars won per dollar lost</h3>\n<p><strong>Profit factor</strong> divides total gains by total losses. A value above 1.0 means the system makes money; the higher, the more cushion.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>profit factor</span></div><div class='term-body'><span class='dim'>Gross profit</span> <span class='ok'>$90,000</span>\n<span class='dim'>Gross loss</span> <span class='bad'>$50,000</span>\n<span class='dim'>Profit factor</span> = 90,000 &divide; 50,000 = <span class='ok'>1.8</span></div></div>\n<p>A profit factor of 1.8 means you earn $1.80 for every $1.00 you lose. As a rough guide: under 1.2 is fragile, 1.3&ndash;1.8 is solid and realistic, and anything claiming above ~2.5 on many trades deserves suspicion of overfitting.</p>\n<h3>Max drawdown: the pain you must survive</h3>\n<p><strong>Maximum drawdown</strong> is the largest peak-to-trough fall in your equity. It is the metric that decides whether you can <em>stay</em> in a system, because it measures the worst stretch you would have had to endure.</p>\n<div class='box danger'><div class='bt'>Pitfall.</div> The drawdown in your backtest is almost always smaller than the one you will actually face, because the future will find a worse path than the past did. Assume the real max drawdown is 1.5&times; the backtested one when sizing your risk.</div>\n<h3>Sharpe ratio: return per unit of volatility</h3>\n<p>The <strong>Sharpe ratio</strong> measures excess return relative to its volatility &mdash; how much return you earn per unit of bumpiness.</p>\n<div class='box law'><div class='bt'>Formula.</div> Sharpe = (R<sub>p</sub> &minus; R<sub>f</sub>) &divide; &sigma;<sub>p</sub>, where R<sub>p</sub> is portfolio return, R<sub>f</sub> the risk-free rate, and &sigma;<sub>p</sub> the standard deviation of returns (annualized).</div>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>sharpe worked example</span></div><div class='term-body'><span class='dim'>Annual return</span> <span class='cm'>14%</span>\n<span class='dim'>Risk-free rate</span> <span class='cm'>3%</span>\n<span class='dim'>Volatility (&sigma;)</span> <span class='cm'>10%</span>\n<span class='dim'>Sharpe</span> = (14 &minus; 3) &divide; 10 = <span class='ok'>1.1</span></div></div>\n<p>As a guide: below 0.5 is weak, around 1.0 is good for a discretionary trader, 1.5&ndash;2.0 is excellent, and claims above 3.0 on a simple strategy usually mean a flaw in the test.</p>\n<h3>Putting it together: judging a real system</h3>\n<p>Now combine them. Here is a system that scores poorly on the metric beginners fixate on, yet is clearly tradeable.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>verdict: tradeable</span></div><div class='term-body'><span class='dim'>Win rate</span> <span class='cm'>45%</span> <span class='dim'>&larr; looks bad alone</span>\n<span class='dim'>Expectancy</span> <span class='ok'>+0.35R</span>\n<span class='dim'>Profit factor</span> <span class='ok'>1.8</span>\n<span class='dim'>Max drawdown</span> <span class='cm'>18%</span>\n<span class='dim'>Sharpe</span> <span class='ok'>1.1</span>\n<span class='dim'>Trades</span> <span class='cm'>420</span>\n<span class='dim'>VERDICT</span> <span class='ok'>positive edge, survivable risk, large sample &rarr; trade it</span></div></div>\n<p>A 45% win rate sounds like a losing system to a novice. But the 1.8 profit factor and +0.35R expectancy show the winners are nearly twice the losers, the 18% drawdown is survivable, the 1.1 Sharpe says the ride is reasonably smooth, and 420 trades make it believable. Read together, the metrics say <em>yes</em>.</p>\n<div class='chart' data-scenario='uptrend' data-pane='atr' data-title='Equity Curve (illustrative)' data-cap='An equity curve that grinds upward with shallow, recoverable drawdowns is what good metrics look like in picture form.'></div>\n<p>Visualized, a healthy system's equity curve climbs with shallow, recoverable dips. Sharp vertical spikes followed by deep crashes are the visual fingerprint of poor risk metrics, no matter how high the headline return.</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Compute the full metric panel for one strategy.</p><ol><li>From a trade ledger, calculate win rate, expectancy (R), and profit factor (gross profit &divide; gross loss).</li><li>Track running equity to find the worst peak-to-trough max drawdown.</li><li>Estimate annualized return and volatility, then compute Sharpe = (return &minus; risk-free) &divide; volatility.</li><li>Write a one-line verdict: does the system have a positive, survivable, believable edge?</li></ol></div></div>"},{"id":"p14-5","part":"14 · Backtesting & Systems","nav":"Journaling","num":"14.5","kicker":"Part 14 · Lesson 5","title":"Keeping a Trading Journal That Improves You","html":"<p>A backtest tells you whether a <em>rule</em> has an edge. A <strong>journal</strong> tells you whether <em>you</em> are actually executing that rule &mdash; and where you are leaking money through your own behavior. The gap between a system's backtested results and a trader's real results is almost always explained by what a good journal reveals: deviations, over-trading, revenge trades and ignored setups. This lesson shows how to build a journal that changes your behavior rather than just recording it.</p>\n<h3>Why most journals fail</h3>\n<p>Most journals are diaries: &ldquo;Bought NOVA, felt good, sold for a loss, annoyed.&rdquo; That is data you cannot analyze. A useful journal is <strong>structured and tagged</strong> so you can group hundreds of trades and ask sharp questions: <em>Which setup loses me the most? What time of day am I worst? Do I size up after a loss?</em></p>\n<div class='box tip'><div class='bt'>Insight.</div> The purpose of a journal is not to remember trades. It is to turn your trading into a dataset you can query, so patterns in <em>your behavior</em> become as measurable as patterns in price.</div>\n<h3>The fields that make a journal queryable</h3>\n<p>Every trade should capture, at minimum, the following. The <em>tags</em> are what unlock analysis later.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>journal schema</span></div><div class='term-body'><span class='dim'>Context</span> <span class='cm'>date, time, instrument, direction</span>\n<span class='dim'>Plan</span> <span class='cm'>setup tag, entry, stop, target, planned R</span>\n<span class='dim'>Execution</span> <span class='cm'>actual entry, exit, size, fees</span>\n<span class='dim'>Result</span> <span class='cm'>P/L in $ and R, hold time</span>\n<span class='dim'>Tags</span> <span class='am'>setup name, A+/B/C grade, followed-plan? Y/N</span>\n<span class='dim'>Mistakes</span> <span class='bad'>early-entry, moved-stop, revenge, over-sized, FOMO</span>\n<span class='dim'>Notes</span> <span class='cm'>one sentence: what I saw, what I felt</span></div></div>\n<p>The two highest-value columns are <strong>setup tag</strong> and <strong>followed-plan?</strong>. The setup tag lets you measure each strategy separately. The followed-plan flag separates losses caused by the market (normal, expected) from losses caused by you breaking your own rules (fixable).</p>\n<h3>The payoff: finding the one setup bleeding you dry</h3>\n<p>Tagging pays off when you group results by setup. Imagine a trader who runs four setups and finally tallies a quarter of trades by tag.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>results by setup (90 days)</span></div><div class='term-body'><span class='dim'>Trend pullback</span> <span class='ok'>32 trades, +0.41R, +13.1R total</span>\n<span class='dim'>Breakout</span> <span class='ok'>21 trades, +0.28R, +5.9R total</span>\n<span class='dim'>Range fade</span> <span class='cm'>14 trades, +0.05R, +0.7R total</span>\n<span class='dim'>News scalp</span> <span class='bad'>41 trades, &minus;0.46R, &minus;18.9R total</span>\n<span class='dim'>NET</span> <span class='ok'>+0.8R (barely positive)</span></div></div>\n<p>The story leaps out. Three setups are genuinely profitable, but the trader is barely above break-even overall because of the <strong>news scalp</strong>: it is the most-traded setup (41 of 108 trades) and it loses nearly half an R every time. Cross-referencing the mistake tags shows that 80% of the account's total losses trace to this one over-traded setup.</p>\n<div class='box lab'><div class='bt'>Do this.</div> When the data is this clear, the action is simple: <strong>cut the losing setup entirely.</strong> Removing the news scalp turns a +0.8R quarter into roughly +19.7R from the same effort &mdash; no new skill required, just subtraction.</div>\n<p>This is the core promise of journaling. You do not always need a <em>better</em> strategy; often you need to stop doing the one demonstrably destroying your results. Without tags and a large enough sample, this would be invisible &mdash; the news scalp's occasional big winner would keep it feeling alive.</p>\n<h3>Reviewing on a cadence</h3>\n<p>A journal only improves you if you review it on a schedule. A workable cadence:</p>\n<ul><li><strong>Daily (5 min):</strong> log every trade while fresh; note any plan deviations and the emotion behind them.</li><li><strong>Weekly (20 min):</strong> tally followed-plan vs broke-plan; flag the single worst trade and why it happened.</li><li><strong>Monthly/quarterly (1 hr):</strong> group by setup, time of day and mistake tag; decide one rule change for next period.</li></ul>\n<div class='box danger'><div class='bt'>Pitfall.</div> Logging without reviewing is theatre. If you never aggregate and act on the data, you are spending effort to feel disciplined while changing nothing. The review loop &mdash; not the logging &mdash; is where improvement happens.</div>\n<h3>Process metrics, not just P/L</h3>\n<p>Track at least one <em>process</em> metric alongside profit. The best is your <strong>followed-plan rate</strong>: the percentage of trades that obeyed your rules. A trader at 95% followed-plan with a slightly losing month is in better shape than one at 60% who got lucky &mdash; because the disciplined trader's results are repeatable and the lucky one's are not.</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Build a tagged journal and run your first setup-level review.</p><ol><li>Create columns for context, plan, execution, result (in R), setup tag, followed-plan?, and mistake tags.</li><li>Log your next 30 trades (or backfill 30 recent ones) honestly.</li><li>Group results by setup tag and compute average R for each.</li><li>Identify your worst setup and your most common mistake tag, and write the one rule change you will make.</li></ol></div></div>"},{"id":"p14-6","part":"14 · Backtesting & Systems","nav":"Forward Testing","num":"14.6","kicker":"Part 14 · Lesson 6","title":"Forward-Testing and Paper Trading","html":"<p>A backtest looks backward at data you already have. A <strong>forward test</strong> &mdash; running the system live, in real time, on data the strategy has never seen &mdash; is the bridge between historical promise and real-money reality. Paper trading is forward testing without risking capital. This lesson explains why forward testing catches problems a backtest cannot, and how to read its results.</p>\n<h3>Why forward-test at all?</h3>\n<p>If a backtest is honest, why not just trade it? Because a backtest, no matter how clean, cannot capture several real-world frictions:</p>\n<ul><li><strong>Genuine out-of-sample data:</strong> every backtest, even with a holdout, was chosen <em>because</em> it looked good. Forward data is the only data you provably did not fit to.</li><li><strong>Execution reality:</strong> real fills, real slippage, real spread widening when you actually need to trade.</li><li><strong>Your behavior:</strong> a backtest assumes flawless execution. Forward testing reveals whether <em>you</em> can pull the trigger and hold the rules under live conditions.</li><li><strong>Regime check:</strong> it confirms the edge still exists <em>now</em>, not just in the past decade.</li></ul>\n<div class='box law'><div class='bt'>Definition.</div> Forward test = running fixed, pre-committed rules on new, unseen data going forward in time. <strong>Paper trading</strong> = a forward test executed with simulated money. Both must use the <em>exact</em> rules from the backtest &mdash; no improvising.</div>\n<h3>A worked forward test: the crossover system</h3>\n<p>Take the 50/200 crossover from Lesson 2. Its backtest suggested a positive, modest edge. We now paper-trade it for three months, executing every signal at realistic fills, and compare the live results to the backtest's <em>expectations</em> over a comparable window.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>backtest vs forward (3 months)</span></div><div class='term-body'><span class='dim'>Metric</span> <span class='dim'>Backtest exp.</span> <span class='dim'>Paper result</span>\n<span class='dim'>Trades</span> <span class='cm'>~5</span> <span class='cm'>5</span>\n<span class='dim'>Win rate</span> <span class='cm'>~40%</span> <span class='ok'>40% (2/5)</span>\n<span class='dim'>Avg win</span> <span class='cm'>+14%</span> <span class='ok'>+12.6%</span>\n<span class='dim'>Avg loss</span> <span class='cm'>&minus;3.4%</span> <span class='cm'>&minus;3.9%</span>\n<span class='dim'>Expectancy</span> <span class='cm'>+0.30R</span> <span class='ok'>+0.27R</span>\n<span class='dim'>VERDICT</span> <span class='ok'>live tracks backtest within noise &rarr; proceed</span></div></div>\n<p>The forward results <em>track</em> the backtest: similar win rate, similar win/loss sizes, a slightly worse loss (real slippage) and an expectancy a hair below prediction. This is exactly what success looks like &mdash; not identical numbers, but the same shape, within the noise you would expect from only five trades.</p>\n<div class='box tip'><div class='bt'>Insight.</div> The goal of forward testing is not to confirm the strategy is <em>as good</em> as the backtest &mdash; it almost never is, because real friction bites. The goal is to confirm it is not <em>fundamentally broken</em>: the edge survives contact with live data and live execution.</div>\n<h3>Reading divergence: when forward results disappoint</h3>\n<p>Suppose instead the paper test had produced a &minus;0.4R expectancy with the same number of trades. Three explanations compete, and you must diagnose which:</p>\n<ol><li><strong>Bad luck (small sample):</strong> five trades is far too few to overturn a backtest. A bad run is expected sometimes.</li><li><strong>Overfit backtest:</strong> the edge was never real &mdash; it lived only in the curve-fit past (Lesson 3).</li><li><strong>Regime change:</strong> the market's character shifted; trends got choppier and the trend system suffers.</li></ol>\n<div class='box danger'><div class='bt'>Pitfall.</div> Do not abandon a system after a handful of bad forward trades, and do not crown one after a handful of good ones. The same small-sample logic from Lesson 1 applies: you need enough live trades for the result to mean anything. Pre-commit to a sample size <em>before</em> you start.</div>\n<h3>How long to forward-test</h3>\n<p>Long enough to gather a statistically meaningful number of trades for <em>that</em> system's frequency &mdash; not a fixed calendar period. A day-trading system might generate 100 trades in a month; the 50/200 crossover might take a year to produce 10. Set the bar in trades, then translate to time.</p>\n<div class='chart' data-scenario='golden-cross' data-overlays='sma50,sma200' data-marks='up:58; up:100; note:58:103:live signal 1; note:100:118:live signal 2' data-title='NOVA · Daily (forward window)' data-cap='Forward testing executes the same crossover signals on new bars the strategy never saw during development.'></div>\n<p>The chart shows the system firing on fresh data. Each live signal is one more out-of-sample data point added to your verdict. Until enough have accumulated, the only honest answer to &ldquo;does it work live?&rdquo; is &ldquo;not enough evidence yet.&rdquo;</p>\n<h3>Paper to live: the transition</h3>\n<p>Once forward results confirm the edge, do not jump to full size. Bridge with <strong>small live size</strong> &mdash; real money, real emotions, but minimal risk &mdash; for a further block of trades. Many systems pass paper testing and fail live trading purely because the trader behaves differently when real money is on the line. Small-size live trading exposes that before it is expensive.</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Run a forward test of a backtested system.</p><ol><li>Freeze the exact rules &mdash; entry, stop, target, sizing &mdash; in writing. No changes allowed during the test.</li><li>Pre-commit to a minimum number of trades (e.g. 20&ndash;30) before judging.</li><li>Paper-trade every signal with realistic fills, logging each in your journal.</li><li>Compare live expectancy and win rate to the backtest. Do they share the same shape within noise? Decide: proceed to small live size, keep testing, or discard.</li></ol></div></div>"},{"id":"p14-7","part":"14 · Backtesting & Systems","nav":"Building a System","num":"14.7","kicker":"Part 14 · Lesson 7","title":"Building and Validating a Repeatable System","html":"<p>Everything in this part now assembles into one thing: a <strong>repeatable trading system</strong>. A system is not a single clever indicator. It is a complete, written specification &mdash; entry, exit, position sizing, risk limits and a review loop &mdash; that has been tested honestly and validated out-of-sample. This final lesson shows how to wire the pieces together so the whole is reliable enough to trade.</p>\n<h3>The anatomy of a complete system</h3>\n<p>Every part of a system must be defined precisely enough that there is no daily improvisation. The components:</p>\n<ul><li><strong>Market &amp; timeframe:</strong> what you trade and on what bars.</li><li><strong>Setup &amp; entry:</strong> the exact condition that triggers a trade and how you fill it.</li><li><strong>Stop / exit:</strong> where you are wrong, and how winners are taken.</li><li><strong>Position sizing:</strong> how many shares/contracts, derived from a fixed risk per trade.</li><li><strong>Risk limits:</strong> max risk per trade, max concurrent positions, daily/weekly loss cutoffs.</li><li><strong>Review loop:</strong> the journaling and re-validation cadence that keeps the system honest.</li></ul>\n<h3>A worked system specification</h3>\n<p>Here is a full, tradeable specification combining a trend-pullback entry, an ATR stop, fixed 1% sizing, and a review loop.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>system spec: trend pullback</span></div><div class='term-body'><span class='dim'>Market</span> <span class='cm'>liquid large-caps, daily bars</span>\n<span class='dim'>Filter</span> <span class='cm'>price &gt; SMA200 (uptrend only)</span>\n<span class='dim'>Entry</span> <span class='ok'>pullback to SMA50, close back above &rarr; buy next open</span>\n<span class='dim'>Stop</span> <span class='bad'>1.5 &times; ATR(14) below entry</span>\n<span class='dim'>Target</span> <span class='ok'>2R, or trail below SMA50</span>\n<span class='dim'>Risk/trade</span> <span class='cm'>1% of equity</span>\n<span class='dim'>Max positions</span> <span class='cm'>5 concurrent</span>\n<span class='dim'>Daily stop</span> <span class='bad'>halt after &minus;3% day</span></div></div>\n<div class='chart' data-scenario='pullback-uptrend' data-overlays='sma50,sma200' data-pane='atr' data-marks='note:42:108:pullback to SMA50; up:44' data-title='ACME · Daily' data-cap='The system buys pullbacks to the rising 50-day average within a confirmed uptrend, with the ATR pane sizing the stop.'></div>\n<p>The chart shows the setup in action: a stock above its 200-day average dips to the 50-day, then closes back above it &mdash; the entry. The ATR pane drives the stop distance, which in turn drives position size. Every decision flows from the spec, not from feel.</p>\n<h3>Position sizing turns risk into shares</h3>\n<p>Fixed-fractional sizing converts your 1% risk rule into a concrete share count. The formula ties together everything from the stop to the account.</p>\n<div class='box law'><div class='bt'>Formula.</div> Shares = (Equity &times; Risk%) &divide; (Entry &minus; Stop). The numerator is dollars you will risk; the denominator is dollars at risk per share.</div>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>sizing worked example</span></div><div class='term-body'><span class='dim'>Equity</span> <span class='cm'>$50,000</span>\n<span class='dim'>Risk per trade</span> <span class='cm'>1% = $500</span>\n<span class='dim'>Entry</span> <span class='cm'>$108.00</span>\n<span class='dim'>Stop (1.5&times;ATR)</span> <span class='cm'>$103.50 &rarr; $4.50 risk/share</span>\n<span class='dim'>Shares</span> = 500 &divide; 4.50 = <span class='ok'>111 shares</span>\n<span class='dim'>Position value</span> <span class='cm'>~$11,990</span></div></div>\n<p>Note that the system never risks more than $500 regardless of the stock's price &mdash; a wider stop simply means fewer shares. This is what makes the system <em>repeatable</em>: the dollar risk is constant even as setups vary.</p>\n<h3>Validation: the gate before real money</h3>\n<p>A spec is only a hypothesis until validated. The validation pipeline chains every tool from this part:</p>\n<ol><li><strong>In-sample backtest</strong> on a development window &mdash; confirm a positive, plausible edge (Lesson 2).</li><li><strong>Bias audit</strong> &mdash; check for overfitting, look-ahead and survivorship (Lesson 3).</li><li><strong>Out-of-sample test</strong> on a holdout window the rules never saw.</li><li><strong>Metric panel</strong> &mdash; expectancy, profit factor, max drawdown, Sharpe meet your thresholds (Lesson 4).</li><li><strong>Forward / paper test</strong> &mdash; confirm the edge survives live (Lesson 6).</li><li><strong>Small live size</strong>, then scale up as confidence builds.</li></ol>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>documented out-of-sample stats</span></div><div class='term-body'><span class='dim'>Window</span> <span class='cm'>holdout (never optimized)</span>\n<span class='dim'>Trades</span> <span class='cm'>140</span>\n<span class='dim'>Expectancy</span> <span class='ok'>+0.31R</span>\n<span class='dim'>Profit factor</span> <span class='ok'>1.6</span>\n<span class='dim'>Max drawdown</span> <span class='cm'>16%</span>\n<span class='dim'>Sharpe</span> <span class='ok'>1.0</span>\n<span class='dim'>In-sample expectancy</span> <span class='cm'>+0.36R (close &rarr; robust)</span></div></div>\n<p>The decisive line is the last one: out-of-sample expectancy (+0.31R) is close to in-sample (+0.36R). A small, graceful degradation is the signature of a <em>robust</em> system. If the holdout number had collapsed to near zero, the system would be curve-fit and you would discard it &mdash; no matter how good the in-sample figures looked.</p>\n<div class='box tip'><div class='bt'>Insight.</div> A validated system is not one that printed the highest backtest return. It is one whose edge held up on data it had never seen, whose drawdown you can survive, and whose rules you can follow without improvising. Robustness beats brilliance.</div>\n<h3>The system is a living loop</h3>\n<p>Validation is not a one-time event. Markets drift, edges decay, and your execution wanders. The review loop &mdash; daily logging, weekly tallies, quarterly re-validation against fresh forward results &mdash; is what keeps the system alive. When out-of-sample metrics start sagging across enough trades, you investigate, adjust within disciplined limits, and re-validate. A trading system is less a machine you build once than a process you maintain forever.</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Write and validate a complete one-page system.</p><ol><li>Document every component: market, filter, entry, stop, target, risk per trade, max positions, daily loss limit.</li><li>Backtest it in-sample, run the bias audit, then test once on an untouched out-of-sample window.</li><li>Record the full metric panel for both windows and compare in-sample vs out-of-sample expectancy.</li><li>If the edge survives, paper-trade it forward; define in writing what result would make you scale up, keep testing, or discard it.</li></ol></div></div>"},{"id":"p15-1","part":"15 · Macro & Other Markets","nav":"Rates & The Fed","num":"15.1","kicker":"Part 15 · Lesson 1","title":"The Macro Backdrop: Rates, the Fed, Inflation, Cycle","html":"<p>Every single stock you trade floats on a sea of macro. The same chart that looks like a clean breakout can be quietly fighting a rising tide of interest rates, a hawkish central bank, or a business cycle rolling over. You do not need a PhD in economics to trade, but you do need a working mental model of the four big forces: <strong>interest rates</strong>, <strong>Fed policy</strong>, <strong>inflation</strong>, and the <strong>business cycle</strong>. This lesson builds that model and shows how it feeds directly into valuations.</p>\n<h3>Why interest rates set the price of everything</h3>\n<p>A stock is a claim on future cash flows. To value those cash flows today, you discount them back at some rate. The <strong>discount rate</strong> rises and falls with prevailing interest rates, anchored by the yield on government bonds (in the US, the 10-year Treasury). When the discount rate goes up, the present value of distant cash flows goes <em>down</em> — and the further out the cash flow, the more it shrinks.</p>\n<div class='box law'><div class='bt'>Definition.</div> Present value of a future cash flow: PV = CF &divide; (1 + r)<sup>t</sup>, where r is the discount rate and t is years out. A high-growth company earns most of its profits far in the future (large t), so it is extremely sensitive to changes in r.</div>\n<p>This is why a small move in rates can crush long-duration assets like unprofitable tech, while barely scratching a utility that pays a steady dividend today. Growth stocks are <em>long-duration</em>; value stocks and cash-rich businesses are <em>short-duration</em>.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Worked example: discount rate compresses a growth multiple</span></div><div class='term-body'><span class='dim'>NOVA earns $10/yr ten years out. Value just that cash flow.</span>\n<span class='cm'>At r = 2%:</span>  PV = 10 &divide; (1.02)<sup>10</sup> = <span class='ok'>$8.20</span>\n<span class='cm'>At r = 5%:</span>  PV = 10 &divide; (1.05)<sup>10</sup> = <span class='bad'>$6.14</span>\n<span class='dim'>The same $10 lost 25% of its present value from a 3-point rate rise.</span>\n<span class='am'>A cash flow due NEXT year barely moves: 10/1.02 = 9.80 vs 10/1.05 = 9.52, only -2.9%.</span></div></div>\n<h3>The Fed: the hand on the rate dial</h3>\n<p>In the US, the Federal Reserve sets the <strong>federal funds rate</strong> — the overnight rate banks charge each other. Everything else (mortgages, corporate borrowing, the discount rate in your DCF) keys off that anchor. The Fed has a dual mandate: stable prices (low inflation) and maximum employment. When inflation runs hot, the Fed <em>hikes</em> rates to cool demand. When the economy weakens and unemployment rises, it <em>cuts</em> to stimulate.</p>\n<p>A <strong>hiking cycle</strong> is the classic headwind for stocks, especially expensive ones. The 2022 episode is the textbook case: the Fed took the funds rate from near zero to over 5% in about 18 months. Long-duration growth multiples compressed hard while the underlying businesses were still growing — the <em>price</em> fell because the <em>discount rate</em> rose.</p>\n<div class='box tip'><div class='bt'>Insight.</div> Watch the <em>second derivative</em>. Markets price the <em>expected path</em> of rates, not today's level. A hike that was fully expected can rally stocks if the Fed signals it is the <em>last</em> one. \"Don't fight the Fed\" really means: don't fight the <em>direction</em> of the policy path.</div>\n<h3>Inflation: the fuel for the dial</h3>\n<p>Inflation is the rate at which prices rise, tracked by gauges like CPI and the Fed's preferred PCE. Moderate inflation is healthy. Runaway inflation forces the Fed to hike, which lifts discount rates and hurts valuations. Deflation (falling prices) is worse in a different way — it signals collapsing demand and crushes earnings. Traders watch the monthly CPI print like a sporting event because it shapes the rate path.</p>\n<h3>The business cycle: the tide underneath</h3>\n<p>Economies breathe in a cycle of four phases. Different assets and sectors lead in each.</p>\n<table><tr><td><strong>Phase</strong></td><td><strong>What's happening</strong></td><td><strong>Rates / Fed</strong></td><td><strong>Tends to lead</strong></td></tr><tr><td>Early recovery</td><td>Economy bottoms, growth resumes</td><td>Low, cutting</td><td>Cyclicals, financials, small caps</td></tr><tr><td>Mid expansion</td><td>Strong growth, rising earnings</td><td>Neutral, starting to hike</td><td>Tech, industrials</td></tr><tr><td>Late cycle</td><td>Overheating, inflation rising</td><td>Hiking, restrictive</td><td>Energy, materials</td></tr><tr><td>Recession</td><td>Contraction, layoffs</td><td>High then cutting</td><td>Defensives, staples, utilities, bonds</td></tr></table>\n<p>The chart below is a stylized index moving through these phases. Notice how the character of price changes — the early-recovery launch off the lows, the smooth mid-cycle trend, the choppy late-cycle top, and the rollover.</p>\n<div class='chart' data-scenario='channel-up' data-overlays='sma50,sma200' data-marks='note:10:88:early recovery; note:45:118:mid expansion; note:70:130:late cycle; note:95:108:rollover' data-title='MACRO INDEX · Weekly' data-cap='A stylized full business cycle: the 50/200 relationship and price character shift across phases.'></div>\n<p>Early in the move price launches off a base with the 50-week MA crossing back above the 200 — a <em>golden cross</em> that often coincides with early recovery. Mid-cycle the trend is orderly and pullbacks are shallow. Late cycle the advance gets choppy and narrow, and the eventual rollover drags the 50 back below the 200.</p>\n<div class='box danger'><div class='bt'>Pitfall.</div> The cycle is not a clock. Phases stretch and compress, and the market front-runs the economy by 6-9 months. Don't sell every stock because a recession headline appeared — stocks often bottom while the news is still terrible.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Map today's macro backdrop to a cycle phase.</p><ol><li>Find the current fed funds rate and the last three CPI prints. Are rates rising, flat, or falling?</li><li>Is the Fed signaling more hikes, a pause, or cuts? Note the expected <em>path</em>, not just the level.</li><li>Using the cycle table, decide which phase best fits and which sectors it favors.</li><li>Pick one growth stock and one cash-rich value stock. Predict which is more exposed if rates rise another point, and explain why using the duration idea.</li></ol></div></div>"},{"id":"p15-2","part":"15 · Macro & Other Markets","nav":"Sector Rotation","num":"15.2","kicker":"Part 15 · Lesson 2","title":"Sector Rotation and Relative Strength","html":"<p>The market is not one thing. Under the surface of the S&P 500 sit eleven sectors, and money is constantly migrating between them as the cycle turns and expectations shift. That migration is <strong>sector rotation</strong>, and the tool that makes it visible is <strong>relative strength</strong> — comparing one thing's performance against another rather than looking at price in isolation. Master this and you stop asking \"is this stock going up?\" and start asking the better question: \"is it going up <em>faster than the alternatives</em>?\"</p>\n<h3>The eleven sectors and their personalities</h3>\n<p>The standard GICS sectors split into broad temperaments. <strong>Cyclicals</strong> — consumer discretionary, financials, industrials, materials, technology — boom when the economy is strong and growth is being priced in. <strong>Defensives</strong> — consumer staples, utilities, healthcare — hold up when the economy weakens because people keep buying toothpaste, electricity, and medicine no matter what. Energy and real estate march to their own commodity- and rate-driven drums.</p>\n<table><tr><td><strong>Type</strong></td><td><strong>Sectors (ETF)</strong></td><td><strong>Shines when</strong></td></tr><tr><td>Cyclical</td><td>Discretionary (XLY), Financials (XLF), Industrials (XLI), Tech (XLK)</td><td>Growth accelerating, rates manageable</td></tr><tr><td>Defensive</td><td>Staples (XLP), Utilities (XLU), Healthcare (XLV)</td><td>Growth slowing, fear rising</td></tr><tr><td>Inflation-sensitive</td><td>Energy (XLE), Materials (XLB)</td><td>Late cycle, rising commodity prices</td></tr></table>\n<h3>Reading relative strength with a ratio chart</h3>\n<p>A <strong>relative-strength (RS) ratio</strong> is one price divided by another. If you plot XLY (discretionary) &divide; XLP (staples), a <em>rising</em> line means risk-on cyclicals are beating defensives — the market wants offense. A <em>falling</em> line means defense is winning — caution is creeping in. The ratio can trend, break out, and form patterns just like a price chart, but it carries cleaner information about <em>where money is going</em>.</p>\n<div class='box law'><div class='bt'>Definition.</div> Relative strength ratio = Price<sub>A</sub> &divide; Price<sub>B</sub>. Trend up &rarr; A is outperforming B. The ABSOLUTE level is meaningless; only the DIRECTION and the trendline matter.</div>\n<p>The chart below is the discretionary-over-staples ratio coming out of a bottom — the classic signature of early recovery as money rotates from defensives back into cyclicals.</p>\n<div class='chart' data-scenario='breakout-up' data-overlays='sma50' data-title='XLY:XLP RATIO · Daily' data-cap='Discretionary over staples breaking out: cyclicals taking leadership from defensives.'></div>\n<p>Notice this is a <em>ratio</em>, not a price. The breakout above the prior shelf says discretionary stocks are now gaining ground on staples day after day. Even if the broad index were flat, this rotation tells you the internal leadership has flipped to offense — a tailwind for cyclical names and a reason to be skeptical of being overweight utilities here.</p>\n<h3>The rotation map across the cycle</h3>\n<p>Sam Stovall's classic sector-rotation model layers the sectors onto the business cycle. Early in a recovery, leadership runs through interest-rate-sensitive cyclicals (financials, discretionary, then tech and industrials). As the expansion matures and inflation rises, leadership rotates to materials and energy. As the economy tops and rolls into recession, money flees to staples, utilities, and healthcare — and into bonds.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Reading two ratios together</span></div><div class='term-body'><span class='cm'>Risk appetite:</span>  XLY &divide; XLP rising  &rarr; <span class='ok'>offense (cyclicals leading)</span>\n<span class='cm'>Risk appetite:</span>  XLY &divide; XLP falling &rarr; <span class='bad'>defense (staples leading)</span>\n<span class='cm'>Cycle stage:</span>    XLE &divide; SPY rising  &rarr; <span class='am'>late-cycle inflation theme</span>\n<span class='cm'>Stress check:</span>   XLU &divide; SPY rising  &rarr; <span class='bad'>flight to safety / risk-off</span>\n<span class='dim'>Confirm with the absolute trend before acting — a ratio can rise simply because B is falling faster.</span></div></div>\n<h3>From sectors to single stocks</h3>\n<p>RS is fractal. Just as you rank sectors against the index, you rank stocks against their sector. The cleanest setups stack the strength: a strong stock, in a strong sector, in a strong market. If ACME is making new RS highs versus XLK <em>and</em> XLK is making new RS highs versus SPY, you have a name being pulled higher by two tailwinds at once. The weakest setups invert this — a stock you like that is quietly underperforming its own sector is fighting an undertow.</p>\n<div class='box tip'><div class='bt'>Insight.</div> Relative strength leads price. A stock that refuses to fall during a market pullback — holding flat while the index drops — is building relative strength that often translates into outsized gains when the index turns back up. Watch what <em>won't</em> go down.</div>\n<div class='box danger'><div class='bt'>Pitfall.</div> A rising ratio is not automatically bullish for A. If both fall but B falls faster, the ratio rises while you lose money owning A. Always check the absolute chart alongside the ratio.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Build a simple rotation dashboard.</p><ol><li>Pull charts for XLY, XLP, XLE, XLU and the index (SPY).</li><li>Create the ratio XLY:XLP. Is it rising or falling over the last three months? What does that say about risk appetite?</li><li>Create XLE:SPY and XLU:SPY. Do they suggest late-cycle or risk-off conditions?</li><li>Pick the sector that looks strongest, find a stock inside it, and check whether that stock is also outperforming its sector ETF. Note whether the strength stacks or conflicts.</li></ol></div></div>"},{"id":"p15-3","part":"15 · Macro & Other Markets","nav":"Breadth & Sentiment","num":"15.3","kicker":"Part 15 · Lesson 3","title":"Market Breadth and Sentiment","html":"<p>The index level tells you what the <em>average</em> stock did, but averages lie. A market can grind to new highs while the majority of its members are quietly falling apart, propped up by a handful of giants. <strong>Breadth</strong> measures how many stocks are actually participating, and <strong>sentiment</strong> measures how greedy or fearful the crowd is. Together they let you see whether a move is broad and healthy or narrow and fragile — and whether the crowd is leaning so hard one way that the trade is crowded.</p>\n<h3>Breadth: who is actually participating</h3>\n<p>The cleanest breadth tool is the <strong>advance-decline (A/D) line</strong>: a running cumulative total of (advancing stocks minus declining stocks) each day. When the A/D line makes new highs alongside the index, the rally is broad and trustworthy. When the index makes a new high but the A/D line does <em>not</em> — a <strong>breadth divergence</strong> — fewer and fewer names are doing the lifting. That is a warning, not a sell signal, but historically the nastiest tops show this fingerprint.</p>\n<div class='box law'><div class='bt'>Definition.</div> Cumulative A/D line: today's value = yesterday's value + (advancers &minus; decliners). Other breadth gauges: % of stocks above their 200-day MA, and new highs minus new lows. All answer one question: how many soldiers are marching, not just the generals?</div>\n<p>The chart below shows the danger case described in the lesson skill: price pushing to a new high while breadth and volatility quietly disagree.</p>\n<div class='chart' data-scenario='rsi-divergence' data-pane='rsi' data-title='BROAD INDEX · Daily' data-cap='Price makes a higher high while the oscillator makes a lower high — the visual signature of a narrowing, divergent advance.'></div>\n<p>Read the panes together. Up top, price prints a marginally higher high. Below, the oscillator rolls over to a <em>lower</em> high — the momentum and participation behind the move are draining even as the headline number ticks up. Treat this as a fragile market: tighten stops, reduce size, and demand more from new long setups. Divergences can persist for weeks, so this is a posture change, not an instant short.</p>\n<h3>Sentiment: the VIX and the put/call ratio</h3>\n<p>The <strong>VIX</strong> is the market's expected 30-day volatility implied by S&P 500 options — the \"fear gauge.\" A low VIX (say, low teens) signals complacency; a spiking VIX signals panic. Crucially, the VIX tends to move <em>inverse</em> to stocks. A rally accompanied by a <em>rising</em> VIX is internally contradictory and often unstable — options traders are paying up for protection even as the index climbs.</p>\n<p>The <strong>put/call ratio</strong> compares put volume to call volume. High readings mean traders are buying lots of downside protection (fear); low readings mean everyone is buying calls (greed). Both VIX and put/call are best read as <strong>contrarian</strong> extremes: peak fear often marks bottoms, and peak greed often marks tops.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Sentiment cheat sheet</span></div><div class='term-body'><span class='cm'>VIX low (&lt;15):</span>      <span class='am'>complacency</span> — protection is cheap, crowd relaxed\n<span class='cm'>VIX spiking (&gt;30):</span>   <span class='ok'>fear / capitulation</span> — often near short-term bottoms\n<span class='cm'>Put/Call high (&gt;1.1):</span> <span class='ok'>excess fear</span> — contrarian bullish tilt\n<span class='cm'>Put/Call low (&lt;0.7):</span>  <span class='bad'>excess greed</span> — contrarian bearish tilt\n<span class='dim'>Rule of thumb: be greedy when others are fearful, fearful when others are greedy — but only at EXTREMES.</span></div></div>\n<h3>The fragile-rally pattern: putting it together</h3>\n<p>The textbook warning configuration combines all three signals: the index rallies, the A/D line falls (narrow participation), and the VIX <em>rises</em> instead of falling (rising hedging demand). Each alone is noise; together they say the move is being driven by a few mega-caps while the broad tape and the options market quietly brace for trouble.</p>\n<div class='box tip'><div class='bt'>Insight.</div> Breadth thrusts work the other way too. When a market launches off a bottom and 90% of stocks advance for several days, that overwhelming participation (a \"breadth thrust\") is one of the most reliable bullish signals there is. Healthy beginnings are broad; dangerous endings are narrow.</div>\n<div class='box danger'><div class='bt'>Pitfall.</div> Sentiment extremes can get more extreme. A high VIX can spike higher; a low put/call can stay low for months in a strong bull. Use these as a thumb on the scale and a reason to manage risk, never as a standalone timing trigger.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Audit the current market's internal health.</p><ol><li>Pull the index, its cumulative A/D line, and the VIX on the same dates.</li><li>At the last index high, did the A/D line confirm with its own high, or diverge?</li><li>Was the VIX falling (healthy) or rising (fragile) into that high?</li><li>Check the put/call ratio. Is the crowd fearful or greedy right now?</li><li>Write a one-sentence verdict: is the current advance broad and healthy, or narrow and fragile?</li></ol></div></div>"},{"id":"p15-4","part":"15 · Macro & Other Markets","nav":"ETFs & Indices","num":"15.4","kicker":"Part 15 · Lesson 4","title":"A Primer on ETFs and Indices","html":"<p>Most traders interact with the market through <strong>indices</strong> and <strong>ETFs</strong> before they ever buy a single stock. An index is a recipe — a rules-based measurement of a basket. An ETF (exchange-traded fund) is a tradable product that holds that basket and trades on an exchange like a stock. Understanding how they are <em>built and weighted</em> explains why \"the market\" can rise while most stocks fall, and why two funds tracking the same theme can perform very differently.</p>\n<h3>What an index actually is</h3>\n<p>An index is just a formula applied to a list of constituents. The S&P 500 is the 500-ish largest US companies, weighted by market value. The Nasdaq-100 is the largest non-financial names on the Nasdaq. The Dow is an oddball — 30 stocks weighted by <em>price</em>, a quirk from 1896. An index itself is not investable; you cannot buy \"the S&P 500.\" You buy a fund that tracks it.</p>\n<h3>Weighting: the most important and least understood detail</h3>\n<p>How constituents are weighted decides everything about behavior.</p>\n<table><tr><td><strong>Scheme</strong></td><td><strong>How weight is set</strong></td><td><strong>Consequence</strong></td></tr><tr><td>Cap-weighted</td><td>By market value (price &times; shares)</td><td>Mega-caps dominate; a few names drive returns</td></tr><tr><td>Equal-weighted</td><td>Every stock gets the same %</td><td>Small and mid names matter equally; needs rebalancing</td></tr><tr><td>Price-weighted</td><td>By share price (the Dow)</td><td>A high-priced stock outweighs a bigger company</td></tr></table>\n<p>The dominant scheme is <strong>cap weighting</strong>, and it has a profound effect: in a cap-weighted S&P 500 fund, the largest handful of mega-caps can account for a third or more of the entire fund. When those few giants rip, the index rips — even if the other ~490 stocks are flat or down.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Worked example: a few mega-caps dominate the move</span></div><div class='term-body'><span class='dim'>Toy 5-stock cap-weighted index. Weight = each company's value &divide; total.</span>\n<span class='cm'>MEGA  $2,000B</span>  weight = 2000/3000 = <span class='am'>66.7%</span>\n<span class='cm'>BIG   $  500B</span>  weight =  500/3000 = 16.7%\n<span class='cm'>MID   $  300B</span>  weight =  300/3000 = 10.0%\n<span class='cm'>SMALL $  150B</span>  weight =  150/3000 =  5.0%\n<span class='cm'>TINY  $   50B</span>  weight =   50/3000 =  1.7%\n<span class='dim'>If MEGA rises +10% and ALL four others fall -5%:</span>\nindex = (.667)(+10) + (.333)(-5) = +6.67 &minus; 1.67 = <span class='ok'>+5.0%</span>\n<span class='bad'>The index rose 5% while 4 of 5 stocks FELL.</span></div></div>\n<p>This is exactly the \"narrow market\" dynamic from the breadth lesson. The fix when you want to see the average stock is an <strong>equal-weight ETF</strong> (like RSP for the S&P 500): comparing the cap-weighted index to its equal-weight version is itself a breadth gauge. When cap-weight runs far ahead of equal-weight, leadership is dangerously concentrated.</p>\n<h3>How an ETF works mechanically</h3>\n<p>An ETF is a wrapper. The fund holds the actual basket of stocks. Large institutions called <strong>authorized participants</strong> can create or redeem big blocks of ETF shares by swapping them for the underlying basket. This <strong>creation/redemption</strong> mechanism is the magic that keeps the ETF's market price glued to its <strong>net asset value (NAV)</strong> — if the ETF trades above NAV, APs arbitrage the gap away. That is why a well-run ETF tracks its index closely and trades all day at a fair price, unlike a mutual fund that prices once at the close.</p>\n<div class='box law'><div class='bt'>Definition.</div> NAV = (total value of holdings &minus; liabilities) &divide; shares outstanding. Arbitrage by authorized participants keeps ETF market price &asymp; NAV. The small gap between them is the premium/discount.</div>\n<h3>Flavors and the fine print</h3>\n<p>ETFs come in many types: broad index, sector (the XL- family), thematic, bond, commodity, and <em>leveraged/inverse</em>. The leveraged ones (2x, 3x, inverse) reset <em>daily</em> and suffer from <strong>volatility decay</strong> — over time their compounding diverges badly from the multiple of the index's longer-run return. They are short-term trading tools, not buy-and-hold vehicles.</p>\n<div class='chart' data-scenario='uptrend' data-overlays='sma50,sma200' data-title='BROAD-MARKET ETF · Daily' data-cap='A cap-weighted broad index ETF in a steady uptrend, riding above its rising 50- and 200-day averages.'></div>\n<p>This is what a healthy index ETF looks like: a persistent uptrend with price holding above a rising 50-day, itself above a rising 200-day. But remember the lesson above — this smooth advance could be driven by a few mega-caps. Always check the equal-weight cousin to know whether the whole army is marching or just the generals.</p>\n<div class='box danger'><div class='bt'>Pitfall.</div> Two ETFs with similar names can hold very different baskets and charge very different fees. Always check the top-10 holdings, the weighting scheme, and the expense ratio before assuming a fund does what its ticker implies.</div>\n<div class='box tip'><div class='bt'>Insight.</div> The cap-weight vs equal-weight spread is a free breadth indicator. When the equal-weight ETF starts outperforming the cap-weight version, leadership is broadening — often a healthy sign after a narrow, top-heavy rally.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Dissect an index fund.</p><ol><li>Look up the top 10 holdings of a major cap-weighted S&P 500 ETF and add their weights. What fraction of the fund is just those 10?</li><li>Pull the cap-weighted ETF and its equal-weight cousin (e.g. SPY vs RSP) over the past year. Which outperformed, and what does that say about breadth?</li><li>Find a 3x leveraged ETF and compare its 1-year return to 3&times; the index's 1-year return. Explain the gap using volatility decay.</li></ol></div></div>"},{"id":"p15-5","part":"15 · Macro & Other Markets","nav":"Futures","num":"15.5","kicker":"Part 15 · Lesson 5","title":"A Primer on Futures","html":"<p>Futures are the plumbing of the financial world. They are standardized contracts to buy or sell something at a set price on a future date, traded on exchanges with deep liquidity and built-in leverage. Index futures (like the E-mini S&P 500) trade nearly 24 hours and are where the overnight 'gap' is decided before the cash market even opens. You do not need to trade them to benefit from understanding them — but their mechanics of <strong>leverage, margin, and roll</strong> are essential macro literacy.</p>\n<h3>What a futures contract is</h3>\n<p>A futures contract obligates the buyer (long) to take delivery and the seller (short) to deliver a specified quantity of an asset at a fixed price on a set expiration. In practice almost all financial futures are <em>cash-settled</em> or closed before delivery — nobody actually wants 1,000 barrels of oil. The contract is standardized by the exchange: the underlying, the size, the tick, and the expiry are all fixed, so the only thing traders negotiate is price.</p>\n<div class='box law'><div class='bt'>Definition.</div> Notional value = contract multiplier &times; index price. For the E-mini S&P 500, the multiplier is $50/point. At an index of 5,000, one contract controls 50 &times; 5,000 = <strong>$250,000</strong> of exposure — controlled with a margin deposit far smaller than that.</div>\n<h3>Leverage and margin: the core mechanic</h3>\n<p>You do not pay the full notional. You post <strong>initial margin</strong> — a good-faith deposit, often just a few percent of notional. This is the source of futures' enormous leverage. Gains and losses are settled <em>daily</em> through <strong>mark-to-market</strong>: every evening your account is credited or debited for the day's move. If your balance falls below the <strong>maintenance margin</strong>, you get a <strong>margin call</strong> and must add funds or be liquidated.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Worked example: E-mini S&P leverage and P&L</span></div><div class='term-body'><span class='dim'>One E-mini S&P contract, $50 per index point.</span>\n<span class='cm'>Index level:</span>        5,000 points\n<span class='cm'>Notional controlled:</span> 50 &times; 5,000 = <span class='am'>$250,000</span>\n<span class='cm'>Initial margin (~5%):</span> &asymp; <span class='am'>$13,000</span>\n<span class='dim'>Index rises 20 points to 5,020:</span>\n<span class='cm'>P&L:</span> 20 pts &times; $50 = <span class='ok'>+$1,000</span>\n<span class='cm'>Return on margin:</span> 1,000 / 13,000 = <span class='ok'>+7.7%</span> from a +0.4% index move\n<span class='dim'>The SAME move down:</span>\n<span class='cm'>P&L:</span> &minus;20 pts &times; $50 = <span class='bad'>&minus;$1,000</span> &rarr; <span class='bad'>&minus;7.7% on margin</span>\n<span class='dim'>Leverage cuts both ways — a 0.4% index move is a 7.7% swing on capital.</span></div></div>\n<p>That table is the whole lesson in risk: a tiny index move becomes a large move on your posted capital. This is why position sizing in futures is measured in <em>ticks and dollars at risk</em>, never in vague gut feel.</p>\n<h3>The roll, and the curve: contango vs backwardation</h3>\n<p>Futures expire. To hold a position past expiry you <strong>roll</strong> — close the expiring contract and open the next month. The relationship between contract months forms the <strong>futures curve</strong>. When further-out contracts are <em>more</em> expensive than near ones, the market is in <strong>contango</strong>. When they are <em>cheaper</em>, it is in <strong>backwardation</strong>.</p>\n<table><tr><td><strong>Curve shape</strong></td><td><strong>Far month vs near</strong></td><td><strong>Roll cost for a long</strong></td><td><strong>Typical cause</strong></td></tr><tr><td>Contango</td><td>Far is higher</td><td>Negative (roll yield bleeds)</td><td>Storage/carry costs, calm supply</td></tr><tr><td>Backwardation</td><td>Far is lower</td><td>Positive (roll yield helps)</td><td>Tight supply, scarcity premium</td></tr></table>\n<div class='box danger'><div class='bt'>Pitfall.</div> In persistent contango, a long that keeps rolling sells the cheap expiring contract and buys the pricier next month each cycle — a slow bleed. This is exactly why commodity ETFs that hold futures (oil, VIX) can decay relentlessly even when spot prices are flat. Roll yield is invisible on the price chart but very real in your account.</div>\n<h3>Why traders watch index futures even if they never trade them</h3>\n<p>Because they trade overnight, S&P futures price in news while the cash market is closed. The pre-market move you see in stock index quotes is really the futures move. Watching the futures gap and any breakout levels gives a read on the day's likely open. The chart below shows an overnight index-futures gap up and follow-through — the kind of move that sets the tone before the bell.</p>\n<div class='chart' data-scenario='gap-up' data-overlays='sma20' data-title='ES FUTURES · Hourly' data-cap='An overnight gap up in index futures with follow-through — the move that sets the cash-market open.'></div>\n<p>Read it as a sentiment tell: the gap reflects news absorbed while stocks were closed, and whether price holds above the gap or fills it back in often frames the entire session's bias. A gap that holds and extends signals real demand; a gap that immediately fills warns the move lacked conviction.</p>\n<div class='box tip'><div class='bt'>Insight.</div> Futures are pure expression of macro views: rates (Treasury futures), inflation (commodities), risk appetite (equity index). Even as a stock trader, glancing at the bond and equity futures curve each morning tells you the macro weather before you place a single equity trade.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Practice futures math and curve reading.</p><ol><li>Take the current S&P index level. Compute the E-mini notional ($50 &times; level) and estimate margin at ~5%.</li><li>Suppose the index moves 30 points your way. Compute the dollar P&L and the return on that margin. Repeat for a 30-point move against you.</li><li>Look up the front two months of a commodity future (e.g. oil). Is the curve in contango or backwardation? State whether a long roll helps or hurts.</li><li>Before the next session, note where S&P futures are trading pre-market versus the prior close, and predict whether the open gaps up or down.</li></ol></div></div>"},{"id":"p15-6","part":"15 · Macro & Other Markets","nav":"Forex","num":"15.6","kicker":"Part 15 · Lesson 6","title":"A Primer on Forex","html":"<p>The foreign exchange market is the largest, most liquid market on earth — trillions of dollars a day, trading 24 hours across global sessions. Even if you never trade currencies, FX is the connective tissue of macro: a strong dollar reshapes commodity prices, corporate earnings, and capital flows worldwide. This lesson teaches you to read a currency pair, count pips, and understand the single biggest driver of FX: <strong>interest-rate differentials</strong>.</p>\n<h3>Reading a currency pair</h3>\n<p>Currencies always trade in <strong>pairs</strong> because a currency only has value relative to another. A quote like <code>EUR/USD = 1.0900</code> means one euro (the <strong>base</strong> currency, listed first) buys 1.0900 US dollars (the <strong>quote</strong> currency, listed second). If the pair <em>rises</em>, the base is strengthening against the quote. If it <em>falls</em>, the base is weakening. So EUR/USD going up means the euro is getting stronger / the dollar weaker.</p>\n<div class='box law'><div class='bt'>Definition.</div> In BASE/QUOTE, the number is how many units of QUOTE buy one unit of BASE. Pair up &rarr; base strengthens. Pair down &rarr; base weakens (quote strengthens).</div>\n<h3>Pips: the unit of movement</h3>\n<p>A <strong>pip</strong> ('percentage in point') is the standard smallest increment for most pairs — the fourth decimal place, or 0.0001. Pairs involving the yen are quoted to two decimals, so a JPY pip is 0.01. Pips let traders speak about moves precisely and size positions consistently.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Worked example: counting pips and P&L on EUR/USD</span></div><div class='term-body'><span class='cm'>Move:</span> 1.0850 &rarr; 1.0900\n<span class='cm'>Pip count:</span> (1.0900 &minus; 1.0850) / 0.0001 = <span class='am'>50 pips</span>\n<span class='dim'>Position: 1 standard lot = 100,000 units of base.</span>\n<span class='cm'>Pip value (USD quote):</span> 100,000 &times; 0.0001 = <span class='am'>$10 per pip</span>\n<span class='cm'>P&L on the move (long EUR):</span> 50 &times; $10 = <span class='ok'>+$500</span>\n<span class='dim'>A mini lot (10,000) = $1/pip &rarr; +$50; a micro lot (1,000) = $0.10/pip &rarr; +$5.</span></div></div>\n<p>So the example move from the lesson skill — EUR/USD 1.0850 to 1.0900 — is exactly a 50-pip rise: the euro strengthened, the dollar weakened, and a long-euro standard lot made $500. That tidy arithmetic is why FX traders think in pips and lots rather than percentages.</p>\n<h3>What actually drives currencies: rate differentials</h3>\n<p>The dominant long-run driver of major FX pairs is the <strong>interest-rate differential</strong> between the two countries. Capital flows toward higher yields. If the Fed is hiking while the European Central Bank holds steady, dollar-denominated assets pay more, capital flows into dollars, and EUR/USD <em>falls</em> (dollar strengthens). When the ECB starts catching up — narrowing the gap — flows reverse and EUR/USD rises. This is the FX echo of the rates lesson that opened this part.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Rate-differential driver of EUR/USD</span></div><div class='term-body'><span class='cm'>Fed hikes, ECB holds:</span>  US yield &gt;
