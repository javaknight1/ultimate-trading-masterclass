 EU yield &rarr; capital &rarr; USD &rarr; <span class='bad'>EUR/USD falls</span>\n<span class='cm'>ECB catches up:</span>       gap narrows &rarr; flows reverse &rarr; <span class='ok'>EUR/USD rises</span>\n<span class='cm'>The 50-pip move:</span>      1.0850 &rarr; 1.0900 on a surprise dovish Fed / hawkish ECB shift\n<span class='dim'>Other drivers stacked on top: growth, inflation, trade balances, risk sentiment (safe-haven flows to USD/JPY/CHF).</span></div></div>\n<p>Layered on rates are growth differentials, inflation, trade balances, and risk sentiment. In risk-off panics, capital rushes to safe havens — the US dollar, Japanese yen, and Swiss franc — regardless of yield. So FX is simultaneously a rate-differential machine and a fear gauge.</p>\n<div class='chart' data-scenario='downtrend' data-overlays='sma50,sma200' data-marks='note:20:118:Fed out-hikes ECB; note:70:92:gap persists' data-title='EUR/USD · Daily' data-cap='EUR/USD trending lower as a widening US-EU rate differential pulls capital into the dollar.'></div>\n<p>This downtrend is the rate-differential story drawn as a chart: as US yields pull ahead of European yields, capital flows into dollars and the pair grinds lower beneath falling moving averages. A trader reading FX this way watches central-bank meetings and yield spreads the way an equity trader watches earnings — they are the catalysts that bend the trend.</p>\n<div class='box tip'><div class='bt'>Insight.</div> The dollar is the world's gravity. A strong dollar (rising DXY index) tightens global financial conditions, pressures commodities priced in dollars, and squeezes emerging markets that borrowed in dollars. Even a pure stock trader should glance at the dollar trend — it quietly tilts the whole field.</div>\n<div class='box danger'><div class='bt'>Pitfall.</div> FX leverage is extreme (often 30:1 or more), and the market runs 24 hours, so positions can move violently while you sleep on a central-bank headline. The same rate-differential logic that creates the trend can reverse it in seconds on a surprise.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Read a pair and tie it to rates.</p><ol><li>Quote EUR/USD right now. Which is base, which is quote, and which currency is stronger than last month?</li><li>Pick any 40-pip move and compute the P&L on a standard, mini, and micro lot.</li><li>Compare the current US and Eurozone policy rates. Which side has the higher yield, and does the recent EUR/USD direction agree with the rate-differential logic?</li><li>Pull the dollar index (DXY). Is the dollar strong or weak, and name one commodity or sector that direction would pressure.</li></ol></div></div>"},{"id":"p15-7","part":"15 · Macro & Other Markets","nav":"Top-Down Feedback","num":"15.7","kicker":"Part 15 · Lesson 7","title":"How Macro and Other Markets Feed Back to Stocks","html":"<p>You have now toured the macro backdrop, sector rotation, breadth and sentiment, ETFs, futures, and forex. This final lesson closes the loop: it shows how all of that feeds <em>back down</em> into a decision about a single stock. Great traders work <strong>top-down</strong> — market, then sector, then stock — so the macro tailwind or headwind is built into the thesis from the start, not discovered after the trade goes wrong.</p>\n<h3>The top-down funnel</h3>\n<p>Think of every single-stock decision as passing through four filters. A high-quality setup aligns all four; the more that conflict, the more the trade is swimming upstream.</p>\n<ol><li><strong>Macro</strong> — rate path, Fed stance, cycle phase. Tailwind or headwind for risk assets?</li><li><strong>Market</strong> — is the index trending up with healthy breadth and a calm VIX?</li><li><strong>Sector</strong> — is the stock's sector outperforming on relative strength?</li><li><strong>Stock</strong> — does the individual chart and fundamental story hold up?</li></ol>\n<div class='box law'><div class='bt'>Definition.</div> Top-down analysis: filter from the largest force (macro) to the smallest (the single stock), keeping only setups where the layers reinforce rather than fight each other. Alignment stacks the odds; conflict subtracts edge.</div>\n<h3>A worked thesis: the exporter under a strong dollar</h3>\n<p>Take the scenario from this lesson's skill. You like ACME, a multinational exporter that earns most of its revenue overseas. The bottom-up story is clean: good products, rising sales, a tidy chart. Then the macro shifts — the Fed signals higher-for-longer, the <strong>10-year yield rises</strong>, and the <strong>dollar strengthens</strong>. Each macro thread, traced down, reshapes the ACME thesis.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Tracing macro into the single-stock thesis</span></div><div class='term-body'><span class='cm'>Rising 10-yr yield:</span>  discount rate up &rarr; <span class='bad'>compresses ACME's growth multiple</span>\n<span class='cm'>Strong dollar:</span>       overseas revenue worth fewer USD &rarr; <span class='bad'>FX translation headwind</span>\n<span class='cm'>Strong dollar:</span>       ACME's goods pricier abroad &rarr; <span class='bad'>competitiveness hit</span>\n<span class='cm'>Sector check:</span>       is its sector still outperforming SPY? &rarr; <span class='am'>confirm RS</span>\n<span class='cm'>Market check:</span>       breadth + VIX healthy? &rarr; <span class='am'>confirm regime</span>\n<span class='dim'>Net: a clean bottom-up chart now carries two fresh macro headwinds. Smaller size, tighter stop, or wait.</span></div></div>\n<p>Nothing about ACME's products changed. But the <em>price</em> of its future earnings (via the discount rate) and the <em>dollar value</em> of its foreign revenue both deteriorated because of forces two and three filters up. A trader who only looked at the stock chart would miss why the breakout keeps failing. A top-down trader saw the headwind coming.</p>\n<div class='chart' data-scenario='breakout-up' data-overlays='sma50' data-marks='resistance:120; note:60:121:breakout attempt; note:78:108:macro headwind stalls it' data-title='ACME · Daily' data-cap='An exporter attempting a breakout that stalls as a strong dollar and rising yields cap the move.'></div>\n<p>The chart shows the tension: the bottom-up setup wants to break out above resistance, but the macro ceiling — rising yields compressing the multiple, a strong dollar eroding revenue — keeps capping it. When the stock-level signal and the macro-level signal disagree, the larger force usually wins over time. That is the whole reason to work top-down.</p>\n<h3>The intermarket web</h3>\n<p>The markets you studied in this part are wired together. Rising yields lift the dollar and pressure long-duration growth stocks and gold. A strong dollar pressures commodities and emerging markets. A spiking VIX coincides with bonds and the yen catching safe-haven bids. None of these moves in isolation — and reading the web gives you context no single stock chart can.</p>\n<table><tr><td><strong>If this rises&hellip;</strong></td><td><strong>Usual pressure on&hellip;</strong></td><td><strong>Usual tailwind for&hellip;</strong></td></tr><tr><td>10-year yield</td><td>Growth stocks, gold, utilities</td><td>Banks, the dollar</td></tr><tr><td>US dollar (DXY)</td><td>Commodities, exporters, EM</td><td>Importers, dollar-cost buyers</td></tr><tr><td>VIX</td><td>Cyclicals, high-beta names</td><td>Defensives, bonds, yen</td></tr><tr><td>Oil</td><td>Airlines, consumers</td><td>Energy sector</td></tr></table>\n<div class='box tip'><div class='bt'>Insight.</div> You do not need to forecast macro — you need to be <em>positioned consistently with it</em>. Knowing that rising yields hurt your growth name lets you size smaller, hedge, or simply wait for the macro to turn, rather than being blindsided.</div>\n<div class='box danger'><div class='bt'>Pitfall.</div> Don't let macro become an excuse to ignore your stops. The macro view sets posture and size; the chart still triggers entries and exits. A trader who marries a macro narrative and overrides every price signal will hold losers far too long. Use macro as a tilt, the chart as the trigger.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Run one stock through the full top-down funnel.</p><ol><li>Pick a stock you are watching. Note whether most of its revenue is domestic or international.</li><li>Macro: what is the rate path and cycle phase? Tailwind or headwind for this kind of stock?</li><li>Market and sector: is the index trending with healthy breadth, and is the stock's sector outperforming on relative strength?</li><li>Intermarket: check the 10-year yield and the dollar. Do they help or hurt this specific name's thesis?</li><li>Write a verdict: do all four filters align, or is the stock fighting an upstream force? Decide whether to size up, size down, or wait.</li></ol></div></div>"}];

const nav=document.getElementById('nav');
const content=document.getElementById('content');
const crumbPath=document.getElementById('crumbPath');
const pfill=document.getElementById('pfill');
const pctTxt=document.getElementById('pctTxt');
const completed=new Set();
let current=0;
let lastPart=null;
L.forEach((les,i)=>{
  if(les.part!==lastPart){
    const lab=document.createElement('span');lab.className='part-label';lab.textContent=les.part;nav.appendChild(lab);lastPart=les.part;
  }
  const b=document.createElement('button');
  b.className='nav-item';b.dataset.i=i;
  b.innerHTML=`<span class="num">${les.num||'»'}</span><span class="ntxt">${les.nav}</span><span class="done">✓</span>`;
  b.addEventListener('click',()=>{go(i);closeSidebar();});
  nav.appendChild(b);
});
function updateNav(){
  document.querySelectorAll('.nav-item').forEach(el=>{
    const i=+el.dataset.i;
    el.classList.toggle('active',i===current);
    el.classList.toggle('completed',completed.has(i));
  });
}
function updateProgress(){
  const total=L.filter(x=>!x.cover).length;
  const doneCount=[...completed].filter(i=>!L[i].cover).length;
  const pct=Math.round(doneCount/total*100);
  pfill.style.width=pct+'%';pctTxt.textContent=pct+'%';
}
function go(i){
  current=i;const les=L[i];
  crumbPath.textContent=les.num?`./module-${les.num}`:'./start';
  let foot=`<div class="lesson-foot">`;
  foot+=i>0?`<button class="btn ghost" onclick="go(${i-1})">← prev</button>`:`<span></span>`;
  if(!les.cover){
    const mark=completed.has(i);
    foot+=`<button class="btn" id="markBtn" onclick="toggleDone(${i})">${mark?'✓ completed — click to undo':'mark lesson complete'}</button>`;
  } else {foot+=`<span></span>`;}
  foot+=i<L.length-1?`<button class="btn primary" onclick="go(${i+1})">next →</button>`:`<span></span>`;
  foot+=`</div>`;
  const head=les.cover?'':`<span class="lesson-kicker">${les.kicker}</span><h2 class="lesson-title">${les.title}</h2>`;
  content.innerHTML=head+les.html+foot;
  if(window.renderCharts)renderCharts(content);
  window.scrollTo({top:0,behavior:'smooth'});
  updateNav();
}
function toggleDone(i){
  if(completed.has(i))completed.delete(i);else completed.add(i);
  updateProgress();updateNav();
  const btn=document.getElementById('markBtn');
  if(btn)btn.textContent=completed.has(i)?'✓ completed — click to undo':'mark lesson complete';
}
window.go=go;window.toggleDone=toggleDone;
const sidebar=document.getElementById('sidebar');
const scrim=document.getElementById('scrim');
document.getElementById('menuBtn').addEventListener('click',()=>{sidebar.classList.toggle('open');scrim.classList.toggle('show');});
scrim.addEventListener('click',closeSidebar);
function closeSidebar(){sidebar.classList.remove('open');scrim.classList.remove('show');}
go(0);updateProgress();
</script>
<script>
/* ============================================================
   Self-contained chart engine for the Trading Masterclass.
   Renders <div class="chart" ...> elements into inline SVG:
   - candlestick charts with synthetic scenarios + indicators
   - option payoff diagrams (legs priced via Black-Scholes)
   - Greek / Black-Scholes curves
   No external libraries. window.renderCharts(root) is the entry point.
   ============================================================ */
(function () {
  const NS = 'http://www.w3.org/2000/svg';
  const cssv = n => (getComputedStyle(document.documentElement).getPropertyValue(n).trim() || '#888');
  function COL() {
    return {
      up: cssv('--green'), dn: cssv('--red'), ink: cssv('--ink'), dim: cssv('--ink-dim'),
      faint: cssv('--ink-faint'), grid: cssv('--grid'), amber: cssv('--amber'),
      cyan: cssv('--cyan'), violet: cssv('--violet')
    };
  }
  const OVC = { sma20: '#4aa8ff', sma50: '#ffb020', sma200: '#a78bfa', ema9: '#46e88f', ema21: '#ff8fb0', bb: '#8294a8', vwap: '#d4dee8', psar: '#ffb020', fib: '#8294a8', trend: '#4aa8ff' };

  function E(tag, attrs, txt) {
    const e = document.createElementNS(NS, tag);
    if (attrs) for (const k in attrs) e.setAttribute(k, attrs[k]);
    if (txt != null) e.textContent = txt;
    return e;
  }
  const hash = s => { let h = 2166136261; for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); } return h >>> 0; };
  const rng = seed => { let s = (seed >>> 0) || 1; return () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 4294967296; }; };

  /* ---------------- scenario -> OHLC + auto annotations ---------------- */
  function genSeries(scn) {
    const N = 72, r = rng(hash(scn)), lv = new Array(N).fill(0), notes = [];
    const ramp = (a, b, p0, p1) => { for (let i = a; i <= b; i++) lv[i] = p0 + (p1 - p0) * ((i - a) / (b - a || 1)); };

      case 'channel-down': ramp(0, N - 1, 130, 90); for (let i = 0; i < N; i++) lv[i] += 4 * Math.sin(2 * Math.PI * 5 * i / N); break;

  }

  /* ---------------- SVG helpers ---------------- */

  /* ---------------- candlestick chart ---------------- */
  function priceChart(opts) {

    // marks: zones first (behind)

      else if (m.k === 'note') { const i = Math.round(m.a); svg.appendChild(txt(xC(i), yP(m.b), m.c || '', c.ink, 9, 'middle')); }

    const vmax = Math.max(...bars.map(b => b.v));

    bars.forEach((b, i) => { const h = b.v / vmax * (volH - 4); svg.appendChild(E('rect', { x: xC(i) - bw * 0.32, y: volTop + volH - h, width: Math.max(bw * 0.64, 1), height: h, fill: b.c >= b.o ? c.up : c.dn, opacity: 0.5 })); });
    svg.appendChild(line(padL, volTop, padL + innerW, volTop, c.grid, 1));

      const yI = (v, lo, hi) => it + 8 + (1 - (v - lo) / (hi - lo)) * (indH - 16);
      const label = (s) => svg.appendChild(txt(padL, it + 11, s, c.faint, 8));
      if (pane === 'rsi') { label('RSI(14)'); [30, 50, 70].forEach(l => { svg.appendChild(line(padL, yI(l, 0, 100), padL + innerW, yI(l, 0, 100), c.grid, 1, l === 50 ? '' : '3,3')); svg.appendChild(txt(padL + innerW + 4, yI(l, 0, 100) + 3, l, c.faint, 8)); }); const R = rsi(cl, 14); svg.appendChild(poly(R.map((v, i) => v == null ? null : [xC(i), yI(v, 0, 100)]).filter(Boolean), c.violet, 1.4)); }
      else if (pane === 'macd') { label('MACD(12,26,9)'); const { m, sig, hist } = macd(cl); const all = m.concat(sig).filter(x => x != null && isFinite(x)); const lo = Math.min(...all), hi = Math.max(...all); svg.appendChild(line(padL, yI(0, lo, hi), padL + innerW, yI(0, lo, hi), c.grid, 1)); hist.forEach((v, i) => { if (v == null) return; const y0 = yI(0, lo, hi), y1 = yI(v, lo, hi); svg.appendChild(E('rect', { x: xC(i) - bw * 0.3, y: Math.min(y0, y1), width: Math.max(bw * 0.6, 1), height: Math.max(Math.abs(y1 - y0), 0.5), fill: v >= 0 ? c.up : c.dn, opacity: 0.5 })); }); svg.appendChild(poly(m.map((v, i) => isFinite(v) ? [xC(i), yI(v, lo, hi)] : null).filter(Boolean), c.cyan, 1.3)); svg.appendChild(poly(sig.map((v, i) => isFinite(v) ? [xC(i), yI(v, lo, hi)] : null).filter(Boolean), c.amber, 1.3)); }
      else if (pane === 'stoch') { label('Stoch(14,3)'); [20, 80].forEach(l => svg.appendChild(line(padL, yI(l, 0, 100), padL + innerW, yI(l, 0, 100), c.grid, 1, '3,3'))); const { k, d } = stoch(bars); svg.appendChild(poly(k.map((v, i) => v == null ? null : [xC(i), yI(v, 0, 100)]).filter(Boolean), c.cyan, 1.3)); svg.appendChild(poly(d.map((v, i) => v == null ? null : [xC(i), yI(v, 0, 100)]).filter(Boolean), c.amber, 1.3)); }
      else if (pane === 'atr') { label('ATR(14)'); const A = atr(bars); const v = A.filter(x => x != null); const lo = Math.min(...v), hi = Math.max(...v); svg.appendChild(poly(A.map((x, i) => x == null ? null : [xC(i), yI(x, lo, hi)]).filter(Boolean), c.amber, 1.4)); }
      else if (pane === 'obv') { label('OBV'); const O = obv(bars); const lo = Math.min(...O), hi = Math.max(...O); svg.appendChild(poly(O.map((x, i) => [xC(i), yI(x, lo, hi)]), c.cyan, 1.4)); }
    }
    return { svg, legend };
  }

  function parseMarks(s) { if (!s) return []; return s.split(';').map(p => p.trim()).filter(Boolean).map(p => { const seg = p.split(':'); return { k: seg[0], a: parseFloat(seg[1]), b: isNaN(parseFloat(seg[2])) ? seg[2] : parseFloat(seg[2]), c: seg[3] }; }); }

  /* ---------------- option payoff ---------------- */
  const LEGNAME = { lc: 'long call', sc: 'short call', lp: 'long put', sp: 'short put', ls: 'long stock', ss: 'short stock' };
  function payoffChart(opts) {
    const c = COL(); const S0 = 100, r = 0.04, T = 30 / 365, sig = 0.30;
    const legs = (opts.legs || '').split(',').map(s => s.trim()).filter(Boolean).map(s => { const p = s.split(':'); return { t: p[0], K: parseFloat(p[1] || S0), q: parseFloat(p[2] || 1) }; });
    let netCost = 0; const desc = [];
    legs.forEach(l => {
      if (l.t === 'ls') { netCost += S0 * l.q; }
      else if (l.t === 'ss') { netCost -= S0 * l.q; }
      else { const call = l.t[1] === 'c'; const pr = bs(S0, l.K, T, r, sig, call).price; const long = l.t[0] === 'l'; netCost += (long ? 1 : -1) * pr * l.q; desc.push((LEGNAME[l.t]) + ' ' + l.K); }
    });
    function pl(S) { let v = 0; legs.forEach(l => { if (l.t === 'ls') v += (S - S0) * l.q; else if (l.t === 'ss') v += (S0 - S) * l.q; else { const call = l.t[1] === 'c'; const intr = call ? Math.max(S - l.K, 0) : Math.max(l.K - S, 0); const pr = bs(S0, l.K, T, r, sig, call).price; const long = l.t[0] === 'l'; v += (long ? 1 : -1) * (intr - pr) * l.q; } }); return v; }
    const W = 760, H = 300, padL = 46, padR = 16, padT = 14, padB = 28;
    const xs = []; for (let S = 60; S <= 140; S += 0.5) xs.push(S);
    const pls = xs.map(pl);
    const ymin = Math.min(...pls, -2), ymax = Math.max(...pls, 2);
    const iw = W - padL - padR, ih = H - padT - padB;
    const xX = S => padL + (S - 60) / 80 * iw;
    const yY = v => padT + ih - (v - ymin) / (ymax - ymin) * ih;
    const svg = svgRoot(W, H);
    for (let t = 0; t <= 4; t++) { const v = ymin + (ymax - ymin) * t / 4; svg.appendChild(line(padL, yY(v), W - padR, yY(v), c.grid, 1)); svg.appendChild(txt(padL - 4, yY(v) + 3, (v >= 0 ? '+' : '') + v.toFixed(0), c.faint, 9, 'end')); }
    [60, 80, 100, 120, 140].forEach(S => { svg.appendChild(line(xX(S), padT, xX(S), padT + ih, c.grid, 1)); svg.appendChild(txt(xX(S), H - padB + 14, S, c.faint, 9, 'middle')); });
    svg.appendChild(line(padL, yY(0), W - padR, yY(0), c.dim, 1.4));
    svg.appendChild(line(xX(S0), padT, xX(S0), padT + ih, c.amber, 1, '4,3'));
    svg.appendChild(txt(xX(S0), padT + 9, 'spot', c.amber, 8, 'middle'));
    // profit/loss shaded line
    const ptsUp = [], ptsDn = [];
    xs.forEach((S, i) => { (pls[i] >= 0 ? ptsUp : ptsDn); });
    svg.appendChild(poly(xs.map((S, i) => [xX(S), yY(pls[i])]), c.cyan, 2));
    // breakevens
    for (let i = 1; i < xs.length; i++) { if ((pls[i - 1] < 0) !== (pls[i] < 0)) { const S = xs[i]; svg.appendChild(E('circle', { cx: xX(S), cy: yY(0), r: 3, fill: c.ink })); svg.appendChild(txt(xX(S), yY(0) - 6, 'BE ' + S.toFixed(1), c.ink, 8, 'middle')); } }
    const maxP = Math.max(...pls), maxL = Math.min(...pls);
    const legend = [[c.cyan, 'P/L at expiration'], [c.amber, 'spot ' + S0]];
    const cap = `Net ${netCost >= 0 ? 'debit' : 'credit'} ≈ ${Math.abs(netCost).toFixed(2)}/sh · max profit ${maxP > 1e4 ? 'unlimited' : '+' + maxP.toFixed(2)} · max loss ${maxL < -1e4 ? 'large' : maxL.toFixed(2)} (per share; ×100 per contract)`;
    return { svg, legend, autocap: cap };
  }

  /* ---------------- Greek / BS curves ---------------- */
  function curveChart(opts) {
    const c = COL(); const which = (opts.curve || 'call-value'); const K = 100, r = 0.04, T = 30 / 365, sig = 0.30;
    let xs = [], ys = [], y2 = null, xlab = 'underlying price', title2 = '', extra = '';
    const fill = f => { xs = []; ys = []; for (let S = 60; S <= 140; S += 0.5) { xs.push(S); ys.push(f(S)); } };
    if (which === 'call-value') { fill(S => bs(S, K, T, r, sig, true).price); y2 = xs.map(S => Math.max(S - K, 0)); extra = 'intrinsic'; }
    else if (which === 'put-value') { fill(S => bs(S, K, T, r, sig, false).price); y2 = xs.map(S => Math.max(K - S, 0)); extra = 'intrinsic'; }
    else if (which === 'payoff-long-call') { fill(S => Math.max(S - K, 0) - bs(100, K, T, r, sig, true).price); }
    else if (which === 'payoff-long-put') { fill(S => Math.max(K - S, 0) - bs(100, K, T, r, sig, false).price); }
    else if (which === 'delta') { fill(S => bs(S, K, T, r, sig, true).delta); }
    else if (which === 'gamma') { fill(S => bs(S, K, T, r, sig, true).gamma); }
    else if (which === 'vega') { fill(S => bs(S, K, T, r, sig, true).vega); }
    else if (which === 'rho') { fill(S => bs(S, K, T, r, sig, true).rho); }
    else if (which === 'theta') { fill(S => bs(S, K, T, r, sig, true).theta); }
    else if (which === 'time-decay') { xlab = 'days to expiration'; xs = []; ys = []; for (let d = 90; d >= 0; d -= 1) { xs.push(d); ys.push(bs(100, K, d / 365, r, sig, true).price); } }
    else if (which === 'iv-smile') { xlab = 'strike'; xs = []; ys = []; for (let K2 = 70; K2 <= 130; K2 += 1) { xs.push(K2); ys.push(28 + 0.006 * Math.pow(K2 - 100, 2) - 0.04 * (K2 - 100)); } title2 = 'implied vol %'; }
    else { fill(S => bs(S, K, T, r, sig, true).price); }
    const W = 760, H = 280, padL = 50, padR = 16, padT = 14, padB = 28;
    const iw = W - padL - padR, ih = H - padT - padB;
    const xmin = xs[0], xmax = xs[xs.length - 1];
    let all = ys.concat(y2 || []); const ymin = Math.min(...all), ymax = Math.max(...all);
    const xX = v => padL + (v - xmin) / (xmax - xmin) * iw;
    const yY = v => padT + ih - (v - ymin) / ((ymax - ymin) || 1) * ih;
    const svg = svgRoot(W, H);
    for (let t = 0; t <= 4; t++) { const v = ymin + (ymax - ymin) * t / 4; svg.appendChild(line(padL, yY(v), W - padR, yY(v), c.grid, 1)); svg.appendChild(txt(padL - 4, yY(v) + 3, v.toFixed(Math.abs(ymax) < 2 ? 2 : 0), c.faint, 9, 'end')); }
    for (let t = 0; t <= 4; t++) { const v = xmin + (xmax - xmin) * t / 4; svg.appendChild(line(xX(v), padT, xX(v), padT + ih, c.grid, 1)); svg.appendChild(txt(xX(v), H - padB + 14, v.toFixed(0), c.faint, 9, 'middle')); }
    if (ymin < 0 && ymax > 0) svg.appendChild(line(padL, yY(0), W - padR, yY(0), c.dim, 1.2));
    if (which.indexOf('value') >= 0 || which.indexOf('payoff') >= 0 || which === 'delta' || which === 'gamma') { svg.appendChild(line(xX(100), padT, xX(100), padT + ih, c.amber, 1, '4,3')); svg.appendChild(txt(xX(100), padT + 9, 'K=100', c.amber, 8, 'middle')); }
    if (y2) svg.appendChild(poly(xs.map((x, i) => [xX(x), yY(y2[i])]), c.dim, 1.3, '4,3'));
    svg.appendChild(poly(xs.map((x, i) => [xX(x), yY(ys[i])]), c.cyan, 2));
    svg.appendChild(txt(padL, padT + 9, xlab + (title2 ? '' : ''), c.faint, 8));
    const legend = [[c.cyan, which.replace(/-/g, ' ')]]; if (extra) legend.push([c.dim, extra]);
    return { svg, legend };
  }

  /* ---------------- dispatcher ---------------- */
  function renderOne(div) {
    try {
      const type = div.getAttribute('data-type') || 'price';
      let res, title = div.getAttribute('data-title') || '', cap = div.getAttribute('data-cap') || '';
      if (type === 'payoff') res = payoffChart({ legs: div.getAttribute('data-legs') });
      else if (type === 'curve') res = curveChart({ curve: div.getAttribute('data-curve') });
      else res = priceChart({ scenario: div.getAttribute('data-scenario'), overlays: div.getAttribute('data-overlays'), pane: div.getAttribute('data-pane'), marks: div.getAttribute('data-marks') });
      if (res.autocap && !cap) cap = res.autocap;
      div.textContent = '';
      const head = document.createElement('div'); head.className = 'chart-head';
      const ct = document.createElement('div'); ct.className = 'ct'; ct.textContent = title || '';
      head.appendChild(ct);
      const leg = document.createElement('div'); leg.className = 'cleg';
      (res.legend || []).forEach(([col, lbl]) => { const i = document.createElement('i'); const sw = document.createElement('span'); sw.className = 'sw'; sw.style.background = col; i.appendChild(sw); i.appendChild(document.createTextNode(lbl)); leg.appendChild(i); });
      head.appendChild(leg);
      div.appendChild(head);
      div.appendChild(res.svg);
      if (cap) { const cc = document.createElement('div'); cc.className = 'chart-cap'; cc.textContent = cap; div.appendChild(cc); }
      div.setAttribute('data-rendered', '1');
    } catch (e) {
      div.innerHTML = '<div class="chart-bad">chart error: ' + (e && e.message) + '</div>';
    }
  }
  window.renderCharts = function (root) {
    (root || document).querySelectorAll('.chart:not([data-rendered])').forEach(renderOne);
  };
  // patch go() so charts render on every lesson navigation, and render the current view now
  if (typeof window.go === 'function') { const _g = window.go; window.go = function (i) { _g(i); window.renderCharts(document.getElementById('content')); }; }
  window.renderCharts(document.getElementById('content'));
})();

</script>
</body>
</html>
