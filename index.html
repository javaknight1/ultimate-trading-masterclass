<style>
  :root{
    --bg:#080b10;--bg-2:#0b0f15;--panel:#0e131b;--panel-2:#131a24;--grid:#1b2535;

    --mono:'JetBrains Mono',monospace;--body:'IBM Plex Mono',monospace;--crt:'VT323',monospace;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}

  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;background:radial-gradient(ellipse at 50% 0%, rgba(94,243,140,.05), transparent 60%),radial-gradient(ellipse at 100% 100%, rgba(0,0,0,.6), transparent 55%);}
  ::selection{background:var(--green);color:#04130a;}
  .shell{display:grid;grid-template-columns:320px 1fr;min-height:100vh;}
  aside{position:sticky;top:0;height:100vh;overflow-y:auto;background:linear-gradient(180deg,var(--bg-2),var(--bg));border-right:1px solid var(--border);padding:0 0 60px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
  aside::-webkit-scrollbar{width:8px;}
  aside::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
  .brand{padding:26px 24px 18px;border-bottom:1px solid var(--border-soft);position:sticky;top:0;background:linear-gradient(180deg,var(--bg-2),rgba(10,17,12,.96));backdrop-filter:blur(6px);z-index:5;}
  .brand .tag{font-family:var(--mono);font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--green);opacity:.8;}
  .brand h1{font-family:var(--crt);font-weight:400;font-size:38px;line-height:.92;margin:6px 0 2px;color:var(--green-bright);text-shadow:0 0 18px rgba(94,243,140,.35);letter-spacing:.02em;}
  .brand .sub{font-size:11px;color:var(--ink-dim);letter-spacing:.04em;}
  .progress-wrap{margin-top:14px;}
  .progress-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--ink-dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px;}
  .progress-bar{height:5px;background:var(--grid);border-radius:99px;overflow:hidden;border:1px solid var(--border-soft);}
  .progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width .4s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 12px rgba(94,243,140,.6);}
  nav{padding:14px 12px 0;}
  .part-label{font-family:var(--mono);font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-faint);padding:18px 12px 7px;display:block;}
  .nav-item{display:flex;gap:10px;align-items:baseline;width:100%;text-align:left;background:none;border:none;cursor:pointer;color:var(--ink-dim);font-family:var(--body);font-size:13.5px;padding:8px 12px;border-radius:7px;line-height:1.4;transition:.16s;border:1px solid transparent;}
  .nav-item:hover{background:var(--panel);color:var(--ink);}
  .nav-item.active{background:var(--panel-2);color:var(--green-bright);border-color:var(--border);box-shadow:inset 2px 0 0 var(--green);}
  .nav-item .num{font-family:var(--mono);font-size:11px;color:var(--green);opacity:.7;min-width:30px;}
  .nav-item.active .num{opacity:1;}
  .nav-item .done{margin-left:auto;color:var(--green);font-size:12px;opacity:0;transition:.2s;}
  .nav-item.completed .done{opacity:1;}
  .nav-item.completed{color:var(--ink-faint);}
  main{padding:0;max-width:980px;}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;padding:14px 40px;background:rgba(7,11,8,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--border-soft);}
  .crumbs{font-family:var(--mono);font-size:11px;color:var(--ink-dim);letter-spacing:.05em;}
  .crumbs b{color:var(--green);font-weight:700;}
  .blink{animation:blink 1.1s steps(1) infinite;color:var(--green);}
  @keyframes blink{50%{opacity:0;}}
  .content{padding:46px 56px 120px;animation:fade .45s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .lesson-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--amber);}
  h2.lesson-title{font-family:var(--mono);font-weight:800;font-size:30px;line-height:1.12;margin:8px 0 6px;color:#eaf6ee;letter-spacing:-.01em;}
  .lede{font-size:16px;color:#cfe6d8;border-left:2px solid var(--green);padding-left:16px;margin:18px 0 30px;}
  h3{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--green-bright);margin:34px 0 10px;letter-spacing:.01em;}
  h3::before{content:"▸ ";color:var(--green);opacity:.7;}
  h4{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--cyan);margin:22px 0 6px;letter-spacing:.04em;text-transform:uppercase;}
  p{margin:12px 0;}
  a{color:var(--cyan);text-decoration:none;border-bottom:1px dotted var(--cyan);}
  a:hover{color:var(--green-bright);border-color:var(--green-bright);}
  strong{color:#e6f4ec;font-weight:600;}
  em{color:var(--amber);font-style:normal;}
  ul,ol{margin:12px 0;padding-left:22px;}
  li{margin:7px 0;}

  .term{margin:20px 0;border:1px solid var(--border);border-radius:11px;overflow:hidden;background:#040806;box-shadow:var(--shadow);}
  .term-head{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--panel-2);border-bottom:1px solid var(--border-soft);}

  .box::before{position:absolute;left:16px;top:15px;font-family:var(--mono);font-size:16px;}
  .box .bt{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;margin-bottom:4px;}
  .box.lab{border-color:#1f4d35;background:linear-gradient(180deg,rgba(94,243,140,.05),transparent);}
  .box.lab::before{content:"⌘";color:var(--green);}
  .box.lab .bt{color:var(--green-bright);}
  .box.law{border-color:#5a4410;background:linear-gradient(180deg,rgba(255,176,0,.06),transparent);}
  .box.law::before{content:"§";color:var(--amber);}
  .box.law .bt{color:var(--amber);}
  .box.danger{border-color:#5e1f1f;background:linear-gradient(180deg,rgba(255,93,93,.06),transparent);}
  .box.danger::before{content:"!";color:var(--red);font-weight:800;}
  .box.danger .bt{color:var(--red);}
  .box.tip{border-color:#1d4453;background:linear-gradient(180deg,rgba(90,215,255,.05),transparent);}
  .box.tip::before{content:"✦";color:var(--cyan);}

  .btn{font-family:var(--mono);font-size:12px;letter-spacing:.06em;border:1px solid var(--border);background:var(--panel);color:var(--ink);padding:11px 18px;border-radius:8px;cursor:pointer;transition:.18s;}

  .btn.primary{border-color:var(--green);color:#04130a;background:var(--green);font-weight:700;}
  .btn.primary:hover{background:var(--green-bright);box-shadow:0 0 22px rgba(94,243,140,.4);}

  .cover h2.lesson-title{font-family:var(--crt);font-size:64px;color:var(--green-bright);text-shadow:0 0 30px rgba(94,243,140,.3);font-weight:400;line-height:.95;}
  .cover .lede{font-size:17px;border:none;padding:0;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:24px 0;}

    aside.open{transform:none;}
    .mobile-bar{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40;padding:12px 18px;background:rgba(7,11,8,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);}
    .menu-btn{font-family:var(--mono);background:var(--panel-2);border:1px solid var(--border);color:var(--green);padding:8px 12px;border-radius:8px;cursor:pointer;}
    .content{padding:28px 22px 100px;}
    .topbar{padding:12px 22px;}
    .grid2{grid-template-columns:1fr;}
    .cover h2.lesson-title{font-size:44px;}
    .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:45;}
    .scrim.show{display:block;}
  }
  .chart{margin:24px 0;border:1px solid var(--border);border-radius:11px;background:var(--panel);overflow:hidden;box-shadow:var(--shadow);}
  .chart-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 14px;background:var(--panel-2);border-bottom:1px solid var(--border-soft);font-family:var(--mono);font-size:11px;letter-spacing:.04em;flex-wrap:wrap;}
  .chart-head .ct{color:var(--ink);font-weight:700;}
  .chart-head .cleg{color:var(--ink-dim);font-size:10px;display:flex;gap:12px;flex-wrap:wrap;}
  .chart-head .cleg i{font-style:normal;display:inline-flex;align-items:center;gap:5px;}

  .chart svg{display:block;width:100%;height:auto;background:transparent;}

  .chart-bad{padding:14px;color:var(--red);font-family:var(--mono);font-size:12px;}

<script>
const L = [{"id":"cover","part":"START","nav":"Welcome","cover":true,"html":"\n<div class=\"cover\">\n<span class=\"lesson-kicker\">market open · quote → options chain</span>\n<h2 class=\"lesson-title\">read the<br>tape.</h2>\n<p class=\"lede\">A rigorous, example-driven path from every number on a brokerage quote, to valuing a company, to all of technical analysis with real charts you analyze, to options, the Greeks, and the strategy playbook. Built-in candlestick charts, indicators, and payoff diagrams illustrate every concept.</p>\n<div class=\"grid2\">\n  <div class=\"card\"><div class=\"ct\">🔢 Every number, explained</div><p>Market cap, float, P/E, EPS, beta, EV/EBITDA, short interest — what each means and how it is calculated, plus how to value a company with multiples and DCF.</p></div>\n  <div class=\"card\"><div class=\"ct\">📈 Charts you actually analyze</div><p>Live SVG candlestick charts with SMA/EMA, RSI, MACD, Bollinger and more — every pattern and indicator shown on a chart, with an honest take on how reliable it is.</p></div>\n  <div class=\"card\"><div class=\"ct\">Δ Options &amp; the Greeks</div><p>Calls, puts, the chain, and the Greeks (delta, gamma, theta, vega, rho) with Black–Scholes curves — then the full strategy toolbox, each with a payoff diagram.</p></div>\n  <div class=\"card\"><div class=\"ct\">🛡 Risk first</div><p>Position sizing, expectancy, backtesting, journaling, and the psychology — the parts that actually keep you in the game.</p></div>\n</div>\n<h3>How this course is structured</h3>\n<p>Sixteen parts, building in order: the stock and its numbers → fundamentals &amp; valuation → technical analysis → options, Greeks &amp; strategies → risk, systems, and the macro picture. Mark lessons complete as you go; your progress bar lives in the sidebar.</p>\n<div class=\"box danger\"><div class=\"bt\">Educational only — not financial advice.</div> Nothing here is a recommendation to buy or sell anything. All charts use <em>synthetic, illustrative</em> data (fictional tickers), and option prices are model estimates. Markets involve real risk of loss; do your own research.</div>\n</div>\n"},{"id":"p0-1","part":"00 · Markets & Brokerage","nav":"What Is a Stock","num":"0.1","kicker":"Part 00 · Lesson 1","title":"What a Stock Is and Why Prices Move","html":"<h3>A share is a slice of a business</h3><p>Before you ever read a chart, you have to know what the line on that chart represents. A <strong>share of stock</strong> is fractional ownership of a real company. Own one share and you own a tiny piece of the factories, the brand, the cash in the bank, and a claim on a slice of future profits. This is not an abstraction invented by Wall Street &mdash; it is a legal ownership stake, the same idea whether you own 1 share or 1 million.</p><p>The cleanest way to feel this is to build a company from scratch. Imagine you and some friends start <strong>Lemon Co.</strong>, a lemonade business. An appraiser values the whole operation &mdash; stands, recipes, brand, expected summer profits &mdash; at <strong>$1,000,000</strong>. You decide to divide ownership into <strong>100,000 shares</strong>. Basic arithmetic gives each share a value of:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Share value from company value</span></div><div class='term-body'><span class='dim'>Company value</span>      <span class='cm'>$1,000,000</span>\n<span class='dim'>Shares outstanding</span>  <span class='cm'>100,000</span>\n<span class='dim'>Price per share</span>     <span class='ok'>$1,000,000 &divide; 100,000 = $10.00</span></div></div><p>That $10 figure is the company's <strong>market value per share</strong> at the moment of creation. Multiply it back out &mdash; price &times; shares outstanding &mdash; and you recover the <strong>market capitalization</strong> ($1,000,000). Every public company you will ever trade works exactly this way: Apple's stock price times its share count is what the whole company is &ldquo;worth&rdquo; in the market's eyes that second.</p><h3>Why the price is never frozen</h3><p>Here is the part beginners get wrong. The $10 is not handed down by an authority. Once Lemon Co. is public, nobody sets the price. Instead, the price is simply <strong>the most recent number at which a buyer and a seller agreed to trade</strong>. It is the location where supply meets demand, and it updates every time a new trade prints.</p><p>Suppose the last trade was $10.00. There is a seller willing to let go at $10.05 and, a moment ago, the best buyer was only willing to pay $10.00. No trade can happen at a single price gap unless someone moves. Now imagine a new, eager buyer arrives who believes summer demand will be huge. They decide they will not wait &mdash; they raise their offer and <strong>outbid</strong> the prior buyer, agreeing to the seller's $10.05. A trade prints. The quoted price ticks from <span class='dim'>$10.00</span> to <span class='ok'>$10.05</span>.</p><div class='box tip'><div class='bt'>Insight.</div> A stock price is a <em>continuous auction</em>, not a sticker. Every tick is one new agreement between one buyer and one seller. &ldquo;The price went up&rdquo; just means the most recent agreement was struck at a higher number than the one before it.</div><p>Nothing about Lemon Co.'s lemons, stands, or bank account changed in that second. Only the <strong>balance of who wants in versus who wants out</strong> changed. That balance is what a chart actually plots over time.</p><h3>What pushes the balance around</h3><p>If price is the meeting point of buyers and sellers, then anything that makes one side more eager moves it. The big drivers:</p><ul><li><strong>Fundamentals (the business itself).</strong> Earnings rise, a new product launches, profit margins expand &mdash; buyers grow more eager, sellers demand more, price drifts up.</li><li><strong>Expectations about the future.</strong> Markets are forward-looking. A stock can fall on <em>good</em> earnings if buyers expected even better. You are trading the future, not the present.</li><li><strong>Interest rates and the economy.</strong> When safe bonds pay more, risky stocks must compete for capital, often pressuring prices.</li><li><strong>Sentiment and flows.</strong> Fear, greed, index-fund buying, and forced selling all move the balance regardless of the underlying business.</li><li><strong>Supply of shares.</strong> Buybacks shrink the share count; new share issuance dilutes it.</li></ul><p>Below is the simplest possible picture: an orderly uptrend, where on balance buyers were repeatedly more eager than sellers, so each new agreement printed a little higher.</p><div class='chart' data-scenario='uptrend' data-title='LEMON · Daily' data-cap='Each higher candle is a fresh agreement struck above the last as buyers stay the eager side.'></div><p>Read that chart as a <em>story of pressure</em>. The rising slope is not magic; it is the visible residue of thousands of tiny auctions in which demand kept edging out supply. When the story flips &mdash; sellers turn eager, buyers step back &mdash; the same mechanism prints lower, and the trend turns. Master this mental model now and every later lesson on spreads, order books, and patterns will slot neatly into it.</p><div class='box law'><div class='bt'>Definition.</div> <strong>Price</strong> = the most recent transaction price between a willing buyer and a willing seller. <strong>Market cap</strong> = price &times; shares outstanding. The chart is a time-series of that transaction price.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: feel that price is an agreement, not a fact.</p><ol><li>Pick any company you know and look up its share price and its shares outstanding.</li><li>Multiply them to get market cap. Ask yourself: does the whole company really seem &ldquo;worth&rdquo; that?</li><li>Watch the live price tick for two minutes. Each change is one new buyer-seller agreement &mdash; note how nothing about the business changed in those seconds.</li><li>Write one sentence: what would make a buyer eager enough to outbid and tick this stock up tomorrow?</li></ol></div></div>"},{"id":"p0-2","part":"00 · Markets & Brokerage","nav":"Exchanges & Makers","num":"0.2","kicker":"Part 00 · Lesson 2","title":"Exchanges, Market Makers and Liquidity","html":"<h3>The exchange is a matching machine</h3><p>When you click <em>buy</em>, your order does not fly to a trading-floor human in a colored jacket. It is routed to an <strong>exchange</strong> (NYSE, Nasdaq) or an electronic venue, which runs a <strong>matching engine</strong> &mdash; software whose entire job is to pair buy orders with sell orders according to strict rules. The two rules that matter:</p><ul><li><strong>Price priority.</strong> The highest bid and the lowest offer get matched first.</li><li><strong>Time priority.</strong> Among equal prices, whoever placed their order first gets filled first.</li></ul><p>The exchange itself takes no view on the stock. It is a neutral referee that matches willing buyers to willing sellers and broadcasts the resulting prices to the world. The two key numbers it broadcasts are the <strong>best bid</strong> (highest price anyone will pay right now) and the <strong>best offer / ask</strong> (lowest price anyone will sell for right now).</p><h3>The problem: buyers and sellers don't arrive together</h3><p>Real markets have a timing problem. You want to buy AAPL at 10:00:00.000, but the next natural seller might not show up for another 400 milliseconds. If every trade had to wait for a perfectly matched counterparty, you would sit there unable to transact. This is where <strong>market makers</strong> come in.</p><p>A market maker is a firm that continuously posts <em>both</em> a bid and an offer, standing ready to buy from sellers and sell to buyers at any moment. They are the always-on counterparty. Because they quote both sides, they manufacture <strong>liquidity</strong> &mdash; the ability to trade quickly without moving the price much.</p><div class='box law'><div class='bt'>Definition.</div> <strong>Liquidity</strong> = how easily you can buy or sell size without moving the price. High liquidity &rarr; tight spreads, big resting size, fast fills. Low liquidity &rarr; wide spreads, thin size, slippage.</div><h3>How a market maker actually earns</h3><p>Market makers are not charities; they get paid through the <strong>spread</strong> &mdash; the gap between their bid and their offer. Watch one work a round trip in AAPL:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Market maker round trip · AAPL · 100 shares</span></div><div class='term-body'><span class='dim'>MM posts</span>   <span class='pr'>189.40 bid</span>  /  <span class='pr'>189.42 ask</span>\n<span class='dim'>Seller hits the bid</span>   MM <span class='bad'>buys</span> 100 @ 189.40  = pays $18,940\n<span class='dim'>Buyer lifts the ask</span>   MM <span class='ok'>sells</span> 100 @ 189.42 = gets $18,942\n<span class='dim'>Spread captured</span>      <span class='ok'>$0.02 &times; 100 = $2.00</span></div></div><p>The market maker bought at 189.40 and sold at 189.42, pocketing the <strong>2-cent spread</strong> &mdash; $2 on the round trip &mdash; without ever caring which way the stock goes, as long as buyers and sellers keep arriving. Do that thousands of times a second across thousands of symbols and the pennies compound into a real business. Their edge is volume and speed; your job as a trader is to understand that <em>you are paying that spread on the other side of every trade.</em></p><h3>Liquidity is not uniform</h3><p>Mega-caps like AAPL trade millions of shares a day, so dozens of market makers compete, the spread is razor-thin (often a single penny), and you can move size instantly. A tiny micro-cap might have one half-hearted market maker, a 30-cent spread, and almost no resting size &mdash; trade it and you <em>are</em> the volume.</p><div class='chart' data-scenario='range' data-marks='hline:101.20:offer wall;hline:98.80:bid support' data-title='NOVA · Daily' data-cap='In a liquid name, deep resting bids and offers absorb orders and keep price ranging tightly.'></div><p>That ranging chart is what abundant liquidity looks like from afar: plenty of resting demand near the lows and resting supply near the highs, so normal-sized orders get absorbed without lurching the price. In a thin name the same chart would be jagged &mdash; small orders punching air pockets between sparse quotes.</p><div class='box danger'><div class='bt'>Pitfall.</div> Liquidity can <strong>vanish</strong> exactly when you need it &mdash; around news, at the open and close, and in extended hours. Market makers widen or pull their quotes to protect themselves, so the spread you saw at noon may be five times wider at 4:01pm.</div><div class='box tip'><div class='bt'>Insight.</div> The headline price you see is the <em>last trade</em>. What you can actually transact at is the <em>bid</em> (if selling) or the <em>ask</em> (if buying). Always look at both quotes, not just the last price.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: see liquidity differences with your own eyes.</p><ol><li>Pull up a mega-cap (e.g. a giant tech name) and note its bid, ask, and spread in cents.</li><li>Now pull up a small, obscure stock and note its bid, ask, and spread.</li><li>Compare: how many times wider is the small-cap spread? That ratio is the liquidity gap you'd pay for.</li><li>Estimate the market maker's per-round-trip take on each: spread &times; 100 shares.</li></ol></div></div>"},{"id":"p0-3","part":"00 · Markets & Brokerage","nav":"Bid/Ask Spread","num":"0.3","kicker":"Part 00 · Lesson 3","title":"The Bid/Ask Spread and What It Costs You","html":"<h3>Two prices, always</h3><p>Beginners think a stock has <em>a</em> price. It actually has two prices at every instant:</p><ul><li><strong>Bid</strong> &mdash; the highest price a buyer is currently willing to pay. This is the price you <em>receive</em> when you sell.</li><li><strong>Ask (offer)</strong> &mdash; the lowest price a seller is currently willing to accept. This is the price you <em>pay</em> when you buy.</li></ul><p>The gap between them is the <strong>bid/ask spread</strong>. It is the single most overlooked cost in trading because no broker lists it on a statement &mdash; yet you pay it on the way in <em>and</em> on the way out.</p><div class='box law'><div class='bt'>Formula.</div> <strong>Spread</strong> = Ask &minus; Bid. <strong>Spread cost per share, round trip</strong> = Ask &minus; Bid (you buy at the ask, sell at the bid). <strong>Mid price</strong> = (Bid + Ask) &divide; 2.</div><h3>Crossing the spread: a worked round trip</h3><p>Say ACME is quoted <strong>50.04 bid / 50.10 ask</strong>. You want a quick in-and-out trade. To buy <em>now</em>, you must lift the ask at 50.10. To sell <em>now</em>, you must hit the bid at 50.04. Watch what happens even if the stock doesn't move a single cent between your two trades:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Spread cost · ACME · 100 shares · price unchanged</span></div><div class='term-body'><span class='dim'>Quote</span>          <span class='pr'>50.04 bid / 50.10 ask</span>\n<span class='dim'>Buy 100 @ ask</span>  <span class='bad'>50.10 &times; 100 = $5,010.00</span>\n<span class='dim'>Sell 100 @ bid</span> <span class='ok'>50.04 &times; 100 = $5,004.00</span>\n<span class='dim'>Result</span>         <span class='bad'>&minus;$6.00</span>  (loss with ZERO price movement)\n<span class='dim'>Spread</span>         50.10 &minus; 50.04 = <span class='am'>$0.06</span> &times; 100 = <span class='bad'>$6.00</span></div></div><p>The <strong>6-cent spread cost you $6 per 100 shares before the market moved at all</strong>. You started underwater. For the trade to break even, ACME must <em>rise 6 cents just to cover the spread</em> &mdash; the bid has to climb to 50.10 so you can sell back what you paid.</p><div class='box tip'><div class='bt'>Insight.</div> Every market-order round trip starts at a loss equal to the spread. You are not betting on the price &mdash; you are betting the price moves <em>more than the spread</em> in your favor. The spread is your starting hole.</div><h3>The spread scales with size and with width</h3><p>That $6 was on 100 shares. The damage scales linearly with share count and with how wide the spread is:</p><table><tr><td><strong>Shares</strong></td><td><strong>6&cent; spread</strong></td><td><strong>20&cent; spread</strong></td></tr><tr><td>100</td><td>$6</td><td>$20</td></tr><tr><td>1,000</td><td>$60</td><td>$200</td></tr><tr><td>5,000</td><td>$300</td><td>$1,000</td></tr></table><p>Trade a thin small-cap with a 20-cent spread in 5,000-share clips and you hand $1,000 to the market <em>per round trip</em>, win or lose. This is why scalpers obsess over penny-wide spreads &mdash; their edge per trade is tiny, so a wide spread can swamp it entirely.</p><h3>Spread as a percentage matters more than cents</h3><p>A 6-cent spread on a $50 stock is 0.12%. The same 6 cents on a $3 stock is <strong>2%</strong> &mdash; you'd need a 2% move just to break even. Always think in <em>relative</em> terms:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Spread as % of price</span></div><div class='term-body'><span class='dim'>$50.00 stock, 6&cent; spread</span>  0.06 &divide; 50.00 = <span class='ok'>0.12%</span>\n<span class='dim'>$3.00 stock, 6&cent; spread</span>   0.06 &divide; 3.00  = <span class='bad'>2.00%</span>\n<span class='dim'>$200 stock, 1&cent; spread</span>   0.01 &divide; 200   = <span class='ok'>0.005%</span></div></div><p>The chart below marks where the bid and ask sit around a quietly ranging ACME. Notice the price oscillates inside a band; a market-order trader pays the spread crossing it every single time, while a patient limit-order trader can sometimes <em>collect</em> the spread by resting on the bid.</p><div class='chart' data-scenario='range' data-marks='hline:50.10:ask;hline:50.04:bid' data-title='ACME · Daily' data-cap='Buy at the ask, sell at the bid: the band between the two lines is pure cost on every round trip.'></div><div class='box danger'><div class='bt'>Pitfall.</div> The spread you see is for <em>small</em> size at the best quote. Want more shares than rest at the best price and you pay progressively worse prices deeper in the book &mdash; the effective spread widens. Lesson 0.5 shows exactly how.</div><div class='box lab'><div class='bt'>Do this.</div> Before any trade, write the quote as <code>bid / ask</code>, compute the spread in cents and as a % of price, then multiply by your share count. If that number is large relative to your expected gain, either size down, use a limit order, or skip the trade.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: quantify the spread you'd actually pay.</p><ol><li>Pick three stocks at different prices ($5, $50, $300) and record each one's bid and ask.</li><li>For each, compute spread in cents, spread as a % of price, and the round-trip cost on 200 shares.</li><li>Rank them: which is cheapest to trade <em>relative</em> to its price? Usually the high-priced liquid one.</li><li>Decide a personal rule, e.g. &ldquo;I won't market-order anything whose spread is over 0.3% of price.&rdquo;</li></ol></div></div>"},{"id":"p0-4","part":"00 · Markets & Brokerage","nav":"Order Types","num":"0.4","kicker":"Part 00 · Lesson 4","title":"Order Types: Market, Limit, Stop and Trailing","html":"<h3>Your instructions to the market</h3><p>An order type is the precise instruction you hand the exchange. Choose wrong and you either fail to get filled or get filled at a terrible price. There are two questions every order answers: <strong>what price am I willing to accept</strong>, and <strong>how long should this order live</strong>. Let's run all the major types on one stock, ACME, currently quoted <strong>50.05 bid / 50.10 ask</strong>, last trade 50.08.</p><h3>Market order &mdash; speed over price</h3><p>A <strong>market order</strong> says: &ldquo;Fill me right now at the best available price, whatever it is.&rdquo; It prioritizes <em>certainty of execution</em> over <em>certainty of price</em>. You will get filled almost instantly, but you cross the spread and may get <strong>slippage</strong> if size is thin.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Market buy · ACME</span></div><div class='term-body'><span class='dim'>Quote</span>   <span class='pr'>50.05 bid / 50.10 ask</span>\n<span class='dim'>Action</span>  Market buy 100 &rarr; lifts the ask\n<span class='dim'>Fill</span>    <span class='bad'>50.12</span>  (50.10 + 2&cent; slippage, only 50 shares rested at 50.10)</div></div><p>You wanted in and you got in &mdash; at 50.12, two cents worse than the displayed ask because the top of the book was thin. Market orders are fine in deep, liquid names; dangerous in thin ones.</p><h3>Limit order &mdash; price over speed</h3><p>A <strong>limit order</strong> says: &ldquo;Fill me only at my price or better.&rdquo; A buy limit at 50.05 will <em>never</em> pay more than 50.05. The trade-off: you might not get filled at all if the stock runs away from you.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Limit buy 50.05 · ACME</span></div><div class='term-body'><span class='dim'>Order</span>   Buy 100 limit <span class='am'>50.05</span>\n<span class='dim'>If price dips to 50.05</span>  <span class='ok'>filled at 50.05 or better</span>\n<span class='dim'>If price runs to 50.30</span>  <span class='bad'>no fill</span> (you missed it)\n<span class='dim'>Bonus</span>   resting at the bid, you may COLLECT the spread</div></div><h3>Stop order &mdash; protection that becomes a market order</h3><p>A <strong>stop (stop-loss)</strong> is dormant until price touches your <strong>stop price</strong>, then it converts into a <em>market order</em>. Set a sell stop at 48.00: while ACME is above 48, nothing happens; the instant it trades 48.00, your stop fires and sells at market &mdash; possibly below 48 in a fast drop.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Sell stop 48.00 · ACME</span></div><div class='term-body'><span class='dim'>While &gt; 48.00</span>  order sleeps\n<span class='dim'>Touch 48.00</span>    converts to market sell\n<span class='dim'>Gentle slide</span>   fills near <span class='ok'>48.00</span>\n<span class='dim'>Gap down to 46</span> fills around <span class='bad'>46.00</span> (no price protection!)</div></div><h3>Stop-limit &mdash; protection with a price floor</h3><p>A <strong>stop-limit</strong> adds a limit so you never sell below a floor. Written <strong>48.00 / 47.90</strong>: at 48.00 it fires, but as a limit that won't fill under 47.90. Safer price &mdash; but if ACME craters straight through 47.90, you're <em>not filled and still holding</em>.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Sell stop-limit 48.00 / 47.90 · ACME</span></div><div class='term-body'><span class='dim'>Trigger</span> 48.00   <span class='dim'>Limit floor</span> 47.90\n<span class='dim'>Orderly dip</span>   fills 47.90&ndash;48.00  <span class='ok'>(good)</span>\n<span class='dim'>Gaps to 46</span>    <span class='bad'>NO FILL</span> &mdash; price below 47.90, you stay long into the crash</div></div><h3>Trailing stop &mdash; a stop that follows price up</h3><p>A <strong>trailing stop</strong> sets the stop a fixed distance (5%, or $2.50) <em>below the peak</em> and ratchets up as price rises, never down. It locks in gains automatically. With a 5% trailing stop bought at 50:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>5% trailing stop · ACME</span></div><div class='term-body'><span class='dim'>Buy 50.00</span>  stop = 50.00 &minus; 5% = <span class='am'>47.50</span>\n<span class='dim'>Rises to 60</span> stop ratchets to 60 &minus; 5% = <span class='ok'>57.00</span>\n<span class='dim'>Rises to 70</span> stop ratchets to <span class='ok'>66.50</span>\n<span class='dim'>Falls to 66.50</span> <span class='bad'>sells</span> &mdash; locked in ~$16.50/share gain</div></div><div class='chart' data-scenario='uptrend' data-marks='note:5:50:buy;hline:66.50:trail stop' data-title='ACME · Daily' data-cap='Buy at 50; the 5% trailing stop climbs under the rising trend and only fires on a real pullback.'></div><p>Notice on that uptrend how the trailing stop sits comfortably below the advance, doing nothing while the trend is healthy, then snapping the position out the moment a 5% reversal arrives &mdash; no emotion, no second-guessing.</p><h3>Time-in-force: how long the order lives</h3><ul><li><strong>Day order</strong> &mdash; expires at the close if unfilled. The default.</li><li><strong>GTC (good-til-canceled)</strong> &mdash; stays working across days/weeks until filled or you cancel (brokers usually cap at 60&ndash;90 days).</li></ul><div class='box danger'><div class='bt'>Pitfall.</div> A <strong>GTC limit can fill on a gap you forgot about</strong>. Leave a GTC buy at 45 for weeks; one morning bad news gaps ACME to 44 and you're filled at 45 into a falling knife. Review your resting orders.</div><div class='box tip'><div class='bt'>Insight.</div> Use <strong>limits to enter</strong> (control your price), <strong>stops to exit losers</strong> (cap risk), and <strong>trailing stops to exit winners</strong> (protect gains). Reserve plain market orders for liquid names where speed truly matters.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: map each order type to a goal.</p><ol><li>For a stock you watch, write its current bid/ask.</li><li>Draft five orders on paper: a market buy, a limit buy 0.1% below the ask, a 4% sell stop, a stop-limit with a 0.2% gap, and a 5% trailing stop.</li><li>For each, state the exact scenario where it helps you and the scenario where it hurts you.</li><li>Pick which time-in-force (day vs GTC) you'd attach and why.</li></ol></div></div>"},{"id":"p0-5","part":"00 · Markets & Brokerage","nav":"Order Book & L2","num":"0.5","kicker":"Part 00 · Lesson 5","title":"The Order Book and Reading Level 2","html":"<h3>From one quote to the whole book</h3><p>Level 1 data shows you a single bid and a single ask &mdash; the best of each. <strong>Level 2</strong> (the depth-of-book or &ldquo;the ladder&rdquo;) shows you <em>all</em> the resting orders stacked at every price, with the <strong>size</strong> sitting at each level. It is an X-ray of supply and demand: where buyers are lined up below and where sellers are stacked above.</p><div class='box law'><div class='bt'>Definition.</div> The <strong>order book</strong> is the live list of all resting limit orders. <strong>Bids</strong> stack below the price (resting demand); <strong>asks/offers</strong> stack above (resting supply). The top bid and top ask form the current spread.</div><h3>Reading a ladder</h3><p>Here is a snapshot for ACME. The best bid is 49.98, the best ask is 50.02 &mdash; a 4-cent spread. Read the bid side as &ldquo;how much demand is waiting below&rdquo; and the ask side as &ldquo;how much supply is stacked above.&rdquo;</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Level 2 ladder · ACME</span></div><div class='term-body'><span class='dim'>      SIZE        PRICE        SIZE</span>\n<span class='dim'>      bids</span>                   <span class='dim'>asks</span>\n                  <span class='bad'>50.20</span>     <span class='bad'>20,000</span>  &larr; wall\n                  <span class='pr'>50.10</span>      3,000\n                  <span class='pr'>50.05</span>      1,500\n                  <span class='pr'>50.02</span>        800  &larr; best ask\n  <span class='ok'>5,000</span>      <span class='pr'>49.98</span>                &larr; best bid\n  2,200      <span class='pr'>49.95</span>\n  1,000      <span class='pr'>49.90</span>\n  <span class='ok'>8,000</span>      <span class='ok'>49.80</span>                &larr; bid support</div></div><p>Two features jump out. First, a <strong>5,000-share bid at 49.98</strong> and a thick <strong>8,000-share bid at 49.80</strong> &mdash; substantial demand waiting underneath, a cushion that can absorb selling. Second, a <strong>20,000-share offer wall at 50.20</strong> &mdash; a heavy block of supply that price will struggle to push through. Traders read these as a near-term floor (49.80) and ceiling (50.20).</p><h3>What a market order sweeps through</h3><p>This is the practical payoff of reading L2. Suppose you send a <strong>market buy for 4,000 shares</strong>. A market order eats the cheapest available supply first, climbing the ask ladder until it's filled. It does <em>not</em> get one clean price &mdash; it gets a blended fill:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Market buy 4,000 · sweeping the offers</span></div><div class='term-body'><span class='dim'>Fill 1</span>   800 @ 50.02  = $40,016\n<span class='dim'>Fill 2</span> 1,500 @ 50.05  = $75,075\n<span class='dim'>Fill 3</span> 1,700 @ 50.10  = $85,170  (of the 3,000 resting)\n<span class='dim'>Total</span> 4,000 shares    = $200,261\n<span class='dim'>Avg price</span> <span class='bad'>50.0653</span>\n<span class='dim'>vs best ask 50.02</span> slippage = <span class='bad'>4.5&cent;/share = $181</span></div></div><p>You wanted 50.02 and got an <strong>average of 50.065</strong> &mdash; the order <em>walked the book</em> three price levels deep. That extra 4.5 cents &times; 4,000 shares is <strong>$181 of slippage</strong>, all because the top of the book was thin. Had you eyeballed the ladder first, you'd have used a <em>limit</em> at 50.05 and refused to chase past it.</p><div class='box tip'><div class='bt'>Insight.</div> A market order's true cost is set by the <em>depth</em> of the book, not the headline spread. Reading L2 tells you in advance how far your order will walk &mdash; and therefore whether to slice it into pieces or rest a limit.</div><h3>Walls, spoofs, and what size really means</h3><p>That 20,000-share offer at 50.20 is a <strong>wall</strong>. Walls act like magnets and barriers: price often grinds toward them, and a genuine wall absorbs buying and caps the move. But be skeptical &mdash; some large orders are <strong>spoofs</strong>, posted to fake supply or demand and yanked before they fill. A wall that keeps refreshing as price approaches is more likely real; one that vanishes the instant price arrives was probably bait.</p><div class='chart' data-scenario='ascending-triangle' data-marks='resistance:50.20;support:49.80' data-title='ACME · Daily' data-cap='Rising bids (49.80 support) press into a fixed 50.20 offer wall; a break above it signals the wall was absorbed.'></div><p>That ascending triangle is the chart-level echo of the ladder above: buyers keep stepping up (higher lows off the 49.80 demand), repeatedly testing the 50.20 supply. When price finally trades <em>through</em> 50.20 on volume, it means the 20,000-share wall got bought &mdash; supply exhausted &mdash; and the breakout can run.</p><div class='box danger'><div class='bt'>Pitfall.</div> Don't treat L2 as truth. Hidden/iceberg orders show only a sliver of real size, and spoofers flash fake walls. Use the ladder as <em>one</em> input alongside price action and volume, never as a crystal ball.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: practice reading depth and predicting a sweep.</p><ol><li>Open a Level 2 ladder for a liquid stock (many brokers offer it free).</li><li>Identify the best bid/ask, the largest resting bid (support) and the largest offer (a wall).</li><li>Pick a hypothetical market-buy size and add up the asks it would consume; compute the blended average price and the slippage vs the best ask.</li><li>Watch a real wall for five minutes: does it hold, get eaten, or vanish as price nears it?</li></ol></div></div>"},{"id":"p0-6","part":"00 · Markets & Brokerage","nav":"Extended Hours","num":"0.6","kicker":"Part 00 · Lesson 6","title":"Pre-Market and After-Hours Trading","html":"<h3>The market has three sessions, not one</h3><p>The headline U.S. session runs <strong>9:30am to 4:00pm ET</strong>. But trading also happens before and after, on electronic networks (ECNs):</p><ul><li><strong>Pre-market</strong> &mdash; roughly 4:00am to 9:30am ET (most activity after 7:00am).</li><li><strong>Regular session</strong> &mdash; 9:30am to 4:00pm ET, the deep, liquid core.</li><li><strong>After-hours</strong> &mdash; 4:00pm to 8:00pm ET.</li></ul><p>Extended-hours sessions exist mainly to let traders react to news that breaks outside regular hours &mdash; above all, <strong>earnings reports</strong>, which most companies release right after the 4:00pm close or before the 9:30am open. The catch: these sessions behave very differently from the regular market.</p><h3>Why extended hours are dangerous: thin liquidity</h3><p>Far fewer participants are active, many market makers step back, and order books are sparse. Three consequences follow directly:</p><ul><li><strong>Wide spreads.</strong> A stock with a 1-cent spread at noon might show a 30-cent spread at 5pm.</li><li><strong>Thin size.</strong> A modest order can walk the book several levels and move the price sharply.</li><li><strong>Gap risk.</strong> A few trades on light volume can swing the price violently, and that print may not survive the next session.</li></ul><div class='box law'><div class='bt'>Definition.</div> A <strong>gap</strong> is a jump between one session's price and the next, with no trading in between. After-hours moves on light volume frequently <em>gap back</em> the other way when the deep regular-session crowd arrives and votes with real volume.</div><h3>A worked example: the earnings spike that gives it back</h3><p>NOVA closes the regular session at <strong>$100.00</strong>. At 4:05pm it reports an earnings beat. On thin after-hours volume, eager buyers chase it up 8%:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>NOVA earnings · the round trip</span></div><div class='term-body'><span class='dim'>4:00pm close</span>        <span class='pr'>$100.00</span>\n<span class='dim'>4:05pm earnings beat</span> spikes on LIGHT volume\n<span class='dim'>4:30pm after-hours</span>   <span class='ok'>$108.00</span>  (+8%, but spread is 40&cent; wide)\n<span class='dim'>You chase, buy</span>       <span class='bad'>$108.20</span> (lift the wide ask)\n<span class='dim'>9:30am next open</span>     <span class='am'>$104.00</span>  (gap gives back HALF the move)\n<span class='dim'>Your mark</span>            108.20 &rarr; 104.00 = <span class='bad'>&minus;$4.20/share (&minus;3.9%)</span></div></div><p>The stock genuinely rose on good news &mdash; yet a trader who chased the 8% after-hours spike is <em>down</em> by the open. Why? The light after-hours volume overshot. When the full regular-session crowd arrived at 9:30am with real liquidity, the price settled at a more sober +4%, giving back half the after-hours move. The chaser paid the wide spread <em>and</em> the gap-back.</p><div class='chart' data-scenario='gap-up' data-marks='hline:108:after-hours high;hline:104:regular open;hline:100:prior close' data-title='NOVA · Daily' data-cap='An 8% after-hours pop on light volume, then a gap-back to +4% as the deep regular session reprices it.'></div><p>Read the chart as two different crowds voting. The tall after-hours candle is a <em>thin</em> vote &mdash; a handful of eager buyers with no one to push back. The regular-session open is the <em>deep</em> vote, where size on both sides finds a fairer clearing price. The space between the after-hours high and the regular open is the gap that punished the chaser.</p><h3>Practical rules for extended hours</h3><ul><li><strong>Use limit orders only.</strong> Many brokers force this in extended hours for good reason &mdash; a market order into a 40-cent spread is a gift to whoever's on the other side.</li><li><strong>Respect the spread.</strong> If the spread is 40 cents, you need a 40-cent move just to break even on a round trip.</li><li><strong>Don't anchor to the last after-hours print.</strong> It may be one tiny trade; it is not a reliable price.</li><li><strong>Beware the gap-back.</strong> Initial reactions to news routinely overshoot and partially reverse at the next open.</li></ul><div class='box danger'><div class='bt'>Pitfall.</div> Holding through earnings means you accept <strong>overnight gap risk</strong> with no ability to manage it &mdash; stop-losses don't trigger between sessions. A stock can open 20% lower than where your stop sat, and you'll be filled far below it. Size positions assuming the gap can blow through your stop.</div><div class='box tip'><div class='bt'>Insight.</div> Extended hours are for <em>informed reaction</em>, not casual trading. The same news, traded patiently after liquidity returns at 9:30am, usually offers a tighter spread and a clearer, less emotional price.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: witness the thin-liquidity gap-back.</p><ol><li>Find a stock reporting earnings after the close. Note its 4:00pm price.</li><li>Check the after-hours quote: record the bid, ask, and spread. Compare the spread to its regular-hours spread.</li><li>Note the biggest after-hours price (the spike or drop).</li><li>The next morning, record the 9:30am open. How much of the after-hours move held vs gave back? Write down the spread cost a chaser would have paid.</li></ol></div></div>"},{"id":"p0-7","part":"00 · Markets & Brokerage","nav":"Accounts & Costs","num":"0.7","kicker":"Part 00 · Lesson 7","title":"Accounts, Settlement and the Hidden Costs","html":"<h3>Cash vs margin: two ways to hold an account</h3><p>Before any of this matters, you trade inside a <strong>brokerage account</strong>, and the type you choose changes the rules.</p><ul><li><strong>Cash account.</strong> You trade only with settled cash. No borrowing. Lower risk, simpler &mdash; but you must wait for trades to settle before reusing the proceeds, which creates the violations described below.</li><li><strong>Margin account.</strong> The broker lends you money against your holdings, letting you buy more than your cash (leverage) and short-sell. Proceeds are also available faster. The cost: <strong>interest</strong> on the loan, <strong>margin calls</strong> if your equity drops, and amplified losses.</li></ul><div class='box law'><div class='bt'>Definition.</div> <strong>Leverage</strong> via margin magnifies <em>both</em> gains and losses. Buy $20,000 of stock with $10,000 cash + $10,000 margin and a 10% drop in the stock is a <strong>20% loss on your equity</strong> &mdash; plus interest.</div><h3>T+1 settlement: the trade isn't final the instant it fills</h3><p>When you buy, the execution is immediate but the <strong>settlement</strong> &mdash; the actual exchange of cash for shares &mdash; completes one business day later, <strong>T+1</strong> (as of the 2024 U.S. standard). When you sell, the cash from that sale isn't fully <em>settled</em> and free of restrictions until T+1. In a margin account this rarely bites you. In a <em>cash</em> account, reusing unsettled proceeds too fast triggers a violation.</p><h3>The good-faith violation, step by step</h3><p>This is the classic cash-account trap. You must let proceeds settle before you sell what you bought with them.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Good-faith violation · cash account</span></div><div class='term-body'><span class='dim'>Mon</span>  Sell old shares for <span class='ok'>$5,000</span> &mdash; cash settles <span class='am'>Tue (T+1)</span>\n<span class='dim'>Mon</span>  Use that UNSETTLED $5,000 to buy ACME\n<span class='dim'>Mon</span>  Sell ACME same day, before Tue\n<span class='bad'>VIOLATION</span> &mdash; you sold a position bought with funds\n          that had not yet settled (good-faith violation)\n<span class='dim'>Penalty</span> 3 violations in 12 months &rarr; account restricted\n          to <span class='bad'>settled cash only for 90 days</span></div></div><p>The fix is simple: in a cash account, either wait for proceeds to settle (T+1) before selling what you bought with them, or use a margin account where this restriction largely disappears. Beginners hit this constantly because the buying power <em>shows</em> the unsettled cash as available &mdash; the platform lets you dig the hole.</p><h3>The hidden costs: &ldquo;zero commission&rdquo; is not free</h3><p>Most brokers advertise <strong>$0 commissions</strong> on stocks. Real, but it hides three other costs that quietly drain accounts:</p><ul><li><strong>The spread</strong> (Lesson 0.3) &mdash; you pay it crossing the bid/ask every round trip.</li><li><strong>Slippage</strong> (Lesson 0.5) &mdash; getting filled worse than the displayed quote when the book is thin.</li><li><strong>Payment for order flow (PFOF)</strong> &mdash; how &ldquo;free&rdquo; brokers actually get paid.</li></ul><h4>How PFOF works</h4><p>Your broker routes your order not straight to the exchange but to a wholesale market maker, who pays the broker a small fee for the right to fill it. The market maker profits from the spread; the broker gets paid; you get a &ldquo;free&rdquo; commission. The debate is whether the fill you receive is as good as it could have been. Regulators require &ldquo;best execution,&rdquo; but on thin or fast names, fractions of a cent can leak out of your fill &mdash; multiplied across millions of orders, that's the whole business model.</p><h3>Tallying the real cost of one &ldquo;free&rdquo; trade</h3><p>Here is the punchline. A zero-commission market order in ACME (<strong>49.98 bid / 50.02 ask</strong>, a 4-cent spread) for 1,000 shares, round trip, with 1 cent of slippage per side:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>True cost of a 'zero-commission' 1,000-share round trip</span></div><div class='term-body'><span class='dim'>Commission</span>            <span class='ok'>$0.00</span>  (the headline)\n<span class='dim'>Spread, 4&cent; &times; 1,000</span>    <span class='bad'>$40.00</span> (cross bid/ask once each way)\n<span class='dim'>Slippage, 1&cent; entry</span>     <span class='bad'>$10.00</span>\n<span class='dim'>Slippage, 1&cent; exit</span>      <span class='bad'>$10.00</span>\n<span class='dim'>Wait &mdash; spread is the round-trip already; count slippage extra</span>\n<span class='dim'>Spread cost (round trip)</span> <span class='bad'>$40.00</span>\n<span class='dim'>Slippage (both sides)</span>    <span class='bad'>$20.00</span>\n<span class='bad'>Total real cost</span>          <span class='bad'>$60.00</span> on a 'free' trade\n<span class='dim'>To break even ACME must rise</span> <span class='am'>6&cent;/share</span></div></div><p>The simplest framing: even at $0 commission, the spread alone on a 4-cent quote and 1,000 shares is <strong>$40</strong>, and a single penny of slippage on entry costs another <strong>$10</strong> &mdash; so a 4-cent-spread, 1-cent-slip round trip quietly costs around <strong>$11 on the entry leg alone</strong> and tens of dollars all-in. &ldquo;Free&rdquo; describes the commission line, not the trade.</p><div class='chart' data-scenario='range' data-marks='hline:50.02:ask;hline:49.98:bid' data-title='ACME · Daily' data-cap='Trading the chop: each round trip pays the spread plus slippage even with $0 commission.'></div><p>That ranging chart is where hidden costs do the most damage: lots of round trips, small moves, and the spread-plus-slippage toll on every one. Overtrade a quiet range and the cumulative friction &mdash; not the market &mdash; is what bleeds the account.</p><div class='box tip'><div class='bt'>Insight.</div> Cost per trade matters most when you trade <em>often</em>. The friction of spread + slippage scales with frequency, so a high-turnover style needs the tightest spreads and the most patient (limit-based) entries to survive.</div><div class='box danger'><div class='bt'>Pitfall.</div> Two traps to remember: (1) in a <strong>cash account</strong>, reusing unsettled T+1 proceeds can trigger good-faith violations and a 90-day restriction; (2) <strong>$0 commission</strong> never means $0 cost &mdash; spread, slippage, and PFOF are the real price of admission.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: see your true trading costs and settlement rules.</p><ol><li>Check whether your account is cash or margin, and find your broker's settlement note (look for T+1).</li><li>Take a stock you'd actually trade; record its bid/ask. Compute the round-trip spread cost on your typical share size.</li><li>Add a realistic 1-cent-per-side slippage estimate. That total is what the market <em>really</em> charges you, commission aside.</li><li>If you have a cash account, write the rule: &ldquo;Proceeds settle T+1; I won't sell anything bought with unsettled cash until then.&rdquo;</li></ol></div></div>"},{"id":"p1-1","part":"01 · Reading a Stock","nav":"Price & Change","num":"1.1","kicker":"Part 01 · Lesson 1","title":"Last Price, Change and Percent Change","html":"<h3>The three numbers everyone sees first</h3><p>Pull up any stock quote and the top line shouts three things at you: the <strong>last price</strong>, the <strong>change</strong>, and the <strong>percent change</strong>. They look trivial, but most beginners misread them, anchoring on a green or red number without knowing what it is measured <em>against</em>. Let us define each precisely and compute them by hand.</p><h4>Last price</h4><p>The <strong>last price</strong> is simply the price at which the most recent trade actually executed. It is not the price you are guaranteed to get. If you place a market order to buy, you pay the <em>ask</em>; if you sell, you receive the <em>bid</em>. The last price sits somewhere between them and is already in the past the instant it prints. During the trading day it updates tick by tick; after the close it freezes at the closing print until the next session.</p><div class='box law'><div class='bt'>Definition.</div> Change = Last price &minus; Prior close. Percent change = (Last price &minus; Prior close) &divide; Prior close &times; 100.</div><h4>The reference point is the PRIOR CLOSE, not the open</h4><p>This is the single most common error. The green or red number is measured from <strong>yesterday's official closing price</strong>, not from today's opening trade. A stock can open sharply lower on bad overnight news, grind higher all day, and still show red if it never recovers to the prior close. The intraday action and the headline change number can tell opposite stories.</p><h4>Worked example</h4><p>ACME last printed at <strong>142.50</strong>. Yesterday's official close was <strong>139.30</strong>. Compute the change and percent change step by step.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME · change worksheet</span></div><div class='term-body'><span class='dim'>Last price</span> <span class='cm'>142.50</span>\n<span class='dim'>Prior close</span> <span class='cm'>139.30</span>\n<span class='dim'>Change</span> = 142.50 &minus; 139.30 = <span class='ok'>+3.20</span>\n<span class='dim'>Percent</span> = 3.20 &divide; 139.30 = 0.02297\n<span class='dim'>&times; 100</span> = <span class='ok'>+2.30%</span></div></div><p>So ACME is <strong>up 3.20 points, or +2.30%</strong>. Notice the percent is what lets you compare moves across stocks of different prices. A +3.20 move means very different things on a 14-dollar stock (huge) than on a 1,400-dollar stock (a rounding error). Always think in percent when comparing.</p><h4>Why the same dollar move is not the same move</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Same +3.20, three stocks</span></div><div class='term-body'><span class='dim'>NOVA @ 16.00 prior</span> &rarr; +3.20 = <span class='ok'>+20.0%</span>\n<span class='dim'>ACME @ 139.30 prior</span> &rarr; +3.20 = <span class='am'>+2.30%</span>\n<span class='dim'>ORCA @ 1280 prior</span> &rarr; +3.20 = <span class='bad'>+0.25%</span></div></div><p>The dollar change is identical; the meaning is wildly different. The percent normalizes for price, which is exactly why it earns its spot on the quote.</p><h4>Reading the chart</h4><p>The candlestick below shows ACME's recent session in context. The most recent up-bar carries the price to 142.50, comfortably above the prior close marked as support.</p><div class='chart' data-scenario='uptrend' data-overlays='sma20' data-marks='hline:139.30:prior close;note:38:142.50:last 142.50' data-title='ACME · Daily' data-cap='Last print at 142.50 sits +2.30% above the 139.30 prior close.'></div><p>The horizontal line at 139.30 is the reference the entire headline number is computed from. Every candle that closes above it would show green for the day; every candle below would show red. The body of the final candle measures the day's own range, while the headline change measures only the gap from that one horizontal line to the last tick.</p><div class='box tip'><div class='bt'>Insight.</div> Pre-market and after-hours quotes often show a SECOND change number measured against the regular-session close. Do not confuse an after-hours +1.5% with the regular-session +2.30%; they have different reference points and different (thin) liquidity.</div><div class='box danger'><div class='bt'>Pitfall.</div> A big green percent on a stock you do not follow can be a low-priced ticker reacting to a single news item on tiny volume. Percent change alone never tells you whether a move is trustworthy. That is why the very next number we read is volume.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: compute change and percent change from raw quote data.</p><ol><li>Pick any stock and write down its last price and its prior close (labeled \"previous close\" on most quotes).</li><li>Subtract to get the dollar change. Confirm the sign matches the green/red on the page.</li><li>Divide the change by the prior close and multiply by 100. Match it to the displayed percent.</li><li>Now find a stock priced under 10 dollars and one over 500. For each, work out what a +2.00 dollar move would be in percent, and note how differently the same dollars register.</li></ol></div></div>"},{"id":"p1-2","part":"01 · Reading a Stock","nav":"Volume","num":"1.2","kicker":"Part 01 · Lesson 2","title":"Volume and Average Volume","html":"<h3>Volume is the conviction behind the price</h3><p>Price tells you <em>where</em> a stock went. <strong>Volume</strong> tells you <em>how many people agreed</em> to take it there. Volume is the total number of shares that changed hands over a period &mdash; one full day, or so far today. A move on heavy volume reflects broad participation; the same move on light volume can be a handful of orders pushing a thin tape around. Reading the two together is the first real skill of tape reading.</p><div class='box law'><div class='bt'>Definition.</div> Volume = total shares traded in the period. Average volume (commonly 30-day or 3-month) = the mean daily share count over that lookback window. Relative volume (RVOL) = Today's volume &divide; Average volume.</div><h4>The problem of comparing apples to half-days</h4><p>You cannot compare today's <em>partial</em> volume to a full-day average directly. If 12.4M shares have traded by noon and the 30-day average is 8.1M for a <em>whole</em> day, the headline already exceeds the average with half the session left. To judge it fairly you either project the full day or compare against the typical volume <em>by this time of day</em>.</p><h4>Worked example</h4><p>NOVA has traded <strong>12.4M shares by noon</strong> (roughly the session midpoint). Its 30-day average <em>full-day</em> volume is <strong>8.1M</strong>. Let us reason about it two ways.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>NOVA · participation check</span></div><div class='term-body'><span class='dim'>Volume so far (noon)</span> <span class='cm'>12.4M</span>\n<span class='dim'>30-day avg (full day)</span> <span class='cm'>8.1M</span>\n<span class='dim'>Naive RVOL</span> = 12.4 &divide; 8.1 = <span class='ok'>1.53&times;</span>\n<span class='dim'>Crude full-day projection</span> = 12.4 &times; 2 = <span class='am'>24.8M</span>\n<span class='dim'>Projected RVOL</span> = 24.8 &divide; 8.1 = <span class='ok'>3.06&times;</span></div></div><p>Even the conservative read &mdash; already at 1.53&times; a full day's average with hours to go &mdash; flags NOVA as a <strong>high-participation</strong> name today. The projection (a simple doubling at the midpoint) suggests it could finish near 3&times; normal. That is the kind of unusual activity that confirms a price move is being driven by real demand, not a quiet drift.</p><div class='box tip'><div class='bt'>Insight.</div> Volume tends to be U-shaped through the day &mdash; heavy at the open, light midday, heavy into the close. A flat &times;2 projection at lunch slightly UNDER-counts the typical day because the close is usually busy. Treat projections as rough, not gospel.</div><h4>Reading the chart</h4><p>The volume pane below sits under the price candles. Watch how the breakout bar is accompanied by a volume spike that towers over the preceding sessions.</p><div class='chart' data-scenario='breakout-up' data-overlays='sma20' data-title='NOVA · Daily' data-cap='Price breaks out on a volume bar far above its recent average — participation confirms the move.'></div><p>The tall volume bar under the breakout candle is the visual signature of conviction. Compare its height to the cluster of shorter bars before it: that ratio <em>is</em> relative volume, read by eye. A breakout on a short volume bar is suspect; the same breakout on a bar two or three times the recent norm is the one worth respecting.</p><h4>What different volume readings imply</h4><ul><li><strong>High volume + price up</strong> &mdash; demand is winning; the advance has buyers behind it.</li><li><strong>High volume + price down</strong> &mdash; supply is winning; distribution or capitulation.</li><li><strong>Low volume + price up</strong> &mdash; a drift higher that may not hold; few committed buyers.</li><li><strong>Volume spike with little net change</strong> &mdash; a battle, often near a turning point; lots of shares trading but neither side prevailing.</li></ul><div class='box danger'><div class='bt'>Pitfall.</div> Average volume itself drifts. After a stock joins an index, splits, or sees a news catalyst, its \"normal\" volume can reset to a new level. A 30-day average can lag a structural change for weeks. Glance at whether the average is trending up or down before you trust an RVOL number.</div><div class='box lab'><div class='bt'>Do this.</div> Whenever a stock shows up on a mover list, check RVOL FIRST. A 5% move at 0.6&times; volume and a 5% move at 4&times; volume are not the same event, even though the percent change looks identical on the quote.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: estimate relative volume and judge participation mid-session.</p><ol><li>Find a stock that is moving today. Note its current volume and its average (30-day or 3-month) volume.</li><li>Estimate how far through the trading day you are, and project the full-day volume.</li><li>Divide your projection by the average to get a rough RVOL. Is it above or below 1.5&times;?</li><li>Pull up the chart with a volume pane. Compare today's bar to the prior two weeks by eye and confirm your number matches what you see.</li></ol></div></div>"},{"id":"p1-3","part":"01 · Reading a Stock","nav":"Market Cap & EV","num":"1.3","kicker":"Part 01 · Lesson 3","title":"Market Cap and Enterprise Value","html":"<h3>What is the company actually worth?</h3><p>The share price tells you the cost of <em>one</em> share. To value the whole company you need two related numbers: <strong>market capitalization</strong> (the value of all the equity) and <strong>enterprise value</strong> (the value of the whole business including its debt, net of cash). Beginners stop at market cap; professionals quote EV, because EV is closer to what it would actually cost to <em>buy the entire company</em>.</p><div class='box law'><div class='bt'>Definition.</div> Market cap = Shares outstanding &times; Share price.<br>Enterprise value = Market cap + Total debt &minus; Cash &amp; equivalents.</div><h4>Market cap: the equity slice</h4><p>Market cap is the price of all the shares added together. It is the headline \"size\" number that sorts companies into large-cap, mid-cap, and small-cap. But it ignores the balance sheet entirely. Two companies can have identical market caps while one is debt-free and the other is buried in loans &mdash; clearly not equally valuable to an acquirer.</p><h4>Worked example: ACME's market cap</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME · market cap</span></div><div class='term-body'><span class='dim'>Shares outstanding</span> <span class='cm'>500M</span>\n<span class='dim'>Share price</span> <span class='cm'>$142.50</span>\n<span class='dim'>Market cap</span> = 500M &times; 142.50\n= <span class='ok'>$71,250,000,000</span> = <span class='ok'>$71.25B</span></div></div><p>So the equity of ACME is worth about <strong>$71.25 billion</strong>. That places it as a large-cap. But to value the <em>business</em>, we must account for what it owes and what it holds in cash.</p><h4>Enterprise value: the true takeover price</h4><p>Imagine you buy every share for $71.25B. You now own the company &mdash; <em>and</em> its $12B of debt, which you are on the hook for. But you also gain its $5B of cash, which you could use to pay down some of that debt. So the real economic cost is higher than market cap by the debt and lower by the cash.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME · enterprise value</span></div><div class='term-body'><span class='dim'>Market cap</span> <span class='cm'>$71.25B</span>\n<span class='dim'>+ Total debt</span> <span class='bad'>+$12.00B</span>\n<span class='dim'>&minus; Cash &amp; equivalents</span> <span class='ok'>&minus;$5.00B</span>\n<span class='dim'>Enterprise value</span> = 71.25 + 12 &minus; 5\n= <span class='ok'>$78.25B</span></div></div><p>ACME's <strong>enterprise value is $78.25 billion</strong> &mdash; about $7B more than its market cap, because it carries net debt of $7B (12 owed minus 5 in cash). An acquirer effectively pays the equity price <em>plus</em> the net debt they inherit.</p><div class='box tip'><div class='bt'>Insight.</div> When a company holds MORE cash than debt (net cash), enterprise value is LOWER than market cap. Cash-rich tech firms often have EV well below their market cap, which makes their EV-based multiples look cheaper than their P/E suggests.</div><h4>Why EV matters for comparisons</h4><p>Because EV neutralizes capital structure, it lets you compare companies financed very differently. A firm that funds itself with debt and one that funds itself with equity might have the same operating business; their P/E ratios would differ because of interest expense, but their EV/EBITDA (covered in Lesson 8) can be compared apples to apples. EV is the numerator in the valuation ratios that serious analysts trust most.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Same market cap, different EV</span></div><div class='term-body'><span class='dim'>ACME</span> cap 71.25, debt 12, cash 5 &rarr; EV <span class='am'>78.25</span>\n<span class='dim'>ZENITH</span> cap 71.25, debt 2, cash 20 &rarr; EV <span class='ok'>53.25</span>\n<span class='dim'>Gap</span> = <span class='bad'>$25B</span> despite identical market caps</div></div><p>Two companies, same equity value, $25B apart in true business value. The market cap line on a quote would call them twins; enterprise value tells you ZENITH's cash hoard makes it materially cheaper to actually own.</p><div class='box danger'><div class='bt'>Pitfall.</div> Some quote pages show market cap using FLOAT instead of total shares outstanding, or omit preferred stock and minority interest from EV. For a precise EV you would add preferred equity and noncontrolling interest too. The simple Market cap + Debt &minus; Cash version is enough for reading a quote, but know the full formula exists.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: build market cap and enterprise value from a quote and balance sheet.</p><ol><li>Find a company's shares outstanding and current price. Multiply to confirm the market cap shown on the quote.</li><li>From its latest balance sheet, note total debt and cash &amp; equivalents.</li><li>Compute EV = market cap + debt &minus; cash. Is it above or below market cap? What does that tell you about net debt vs net cash?</li><li>Repeat for a debt-heavy company and a cash-rich one. Compare how far each EV diverges from its market cap.</li></ol></div></div>"},{"id":"p1-4","part":"01 · Reading a Stock","nav":"Shares & Float","num":"1.4","kicker":"Part 01 · Lesson 4","title":"Shares Outstanding vs Float","html":"<h3>Not every share can actually trade</h3><p>A quote may report two share counts that look similar but mean very different things: <strong>shares outstanding</strong> and <strong>float</strong>. The gap between them &mdash; shares that exist but are not available to the open market &mdash; is one of the most underappreciated drivers of how violently a stock moves.</p><div class='box law'><div class='bt'>Definition.</div> Shares outstanding = every share the company has issued (held by everyone &mdash; insiders, institutions, and the public). Float = shares outstanding &minus; restricted/closely-held shares = the shares freely available to trade.</div><h4>What gets subtracted to make the float</h4><p>From total shares outstanding we remove shares that are not realistically for sale day to day: large insider and founder stakes, employee shares under lockup, government or strategic holdings, and other restricted blocks. What remains is the <strong>float</strong> &mdash; the supply that the buying and selling public is actually fighting over.</p><h4>Worked example</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ORCA · float worksheet</span></div><div class='term-body'><span class='dim'>Shares outstanding</span> <span class='cm'>600M</span>\n<span class='dim'>Insiders / locked-up</span> <span class='bad'>&minus;180M</span>\n<span class='dim'>Float</span> = 600M &minus; 180M = <span class='ok'>420M</span>\n<span class='dim'>Float as % of total</span> = 420 &divide; 600 = <span class='am'>70%</span>\n<span class='dim'>Locked %</span> = 180 &divide; 600 = <span class='bad'>30%</span></div></div><p>ORCA has <strong>600M shares outstanding but only 420M float</strong>, because insiders hold 180M locked up. Seventy percent of the company can trade; thirty percent is effectively off the market. That tighter tradable supply is what makes a float-aware trader pay attention.</p><h4>Why a thin float moves faster</h4><p>Price is set at the margin by supply and demand for the <em>available</em> shares. If only 420M shares are out there and a wave of buying arrives, there are fewer shares to satisfy it, so the price must rise further to coax holders into selling. The same dollar of demand pushes a small float much harder than a large one. Float is the denominator of how easily price gets moved.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>$500M of buying hits two floats</span></div><div class='term-body'><span class='dim'>BIG float</span> 2.0B shares @ $50 &rarr; demand absorbed, <span class='ok'>small % move</span>\n<span class='dim'>THIN float</span> 40M shares @ $50 &rarr; same $500M is 25% of float, <span class='bad'>violent move</span>\n<span class='dim'>Takeaway</span> identical demand, <span class='am'>opposite volatility</span></div></div><p>The same buy order is a drop in the ocean for a 2-billion-share float and a tidal wave for a 40-million-share float. This is the mechanical reason low-float stocks gap, spike, and reverse so sharply &mdash; and why they are favored by momentum traders and feared for their risk.</p><div class='box tip'><div class='bt'>Insight.</div> Combine float with relative volume from Lesson 2. A small float TRADING multiple times its float in a day (high turnover) is the recipe for the most explosive intraday moves. Float tells you the supply; volume tells you how furiously it is being recycled.</div><h4>Reading the chart</h4><p>The chart shows a thin-float name making a sharp, near-parabolic run &mdash; the kind of move tight supply enables when demand floods in.</p><div class='chart' data-scenario='parabolic' data-overlays='ema9' data-title='ORCA · Daily' data-cap='With limited float to absorb buying, demand drives a steep, fast advance.'></div><p>Notice how little consolidation there is on the way up: with few shares available, each new buyer must reach higher to find a seller, so the candles stack almost vertically. The flip side is brutal &mdash; when buying dries up, the same thin float offers no cushion of resting demand, and these moves reverse just as fast as they rose.</p><div class='box danger'><div class='bt'>Pitfall.</div> Lockups expire. When an insider lockup ends, formerly restricted shares can flood into the float, expanding supply and pressuring price. A stock with a near-term lockup expiry can see its effective float jump overnight. Always check whether a thin float is about to get fatter.</div><div class='box lab'><div class='bt'>Do this.</div> Before trading any fast mover, look up its float. Under ~50M shares is \"low float\" territory where moves are amplified and stops can be jumped. Size positions smaller and respect wider swings.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: separate total shares from tradable float and gauge move sensitivity.</p><ol><li>Find a company's shares outstanding and its float (both are usually on the statistics tab of a quote).</li><li>Subtract to find how many shares are restricted, and express the float as a percent of total.</li><li>Find a large-cap with a multi-billion-share float and a small-cap under 50M float. Note the difference.</li><li>Pull up the small-float stock's chart and look for the sharper, faster swings that tight supply produces.</li></ol></div></div>"},{"id":"p1-5","part":"01 · Reading a Stock","nav":"Range & MAs","num":"1.5","kicker":"Part 01 · Lesson 5","title":"52-Week Range and Quote Moving Averages","html":"<h3>Where does today's price sit in its own history?</h3><p>A single price means little without context. Two numbers on the quote supply that context cheaply: the <strong>52-week range</strong> (the lowest and highest price over the past year) and the <strong>moving averages</strong> &mdash; usually the 50-day and 200-day &mdash; that the quote lists as round-number reference levels. Together they tell you whether a stock is near the top or bottom of its yearly arc and whether its me
