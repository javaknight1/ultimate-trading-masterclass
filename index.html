e sorted by strike, ITM on one side of the current price, OTM on the other.</li><li><strong>Bid</strong> — the highest price a buyer in the market will pay. If you <em>sell</em>, you get the bid.</li><li><strong>Ask</strong> (offer) — the lowest price a seller will accept. If you <em>buy</em>, you pay the ask.</li><li><strong>Spread</strong> — ask minus bid; the round-trip cost of crossing the market. Tight spreads = liquid; wide spreads = illiquid and expensive to trade.</li><li><strong>Last</strong> — the most recent trade price (can be stale).</li><li><strong>Volume</strong> — contracts traded <em>today</em>. A fresh, daily activity gauge.</li><li><strong>Open interest (OI)</strong> — the total number of contracts <em>currently outstanding</em> (opened but not yet closed). A cumulative measure of how many positions exist.</li></ul><div class='box law'><div class='bt'>Definition.</div> Bid/ask = the prices you sell/buy at. Volume = today's trades (resets daily). Open interest = live contracts that exist right now (changes only as positions are opened or closed). Mid price &asymp; (Bid + Ask) &divide; 2 is a fair estimate of true value.</div><h4>Volume vs open interest — the key distinction</h4><p>Beginners confuse these constantly. <strong>Volume</strong> is a flow — how many traded <em>today</em>, reset to zero each morning. <strong>Open interest</strong> is a stock (in the inventory sense) — how many contracts are <em>alive</em> across all days, updated overnight. High OI means a deep pool of existing positions and usually tight, tradeable spreads; high volume means lots of attention today. You want both to be healthy before trading a contract.</p><h4>Worked example: decoding one row</h4><p>ACME trades at $103. Here is the <strong>105 call</strong> row from the chain.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ACME 105 call · row decoded · stock $103</span></div><div class='term-body'><span class='dim'>Bid / Ask:</span> <span class='cm'>2.40 / 2.55</span>\n<span class='dim'>Spread:</span> 2.55 &minus; 2.40 = <span class='am'>$0.15</span> (tight, liquid)\n<span class='dim'>Mid (fair value):</span> (2.40 + 2.55) &divide; 2 = <span class='pr'>$2.475</span>\n<span class='dim'>To BUY you pay:</span> <span class='bad'>$2.55</span> &times; 100 = $255\n<span class='dim'>To SELL you get:</span> <span class='ok'>$2.40</span> &times; 100 = $240\n<span class='dim'>Volume today:</span> <span class='cm'>1,200</span> contracts\n<span class='dim'>Open interest:</span> <span class='cm'>8,400</span> contracts (deep, liquid)\n<span class='dim'>Moneyness:</span> strike 105 &gt; stock 103 &rarr; <span class='bad'>OTM</span>, all $2.475 is extrinsic</div></div><p>Everything you need is in those numbers. The 105 call is OTM (strike above the $103 stock), so its entire $2.475 mid value is time value. The spread is just $0.15 — narrow, meaning you lose little crossing the market. The 8,400 open interest tells you thousands of these contracts already exist, so you can get in and out easily; the 1,200 volume confirms active trading today. Buy at the ask ($2.55, or $255 per contract); sell at the bid ($2.40, or $240). That $15 gap is the market-maker's edge and your transaction cost.</p><div class='box tip'><div class='bt'>Insight.</div> When a spread is wide (say bid 2.00 / ask 2.80), never pay the ask blindly. Place a limit order near the mid; you can often get filled inside the spread, saving real money. Low OI plus a wide spread is a warning that the contract is illiquid — easy to enter, painful to exit.</div><div class='chart' data-scenario='range' data-marks='hline:103:stock $103; hline:105:105 call strike (OTM)' data-title='ACME · Daily' data-cap='The 105 call sits just above price — out-of-the-money, pure time value until the stock pushes higher.'></div><p>The chart shows ACME ranging just under the 105 strike. Because price keeps stalling below that line, the 105 call stays OTM and its premium is all extrinsic — which decays daily. For that call to gain real (intrinsic) value, the candles must break and hold above 105. This links the chain back to the chart: a row of numbers only becomes profitable when price action carries the stock through the strike.</p><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: read a chain row like a pro.</p><ol><li>NOVA = $72. The 70 call shows bid 3.10 / ask 3.30. Compute the spread, the mid, and your cost to buy one contract.</li><li>Is the 70 call ITM or OTM? What is its intrinsic value and its extrinsic value (using the mid)?</li><li>One row has OI 12 and a 1.80/2.90 spread; another has OI 9,000 and a 2.30/2.35 spread. Which would you trade and why?</li></ol></div></div>"},{"id":"p10-7","part":"10 · Options Basics","nav":"Style & Settlement","num":"10.7","kicker":"Part 10 · Lesson 7","title":"American vs European and Settlement","html":"<h3>When you can exercise, and what you receive</h3><p>Two structural features quietly change how an option behaves: its <strong>exercise style</strong> (when the holder may exercise) and its <strong>settlement</strong> (whether exercise delivers shares or cash). Getting these wrong leads to nasty surprises — like being assigned over a holiday weekend, or expecting stock and receiving a cash debit instead.</p><h4>American vs European style</h4><p>The names have nothing to do with geography. They describe <em>when</em> the right may be used.</p><ul><li><strong>American-style:</strong> can be exercised <em>any time</em> up to and including expiration. Nearly all <strong>single-stock options</strong> and ETF options (e.g., on individual companies) are American. This means a short option holder can be assigned <em>early</em>, on any day.</li><li><strong>European-style:</strong> can be exercised <em>only at expiration</em>. Most broad-based <strong>index options</strong> (e.g., the S&amp;P 500 index, SPX) are European. No early assignment risk.</li></ul><div class='box law'><div class='bt'>Definition.</div> American = exercisable any day through expiration (early assignment possible). European = exercisable only at expiration (no early assignment). Style is a fixed property of the contract, not a choice you make.</div><h4>Physical vs cash settlement</h4><p>When an option is exercised, how does the obligation get fulfilled?</p><ul><li><strong>Physical settlement:</strong> actual shares change hands at the strike. Single-stock options are physically settled — exercise the 100 call and you literally receive 100 shares for $10,000.</li><li><strong>Cash settlement:</strong> no shares move; instead the in-the-money amount is paid in cash. Index options like SPX are cash-settled because you cannot deliver \"the index\" — there is no such share.</li></ul><h4>Worked example: stock call vs index option</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Two contracts at expiration</span></div><div class='term-body'><span class='dim'>ACME 100 call (American, physical):</span> stock $106\n&rarr; exercise &rarr; receive <span class='ok'>100 shares</span> at $100 ($10,000 paid)\n&rarr; can also be exercised <span class='am'>early</span>, any day\n\n<span class='dim'>SPX 5,000 call (European, cash):</span> index settles 5,030\n&rarr; ITM by 30 points &times; $100 multiplier = <span class='ok'>$3,000 cash</span>\n&rarr; no shares; <span class='am'>no early exercise</span>, settles only at expiry</div></div><p>The ACME call hands you stock and a $10,000 bill; the SPX call simply credits $3,000 of cash and disappears — clean, no shares, no overnight stock risk after settlement. The SPX holder also never worries about being assigned on a random Tuesday, whereas an ACME short call writer must always watch for early assignment.</p><h4>Why early exercise (American) usually does not happen — except around dividends</h4><p>For most American <em>calls</em>, early exercise is irrational: exercising throws away the option's remaining time value, so it is better to sell the option than exercise it. The big exception is <strong>dividends</strong>. Just before a stock pays a dividend, a deep-ITM call holder may exercise early to capture the dividend by owning the shares on the ex-date. That is the main scenario in which short call writers get assigned ahead of expiration.</p><div class='box danger'><div class='bt'>Pitfall.</div> If you are short an American ITM call going into an ex-dividend date, assume you may be assigned early and end up short the stock and owing the dividend. European index options remove this risk entirely — one reason index traders favor them.</div><div class='box tip'><div class='bt'>Insight.</div> SPX (European, cash-settled) versus SPY (the ETF, American, physically settled) track nearly the same index but behave differently at the edges: SPX has no early-assignment or pin-into-shares risk, while SPY can leave you holding actual ETF shares. Same exposure, different mechanics.</div><div class='chart' data-scenario='uptrend' data-marks='hline:100:strike; note:38:103:deep ITM call · ex-div &rarr; early-exercise risk' data-title='ACME · Daily approaching ex-dividend' data-cap='A deep-ITM American call near an ex-dividend date is the classic early-assignment trigger.'></div><p>As ACME trends well above the 100 strike, the call goes deep ITM and its time value shrinks toward zero. With little time value left to forfeit, capturing an upcoming dividend can make early exercise worthwhile for the holder — and that is precisely when the short call writer should expect an early assignment notice. A European contract on the same trajectory would simply sit until expiration regardless.</p><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: match style and settlement to a contract.</p><ol><li>For each — a single-stock NOVA call and an index SPX put — state the exercise style and settlement type.</li><li>An SPX 5,000 put settles with the index at 4,940. Compute the cash settlement (multiplier $100).</li><li>Explain in one sentence why a short American call writer should be on alert just before an ex-dividend date.</li></ol></div></div>"},{"id":"p10-8","part":"10 · Options Basics","nav":"Single-Leg Payoffs","num":"10.8","kicker":"Part 10 · Lesson 8","title":"Payoffs of a Single Long/Short Call/Put","html":"<h3>The four building blocks</h3><p>Every options strategy ever devised is assembled from four atoms: <strong>long call, short call, long put, short put</strong>. If you can draw each one's payoff at expiration and state its break-even, you can reason about any combination. Let us chart all four and compute their break-evens precisely.</p><div class='box law'><div class='bt'>Definition.</div> A payoff diagram plots profit/loss (vertical) against the stock price at expiration (horizontal). Break-even is where profit = 0. Long call BE = strike + premium. Long put BE = strike &minus; premium. Short positions share the same break-even but mirror the profit across zero.</div><h4>1. Long call — bullish, limited risk, unlimited reward</h4><p>You pay premium for the right to buy. Below the strike the call expires worthless and you lose the full premium. Above the strike profit rises one-for-one with the stock, with no ceiling.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Long 100 call · premium $3</span></div><div class='term-body'><span class='dim'>Max loss:</span> <span class='bad'>&minus;$300</span> (premium), at any price &le; 100\n<span class='dim'>Break-even:</span> 100 + 3 = <span class='pr'>$103</span>\n<span class='dim'>At $110:</span> (110 &minus; 100) &times; 100 &minus; 300 = <span class='ok'>+$700</span>\n<span class='dim'>Max gain:</span> <span class='ok'>unlimited</span> as stock rises</div></div><div class='chart' data-type='payoff' data-legs='lc:100' data-title='Long 100 Call · debit $3' data-cap='Bullish: capped $3 loss, break-even $103, unlimited upside.'></div><p>The hockey stick: flat at &minus;$3 below the strike, kinking up at 100, crossing zero at the $103 break-even, then climbing forever. This is the position from Lesson 1.</p><h4>2. Short call — bearish/neutral, limited reward, unlimited risk</h4><p>You collect premium and take the obligation to deliver. It is the mirror of the long call.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Short 100 call · credit $3</span></div><div class='term-body'><span class='dim'>Max gain:</span> <span class='ok'>+$300</span> (premium), at any price &le; 100\n<span class='dim'>Break-even:</span> <span class='pr'>$103</span>\n<span class='dim'>At $110:</span> <span class='bad'>&minus;$700</span>\n<span class='dim'>Max loss:</span> <span class='bad'>unlimited</span> as stock rises</div></div><div class='chart' data-type='payoff' data-legs='sc:100' data-title='Short 100 Call · credit $3' data-cap='The mirror of the long call: $3 max gain, unlimited loss above $103.'></div><p>Flip the long call upside down across zero and you have it. Profit is capped at the $3 premium below the strike; above $103 losses run without bound. Selling naked calls carries the most dangerous risk profile of the four.</p><h4>3. Long put — bearish, limited risk, large reward</h4><p>You pay premium for the right to sell. Above the strike the put expires worthless (lose premium). Below the strike profit rises as the stock falls, all the way down to zero.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Long 100 put · premium $3</span></div><div class='term-body'><span class='dim'>Max loss:</span> <span class='bad'>&minus;$300</span> (premium), at any price &ge; 100\n<span class='dim'>Break-even:</span> 100 &minus; 3 = <span class='pr'>$97</span>\n<span class='dim'>At $85:</span> (100 &minus; 85) &times; 100 &minus; 300 = <span class='ok'>+$1,200</span>\n<span class='dim'>Max gain:</span> (100 &minus; 0) &times; 100 &minus; 300 = <span class='ok'>+$9,700</span> at $0</div></div><div class='chart' data-type='payoff' data-legs='lp:100' data-title='Long 100 Put · debit $3' data-cap='Bearish: capped $3 loss, break-even $97, profit grows as the stock falls toward zero.'></div><p>A reversed hockey stick: flat &minus;$3 above the strike, kinking down through the $97 break-even, rising leftward as the stock drops. The reward is large but bounded — a stock can only fall to zero.</p><h4>4. Short put — bullish/neutral, limited reward, large risk</h4><p>You collect premium and take the obligation to buy at the strike. Mirror of the long put.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Short 100 put · credit $3</span></div><div class='term-body'><span class='dim'>Max gain:</span> <span class='ok'>+$300</span> (premium), at any price &ge; 100\n<span class='dim'>Break-even:</span> <span class='pr'>$97</span>\n<span class='dim'>At $85:</span> <span class='bad'>&minus;$1,200</span>\n<span class='dim'>Max loss:</span> <span class='bad'>&minus;$9,700</span> if stock goes to $0</div></div><div class='chart' data-type='payoff' data-legs='sp:100' data-title='Short 100 Put · credit $3' data-cap='Bullish: $3 max gain above $97, large loss as the stock falls (capped at the strike).'></div><p>Above $97 you keep the full $3 credit; below it losses mount as the stock falls toward zero. This is the payoff behind the \"cash-secured put\" income strategy — you are paid $3 to stand ready to buy at $100.</p><div class='box tip'><div class='bt'>Insight.</div> Two clean rules tie it together: <strong>(1)</strong> buyers (long) have limited risk and large reward; sellers (short) have limited reward and large risk. <strong>(2)</strong> Calls profit up, puts profit down. Long call BE = K + premium; long put BE = K &minus; premium; the short shares the BE but flips the sign of every profit.</div><div class='box danger'><div class='bt'>Pitfall.</div> The two short, naked positions (short call, short put) carry the outsized losses. Beginners drawn to the steady premium income must respect that one large adverse move can erase many months of collected credits.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: draw and price all four atoms.</p><ol><li>NOVA 50 call costs $2. State max loss, break-even, and P/L at $58 for the long call and the short call.</li><li>NOVA 50 put costs $2. State max loss, break-even, and P/L at $42 for the long put and the short put.</li><li>For each of the four, label it bullish or bearish and limited-risk or large-risk.</li></ol></div></div>"},{"id":"p11-1","part":"11 · The Greeks","nav":"Premium Parts","num":"11.1","kicker":"Part 11 · Lesson 1","title":"What Makes Up an Option Premium","html":"<p>Before you can speak the language of the Greeks, you have to understand what they are measuring sensitivities <em>of</em>: the option's premium. The premium is the price you pay (or collect) for the contract, and it is not a single mysterious number handed down by the market. It is the output of a handful of identifiable inputs, each of which the Greeks will later isolate. If you can decompose a premium in your head, every Greek becomes obvious &mdash; delta is just the premium's sensitivity to one of those inputs, theta to another, vega to a third.</p>\n<h3>The five-and-a-half inputs</h3>\n<p>Every standard option price is a function of the same ingredients. Memorize them, because the entire rest of this part is built on them.</p>\n<ul><li><strong>Underlying price (S)</strong> &mdash; where the stock trades right now.</li><li><strong>Strike price (K)</strong> &mdash; the fixed price at which you may buy (call) or sell (put).</li><li><strong>Time to expiration (T)</strong> &mdash; how long until the contract dies, usually expressed in years.</li><li><strong>Implied volatility (&sigma;)</strong> &mdash; the market's estimate of how much the stock will move, annualized.</li><li><strong>Risk-free rate (r)</strong> &mdash; the interest the cash could earn meanwhile.</li><li><strong>Dividends (q)</strong> &mdash; the half-input; payouts the stock makes before expiration, which reduce a call's value.</li></ul>\n<h3>Intrinsic value and extrinsic value</h3>\n<p>Any premium splits cleanly into two parts. The first is <strong>intrinsic value</strong> &mdash; the amount the option is already in the money. For a call that is max(S &minus; K, 0); for a put it is max(K &minus; S, 0). Intrinsic value is pure arithmetic; it has no opinion about the future.</p>\n<div class='box law'><div class='bt'>Definition.</div> Premium = Intrinsic value + Extrinsic value. Intrinsic<sub>call</sub> = max(S &minus; K, 0). Everything left over &mdash; the part that pays for <em>time</em> and <em>uncertainty</em> &mdash; is extrinsic value, also called time value.</div>\n<p>The second part, <strong>extrinsic value</strong>, is everything the market pays on top of intrinsic value. It is the price of possibility: the chance the stock keeps moving in your favor before expiration. Extrinsic value is where time (theta) and volatility (vega) live. An out-of-the-money option has <em>zero</em> intrinsic value, so its entire premium is extrinsic &mdash; it is pure hope with a clock running.</p>\n<h3>Decomposing a $5 premium</h3>\n<p>Suppose ACME trades at $103 and you are pricing the 100-strike call with 30 days left. The market quotes it at $5.00. Let us pull that premium apart.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Decomposing a $5.00 call premium</span></div><div class='term-body'><span class='dim'>Underlying S</span> = <span class='cm'>$103</span>\n<span class='dim'>Strike K</span> = <span class='cm'>$100</span>\n<span class='dim'>Intrinsic = max(103 &minus; 100, 0)</span> = <span class='ok'>$3.00</span>\n<span class='dim'>Premium quoted</span> = <span class='cm'>$5.00</span>\n<span class='dim'>Extrinsic = 5.00 &minus; 3.00</span> = <span class='am'>$2.00</span>\n<span class='dim'>So you pay $3 of certainty and</span> <span class='am'>$2 of time + volatility</span></div></div>\n<p>That $2.00 of extrinsic value is the battleground for the rest of this part. Raise implied volatility and it grows (vega). Let a week pass with the stock still and it shrinks (theta). Push the stock higher and the whole premium climbs because intrinsic value rises faster than extrinsic erodes (delta and gamma). The Greeks are simply the dials that tell you how fast each of those things happens.</p>\n<h3>How each input pushes the premium</h3>\n<table><tr><td><strong>Input rises</strong></td><td><strong>Call premium</strong></td><td><strong>Put premium</strong></td></tr><tr><td>Underlying S &uarr;</td><td>up</td><td>down</td></tr><tr><td>Time T &uarr;</td><td>up</td><td>up</td></tr><tr><td>Volatility &sigma; &uarr;</td><td>up</td><td>up</td></tr><tr><td>Rate r &uarr;</td><td>up</td><td>down</td></tr><tr><td>Dividend q &uarr;</td><td>down</td><td>up</td></tr></table>\n<p>Notice that time and volatility lift <em>both</em> calls and puts &mdash; more time and more movement mean more chance of finishing in the money, regardless of direction. Direction-dependent inputs (S, r, q) help one side and hurt the other. Each row of this table will become a Greek with a name and a number.</p>\n<div class='box tip'><div class='bt'>Insight.</div> An option is a decaying asset wrapped around a stock position. The intrinsic part behaves like the stock; the extrinsic part behaves like a melting ice cube. The Greeks measure the melting.</div>\n<p>One more visual will anchor the idea. The curve below shows how a call's <em>total value</em> bends above its intrinsic-value kink. The gap between the smooth curve and the hard hockey-stick is extrinsic value &mdash; widest at the money, vanishing deep in or deep out.</p>\n<div class='chart' data-type='curve' data-curve='call-value' data-title='Call Value vs Underlying' data-cap='Smooth premium curve sits above the intrinsic-value kink; the gap is extrinsic value, fattest near the strike.'></div>\n<p>Read it carefully. Far to the left, the call is worthless and the curve hugs zero. Far to the right, the curve runs parallel to and just above the intrinsic line &mdash; deep-ITM options are almost all intrinsic value with little time premium left. Right at the strike, the bulge is largest: that is where uncertainty is richest and where, as we will see, gamma and vega concentrate.</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Decompose three live premiums into intrinsic and extrinsic value.</p><ol><li>Pick a liquid stock and note its price S.</li><li>For an ITM, an ATM, and an OTM call in the same expiration, write down each premium.</li><li>Compute intrinsic = max(S &minus; K, 0) for each, then subtract to get extrinsic value.</li><li>Confirm the OTM option is 100% extrinsic and that extrinsic value is largest for the near-the-money strike.</li></ol></div></div>"},{"id":"p11-2","part":"11 · The Greeks","nav":"Delta","num":"11.2","kicker":"Part 11 · Lesson 2","title":"Delta: Sensitivity, Hedge Ratio and Probability","html":"<p>Delta is the first Greek every trader meets, and the most useful, because it answers three different questions at once. Formally it is the rate of change of the option's value with respect to the underlying price &mdash; the slope of the premium curve you saw in the last lesson. But that single slope can be read as a <strong>price sensitivity</strong>, a <strong>hedge ratio</strong>, and a <strong>rough probability</strong>. Mastering delta means holding all three readings in your head simultaneously.</p>\n<div class='box law'><div class='bt'>Definition.</div> &Delta; = &part;V &divide; &part;S &mdash; the change in option value per $1 change in the underlying. Calls have delta from 0 to +1; puts from 0 to &minus;1. By convention quotes often show delta as a whole number, so 0.60 is &ldquo;60 delta.&rdquo;</div>\n<h3>Reading one: price sensitivity</h3>\n<p>The plainest reading is mechanical. A call with delta 0.60 gains about $0.60 in value for every $1 the stock rises, and loses about $0.60 for every $1 it falls. Since one equity contract controls 100 shares, that 0.60 delta means roughly $60 of P&amp;L per $1 stock move per contract.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>0.60-delta call: a $1 move</span></div><div class='term-body'><span class='dim'>Stock moves</span> <span class='cm'>$50 &rarr; $51</span> (+$1)\n<span class='dim'>Premium change &asymp; &Delta; &times; &Delta;S = 0.60 &times; 1</span> = <span class='ok'>+$0.60</span>\n<span class='dim'>Per contract (&times;100)</span> = <span class='ok'>+$60</span>\n<span class='dim'>If stock falls to $49 instead</span> = <span class='bad'>&minus;$60</span></div></div>\n<p>Deep-in-the-money calls approach delta 1.00 &mdash; they track the stock almost dollar-for-dollar, behaving like stock itself. Deep-out-of-the-money calls have delta near 0.00 &mdash; the stock can wiggle and the premium barely notices. The curve below plots delta across the underlying.</p>\n<div class='chart' data-type='curve' data-curve='delta' data-title='Call Delta vs Underlying' data-cap='Delta rises smoothly from 0 (deep OTM) through 0.50 (ATM) to nearly 1.0 (deep ITM) - an S-shaped curve.'></div>\n<p>The S-shape is the whole story. The curve is flat at both extremes &mdash; far OTM and far ITM, delta barely changes &mdash; and steepest right at the money, where it passes through about 0.50. That steepness is gamma, the subject of the next lesson. For now, note that an at-the-money option is the most responsive place on the curve: its delta is changing fastest as the stock moves.</p>\n<h3>Reading two: the hedge ratio</h3>\n<p>Delta also tells you how many shares replicate &mdash; or neutralize &mdash; the option. If your 0.60-delta call behaves like 60 shares of long stock, you can cancel its directional risk by <em>shorting 60 shares</em>. Do that and small moves in the stock leave your combined position roughly flat: this is <strong>delta hedging</strong>, the foundation of how dealers warehouse risk.</p>\n<div class='box tip'><div class='bt'>Insight.</div> A long call at 0.60 delta plus 60 short shares is delta-neutral <em>for an instant</em>. As the stock moves, the call's delta changes but the share count does not, so the hedge drifts &mdash; which is exactly why gamma matters and why hedges must be rebalanced.</div>\n<h3>Reading three: a rough probability</h3>\n<p>The third reading is the most quoted and the most abused. A call's delta is approximately the risk-neutral probability that the option finishes in the money. A 0.60-delta call is loosely &ldquo;about 60% likely&rdquo; to expire ITM; a 0.20-delta put is &ldquo;about 20% likely.&rdquo; This is why traders selling premium speak of selling the &ldquo;10-delta strike&rdquo; &mdash; they mean a strike with roughly a 10% chance of being breached.</p>\n<div class='box danger'><div class='bt'>Pitfall.</div> Delta-as-probability is an approximation, not gospel. It is the risk-neutral probability, not the real-world one, and it ignores the difference between finishing a penny ITM and finishing deep ITM. Use it as a quick gauge, never as a precise forecast.</div>\n<p>Putting all three together: a 0.60-delta call gains ~$0.60 per $1 up-move (sensitivity), can be hedged with 60 short shares (hedge ratio), and is roughly 60% likely to finish in the money (probability). One number, three lenses.</p>\n<h3>Position delta</h3>\n<p>Delta is additive, which makes it the master gauge of a whole book. Long 5 of those calls is +300 deltas (5 &times; 0.60 &times; 100). Add 100 short shares (&minus;100 deltas) and your net is +200 deltas &mdash; you are effectively long 200 shares regardless of how many legs you hold. Every multi-leg position collapses to a single net-delta number that tells you your directional exposure at a glance.</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Verify delta's three meanings on a real option chain.</p><ol><li>Find an ATM call and confirm its delta is near 0.50.</li><li>Estimate its premium change for a $1 stock move using &Delta; &times; 1, then watch the quote when the stock actually moves a dollar.</li><li>Write down how many shares you would short to delta-hedge one contract.</li><li>Compare its delta to the OTM strikes and sanity-check the &ldquo;probability of finishing ITM&rdquo; reading.</li></ol></div></div>"},{"id":"p11-3","part":"11 · The Greeks","nav":"Gamma","num":"11.3","kicker":"Part 11 · Lesson 3","title":"Gamma: How Delta Changes","html":"<p>If delta is speed, gamma is acceleration. Delta told you how fast the premium moves when the stock moves; gamma tells you how fast <em>delta itself</em> changes. It is the second derivative of the option value with respect to price, and it is the reason a hedge that is perfect at this instant is wrong an instant later. Understanding gamma is what separates traders who merely know delta from traders who can manage a position through a fast market.</p>\n<div class='box law'><div class='bt'>Definition.</div> &Gamma; = &part;&Delta; &divide; &part;S = &part;<sup>2</sup>V &divide; &part;S<sup>2</sup>. It measures how much delta changes per $1 move in the underlying. Gamma is identical for a call and the same-strike put, and it is always positive for long options.</div>\n<h3>Where gamma lives</h3>\n<p>Recall the S-shaped delta curve from the last lesson. Gamma is its slope. Where the delta curve is steepest &mdash; right at the money &mdash; gamma is highest. Where the delta curve flattens out &mdash; deep ITM or deep OTM &mdash; gamma falls toward zero. So gamma is a hump centered on the strike.</p>\n<div class='chart' data-type='curve' data-curve='gamma' data-title='Gamma vs Underlying' data-cap='Gamma is a bell-shaped hump peaking at the money and decaying to zero deep ITM and deep OTM.'></div>\n<p>The bell shape carries two practical truths. First, at-the-money options have the most gamma, so their deltas are the most unstable &mdash; a small move flips them around quickly. Second, deep-ITM and deep-OTM options have almost no gamma; their deltas are pinned near 1.0 or 0.0 and barely budge. Gamma also <em>rises</em> as expiration approaches for ATM options, which is why the last day of a near-the-money option is so violent.</p>\n<h3>A worked example: delta swinging on a $2 move</h3>\n<p>NOVA trades at $50. The 50-strike call is at-the-money with delta 0.50 and gamma 0.075. The stock rallies $2 to $52. How does delta respond?</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Delta moving because of gamma</span></div><div class='term-body'><span class='dim'>Starting delta</span> = <span class='cm'>0.50</span>\n<span class='dim'>Gamma</span> = <span class='cm'>0.075 per $1</span>\n<span class='dim'>Stock move</span> = <span class='cm'>+$2</span>\n<span class='dim'>Delta change &asymp; &Gamma; &times; &Delta;S = 0.075 &times; 2</span> = <span class='am'>+0.15</span>\n<span class='dim'>New delta &asymp; 0.50 + 0.15</span> = <span class='ok'>0.65</span></div></div>\n<p>The delta swung from 0.50 to 0.65 purely because gamma is high near the money. That is the example in the skeleton, and it shows why gamma is the trader's friend when long and the trader's enemy when short. A long-gamma position gets <em>longer</em> as the stock rises and <em>shorter</em> as it falls &mdash; it automatically leans into winners. A short-gamma position does the opposite, getting shorter into rallies and longer into selloffs, which is precisely the wrong way to be positioned in a trending move.</p>\n<div class='box tip'><div class='bt'>Insight.</div> Long options are long gamma: your delta improves in your favor as the stock moves, in either direction. That convexity is what you pay for with theta. Gamma and theta are two sides of one trade &mdash; you cannot have positive gamma without paying time decay.</div>\n<h3>Gamma and the cost of hedging</h3>\n<p>Return to the delta-hedged call from the last lesson: long one 0.60-delta call, short 60 shares. The stock rises and the call's delta climbs to, say, 0.70. Now you are net +10 deltas &mdash; the hedge slipped because gamma moved your delta. To re-neutralize you must short 10 more shares, and you do so at a <em>higher</em> price. If the stock then falls, your delta drops back and you buy shares back <em>lower</em>. Long gamma means you are structurally selling high and buying low as you rebalance &mdash; the rebalancing itself harvests value, which is what offsets the theta you pay.</p>\n<div class='box danger'><div class='bt'>Pitfall.</div> Short-gamma positions (selling options) force the opposite: you rebalance by buying high and selling low. In a quiet market the theta you collect wins; in a sharp move the gamma losses can dwarf weeks of collected premium. Never judge a short-premium book by its theta alone &mdash; check its gamma.</div>\n<h3>Reading gamma on a position</h3>\n<p>Like delta, gamma is additive across a book. A market maker's whole job is often described as managing net gamma: long-gamma books love volatility and hate stillness; short-gamma books love stillness and fear gaps. When you hear that &ldquo;dealers are short gamma below this strike,&rdquo; it means their forced hedging amplifies moves &mdash; selling into weakness &mdash; which is why gamma positioning has become a widely watched market-structure signal.</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>See gamma reshape delta on a real chain.</p><ol><li>Note the delta and gamma of an ATM option and a deep-ITM option in the same expiration.</li><li>Confirm the ATM gamma is far larger than the deep-ITM gamma.</li><li>Estimate the new delta after a $2 move using &Delta;<sub>new</sub> &asymp; &Delta; + &Gamma; &times; 2.</li><li>Repeat for a contract one day from expiration and watch how much higher ATM gamma has become.</li></ol></div></div>"},{"id":"p11-4","part":"11 · The Greeks","nav":"Theta","num":"11.4","kicker":"Part 11 · Lesson 4","title":"Theta: Time Decay","html":"<p>Every option is a wasting asset. The extrinsic value you isolated in Lesson 1 &mdash; the premium paid for time and uncertainty &mdash; bleeds away as expiration approaches, because there is steadily less time left for the stock to move in your favor. Theta is the Greek that puts a number on that bleed: how much value an option loses per day, all else equal. For option buyers theta is rent; for option sellers it is income.</p>\n<div class='box law'><div class='bt'>Definition.</div> &Theta; = &part;V &divide; &part;t &mdash; the change in option value as one day passes, holding everything else constant. It is quoted as a negative number for long options (e.g. &minus;0.05 means the option loses $0.05 per day, or $5 per contract).</div>\n<h3>Quantifying the daily bleed</h3>\n<p>Theta is the easiest Greek to feel in your account. Consider an at-the-money option carrying a theta of &minus;0.05. Hold it overnight with the stock unchanged and you wake up $0.05 poorer per share, $5 poorer per contract.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Theta bleed over a quiet week</span></div><div class='term-body'><span class='dim'>Theta</span> = <span class='cm'>&minus;0.05 / day</span>\n<span class='dim'>Per contract (&times;100)</span> = <span class='bad'>&minus;$5 / day</span>\n<span class='dim'>5 calendar days, stock flat</span> = <span class='bad'>&minus;$25</span>\n<span class='dim'>Long 10 contracts</span> = <span class='bad'>&minus;$250 for the week</span>\n<span class='dim'>Note: this is the cost if NOTHING moves</span></div></div>\n<p>That is the buyer's predicament: you can be right about direction and still lose if you are slow, because theta charges rent every single day. The seller's mirror image is that collecting that $25 per contract is the entire business model of premium selling &mdash; as long as the stock does not move enough to overwhelm it.</p>\n<h3>Theta accelerates into expiration</h3>\n<p>The crucial subtlety is that theta is not constant. For an at-the-money option, time decay <em>accelerates</em> as expiration nears. Extrinsic value does not melt linearly; it follows a curve that drops gently far from expiration and then plunges in the final stretch. The decay of an ATM option is roughly proportional to the square root of time remaining, so the last weeks shed value far faster than the first.</p>\n<div class='chart' data-type='curve' data-curve='time-decay' data-title='Extrinsic Value vs Time to Expiration' data-cap='Time value erodes slowly at first then collapses in the final weeks - the classic accelerating decay curve.'></div>\n<p>Read the curve from right (lots of time) to left (expiration). Far out, the line is nearly flat &mdash; a 90-day ATM option barely decays day to day. As you approach the final two to three weeks, the curve steepens sharply, and in the last few days it falls off a cliff. This is why an ATM option that is &minus;0.05 today might be &minus;0.12 with a week to go, even though nothing about the stock changed.</p>\n<div class='box tip'><div class='bt'>Insight.</div> The accelerating curve is why sellers often favor the 30-to-45-day window and close around 7-14 days left: they collect the steepest part of the decay, then step aside before gamma risk explodes. Buyers face the reverse incentive &mdash; buy more time than you think you need, because the cheapest decay is far from expiry.</div>\n<h3>Theta depends on moneyness</h3>\n<p>Where the option sits matters. At-the-money options have the most extrinsic value to lose, so they carry the largest theta and the most dramatic terminal acceleration. Deep-ITM and deep-OTM options have little extrinsic value left, so their theta is small &mdash; there simply isn't much time premium to bleed. An OTM option's decay also accelerates, but because it is decaying toward zero, the final collapse can wipe out the whole premium.</p>\n<div class='box danger'><div class='bt'>Pitfall.</div> Theta and gamma move together but with opposite signs. The same ATM option whose theta accelerates into expiration also has gamma exploding in that window. Sellers harvesting fat late-cycle theta are simultaneously taking on dangerous gamma &mdash; one overnight gap can erase a month of collected decay.</div>\n<h3>Theta is paid for vega and gamma</h3>\n<p>Never read theta in isolation. The decay you pay as a buyer is the price of two good things: positive gamma (your delta improves as the stock moves) and positive vega (you profit if volatility rises). A long straddle bleeds theta every day precisely because it is long gamma and long vega. The question is never &ldquo;is theta bad?&rdquo; but &ldquo;am I being paid enough in movement and volatility to cover the rent?&rdquo;</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Measure theta acceleration directly.</p><ol><li>Pick an ATM option ~45 days out and record its theta and premium.</li><li>Find the same strike ~10 days out and record its theta.</li><li>Confirm the near-dated theta is meaningfully larger (more negative).</li><li>Multiply each theta by 100 to express the daily dollar bleed per contract, and project the cost of holding a week.</li></ol></div></div>"},{"id":"p11-5","part":"11 · The Greeks","nav":"Vega","num":"11.5","kicker":"Part 11 · Lesson 5","title":"Vega: Sensitivity to Implied Volatility","html":"<p>Vega is the Greek that catches new traders off guard. They buy a call, the stock rallies exactly as predicted, and the option still loses money. The culprit is almost always vega &mdash; the option's sensitivity to <em>implied volatility</em>, the market's estimate of future movement baked into the premium. You can be right on direction and timing and still lose if implied volatility collapses underneath you. Vega measures exactly how much.</p>\n<div class='box law'><div class='bt'>Definition.</div> &nu; = &part;V &divide; &part;&sigma; &mdash; the change in option value per 1 percentage-point change in implied volatility. (Vega is not a true Greek letter, but it is universal.) A vega of 0.12 means the premium gains $0.12 if IV rises one point and loses $0.12 if IV falls one point.</div>\n<h3>Estimating a price change from an IV shift</h3>\n<p>Vega is a simple multiplier. Take an option with vega 0.12. If implied volatility rises from 30% to 35% &mdash; a 5-point increase &mdash; the premium gains about 0.12 &times; 5 = $0.60, with the stock perfectly still. Volatility alone moved the price.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Vega: a 5-point IV rise</span></div><div class='term-body'><span class='dim'>Vega</span> = <span class='cm'>0.12 per IV point</span>\n<span class='dim'>IV moves</span> <span class='cm'>30% &rarr; 35%</span> (+5 pts)\n<span class='dim'>Premium change &asymp; &nu; &times; &Delta;&sigma; = 0.12 &times; 5</span> = <span class='ok'>+$0.60</span>\n<span class='dim'>Per contract (&times;100)</span> = <span class='ok'>+$60</span>\n<span class='dim'>Stock did not move at all</span></div></div>\n<h3>The earnings IV crush</h3>\n<p>Nowhere is vega more brutal than around earnings. Implied volatility inflates in the days before a report as the market prices in the coming surprise, then collapses the instant the news is out and uncertainty resolves. This is the famous <strong>IV crush</strong>. Suppose you hold a $4.00 ATM call with vega 0.12 into earnings, where IV stands at 60%. The report lands, the stock barely moves, and IV crashes from 60% to 35% &mdash; a 25-point drop.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Earnings IV crush guts the premium</span></div><div class='term-body'><span class='dim'>Premium before</span> = <span class='cm'>$4.00</span>\n<span class='dim'>Vega</span> = <span class='cm'>0.12</span>\n<span class='dim'>IV drop</span> = <span class='cm'>60% &rarr; 35% = &minus;25 pts</span>\n<span class='dim'>Vega P&amp;L &asymp; 0.12 &times; (&minus;25)</span> = <span class='bad'>&minus;$3.00</span>\n<span class='dim'>Premium after (stock flat)</span> = <span class='bad'>&asymp; $1.00</span>\n<span class='dim'>You lost 75% with the stock unchanged</span></div></div>\n<p>That is the trap: the stock did exactly nothing, yet three-quarters of the premium vaporized because the volatility you paid for evaporated. Long-premium earnings plays must clear not just the stock move but the vega drag of the crush. Sellers, by contrast, position <em>for</em> the crush &mdash; selling rich pre-earnings premium and buying it back cheap after.</p>\n<div class='box danger'><div class='bt'>Pitfall.</div> Buying options into earnings &ldquo;because the stock will move&rdquo; ignores that IV crush is nearly guaranteed while the move is not. The break-even move often has to exceed the entire implied move just to overcome vega losses. Always check vega and the IV level before an event trade.</div>\n<h3>Where vega is largest</h3>\n<p>Vega, like gamma, peaks at the money &mdash; but unlike gamma it <em>grows with time to expiration</em>. Long-dated options have far more vega than weeklies, because a change in the volatility assumption compounds over more time. A LEAPS option is dominated by vega; a one-day option has almost none.</p>\n<div class='chart' data-type='curve' data-curve='vega' data-title='Vega vs Underlying' data-cap='Vega is a hump centered at the money; it is taller for longer-dated options and shrinks as expiration nears.'></div>\n<p>The hump shape mirrors gamma, but the time relationship is reversed: gamma is biggest for <em>short</em>-dated ATM options, vega for <em>long</em>-dated ones. This is why calendar spreads &mdash; selling a short-dated option and buying a long-dated one at the same strike &mdash; are net long vega: the long leg's vega outweighs the short leg's. If implied volatility rises, the calendar profits even though it is short an option.</p>\n<div class='box tip'><div class='bt'>Insight.</div> Think of vega as your bet on the volatility regime. Long vega wants fear and uncertainty to grow; short vega wants calm. Many blow-ups happen when a trader is unknowingly short vega &mdash; collecting theta in a quiet market &mdash; and a volatility spike repriced every option against them at once.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Catch an IV crush in the wild.</p><ol><li>Find a stock reporting earnings this week and note the ATM option's IV and vega the day before.</li><li>Estimate the premium loss if IV falls 20 points: &nu; &times; (&minus;20).</li><li>After the report, record the new IV and premium with the stock roughly flat.</li><li>Compare your vega estimate to the actual premium drop.</li></ol></div></div>"},{"id":"p11-6","part":"11 · The Greeks","nav":"Rho","num":"11.6","kicker":"Part 11 · Lesson 6","title":"Rho: Sensitivity to Interest Rates","html":"<p>Rho is the forgotten Greek. For most short-dated retail trades it is so small it can be ignored entirely, which is why it gets the least attention. But it is part of the complete picture, and for long-dated options &mdash; LEAPS, deep-ITM substitutes for stock, large institutional books &mdash; it can matter quite a bit. Rho measures the option's sensitivity to the risk-free interest rate.</p>\n<div class='box law'><div class='bt'>Definition.</div> &rho; = &part;V &divide; &part;r &mdash; the change in option value per 1 percentage-point change in the risk-free interest rate. Calls have positive rho (they rise when rates rise); puts have negative rho (they fall when rates rise).</div>\n<h3>Why rates touch option prices at all</h3>\n<p>The intuition flows from the carry of the underlying. Buying a call is a leveraged way to control stock without paying the full cash up front &mdash; you keep your cash and let it earn interest. The higher the interest rate, the more valuable that deferral of payment is, so calls are worth more when rates are high. A put is the reverse: it defers <em>receiving</em> cash from a sale, so higher rates make it slightly less attractive, giving puts negative rho.</p>\n<h3>Why rho is a long-dated phenomenon</h3>\n<p>Rho scales with time, because interest is earned over time. The cost of carry on a one-week option covers seven days of interest &mdash; trivial. The cost of carry on a two-year LEAPS covers two years &mdash; substantial. So rho is negligible for weeklies and meaningful for LEAPS. Compare a LEAPS call to a weekly when rates climb a full point.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Rho: a 1-point rate rise, two horizons</span></div><div class='term-body'><span class='dim'>Rates rise</span> <span class='cm'>4% &rarr; 5% (+1 pt)</span>\n<span class='dim'>LEAPS call rho</span> = <span class='cm'>~0.45</span>\n<span class='dim'>LEAPS value change &asymp; 0.45 &times; 1</span> = <span class='ok'>+$0.45</span> (per share)\n<span class='dim'>Weekly call rho</span> = <span class='cm'>~0.01</span>\n<span class='dim'>Weekly value change &asymp; 0.01 &times; 1</span> = <span class='dim'>+$0.01 (negligible)</span></div></div>\n<p>The LEAPS gains a real, if modest, $0.45 per share from the rate move; the weekly's penny is lost in the bid-ask noise. This is the entire practical lesson of rho: it is a slow, long-horizon Greek that only earns a seat at the table when expiration is far away.</p>\n<div class='chart' data-type='curve' data-curve='rho' data-title='Call Rho vs Underlying' data-cap='Rho rises with moneyness and is far larger for long-dated options; for short-dated contracts the curve is nearly flat and small.'></div>\n<p>The curve shows rho increasing as the option moves into the money &mdash; deep-ITM calls have the most rho because they behave most like a financed stock position, carrying the largest deferred purchase. Notice how much steeper the long-dated curve sits above the short-dated one; that vertical gap <em>is</em> the time-scaling of rho.</p>\n<div class='box tip'><div class='bt'>Insight.</div> In a stable-rate environment rho fades into irrelevance, which is why it earns the least screen time. But during a rate-hiking or rate-cutting cycle, long-dated option books feel rho directly &mdash; and the put/call rho asymmetry can shift the relative pricing of bullish versus bearish long-term structures.</div>\n<h3>Rho in practice</h3>\n<p>For the vast majority of trades &mdash; anything inside a couple of months &mdash; you can safely set rho aside and concentrate on delta, gamma, theta, and vega. Where to keep it in mind:</p>\n<ul><li><strong>LEAPS and stock-replacement calls</strong> &mdash; a deep-ITM long-dated call used instead of buying shares carries real rho; rising rates quietly help it.</li><li><strong>Box spreads and synthetic financing</strong> &mdash; these are essentially interest-rate trades, and rho is their dominant Greek.</li><li><strong>Macro regime shifts</strong> &mdash; when the central bank is actively moving rates, repricing of carry flows through rho across long-dated chains.</li></ul>\n<div class='box danger'><div class='bt'>Pitfall.</div> Do not confuse rho with the indirect effect of rates on stocks. A rate hike can crush equity prices &mdash; but that hits your option through delta, not rho. Rho is the <em>direct</em>, all-else-equal carry effect only. Keep the two channels separate when you reason about a rate decision.</div>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Compare rho across expirations.</p><ol><li>Pull up an ATM call expiring this week and a LEAPS call on the same stock.</li><li>Record the rho of each (your platform's Greeks tab will list it).</li><li>Estimate each option's value change for a 1-point rate move using &rho; &times; 1.</li><li>Confirm the weekly's rho is near zero while the LEAPS' is materially larger, and check that the put rho carries the opposite sign.</li></ol></div></div>"},{"id":"p11-7","part":"11 · The Greeks","nav":"Black-Scholes","num":"11.7","kicker":"Part 11 · Lesson 7","title":"Black-Scholes: Intuition and the Formula","html":"<p>Every Greek you have met so far is a partial derivative of one equation: the Black-Scholes-Merton option pricing formula. You do not need to derive it, but you should be able to read it, because it ties the whole part together &mdash; each Greek is simply Black-Scholes differentiated with respect to one input. This lesson presents the intuition, the formula, and the direct link from the formula to delta, gamma, theta, vega, and rho.</p>\n<h3>The intuition</h3>\n<p>Black-Scholes answers a single question: <em>what is the fair price today of the right to buy a stock at strike K at a future date, given how much the stock is likely to wander?</em> Its core insight is that you can perfectly replicate an option by continuously holding a precise amount of the stock (its delta) financed with borrowed cash. If a portfolio of stock-plus-borrowing exactly reproduces the option's payoff, then by no-arbitrage the option must cost the same as that portfolio. The formula is the closed-form price of that replicating portfolio.</p>\n<div class='box law'><div class='bt'>Formula.</div> Call price <strong>C = S&middot;N(d<sub>1</sub>) &minus; K&middot;e<sup>&minus;rT</sup>&middot;N(d<sub>2</sub>)</strong>, where d<sub>1</sub> = [ln(S&divide;K) + (r + &sigma;<sup>2</sup>&divide;2)T] &divide; (&sigma;&radic;T) and d<sub>2</sub> = d<sub>1</sub> &minus; &sigma;&radic;T. N(&middot;) is the cumulative normal distribution.</div>\n<p>Read it in two pieces. The first term, S&middot;N(d<sub>1</sub>), is the expected value of receiving the stock if the option finishes in the money. The second term, K&middot;e<sup>&minus;rT</sup>&middot;N(d<sub>2</sub>), is the present value of paying the strike, weighted by the probability N(d<sub>2</sub>) that you actually exercise. The call is worth the discounted difference: what you get minus what you pay, each scaled by its probability. The e<sup>&minus;rT</sup> discount factor is where rho comes from; the N(d<sub>1</sub>) term is, remarkably, the delta.</p>\n<h3>A full worked pricing</h3>\n<p>Let us price the contract from the skeleton: S = $100, K = $100 (at the money), T = 30 days (&asymp; 0.0822 years), &sigma; = 30%, r = 5%.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Black-Scholes step by step</span></div><div class='term-body'><span class='dim'>&sigma;&radic;T = 0.30 &times; &radic;0.0822</span> = <span class='cm'>0.0860</span>\n<span class='dim'>ln(S/K) = ln(1)</span> = <span class='cm'>0</span>\n<span class='dim'>(r + &sigma;&sup2;/2)T = (0.05 + 0.045)(0.0822)</span> = <span class='cm'>0.00781</span>\n<span class='dim'>d<sub>1</sub> = (0 + 0.00781) / 0.0860</span> = <span class='am'>0.0908</span>\n<span class='dim'>d<sub>2</sub> = 0.0908 &minus; 0.0860</span> = <span class='am'>0.0048</span>\n<span class='dim'>N(d<sub>1</sub>)</span> = <span class='cm'>0.5362</span> &nbsp; <span class='dim'>N(d<sub>2</sub>)</span> = <span class='cm'>0.5019</span>\n<span class='dim'>C = 100(0.5362) &minus; 100&middot;e<sup>&minus;0.00411</sup>(0.5019)</span>\n<span class='dim'>C = 53.62 &minus; 49.99</span> = <span class='ok'>$3.63</span></div></div>\n<p>So the fair value of this 30-day ATM call is about $3.63. And we got delta for free: <strong>N(d<sub>1</sub>) = 0.536</strong> is the call's delta. An at-the-money call has a delta slightly above 0.50 &mdash; nudged up by the drift term (r + &sigma;<sup>2</sup>&divide;2) &mdash; exactly as the delta lesson promised.</p>\n<h3>Every Greek is a derivative of this formula</h3>\n<p>Here is the unifying idea. Each Greek is Black-Scholes differentiated with respect to one input, and most have clean closed forms built from the same N(d<sub>1</sub>), N(d<sub>2</sub>), and the normal density n(d<sub>1</sub>).</p>\n<table><tr><td><strong>Greek</strong></td><td><strong>Closed form (call)</strong></td></tr><tr><td>Delta &Delta;</td><td>N(d<sub>1</sub>)</td></tr><tr><td>Gamma &Gamma;</td><td>n(d<sub>1</sub>) &divide; (S&middot;&sigma;&radic;T)</td></tr><tr><td>Vega &nu;</td><td>S&middot;n(d<sub>1</sub>)&middot;&radic;T</td></tr><tr><td>Theta &Theta;</td><td>&minus;[S&middot;n(d<sub>1</sub>)&middot;&sigma; &divide; (2&radic;T)] &minus; rK&middot;e<sup>&minus;rT</sup>N(d<sub>2</sub>)</td></tr><tr><td>Rho &rho;</td><td>K&middot;T&middot;e<sup>&minus;rT</sup>&middot;N(d<sub>2</sub>)</td></tr></table>\n<p>Look how the formulas confirm everything from earlier lessons. Gamma and vega both contain n(d<sub>1</sub>), the bell-shaped normal density that peaks at the money &mdash; which is precisely why gamma and vega are humps centered on the strike. Vega carries a &radic;T factor, so it <em>grows</em> with time; the first theta term carries 1&divide;&radic;T, so decay <em>accelerates</em> as T shrinks. Rho carries the T&middot;e<sup>&minus;rT</sup> factor, so it scales with time-to-expiry. The shapes you saw in the curves are not coincidences &mdash; they are these formulas drawn out.</p>\n<div class='box tip'><div class='bt'>Insight.</div> You will almost never compute Black-Scholes by hand in live trading &mdash; your platform does it instantly. The value of reading the formula is conceptual: it shows that the Greeks are not five unrelated rules of thumb but five views of one surface. Change an input, and the formula and all its derivatives update together.</div>\n<div class='box danger'><div class='bt'>Pitfall.</div> Black-Scholes assumes constant volatility, lognormal returns, no jumps, and European exercise. Real markets violate all four &mdash; which is exactly why implied volatility is not flat across strikes. That gap between the model's assumptions and reality is the subject of the final lesson.</div>\n<div class='chart' data-type='curve' data-curve='call-value' data-title='Black-Scholes Call Value' data-cap='The smooth Black-Scholes price curve; its slope is delta (N(d1)) and its curvature is gamma.'></div>\n<p>One last way to see it: the curve above is C as a function of S. Its <em>slope</em> at any point is delta, and the <em>rate the slope changes</em> is gamma. The smoothness that distinguishes this curve from the sharp payoff hockey-stick is the time and volatility value that Black-Scholes prices &mdash; and that the Greeks dissect.</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Reproduce a quoted price with Black-Scholes.</p><ol><li>Take a liquid ATM option and record S, K, days to expiry, the quoted IV, and a current short rate.</li><li>Use any Black-Scholes calculator to price it with those inputs.</li><li>Compare the model price to the market mid &mdash; they should be close.</li><li>Read N(d<sub>1</sub>) off the calculator and confirm it matches the listed delta.</li></ol></div></div>"},{"id":"p11-8","part":"11 · The Greeks","nav":"IV & Skew","num":"11.8","kicker":"Part 11 · Lesson 8","title":"Implied Volatility, the Smile and Managing a Position","html":"<p>The final lesson closes the loop. Implied volatility is the one Black-Scholes input the market does not give you directly &mdash; it is reverse-engineered from the option's price &mdash; and its behavior across strikes (the smile and skew) reveals where the model breaks and where opportunity lives. Then we put every Greek to work managing a real multi-leg position into an event. This is where the Greeks stop being definitions and become a control panel.</p>\n<h3>Implied volatility is the market's price, restated</h3>\n<p>Of the six Black-Scholes inputs, five are observable: S, K, T, r, and dividends. The sixth, volatility, is not &mdash; nobody knows the future. So traders run Black-Scholes <em>backwards</em>: they take the option's market price and solve for the volatility that makes the model match it. That number is the <strong>implied volatility</strong>. It is not a forecast handed down from on high; it is simply the market's price expressed in volatility units.</p>\n<div class='box law'><div class='bt'>Definition.</div> Implied volatility is the value of &sigma; that, plugged into Black-Scholes, reproduces the option's observed market price. High IV means rich premiums and an expensive option; low IV means cheap premiums. IV is the great common language for comparing option prices across strikes, stocks, and time.</div>\n<h3>The smile and the skew</h3>\n<p>Black-Scholes assumes one volatility for all strikes. The market disagrees. If you plot implied volatility against strike, you do not get a flat line &mdash; you get a curve. For many assets it is a <strong>smile</strong> (IV higher for both deep-OTM puts and deep-OTM calls) and for equity indices it is a <strong>skew</strong> (IV markedly higher for downside puts than for upside calls).</p>\n<div class='chart' data-type='curve' data-curve='iv-smile' data-title='Implied Volatility vs Strike' data-cap='The IV smile/skew: implied volatility is richest for downside puts, dips near the money, and rises again for far OTM strikes.'></div>\n<p>Read the curve from left (low strikes, downside puts) to right (high strikes, upside calls). The left side sits high &mdash; that is the equity skew. It exists because crashes are faster and deeper than rallies, and because investors pay up for downside protection, bidding put IV higher. The dip near the money is where IV is lowest; the right side ticks up again into the smile. The practical takeaway: a 10-delta put is usually priced at a <em>higher</em> implied volatility than a 10-delta call &mdash; downside insurance is structurally expensive.</p>\n<div class='box tip'><div class='bt'>Insight.</div> Skew is information. Steepening put skew signals rising fear and demand for crash protection; flattening skew signals complacency. Vertical spreads, risk reversals, and ratio trades are all ways of taking a view on the <em>shape</em> of the skew, not just the level of IV.</div>\n<h3>Managing a position with net Greeks</h3>\n<p>Now the payoff. Because every Greek is additive, a complex position collapses to a handful of net numbers that you steer like a dashboard. Consider an iron-condor-style position held into earnings: short an OTM call spread and short an OTM put spread. Each leg has its own Greeks; what you manage is the <em>net</em>.</p>\n<div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Net Greeks of a short-premium condor into earnings</span></div><div class='term-body'><span class='dim'>Net delta</span> = <span class='cm'>&minus;5</span> (slight short bias, near neutral)\n<span class='dim'>Net gamma</span> = <span class='bad'>&minus;30</span> (short gamma &mdash; a gap hurts)\n<span class='dim'>Net theta</span> = <span class='ok'>+$45 / day</span> (collecting decay)\n<span class='dim'>Net vega</span> = <span class='bad'>&minus;180</span> (short vega &mdash; wants IV crush)\n<span class='dim'>Read: profits from decay + crush, loses on a big move</span></div></div>\n<p>This single readout tells the whole story. The position is roughly delta-neutral, so direction is not the main bet. It is long theta (+$45/day): it makes money simply by time passing. It is short vega (&minus;180): the earnings IV crush from, say, 60% to 35% would hand it 25 &times; 180 = $4,500 of vega profit. But it is short gamma (&minus;30): if the stock gaps hard on the report, the net delta swings violently against the move and losses pile up fast. The trade's thesis, stated in Greeks, is &ldquo;volatility is overpriced into the event and the stock will not gap beyond the short strikes.&rdquo;</p>\n<div class='box lab'><div class='bt'>Do this.</div> Before any multi-leg trade, write its four net Greeks on one line: delta (direction), gamma (move risk), theta (time edge), vega (vol edge). If you cannot state your thesis in those four numbers, you do not yet understand the position you are about to put on.</div>\n<h3>Steering the position</h3>\n<p>Managing the trade is managing those numbers. If the stock drifts and net delta grows to &minus;25, you buy stock or add a call to flatten it back toward neutral. If you decide the IV crush has already happened and you no longer want short vega, you buy back a wing. If gamma risk feels too large into the print, you reduce size or buy a cheap further-OTM option to cap the tail. Every adjustment is a deliberate change to one net Greek.</p>\n<div class='box danger'><div class='bt'>Pitfall.</div> The most common blow-up is loving the theta and ignoring the gamma and vega beside it. A short-premium book looks like free money on quiet days &mdash; positive theta ticking in &mdash; right up until a gap or a vol spike triggers the short gamma and short vega simultaneously. Always size to the move you are short, not to the decay you are collecting.</div>\n<p>That is the whole part in one sentence: an option premium is built from price, time, and volatility (Lesson 1); delta, gamma, theta, vega, and rho measure its sensitivity to each (Lessons 2-6); Black-Scholes ties them into one surface (Lesson 7); and implied volatility plus the net Greeks let you read, price, and steer any position you hold (Lesson 8).</p>\n<div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Build and read a net-Greek dashboard.</p><ol><li>Pull the IV of several strikes on one expiration and sketch the smile/skew &mdash; confirm downside puts carry higher IV.</li><li>Construct a paper iron condor and record each leg's delta, gamma, theta, and vega.</li><li>Sum them into four net Greeks and state the trade's thesis in one sentence using those numbers.</li><li>Decide in advance which Greek you would adjust, and how, if the stock moved toward one of your short strikes.</li></ol></div></div>"},{"id":"p12-1","part":"12 · Options Strategies","nav":"Reading Payoffs","num":"12.1","kicker":"Part 12 · Lesson 1","title":"Reading a Payoff Diagram","html":"<p>Every option strategy in this part is a recipe of <em>legs</em> — calls and puts, bought or sold, at chosen strikes. The single most important skill is reading the <strong>payoff diagram</strong>: a picture of your profit or loss at expiration as a function of the underlying price. Master this one chart type and every strategy that follows becomes a variation on a theme.</p><p>This is education, not financial advice. The numbers are illustrative and ignore commissions, assignment quirks and taxes unless stated.</p><h3>The anatomy of the chart</h3><p>The horizontal axis is the stock price <code>S</code> at expiration. The vertical axis is profit and loss (P/L) in dollars per share — multiply by 100 for one standard equity contract. The thick line is your payoff. Three landmarks matter on every diagram:</p><ul><li><strong>Break-even (BE):</strong> where the payoff line crosses zero. Above or below it you make money.</li><li><strong>Max profit:</strong> the highest the line ever reaches (sometimes infinite).</li><li><strong>Max loss:</strong> the lowest the line ever reaches (sometimes infinite).</li></ul><div class='box law'><div class='bt'>Definition.</div> A long call's value at expiration is its <em>intrinsic value</em>: payoff = max(S &minus; K, 0). Subtract the premium paid to get P/L: P/L = max(S &minus; K, 0) &minus; premium.</div><h3>The long call, annotated</h3><p>Consider buying one ACME 100-strike call for a premium of <code>$3</code>. You pay $300. Below the strike the call expires worthless and you lose the whole premium — a flat floor at &minus;$3. Above the strike each dollar of stock adds a dollar of intrinsic value. You only turn a profit once the stock has risen enough to recover the premium.</p><div class='chart' data-type='payoff' data-legs='lc:100' data-title='Long 100 Call · $3 premium' data-cap='The hockey stick: flat max loss below the strike, then a 45-degree climb to unlimited upside.'></div><p>Read the chart left to right. From far left up to the strike at 100 the line sits flat at &minus;$3 — this is the <strong>max loss</strong>, the entire premium, realized anywhere below 100. The line begins climbing at the strike, the kink in the hockey stick. It crosses zero — the <strong>break-even</strong> — at 103, the strike plus the premium. From there it rises one-for-one with the stock, so the <strong>max profit is unlimited</strong>: the line never turns back down.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Long call P/L worked three ways</span></div><div class='term-body'><span class='dim'>Premium paid = $3 &nbsp; Strike K = 100</span>\n<span class='cm'>S = 95:</span> max(95&minus;100,0) &minus; 3 = 0 &minus; 3 = <span class='bad'>&minus;$3 (max loss)</span>\n<span class='cm'>S = 103:</span> max(103&minus;100,0) &minus; 3 = 3 &minus; 3 = <span class='dim'>$0 (break-even)</span>\n<span class='cm'>S = 115:</span> max(115&minus;100,0) &minus; 3 = 15 &minus; 3 = <span class='ok'>+$12 profit</span></div></div><h3>Four reflexes for any new strategy</h3><ol><li><strong>List the legs.</strong> Long or short, call or put, which strike, how many.</li><li><strong>Net the premium.</strong> A net debit means you paid (cash out); a net credit means you collected (cash in). Debit strategies generally have a max loss equal to the debit; credit strategies often cap profit at the credit.</li><li><strong>Find the kinks.</strong> Payoff lines bend only at strikes. Between strikes the line is straight, so you only need the value at each strike to draw the whole picture.</li><li><strong>Walk the extremes.</strong> Ask what happens at S = 0 and at S &rarr; &infin;. That tells you whether max profit or max loss is bounded or infinite.</li></ol><div class='box tip'><div class='bt'>Insight.</div> Long options (debit) define your risk to the premium but bleed value over time. Short options (credit) collect premium and benefit from time decay, but the risk is often larger than the reward. The payoff shape tells you which side of that trade you are on at a glance.</div><div class='box danger'><div class='bt'>Pitfall.</div> The payoff diagram shows P/L <em>at expiration only</em>. Before expiry the position is worth more or less because of remaining time value and implied volatility. A long call can be deeply underwater at expiration's strike yet show a gain a month earlier if volatility spiked. Treat the diagram as the destination, not the journey.</div><h3>Short positions flip the picture</h3><p>Selling the same 100 call mirrors the buyer. Your best case is keeping the $3 credit (a flat ceiling), your break-even is still 103, but above it your losses are unlimited. Whenever you sell a leg, picture the buyer's chart reflected through the horizontal axis — your gain is their loss and vice versa.</p><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: read a payoff cold and label its three landmarks.</p><ol><li>Buy a put: a long 100 put for a $2 premium. On paper, compute P/L at S = 90, 98 and 105 using P/L = max(K &minus; S, 0) &minus; premium.</li><li>Mark the break-even (98), the max loss (&minus;$2 above 100) and the max profit (at S = 0, equal to 98).</li><li>Now sell that put and redraw it as the mirror image. Confirm the seller's max profit is the $2 credit and the max loss is 98.</li></ol></div></div>"},{"id":"p12-2","part":"12 · Options Strategies","nav":"Covered Call & CSP","num":"12.2","kicker":"Part 12 · Lesson 2","title":"The Covered Call and the Cash-Secured Put","html":"<p>The covered call and the cash-secured put are the two foundational <em>income</em> strategies. Each sells one option backed by an asset you already hold — shares for the call, cash for the put — so neither is naked. They are mirror images, and seeing why is the lesson.</p><h3>The covered call</h3><p>You own 100 shares of ACME bought at <code>$50</code>. You are mildly bullish but content to sell higher, so you sell one 55-strike call expiring in a month and collect <code>$1.50</code> ($150). You are <em>covered</em> because if the stock is called away you simply deliver the shares you already own.</p><div class='box law'><div class='bt'>Definition.</div> Covered call = long 100 shares + short 1 call. Net cost basis falls to entry &minus; premium = 50 &minus; 1.50 = <code>$48.50</code>. Max profit = (strike &minus; basis) = 55 &minus; 48.50 = <code>$6.50</code>, capped. Upside above the strike is forfeited.</div><div class='chart' data-type='payoff' data-legs='ls:50,sc:55' data-title='Covered Call · long stock 50, short 55 call' data-cap='The short call shaves a ceiling onto long stock: capped above 55, cushioned by premium below.'></div><p>Read the chart. Below 48.50 you lose money, but less than holding stock alone — the $1.50 premium shifts your break-even down from 50 to 48.50, the new floor of profitability. Between 48.50 and 55 you gain on the shares plus keep the premium. At and above 55 the line goes flat: the short call caps you at <strong>$6.50 max profit</strong> (a gain to 55 of $5 plus the $1.50 premium, i.e. an effective sale at 56.50). You gave up unlimited upside in exchange for income and a small downside buffer.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Covered call outcomes at expiration</span></div><div class='term-body'><span class='dim'>Basis 50, premium 1.50, strike 55</span>\n<span class='cm'>S = 45:</span> stock &minus;5.00 + premium 1.50 = <span class='bad'>&minus;$3.50</span>\n<span class='cm'>S = 48.50:</span> stock &minus;1.50 + premium 1.50 = <span class='dim'>$0 (break-even)</span>\n<span class='cm'>S = 53:</span> stock +3.00 + premium 1.50 = <span class='ok'>+$4.50</span>\n<span class='cm'>S = 60:</span> capped at 55: gain 5.00 + premium 1.50 = <span class='ok'>+$6.50 (max)</span></div></div><h3>The cash-secured put</h3><p>Now the mirror. Instead of owning ACME, you would happily buy it at 45. You sell one 45-strike put and collect, say, <code>$1.50</code>, setting aside $4,500 of cash to honor the purchase if assigned. That cash is the <em>security</em>; the put is not naked.</p><div class='chart' data-type='payoff' data-legs='sp:45' data-title='Cash-Secured 45 Put · $1.50 credit' data-cap='Keep the credit above 45; below it you buy stock at a discounted effective price of 43.50.'></div><p>If ACME stays above 45 the put expires worthless and you keep the $150 — your <strong>max profit</strong>. If it falls below 45 you are assigned and buy 100 shares, but the premium lowers your effective entry to <code>$43.50</code> (the break-even). Your <strong>max loss</strong> is large but bounded: if the stock went to zero you would lose 43.50 per share, exactly what an outright buyer at 43.50 would lose. The risk is identical to owning the stock from your target price.</p><div class='box tip'><div class='bt'>Insight.</div> A cash-secured put has the <em>same payoff shape</em> as a covered call. Both are short a put in disguise (the covered call is synthetically short a 55 put). They collect premium, profit in a quiet-to-rising market, and carry full downside below the strike. Choose the put when you want to acquire stock cheaply; choose the call when you already own it and want income.</p></div><div class='box danger'><div class='bt'>Pitfall.</div> The covered call's worst feature is <em>opportunity cost</em>. If ACME gaps to 70 on news, you are still capped at 56.50 and watch the rest evaporate. Sell calls only at strikes where you are genuinely willing to part with the shares, and avoid selling through earnings unless that capped outcome is acceptable.</div><div class='hw'><div class='hw-head'><span class='hwicon'>&#9656;</span><span class='hwt'>Try It</span></div><div class='hw-body'><p>Goal: prove the two strategies are mirror twins.</p><ol><li>For the covered call (basis 50, short 55 call at 1.50), tabulate P/L at S = 40, 50, 55, 65.</li><li>For the cash-secured 45 put at 1.50, tabulate P/L at the same prices.</li><li>Note where each caps out and where each break-even sits, and confirm both are short-volatility, premium-collecting positions.</li></ol></div></div>"},{"id":"p12-3","part":"12 · Options Strategies","nav":"Protective & Collar","num":"12.3","kicker":"Part 12 · Lesson 3","title":"The Protective Put and the Collar","html":"<p>Where the last lesson sold options for income, this one buys them for <em>insurance</em>. The protective put hedges a stock you own; the collar pays for that hedge by selling away some upside. Together they let a long-term holder sleep through a storm.</p><h3>The protective put</h3><p>You own 100 shares of ACME at <code>$50</code> and fear a drawdown but do not want to sell. You buy one 45-strike put for <code>$1.50</code>. That put is a contractual right to sell at 45 no matter how far the stock falls — downside insurance with a deductible.</p><div class='box law'><div class='bt'>Definition.</div> Protective put = long stock + long put. Max loss = (entry &minus; strike) + premium = (50 &minus; 45) + 1.50 = <code>$6.50</code>, fixed. Break-even = entry + premium = <code>$51.50</code>. Upside remains unlimited, minus the premium drag.</div><div class='chart' data-type='payoff' data-legs='ls:50,lp:45' data-title='Protective Put · long stock 50, long 45 put' data-cap='A floor at 45: losses stop falling, while upside stays open above the 51.50 break-even.'></div><p>Read the floor. Below 45 the put gains a dollar for every dollar the stock loses, so the combined line goes flat: your <strong>max loss is locked at $6.50</strong> however ugly the tape gets. Between 45 and 51.50 you are recovering the insurance premium; above 51.50 you profit, participating fully in any rally less the $1.50 you spent. The cost of the insurance is that drag — you start each move 1.50 behind.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Protective put vs. naked stock</span></div><div class='term-body'><span class='dim'>Stock basis 50, put strike 45, premium 1.50</span>\n<span class='cm'>S = 35:</span> stock &minus;15.00, put +10.00, prem &minus;1.50 = <span class='bad'>&minus;$6.50 (floored)</span>\n<span class='cm'>S = 45:</span> stock &minus;5.00, put 0, prem &minus;1.50 = <span class='bad'>&minus;$6.50</span>\n<span class='cm'>S = 51.50:</span> stock +1.50, put 0, prem &minus;1.50 = <span class='dim'>$0 (break-even)</span>\n<span class='cm'>S = 60:</span> stock +10.00, put 0, prem &minus;1.50 = <span class='ok'>+$8.50</span></div></div><h3>Financing it: the collar</h3><p>Insurance is a recurring cost. To offset it, sell an out-of-the-money call and use that credit to pay for the put. Sell the 55 call for <code>$1.50</code> against your long stock and long 45 put. The call premium exactly funds the put premium — a <strong>zero-cost collar</strong>.</p><div class='box law'><div class='bt'>Definition.</div> Collar = long stock + long put (floor) + short call (ceiling). Here floor 45, ceiling 55, net premium &asymp; $0. P/L is boxed between &minus;$5 (at or below 45) and +$5 (at or above 55).</div><div class='chart' data-type='payoff' data-legs='ls:50,lp:45,sc:55' data-title='Zero-Cost Collar · stock 50, +45 put, &minus;55 call' data-cap='Profit boxed between a floor at 45 and a ceiling at 55 for roughly no upfront cost.'></div><p>The collar trades both tails for certainty. Below 45 the long put floors your loss at $5; above 55 the short call caps your gain at $5. In between you ride the stock normally. Because the call paid for the put, you spent nothing upfront — you simply rented out the upside above 55 to buy protection below 45.</p><div class='box tip'><div class='bt'>Insight.</div> A collar is a covered call with a long put bolted on, or equivalently a bull call spread expressed on stock. It is the workhorse of holders sitting on large unrealized gains who want to protect a position into an uncertain even
