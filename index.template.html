<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ultimate Trading & Technical Analysis Masterclass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:ital,wght@0,400;0,700;0,800;1,400&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080b10;--bg-2:#0b0f15;--panel:#0e131b;--panel-2:#131a24;--grid:#1b2535;
    --ink:#d4dee8;--ink-dim:#8294a8;--ink-faint:#4e5d70;
    --green:#26d07c;--green-bright:#46e88f;--amber:#ffb020;--red:#ff5562;--cyan:#4aa8ff;--violet:#a78bfa;
    --border:#203044;--border-soft:#17222f;
    --shadow:0 0 0 1px rgba(38,208,124,.06), 0 24px 60px -28px rgba(0,0,0,.92);
    --mono:'JetBrains Mono',monospace;--body:'IBM Plex Mono',monospace;--crt:'VT323',monospace;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.72;-webkit-font-smoothing:antialiased;}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9998;background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,.18) 3px, rgba(0,0,0,0) 4px);mix-blend-mode:overlay;opacity:.5;}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;background:radial-gradient(ellipse at 50% 0%, rgba(94,243,140,.05), transparent 60%),radial-gradient(ellipse at 100% 100%, rgba(0,0,0,.6), transparent 55%);}
  ::selection{background:var(--green);color:#04130a;}
  .shell{display:grid;grid-template-columns:320px 1fr;min-height:100vh;}
  aside{position:sticky;top:0;height:100vh;overflow-y:auto;background:linear-gradient(180deg,var(--bg-2),var(--bg));border-right:1px solid var(--border);padding:0 0 60px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
  aside::-webkit-scrollbar{width:8px;}
  aside::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
  .brand{padding:26px 24px 18px;border-bottom:1px solid var(--border-soft);position:sticky;top:0;background:linear-gradient(180deg,var(--bg-2),rgba(10,17,12,.96));backdrop-filter:blur(6px);z-index:5;}
  .brand .tag{font-family:var(--mono);font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--green);opacity:.8;}
  .brand h1{font-family:var(--crt);font-weight:400;font-size:38px;line-height:.92;margin:6px 0 2px;color:var(--green-bright);text-shadow:0 0 18px rgba(94,243,140,.35);letter-spacing:.02em;}
  .brand .sub{font-size:11px;color:var(--ink-dim);letter-spacing:.04em;}
  .progress-wrap{margin-top:14px;}
  .progress-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--ink-dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px;}
  .progress-bar{height:5px;background:var(--grid);border-radius:99px;overflow:hidden;border:1px solid var(--border-soft);}
  .progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width .4s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 12px rgba(94,243,140,.6);}
  nav{padding:14px 12px 0;}
  .part-label{font-family:var(--mono);font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-faint);padding:18px 12px 7px;display:block;}
  .nav-item{display:flex;gap:10px;align-items:baseline;width:100%;text-align:left;background:none;border:none;cursor:pointer;color:var(--ink-dim);font-family:var(--body);font-size:13.5px;padding:8px 12px;border-radius:7px;line-height:1.4;transition:.16s;border:1px solid transparent;}
  .nav-item:hover{background:var(--panel);color:var(--ink);}
  .nav-item.active{background:var(--panel-2);color:var(--green-bright);border-color:var(--border);box-shadow:inset 2px 0 0 var(--green);}
  .nav-item .num{font-family:var(--mono);font-size:11px;color:var(--green);opacity:.7;min-width:30px;}
  .nav-item.active .num{opacity:1;}
  .nav-item .done{margin-left:auto;color:var(--green);font-size:12px;opacity:0;transition:.2s;}
  .nav-item.completed .done{opacity:1;}
  .nav-item.completed{color:var(--ink-faint);}
  main{padding:0;max-width:980px;}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;padding:14px 40px;background:rgba(7,11,8,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--border-soft);}
  .crumbs{font-family:var(--mono);font-size:11px;color:var(--ink-dim);letter-spacing:.05em;}
  .crumbs b{color:var(--green);font-weight:700;}
  .blink{animation:blink 1.1s steps(1) infinite;color:var(--green);}
  @keyframes blink{50%{opacity:0;}}
  .content{padding:46px 56px 120px;animation:fade .45s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .lesson-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--amber);}
  h2.lesson-title{font-family:var(--mono);font-weight:800;font-size:30px;line-height:1.12;margin:8px 0 6px;color:#eaf6ee;letter-spacing:-.01em;}
  .lede{font-size:16px;color:#cfe6d8;border-left:2px solid var(--green);padding-left:16px;margin:18px 0 30px;}
  h3{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--green-bright);margin:34px 0 10px;letter-spacing:.01em;}
  h3::before{content:"▸ ";color:var(--green);opacity:.7;}
  h4{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--cyan);margin:22px 0 6px;letter-spacing:.04em;text-transform:uppercase;}
  p{margin:12px 0;}
  a{color:var(--cyan);text-decoration:none;border-bottom:1px dotted var(--cyan);}
  a:hover{color:var(--green-bright);border-color:var(--green-bright);}
  strong{color:#e6f4ec;font-weight:600;}
  em{color:var(--amber);font-style:normal;}
  ul,ol{margin:12px 0;padding-left:22px;}
  li{margin:7px 0;}
  li::marker{color:var(--green);}
  code{font-family:var(--mono);background:var(--panel-2);color:var(--green-bright);padding:1.5px 6px;border-radius:5px;font-size:13px;border:1px solid var(--border-soft);}
  .term{margin:20px 0;border:1px solid var(--border);border-radius:11px;overflow:hidden;background:#040806;box-shadow:var(--shadow);}
  .term-head{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--panel-2);border-bottom:1px solid var(--border-soft);}
  .dot{width:11px;height:11px;border-radius:50%;}
  .dot.r{background:#ff5f56;}.dot.y{background:#ffbd2e;}.dot.g{background:#27c93f;}
  .term-title{margin-left:8px;font-family:var(--mono);font-size:11px;color:var(--ink-dim);letter-spacing:.06em;}
  .term-body{padding:16px 18px;font-family:var(--mono);font-size:12.5px;line-height:1.62;overflow-x:auto;white-space:pre;color:#b9e8c8;}
  .term-body .pr{color:var(--green);}.term-body .cm{color:#7fd0ff;}.term-body .ok{color:var(--green-bright);}.term-body .bad{color:var(--red);}.term-body .dim{color:var(--ink-faint);}.term-body .am{color:var(--amber);}
  .box{border-radius:11px;padding:16px 18px 16px 46px;margin:20px 0;position:relative;border:1px solid var(--border);background:var(--panel);}
  .box::before{position:absolute;left:16px;top:15px;font-family:var(--mono);font-size:16px;}
  .box .bt{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;margin-bottom:4px;}
  .box.lab{border-color:#1f4d35;background:linear-gradient(180deg,rgba(94,243,140,.05),transparent);}
  .box.lab::before{content:"⌘";color:var(--green);}
  .box.lab .bt{color:var(--green-bright);}
  .box.law{border-color:#5a4410;background:linear-gradient(180deg,rgba(255,176,0,.06),transparent);}
  .box.law::before{content:"§";color:var(--amber);}
  .box.law .bt{color:var(--amber);}
  .box.danger{border-color:#5e1f1f;background:linear-gradient(180deg,rgba(255,93,93,.06),transparent);}
  .box.danger::before{content:"!";color:var(--red);font-weight:800;}
  .box.danger .bt{color:var(--red);}
  .box.tip{border-color:#1d4453;background:linear-gradient(180deg,rgba(90,215,255,.05),transparent);}
  .box.tip::before{content:"✦";color:var(--cyan);}
  .box.tip .bt{color:var(--cyan);}
  .hw{margin:34px 0 10px;border:1px dashed var(--green);border-radius:12px;background:linear-gradient(180deg,rgba(94,243,140,.04),transparent);padding:0;overflow:hidden;}
  .hw-head{display:flex;align-items:center;gap:10px;padding:13px 18px;background:rgba(94,243,140,.06);border-bottom:1px dashed var(--border);}
  .hw-head .hwicon{font-family:var(--crt);font-size:22px;color:var(--green-bright);line-height:1;}
  .hw-head .hwt{font-family:var(--mono);font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:13px;color:var(--green-bright);}
  .hw-body{padding:8px 20px 18px;}
  .hw-body ol{counter-reset:hw;list-style:none;padding-left:0;}
  .hw-body ol li{counter-increment:hw;padding-left:34px;position:relative;margin:11px 0;}
  .hw-body ol li::before{content:counter(hw);position:absolute;left:0;top:1px;width:22px;height:22px;border-radius:6px;background:var(--panel-2);border:1px solid var(--green);color:var(--green-bright);font-family:var(--mono);font-size:11px;display:flex;align-items:center;justify-content:center;}
  .stretch{font-family:var(--mono);font-size:11px;color:var(--amber);letter-spacing:.1em;text-transform:uppercase;margin-top:14px;display:inline-block;}
  table{width:100%;border-collapse:collapse;margin:18px 0;font-size:13px;}
  th,td{border:1px solid var(--border);padding:9px 12px;text-align:left;vertical-align:top;}
  th{background:var(--panel-2);color:var(--green-bright);font-family:var(--mono);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
  td code{font-size:12px;}
  .lesson-foot{display:flex;justify-content:space-between;align-items:center;margin-top:54px;padding-top:24px;border-top:1px solid var(--border-soft);gap:14px;flex-wrap:wrap;}
  .btn{font-family:var(--mono);font-size:12px;letter-spacing:.06em;border:1px solid var(--border);background:var(--panel);color:var(--ink);padding:11px 18px;border-radius:8px;cursor:pointer;transition:.18s;}
  .btn:hover{border-color:var(--green);color:var(--green-bright);background:var(--panel-2);}
  .btn.primary{border-color:var(--green);color:#04130a;background:var(--green);font-weight:700;}
  .btn.primary:hover{background:var(--green-bright);box-shadow:0 0 22px rgba(94,243,140,.4);}
  .btn.ghost{opacity:.55;}
  .pill{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:99px;border:1px solid var(--border);color:var(--ink-dim);margin:0 6px 6px 0;}
  .pill.t{border-color:var(--cyan);color:var(--cyan);}
  .cover h2.lesson-title{font-family:var(--crt);font-size:64px;color:var(--green-bright);text-shadow:0 0 30px rgba(94,243,140,.3);font-weight:400;line-height:.95;}
  .cover .lede{font-size:17px;border:none;padding:0;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:24px 0;}
  .card{border:1px solid var(--border);border-radius:11px;padding:16px 18px;background:var(--panel);}
  .card .ct{font-family:var(--mono);color:var(--green-bright);font-weight:700;font-size:13px;letter-spacing:.05em;margin-bottom:5px;}
  .card p{margin:4px 0 0;font-size:13px;color:var(--ink-dim);}
  .mobile-bar{display:none;}
  .scrim{display:none;}
  @media(max-width:880px){
    .shell{grid-template-columns:1fr;}
    aside{position:fixed;left:0;top:0;width:300px;z-index:50;transform:translateX(-100%);transition:.3s;box-shadow:30px 0 60px rgba(0,0,0,.6);}
    aside.open{transform:none;}
    .mobile-bar{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40;padding:12px 18px;background:rgba(7,11,8,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);}
    .menu-btn{font-family:var(--mono);background:var(--panel-2);border:1px solid var(--border);color:var(--green);padding:8px 12px;border-radius:8px;cursor:pointer;}
    .content{padding:28px 22px 100px;}
    .topbar{padding:12px 22px;}
    .grid2{grid-template-columns:1fr;}
    .cover h2.lesson-title{font-size:44px;}
    .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:45;}
    .scrim.show{display:block;}
  }
  .chart{margin:24px 0;border:1px solid var(--border);border-radius:11px;background:var(--panel);overflow:hidden;box-shadow:var(--shadow);}
  .chart-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 14px;background:var(--panel-2);border-bottom:1px solid var(--border-soft);font-family:var(--mono);font-size:11px;letter-spacing:.04em;flex-wrap:wrap;}
  .chart-head .ct{color:var(--ink);font-weight:700;}
  .chart-head .cleg{color:var(--ink-dim);font-size:10px;display:flex;gap:12px;flex-wrap:wrap;}
  .chart-head .cleg i{font-style:normal;display:inline-flex;align-items:center;gap:5px;}
  .chart-head .cleg .sw{width:11px;height:3px;border-radius:2px;display:inline-block;}
  .chart svg{display:block;width:100%;height:auto;background:transparent;}
  .chart svg text{font-family:var(--mono);}
  .chart-cap{padding:8px 14px 10px;font-size:12px;color:var(--ink-dim);border-top:1px solid var(--border-soft);font-family:var(--body);line-height:1.5;}
  .chart-bad{padding:14px;color:var(--red);font-family:var(--mono);font-size:12px;}
</style>
</head>
<body>
<div class="shell">
  <aside id="sidebar">
    <div class="brand">
      <span class="tag">// market_open</span>
      <h1>TRADE//DESK</h1>
      <div class="sub">The Ultimate Trading &amp; Technical Analysis Masterclass</div>
      <div class="progress-wrap">
        <div class="progress-meta"><span>progress</span><span id="pctTxt">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="pfill"></div></div>
      </div>
    </div>
    <nav id="nav"></nav>
  </aside>
  <div class="scrim" id="scrim"></div>
  <main>
    <div class="mobile-bar">
      <button class="menu-btn" id="menuBtn">☰ menu</button>
      <span class="crumbs"><b>trader@desk</b>:~$</span>
    </div>
    <div class="topbar">
      <span class="crumbs" id="crumbs"><b>trader@desk</b>:~$ <span id="crumbPath">./start</span><span class="blink">█</span></span>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<script>
const L = /*__LESSONS__*/[];
/* ===== RENDER ENGINE ===== */
const nav=document.getElementById('nav');
const content=document.getElementById('content');
const crumbPath=document.getElementById('crumbPath');
const pfill=document.getElementById('pfill');
const pctTxt=document.getElementById('pctTxt');
const completed=new Set();
let current=0;
let lastPart=null;
L.forEach((les,i)=>{
  if(les.part!==lastPart){
    const lab=document.createElement('span');lab.className='part-label';lab.textContent=les.part;nav.appendChild(lab);lastPart=les.part;
  }
  const b=document.createElement('button');
  b.className='nav-item';b.dataset.i=i;
  b.innerHTML=`<span class="num">${les.num||'»'}</span><span class="ntxt">${les.nav}</span><span class="done">✓</span>`;
  b.addEventListener('click',()=>{go(i);closeSidebar();});
  nav.appendChild(b);
});
function updateNav(){
  document.querySelectorAll('.nav-item').forEach(el=>{
    const i=+el.dataset.i;
    el.classList.toggle('active',i===current);
    el.classList.toggle('completed',completed.has(i));
  });
}
function updateProgress(){
  const total=L.filter(x=>!x.cover).length;
  const doneCount=[...completed].filter(i=>!L[i].cover).length;
  const pct=Math.round(doneCount/total*100);
  pfill.style.width=pct+'%';pctTxt.textContent=pct+'%';
}
function go(i){
  current=i;const les=L[i];
  crumbPath.textContent=les.num?`./module-${les.num}`:'./start';
  let foot=`<div class="lesson-foot">`;
  foot+=i>0?`<button class="btn ghost" onclick="go(${i-1})">← prev</button>`:`<span></span>`;
  if(!les.cover){
    const mark=completed.has(i);
    foot+=`<button class="btn" id="markBtn" onclick="toggleDone(${i})">${mark?'✓ completed — click to undo':'mark lesson complete'}</button>`;
  } else {foot+=`<span></span>`;}
  foot+=i<L.length-1?`<button class="btn primary" onclick="go(${i+1})">next →</button>`:`<span></span>`;
  foot+=`</div>`;
  const head=les.cover?'':`<span class="lesson-kicker">${les.kicker}</span><h2 class="lesson-title">${les.title}</h2>`;
  content.innerHTML=head+les.html+foot;
  if(window.renderCharts)renderCharts(content);
  window.scrollTo({top:0,behavior:'smooth'});
  updateNav();
}
function toggleDone(i){
  if(completed.has(i))completed.delete(i);else completed.add(i);
  updateProgress();updateNav();
  const btn=document.getElementById('markBtn');
  if(btn)btn.textContent=completed.has(i)?'✓ completed — click to undo':'mark lesson complete';
}
window.go=go;window.toggleDone=toggleDone;
const sidebar=document.getElementById('sidebar');
const scrim=document.getElementById('scrim');
document.getElementById('menuBtn').addEventListener('click',()=>{sidebar.classList.toggle('open');scrim.classList.toggle('show');});
scrim.addEventListener('click',closeSidebar);
function closeSidebar(){sidebar.classList.remove('open');scrim.classList.remove('show');}
go(0);updateProgress();
</script>
<script>
/*__CHART_ENGINE__*/
</script>
</body>
</html>
